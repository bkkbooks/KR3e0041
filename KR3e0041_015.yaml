body:
  text: 三因極一病證方論卷十五宋陳言撰瘰􅊓證治夫九漏形疹皆瘰􅊓於項腋之間發作寒熱其根在臟府千金所叙雖名九漏别録方證其名更多狼漏根於肝得之憂怒鼠漏根於胃得之食鼠毒螻蛄漏根於大腸得之食果蜂漏根於脾得之飲流水有蜂毒蚍蜉漏根於腎得之食中有蚍蜉毒蠐螬漏根於心得之喜怒哭泣浮蛆漏根於膽得之思慮瘰􅊓漏根於腎得之新沐髮轉脉漏根於小腸得之驚卧失枕等因之證文義不明未知所始若以理例較之怒根在肝鼠毒在胃食果瓜在大腸蜂水在脾姑且通俗易曉如轉脉因驚根當在膽却云在小腸浮蛆因思慮根當在脾却云在膽瘰􅊓因沐髮亦不當在腎名義不通似難考據又况喜怒蠐螬之名思慮浮蛆之名此尤不可曉也其外更有風漏冷漏蝎漏蟻漏蜣螂漏蚯蚓漏蝦蟆漏等名狀不一諒皆出於土俗隨象命名難以考據治之之法觀其未著於肌肉而外為膿血者從本引末可使針之炙之敷之解之從其所因宣通本臟皆有成法千金又有决死生反其目視其中有赤脉從上貫瞳子見一脉一嵗死一脉半一嵗半死二脉二嵗死三脉三嵗死赤脉不下貫瞳子可治雖有是說驗之病者少有是證亦難考據此往往是三陽傳諸隂經方有之若非臟發未必有是學者知之必勝丸治瘰癧不論年深日近及腦後兩邉有小結核連復數箇及癆瘵腹中有塊鯽魚一箇去子及腸肚入雄黃一枚如雞子大硇砂一錢在腹內仰安魚於炭火上燒煙盡取出以全蜈蚣一條蓬术五錢梔子五箇皂角二挺並燒萆麻子五箇去皮燈上燒更用黃明膠二條皂角二挺去皮酥炙右為末别用皂角二挺去皮捶碎以水三碗揉汁去渣煮精羊肉四兩爛軟入輕粉五匣男子乳汁半兩同研為膏和藥末丸如菉豆大硃砂為衣溫酒清晨下十丸日一服至脫下肉疙瘩為效若項有五箇則以五服藥取之視其所生多少以為服數既可更進數服如熱毒瘡􅟻未有頭腦者一服亦須消散白花蛇散治九漏瘰癧發於項腋之間增寒發熱或痛或不痛白花蛇酒浸軟去皮骨焙乾二兩生犀角鎊五錢黑牽牛五錢半生半用炮青皮五錢右為末每服二錢膩粉五分研勻五更時糯米飲調下已時下惡物乃瘡之根也更候十餘日再進一服忌發風壅熱物如已成瘡一月可效用之神驗四聖散治瘰癧用白花蛇散取效後須用此補之永去其根海藻洗石决明煅羌活瞿麥穗各等分右為末每服二錢米湯調下日三服下清水盡為度蝸牛散治瘰癧已潰未潰皆可貼蝸牛不拘多少以竹索串瓦上晒乾燒存性右為末入輕粉少許猪骨髓調用紙花量病大小貼之一法以帶殼蝸牛七箇生取肉入丁香七枚於七殼內燒存性與肉同研成膏用紙花貼之旱蓮子丸治少長臟氣不平憂怒驚恐諸氣抑鬱結聚瘰癧滯留項腋及外傷風寒燥濕飲食百毒結成諸漏發作寒熱偏於項腋無問久近悉主之旱蓮子連翹子威靈仙何首烏蔓荆子京三稜醋浸濕紙裹煨赤芍藥各一兩木香二兩大皂角三挺去皮酥灸無酥用羊脂灸右為末糊丸桐子大建茶清下三十丸至五十丸日三服小兒量與之食後服癭瘤證治夫血氣凝滯結癭瘤者雖與癰疽不同所因一也癭多著於肩項瘤則隨氣凝結此等皆數年深逺浸大浸長堅硬不可移者名曰石癭皮色不變即名肉癭筋脉露結者名筋癭赤脉交絡者名血癭隨憂愁消長者名氣癭五癭皆不可妄决破决破則膿血崩潰多致夭枉瘤者有六骨瘤脂瘤肉瘤膿瘤血瘤亦不可决潰肉瘤尤不可治治則殺人惟脂瘤破而去其脂粉則愈破結散治石癭氣癭勞血癭憂癭等證海藻洗龍膽海蛤通草昆布礬石煆枯松蘿各三分麥麯四兩半夏右為末酒服方寸匕日三服忌鯽魚猪肉五辛生菜諸雜毒物十日知二十日愈白膏治一切風熱毒腫及臟氣鬱結丹石發動結為癰疽瘰癧諸瘡腫未潰即令消散九漏浸淫膿汁淋漓諸治不瘥者悉主之白蘞白薇白芨白芷薤白各五錢洗銼以清油一斤煎至半斤濾去渣入黃茋甘松藿香零陵香防風當歸各五錢再入煎油煎拾上火綿濾去渣再入定粉二兩黃蠟三兩寒水石煆水飛過二兩研細右再煎滴水成珠為度磁器盛之以腦子少許糝其上煎時忌鐵器以柳枝攪附骨疽證治附骨疽與白虎飛尸歷節風皆相類歷節則走注不定白虎飛尸痛淺按之則止附骨疽痛深按之無益又一說白虎飛尸亦能作膿著骨而生及其腐潰碎骨盡出方愈如是則附骨疽與白虎飛尸是一病但淺深不同耳白虎飛尸俗名風煞然病附骨疽少有骨出者宣拔毒氣不可執泥一向五香連翹漏蘆之屬當先溫腎如靈寶膏乃神藥惟在針烙淺深刺拔其毒根則易愈不爾則順脉流走遍體紅腫卒致不救蟾蜍膏治附骨疽久不瘥膿汁敗壞或骨從瘡孔出大蝦蟆一隻亂髮一把如雞子大猪脂油一斤右同煎二物略盡濾去滓凝如膏貼之凡欲貼瘡須先以桑白皮烏豆煎湯淋洗拭乾以龍骨煅為粉糝瘡四邉令易收然後方用膏貼黑鯽膏治附骨疽膿熟已破未破或膿出不愈黑色鯽魚一箇去腸肚入白鹽令細線縫之右銅石器中煮一盞水盡魚乾焦為末脂油調敷已破則乾糝少有痛意勿怪赤术丸治附骨疽膿出淋漓久久不瘥已破未破皆可服赤术一斤米泔浸三宿取出洗净晒乾再以天麻腐汙浸水十餘日許入川椒二十一粒葱白七根煮黑取出洗净焙乾破故紙炒川練子銼炒茯苓舶上茴香炒杜茴香白芷桃仁去皮尖炒各半斤右為末煉蜜丸桐子大每服五十丸溫酒鹽湯任下一方用槲樹皮燒灰為末餘方寸匕又方用蜜陀僧為末以猪骨髓調敷之兼治漏痔不愈疔瘡證治世醫諸傷寒在諸風之前癰疽冠雜病之首言此二證重大急切然方論疔瘡又在癰疽之先其意謂急切甚矣但江左少見少病醫者不以為事病源既有不可不知且依千金類例具列於後既不能究其源亦不敢有改作一曰麻子疔肉上起頭如黍米色稍黑四邉微赤多癢忌食麻子及麻衣入麻田中行二曰石丁度因相連色烏黑如黑豆甚硬刺之不得入肉隱隱微痛忌瓦礫磚石之屬三曰雄疔皰頭黑黶四畔仰瘡皰漿起有水出色黃大如錢孔忌房事四曰雌疔瘡頭稍黃向裏黶亦赤似灸病四畔皰漿起似錢孔色赤亦忌房事五曰火疔狀如湯火燒灼瘡頭黑黶四邉有泡漿起如赤粟米忌火爍灸六曰爛疔色稍黑有白斑瘡中潰潰有濃水流出瘡形大小如匙面忌食沸爛等物七曰三十六疔頭黑浮起形如黑豆四邉起大赤色今日生一明日生二三日生三若滿三十六疔藥所不治俗名黑泡忌嗔怒蓄積愁恨八曰蛇眼疔瘡頭黑皮上浮生形如小豆狀似蛇眼大體硬忌惡眼看之并嫉妬人見反毒九曰鹽膚疔狀如匙面四邉皆赤有黑粟粒起忌醎食十曰水洗疔狀如錢或如錢孔瘡頭大裏黑黶汗出中硬忌飲漿水水洗渡河十一曰刀鐮疔瘡濶狹如韭葉大長一寸左側肉黑如燒灼忌刺及刀鐮切割鐵創所傷可以藥治十二曰浮漚疔瘡體曲圓少許不合長而濶如韭葉內黃外黑黑處刺不痛內黃處刺之則痛十三曰牛拘疔肉泡起掐不破此十三證初發必先癢後痛先寒後熱熱定又復發寒四肢浮腫沉重頭痛心驚眼花大重者嘔􅊇嘔􅊇則難治麻子疔始末唯癢所録忌者勿犯犯即難治浮漚疔牛拘疔無甚忌縱不治亦不殺人欲知犯觸但脊强痛極甚不可忍者是犯之狀也學者宜潛心焉治三十六種疔悉以此方治之以綿一片裹藥取匝為限亂髮雞子大攤布帛上牛黃如桐子大反鈎棘針二十一枚赤小豆七粒為末並布髮上捲緋帛作團外以髮作繩十字縛之尉斗中急火燒灰研篩細以枸杞或子或根皮枝葉隨得為末用枸杞末二匕緋帛灰一匕研勻分二服空心酒調下蒼耳散治一切疔腫神效方蒼耳根莖苖子但取一色便可用以一味燒為灰醋泔淀和如泥塗上乾即換之不過十度即能拔根出矣腸癰證治癰疽初無定處隨其所發即便命名在外則為發背發腦在內則為腸癰內癰心癰腎癰肺癰臍癰等治得其法則生失法則死外症易識內症難明不可不偹述也腸癰為病其身甲錯腹皮急按之濡如瘇狀腹無積聚身無熱脉數此為腸內有膿久積隂冷所成也故金匱用附子溫之小腹腫痞按之痛如淋小便自調發熱身無汗復惡寒其脉遲緊膿未成可下之當有血脉洪數者膿已成不可下以內結熱所成也故金匱以大黃和之甚者腹乃脹大轉側聞水聲或繞臍生瘡或膿從臍出或大便出膿血不治必死其如五內生瘡亦止分别隂陽而已不比外癰須依四節八事之次第也千金引官羽林郎婦病醫診之其脉滑數滑則為實數則為熱滑則為榮數則為衛衛數下降榮滑上升榮衛相干血為敗濁小腹堅痞小便或澀或復汗出或復惡寒膿為已成設脉遲緊即為瘀血血下即愈更內經所載有息積病此見有得之二三年遍身微腫續乃大腸與臍連日出膿遂致不救此亦腸癰之類也薏苡附子敗醬散治脉數身無熱腹無聚積按之濡此為腸癰薏苡仁二兩半附子炮五錢敗醬一兩一分右㕮咀每服四錢水二盞煎七分去滓空心服以小便利為效大黃牡丹湯治腸癰小腹腫痞按之即痛小便自調時時發熱自汗出復惡寒其脉遲緊者膿未成可以下之當有血脉洪數者膿已成不可下大黃半兩蒸丹皮一錢桃仁五錢去皮尖瓜子三分芒硝二分右㕮咀為一服以水三盞煎八分去滓入芒硝再煎沸頓服無時薏苡仁湯治腸癰腸中㽲痛煩躁不安或脹滿不食小便澀婦人産後虛熱多有此病縱非癰但疑是便可服就有差訛亦無害薏苡仁五兩丹皮桃仁各三兩瓜瓣仁四兩右銼散每服四大錢水一盞半煎七分去滓服五痔證治經云腸澼為痔如大澤中有小山突出為痔於人九竅中凡有小肉突出者皆曰痔不特於肛門邉生亦有鼻痔眼痔牙痔等肛門中證狀非一方書分出五種曰牝曰牡曰脉曰腸曰氣牡痔者肛邉腫痛突出一枚五六日潰出膿血自愈牝痔者肛邉發㿔數箇如鼠乳狀脉痔者無頭脉中并小竅注下清血腸痔者生於腸內更衣時非挼搦不能入氣痔者遇憂怒則發肛門腫痛氣散則愈治之之法切勿用生砒毒氣入腹反至為患貴人遭此痛不忍言因書以戒後學五灰散治五痔不問內外牝牡寒濕悉主之鱉甲治牡痔蝟皮治牝痔猪左足懸蹄甲治腸痔蜂房治脉痔蛇殼治氣痔各等分右燒存性隨證倍一分為末水調二錢空心卧時一服薰法蝟皮方三指大切薰黃棗大研熟艾雞子大一團右為末用瓶器以灰實一半如燒香法安長桶內坐其上薰之煙從口出為佳凡三度薰永瘥勿犯風冷忌雞肉毒物洗法海桐皮銼蛇床子各一兩香楠藤銼葱白切各三兩右用水一斗入藥五兩煎减半去滓候溫著手輕輕洗以絹拭之乾一法止用槐白皮煎湯淋泄最妙貼藥蜀葵子五錢蟬退五箇檳榔一枚右為末以棗三枚取肉研細搜和藥末如覺硬滴蜜少許研成膏量大小貼病處辨腸風論夫有五痔人登圊則下血或㸃滴或洴箭或清或濁面黃脣白心忡腳弱頭目眩暈此因飽食坐久腸澼所為亦有飲酒房勞過度所致醫多指此為腸風臟毒然腸風臟毒自屬滯下門臟毒即是臟中積毒腸風即是邪入臟純下清血謂之風痢今五痔下血乃是酒痔脉痔其血自肛門邉别有一竅如針孔大滴淋而下與泄物不共道不可不知烏連湯治脉痔下血不止量冷熱加减黃連烏頭泡去皮尖各等分右銼末每服二錢水一盞半煎七分去滓空心服熱加黃連冷加烏頭酒連丸治酒痔下血伏暑久治不效黃連不拘多少燎去鬚酒浸銀器中重湯煮漉出晒乾添酒煮七次止右為末以餘酒為丸如桐子大每服五十丸米湯下加味四君子湯治五痔下血面黃心忪耳鳴腳弱氣乏口淡食不知味人參白术茯苓甘草炙黃茋扁豆蒸各等分右為末每服二錢匕湯㸃服此方人未之信服者頗效所謂看不上手而自有竒效荆芥散治脉痔下血荆芥穗槐花炒焦各一兩石菖蒲一兩五錢右為末米飲調下空心服日二劑白玉丹治久年腸痔下血百藥不效者凝水石煅不拘多少煅紅研細水飛再入煅窩中煅右糯米糊為丸如桐子大每服陳米飲下五十丸只一服愈又方單服白梅亦效瘡痬證治瘡疥雖不致害人浸淫不已亦有數年不愈者多因心腎有虧傷神失志或飲食不節積滯腸胃致氣凝留發於肌肉皮膜之間色自極異所謂馬疥惡露反花瘑瘡腫狀不同或癢或痛汁水淋漓愈而復發諸治不瘥要當調養心腎去腸間菀莝理無不愈升麻和氣飲治疥瘡發於四肢臀髀痛癢不常甚致增寒發熱攻刺疼痛浸淫浮腫及􅒃風入臟隂下濕耳鳴眼痛蒼术二兩米泔浸桔梗升麻乾葛各一兩陳皮八錢甘草芍藥各三分半夏製當歸二錢大黃五錢白芷茯苓各二分枳殼厚朴薑汁炒乾薑各五錢右銼散每服四大錢水一半寸三片燈心十五寸煎七分去滓空心服天麻煎治風毒入胃及心腎經絡攻注百節疼痛頭目虛腫痰涎不利下注腰腳緩弱生瘡婦人血風男子􅒃風及風濕腳氣攻注皮膚搔癢癮疹偏正頭風川烏頭洗淨灰炒去皮尖草烏頭水浸三日洗去皮各四兩荆芥穗半斤乾薄荷五兩杜當歸水浸三日晒乾一斤右為末醋糊丸梧子大清茶下三十丸此方與癮疹門加味烏荆丸相類但此方入草烏併製法不同耳殺疥藥羊蹄根生切一兩薑一分礬半分硫黃一分草烏一箇右以米泔浸一宿研極細入釅醋和勻入治時抓破敷之遲頃以溫湯洗去絶妙百草膏治一切惡瘡不問乾濕痛癢日近年深百藥不瘥羊屎一味不拘多少上下以瓦盛蓋蘖木燒令煙盡末之麻油調敷癢者入輕粉少許痛者入麝香少許神效一法以杏仁輕粉等分研勻搽之最能殺蟲􅒃風證治男子精血不調外為風冷所襲以致隂中濕癢搔之不已流注於腳患生瘡瘍名曰􅒃風世謂腎臟風者乃認􅒃為腎也􅒃屬宗筋系於肝胃陽明養之陽明主肌肉循經流入四肢故使四肢生瘡正謂之􅒃風非腎臟風也四生散治􅒃風上攻下注耳鳴目癢鼻赤齒浮或作口瘡下注隂濕四肢搔癢遍體生瘡及婦人血瘡白附子沙苑蒺藜黃茋羌活各等分右為末每服二錢鹽酒調下有人將猪腎破開入鹽糝藥於其間煨服亦佳􅒃屬宗筋胃陽明飬之故有是證烏頭煮鹽丸治元臟氣虛􅒃風入胃上攻頭疼眼赤多淚昏澀口乾咽燥下注四肢歷節重著隂下濕癢足脛腰膝遍生瘡瘍及風水浮腫川烏頭洗净大者破開小者全用蒼耳吳茱茰各四兩京三稜五錢白芷十二兩用水煮四味候烏頭透控乾洗盡鹽右為末米糊丸桐子大每服五十丸空心溫酒鹽湯任下凡水病必忌鹽此藥用鹽無所忌升麻和氣飲治如前方見瘡瘍門天麻煎治如前方見瘡瘍門癬證治凡癬種類亦多所謂苔癬瓦癬荷葉癬雖以皮膚血氣凝滯所為或有血氣濕搏成者或為人傳染得之者種種不同治之各有方昨荷葉散治一切癬不問風濕氣血與夫相染而生者昨葉何草即瓦上松晒乾一兩枯礬五錢雄黃五錢右為末以羊蹄菜根先蘸醋揩癬上令癢破即以藥末乘濕塗敷不過三兩次即愈妒精瘡證治夫邏欲人多患妒精瘡者以婦人隂中先有宿精男子與之交接虛熱即成初發在隂頭如粟拂之則痛甚至兩目出清膿作臼孔蝕之大痛婦人亦有此病生在玉門內正似疳蝕瘡不痛為異耳麝香散治妒精瘡麝香黃礬青礬各等分右為末小便後敷之白散子治妒精瘡癢不可忍者及皮膚諸瘡手搔諸瘡晉礬不拘多少煆輕粉每服入少許右研勻糝瘡上立瘥如治漏瘡每挑一錢入黃柏末一錢輕粉五分津調散治妒精瘡膿汁淋漓臭爛黃連欵冬花各等分右為末以地骨皮蛇床子煎湯洗用軟帛挹乾以津調藥敷之最忌不得用生湯洗諸瘡皆然蒲黃散治隂蝕瘡蒲黃三兩水銀一兩右研勻先以猪肉湯浸洗挹乾以藥參之一方治男女隂蝕以硫黃末敷之大風叙論經所載癘風者即方論中所謂大風惡癩是也雖名曰風未必皆因風大率多是嗜欲勞動氣血熱發汗泄不避邪風冷濕使淫氣與衛氣相干致肌肉憤䐜氣有所凝則肌肉不仁榮衛泣濁則拊熱不利故色敗皮膚爛潰鼻梁塌壞千金所謂自作不仁極猥之業雖有悔言而無悔心良得其情然亦有傳染者又非自致此則不謹之故氣血相傳豈宿業緣㑹之所為也原其所因皆不內固涉外所因而成也證候多端并見於後大風治法凡治大風皆推其所因况因風寒濕熱勞逸飲食與夫傳染不可混濫散寒濕風濕清熱調和氣血顯然不同若例以㵼風藥治之則失其機要矣昔見一僧得病狀如白􅒃卒不成瘡但每旦起白皮一升許如蛇殼醫者謂多啖炙煿所致與局方解毒雄黃丸三四服而愈豈非得其因邪治之第一浴法麻黃根地骨皮草烏頭各二兩右為銼散研朴硝二兩和勻每用藥二兩水一桶椒一合葱三十莖艾葉一兩同煎十沸入米醋一盞打勻去滓坐溫室中且用手巾搭四肢候湯可浴即浴令汗透面上如珠流更坐室中或睡片時尤佳候汗解方著衣避風而出五日再浴如此兩三次便服換骨丹換骨丹九次鱉甲去裙海蜈蚣右以鹽泥固濟候乾火煅存性為末巴豆五錢去皮膜順手研青州棗七箇去核入巴豆膏在棗中火煨令焦存巴豆五分性將棗巴豆爛研如泥入前二味末同研勻以醋煮糊為丸如菉豆大每服七丸虛者四五丸用濕薺汁下候利惡物如膿血爛魚腸即止即此兩三服未利更服一二丸次進遇仙丹遇仙丹人參紫蘇各一兩苦參白殭蠶去嘴各二兩右為末白麵糊丸桐子大每服三十丸鹽湯吞下空心日二次服疏風散疏風散梔子一兩半大黃滑石熟地懸豆右為末入朴硝五錢令勻每服一錢食後淡茶清調下次以佛手膏去瘡佛手膏去黑紫瘡核斑猫七箇去翅足巴豆七粒去皮杏仁二十七粒去皮尖紅娘子二十七箇去翅足砒一錢另研盆硝一錢黃蠟韶粉瀝青研各五錢硫黃黃丹各三錢膩粉炒一兩菉豆一合槐角三條麻油四兩亂髮一兩右用油煎令髮化次下紅娘子次下巴豆槐角等逐味下焦者漉出方下硫黃盆硝丹粉等以箆子不住手攪令自滴水成珠為度用時先將針輕手刺瘡核用藥一粟米大放針處次日擠瘡有黑臭膿血三兩日血漸少次服去毒丹去毒丹赤芍藥甘草滑石各五錢巴豆去皮炒别研後入黑牽牛一兩半生半炒大黃朴硝各一分右為末麵糊丸菉豆大臨卧時服十五丸金銀花薄荷湯下加至二三十丸次服甘草散甘草散炙草滑石各五錢山豆根一兩生大黃一錢生右為末每服一錢蜜熟水調下日二服次服解毒丸解毒丸瓜蔞根三兩甘草五錢炒大黃一分生朴硝一分另研右為末麵糊丸如菉豆大每服二十丸至三十丸白湯下次服福神丹福神丹訶子四箇炮巴豆炒黑牽牛各五錢甘遂三錢生赤小豆四十九粒右為末麵糊丸如菉豆大每服十丸至十五丸薄荷湯下次用水膏藥水膏藥敷貼破處及足面足上瘡令生肉陳皮去灰土半斤炒紫色陳米半升炒紫藿香馬蹄香各一兩麝香一錢另研右同為末入麝香用冷水調掃敷瘡上有膿處如損破即煎槐枝湯洗再上藥此十方倪處士所傳甚驗大要病人須能如法將息理㑹敬而信之通天再造散治大風惡疾鬱金五錢生大黃一兩炮白牽牛六錢半生半炒皂角刺一兩炮經年黑大者右為末每服五錢日未出面東以無灰酒下盡量為度脫利黑頭小蟲病稍輕者止利如魚腸臭惡物忌毒半月但食稠粥軟飯漸生眉毛皮膚如常甚者不過三兩次須將理不可妄有勞動及終身不得食馬驢騾等肉犯者死不救三濟丸治如前當歸熟地川芎荆芥各二兩防風細辛各一兩桂心一分右㕮咀先以醋一升浸一宿漉出焙乾再以生地黃一斤搗汁浸一宿焙乾酒一升浸一宿旋入乳香五錢以餘酒醋地黃汁釋蒸餅為丸如桐子大用川烏一箇炮裂銼荆芥穗五錢浸酒三升旋溫下藥五十丸
