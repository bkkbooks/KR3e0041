body:
  text: 三因極一病証方論卷四宋陳言撰叙傷風論經云春傷風夏飡泄此乃四時之序也或表中風在經絡中循經流注以日傳變與傷寒無異但寒泣血無汗惡寒風㪚氣有汗惡風為不同仲景正以此格量太陽經傷寒傷風用藥不同而纂集者不識門類遂雙編二証使後學混濫卒不知歸甚者以傷風暑濕時氣疫疹凢曰太陽病者皆謂之傷寒晉人不經類皆如此固不足道但文義乖錯惑於後世不可不與之辨今别立傷風一門於四淫之前且依先哲以太陽為始分注六經學者當自知傷風証治足太陽膀胱經傷風有汗惡風不惡寒頭項强腰脊痛以其脉從巔入絡腦還出别下項循肩膊内俠脊抵腰中故太陽諸証如是治之宜桂枝湯桂枝湯治太陽傷風脉陽浮陰弱榮弱衛強頭痛鼻鳴乾嘔發熱自汗惡風或煩熱汗出則解有如瘧狀脉浮洪虚大桂枝芍藥各一兩半甘草一兩右㕮咀每服五錢煎八分去滓食前温服令遍身微汗愈或發汗漏不止惡風小便難四肢拘急者加熟附子一分或項背強几几反汗出惡風者加葛根一兩三錢或汗出後身疼痛脉沉遲者加芍藥生薑各五錢人葠一兩五錢或下後脉促胸滿者去芍藥若微寒加熟附子或下後頭項強痛翕翕發熱無汗心下滿痛小便不利者去桂枝加茯苓白术各一兩五錢太陽外証未除數下之挾熱利不止心下痞硬表裏不解加人葠一兩或下之微喘者加厚朴六錢杏仁十七粒因燒針令汗針處被寒核起而赤必發奔豚灸其核上各一壯加桂一兩與服因燒針煩躁者去芍藥减桂一兩加牡蠣龍骨各一兩可代救逆湯足陽明胃經傷風口躁煩渇自汗嗜卧身重小便難以其脉俠鼻絡目下膈屬胃絡脾俠臍入氣街故陽明諸証如是治之宜杏子湯杏子湯治陽明傷風能食口苦咽乾腹滿㣲喘發熱惡寒自汗嗜卧身重小便難潮熱而􅎪其脉浮弦長而數悉主之杏仁半夏五味芍藥桂心細辛各二錢炮薑大黃甘草各三錢茯苓足少陽胆經傷風身熱惡風自汗項強脇滿以其脉起於目銳眥上抵頭角交出入缺盆下胸中胃膈絡肝循脇裏出氣街合脾厭中故少陽諸証如是治宜柴胡加桂湯柴胡加桂湯治少陽傷風四五日身熱惡風頸項強脇下滿手足温口苦而渇自汗其脉陽浮陰弦或發汗汗多亡陽譫語可和其榮衛通其津液自然愈矣柴胡一兩半夏芍藥黃芩人参甘草桂枝五錢加生薑足太陰脾經傷風自汗胸滿腹痛四肢倦怠以其脉入腹絡胃上膈俠咽連舌本㪚舌下故太陰諸証如是治之宜桂枝芍藥湯桂枝芍藥湯治太陰傷風自汗咽乾胸腹四肢倦怠手足自温其脉弦大而緩桂枝五錢白芍三兩加生薑三片棗一枚腹痛甚加大黃一兩足少陰腎經傷風口燥舌乾咽痛胸滿心煩自汗腰連䯒骨酸痛以其脉貫脊属腎上貫胸膈入肺中循喉嚨俠舌本故少陰諸証如是治之宜桂附湯桂附湯治少陰傷風胸滿心煩咽喉哽痛自汗腰疼連䯒骨酸痛嘔吐涎沫頭痛其脉沉弦附子生去皮臍桂心乾薑芍藥甘草茯苓桃仁去皮尖麸炒各一兩咽痛加桔梗足厥陰肝經傷風自汗惡風舌卷小腹急滿以其脉循股入毛中環陰器抵小腹俠胃絡胆布脇與督脉㑹故厥陰諸証如是治之宜八物湯八物湯治厥隂傷風惡風舌卷自汗小腹急滿寒熱如瘧骨節煩疼其脉尺寸俱微而遲者桂心當歸川芎前胡防風各三分芍藥一兩五錢甘草茯苓各五錢加生棗叙傷寒論經云冬傷於寒春為温病以冬不即病其寒毒藏於風府之上至春温煖之時發而為病故曰温病或愈或死死則六七日間愈則多出旬日之外世號為大病要當随其經絡傳變仍以脉証别之乃可施治治傷寒法葢盡於此至晉集仲景論於太陽經出麻黄桂枝二方治傷寒傷風并録預偹救失加减之法甚詳至陽明少陽與三陰經傷風証治則蔑聞矣故知仲景只就太陽一經格量二病勿令差互編集既不詮辨後學懵無所知昏翳典墳千有餘載略不加省良可嘆息今輒提其六經傷寒合用對治諸方以為宗兆其如壊証治法餘各見本門外編集於後使皂白自分初不敢取諸胸臆葢有所本於聖經也傷寒辨証内經論傷寒惟說足三陽三陰傳變經絡愈不日數及各随其臟府經絡流注去處以行汗下并兩感脉應病形而已至張長沙以伊尹液湯作治法兼述傷寒暑濕等詳略不同格量互顯使後學舉隅而反至晉不解其義随行編集遂行於世此後蹈襲者不可勝計所謂百問証治提綱目録撮要偹全活人書傷寒論乃至圖形指脉皆剥採晉集初無反隅雖有廣傳皆未明其義類縁晉集不識偏正以此類預偹之方雜於正治而正治之方多所簡脫故使典籍愈多後學固封不削蘩蕪㒺知樞要因别論於後云傷寒証治足太陽膀胱經傷寒頭項強腰脊痛無汗惡寒其經絡流注去處與傷風同但脉浮洪𦂳數為異耳惟足太陽寒水為諸陽主氣故寒先傷之麻黃湯治太陽傷寒脉浮𦂳而數頭疼身痛發熱惡寒無汗胸滿而喘者麻黃桂枝各一兩甘草五錢杏仁二十五粒右㕮咀每服五錢煎八分去滓服後覆取㣲汗夏則加知母五錢石膏一兩黃芩一錢或汗出後無大熱而喘者去桂加石膏一兩小青龍湯治傷寒表未解心下有水氣乾嘔發熱而咳或渇或利或噎或小便不利小腹滿而喘麻黃細辛炮薑甘草桂枝芍藥各三兩半夏五味子各二兩右㕮咀每服五錢煎八分去滓服噎者去麻黃加熟附一錢若小便不利小腹滿者加茯苓一錢喘者加杏仁七枚去皮尖温粉凡發汗不欲多多則亡陽宜用此粉撲之即愈效如神白芷藁本川芎白术右等分為末每末入米粉三兩和勻撲之大青龍湯治太陽中風傷寒脉𦂳發熱惡寒身疼不汗出而煩渇或脉浮緩身不疼但重乍有輕時或傷寒見風脉傷風見寒脉麻黃二兩去節桂枝甘草杏仁去皮尖各一兩石膏一兩足陽明胃經傷寒身熱不惡寒目疼鼻乾不得卧腹滿咽乾口燥而渇其脉流注與傷風同以陽明主肉故次傳之大承氣湯治陽明傷寒脉長身熱不惡寒目疼鼻乾不眠腹滿咽乾大便難譫語或汗後脉沉實或下利心下堅或已經下其脉按之浮沉尚有力者大黃五錢洗芒硝一分别研入厚朴一兩姜汁炒枳實一分麸炒右為粗末每服五錢煎八分去滓入硝再煎若脉遲而滑汗出身重時發潮熱并得病二三日無太陽証煩躁心下硬下利後譫語者去芒硝名小承氣湯發汗不解蒸蒸發熱嗢嗢欲吐鼻中痛大便反溏及吐利後腹脹厥煩譫語去厚朴枳實入甘草五錢芒硝一分煎名調胃承氣湯或熱結膀胱如狂狀下血小腹急結者去厚朴枳實加桃仁十二粒桂枝甘草各五錢硝一分名桃仁承氣湯大柴胡湯治証狀大畧與大承氣湯同輕則大柴胡重則承氣湯柴胡四兩半夏一兩黃芩赤芍各一兩半大黃一兩枳實一分右為粗末每服三錢加薑五片棗二枚煎八分去滓食後温服若内熱裏實身疼痛是表証未解不可服足少陽胆經胸脇痛耳聾口苦咽乾徃來寒熱目眩乾嘔其脉流注與傷風同以少陽主膽屬半表半裏故三傳之小柴胡湯治少陽傷寒脉弦或沉𦂳往來寒熱胸脇苦滿嘿嘿不欲食心煩喜嘔或渇小腹痛或脇下痞硬或心悸小便不利或咳有微熱亦有不渇不嘔者又治婦人傷風傷寒經水適㫁發熱惡寒晝日明了暮則譫語此為熱入血室其血必結故如瘧狀得七分熱除脉遲身凉胸滿如結胸狀當刺期門随其實而取之投此湯即愈又太陽病不解轉入少陽并陽明傷寒脉反弦浮身目悉黃小便難潮熱時噦柴胡二兩半夏六錢黃芩人参甘草各三分右為剉㪚每服五錢生薑五片棗一枚去滓服若腹痛去黃芩加白芍三分心下悸小便不利加茯苓一兩若不渇則有微熱去人参加桂枝三分若咳去棗加五味三分乾薑五錢胸中煩不嘔者去半夏加花粉一兩胸中痞硬去棗加牡蠣一兩若過不解日晡發熱已而微利加芒硝一兩足太陰脾經傷寒手足温自利不渇腹滿時痛咽乾其脈流注與傷風同治之各有正方治中方治太陰傷寒手足温自利不渇腹滿時痛咽乾其脈尺寸俱沉細人参炮薑白术甘草陳皮青皮五積散治太陰傷寒脾胃不和及有積聚腹痛蒼术米泔浸一宿二十兩桔梗十兩陳皮六兩白芷甘草當歸各二兩川芎一兩五錢芍藥茯苓半夏各一兩麻黃去節湯煑春夏二兩秋冬三兩乾薑春夏兩半秋冬三兩枳殻麸炒四兩桂心春夏三兩秋冬四兩厚朴二兩薑汁炒右先將十二味㕮咀微炒令香取出當風凉之入後枳殻桂心厚朴三味同為細末每服三錢薑三片棗二枚煎七分温服傷寒手足逆冷自汗不止脈沉細面青嘔逆加順元㪚一錢同煎熱服産婦痛陣疎難産經兩三日不生胎死腹中或産母氣乏委頓産道乾澁加順元㪚水七酒三煎相繼兩服氣血内和即産胎死者不過三服當下其順元㪚多少量産母虚實加减傷寒發熱挾内寒者加葱白二寸豉七粒同煎相繼服當以汗解順元散烏頭炮去皮尖二兩附子南星炮一兩木香一兩右為末同前法煎此藥治内外感寒脈沉伏遲細手足冷毛髪怐慄傷寒陰症大啜一二杯氣和汗出即愈足少陰腎經傷寒口燥舌乾而渇背惡寒反發熱倦怠其脈流注與傷風同麻黃附子細辛湯治少陰傷寒口中和面背惡寒反發熱倦怠自汗而渇其脈尺寸俱沉而𦂳者麻黃細辛附子各五錢右為粗末每服四錢手足厥者去麻黃細辛加乾薑五錢甘草一分或口燥舌乾而渇宜急下之足厥隂肝經傷寒煩滿發熱惡寒往來如瘧或嚢縮小腹急痛其脈流注與傷風同本論小腹急痛用小建中湯麻黃桂枝各半湯治厥陰傷寒煩滿發熱惡寒往來寒熱嚢縮其脈尺寸俱微遲者主之若脈沉短其嚢必縮急以大承氣湯下可保五死一生承氣湯乃利陽明藥耳若病到厥陰其勢已甚葢陽明養宗筋為熱毒所攻乃以㵼其能養故利陽以救陰此猶假虞伐虢圍韓救趙之意也桂枝芍藥麻黃杏仁十二粒去皮尖甘草各五錢右為粗末每服五錢煎八分入薑棗煎亦可大承氣湯方見足陽明經小建中湯方見九痛門傳變次序内經熱論論傷寒云太陽為諸陽主氣傷寒必先自太陽始至漢諸師凡外所因皆曰太陽病未為了義足太陽寒水其位居辰辰為六氣化原故辛遁起戊子至辰為壬辰水而太陽正化居焉在天為寒在地為水寒喜歸水故寒必先傷太陽以此例推寒既自太陽入風自少陽入温自陽明入經曰陰為之主陽為之正别於陽者知病從來别於陰者知死生之期此之謂也或問傳變次序當何如耶然陰陽流行出入次序固有定說及其中病或喜入或乘虚或成兩感或守一經其可拘也但當以脈証分别陰陽表裏盛衰為始又不可以日數期也料簡論曰有汗不服麻黃無汗不得服桂枝切忌不得悮若寒証見風脈風証見寒脈却以桂枝麻黃各半湯治之古人治傷風熱多寒少惡風脈浮𦂳無汗用青龍湯葢先傷風而後傷寒風証尚在而寒脈已行故有是偹也若先傷寒而後傷風寒多熱少不煩躁㣲厥脈當浮緩弱而自汗即傷寒見風脈但青龍𦂳暴不若各半湯平和无悔吝也諸經皆倣此六經傷寒用藥格法夫傷寒始自太陽逆傳陽明至厥陰而止六經既别治法不同太陽屬膀胱非發汗不能愈必用麻黃者以麻黃生於中牟雪積五尺生麻黃處雪則不聚葢此藥内通陽氣以却外寒也陽明屬胃非通泄不能愈必用大黃芒硝以利之少陽屬膽無出入道柴胡能利能汗佐之以黃芩非此不解太陰屬脾中州土也性惡寒濕非乾薑白术不能温燥少陰屬腎性畏寒燥非附子不能温潤厥陰肝經藏血養筋非温平之藥不能潤養此經常之道也後學不知倫類妄意進餌遂至錯亂諸証蜂起夭傷人命可不究辨且三陽病汗下和解人皆知之至太陰脾經温燥不行亦自當温利陽利如温脾丸用大黃者是也少陰腎經雖用附子復使麻黃則知少陰亦自太陽出厥陰用桂自少陽出明矣及其二陽鬰閉皆當自陽明出故三陰皆有下証如少陰口燥咽乾下利清水太陰腹滿時痛厥陰舌卷嚢縮皆當下之學宜詳審不可率意投也温脾丸治乆病虚羸脾氣弱食不消氣噫黄柏桂心炮薑細辛附子當歸大麥芽大黃神麯川連吳茱茰各一兩右為末蜜丸桐子大酒下三十丸三陽合病脈証治三陽有合病三陰無合病所謂三陽合者有太陽陽明有少陽陽明有太陽傳至陽明其頭痛腰痛者太陽也肌熱目痛鼻乾者陽明也倘惡寒脈必浮大而長浮者太陽脈也長者陽明脈也當随証調之本太陽証因發汗多則譫語屬陽明故有太陽陽明也少陽証未解猶當和解不可便作陽明下之葛根湯治太陽病項背強几几然無汗惡寒并治三陽合病自利葛根一兩麻黃三分桂心五錢芍藥五錢甘草三錢每服五錢加生薑五片大棗一枚三陽合病不下利但嘔者加半夏六錢煎兩感証論并治法兩感傷寒者表裏俱病也一日太陽與少陰俱病頭痛舌乾咽滿而渇二日陽明與太陰俱病腹滿身熱不食譫語三日少陽與厥陰俱病耳聾囊縮而厥兩感俱作治有先後宜先救裏臟氣内正急宜救表救内固宜急而表亦不可緩也救裏解表各随諸証而善用之自非精妙甄别其孰能與於斯四逆湯治少陰傷寒自利不渇嘔􅎪不止或吐利俱發小便不利或汗出過多脉微欲絶腹痛脹滿手足厥冷及一切虚寒厥冷凡病傷寒凡此証候皆由陽氣素虚積有陰寒雖更覺頭疼體痛發熱惡寒四肢拘急表裏悉具者不可攻表宜先服此藥以助陽救裏附子五錢炮薑炙草一分强人加乾薑一錢或惡寒脈微而利利止仍亡血者加人参五錢或發汗若下之病仍不解煩燥者仍加茯苓五錢面赤者加連鬚葱九根腹中痛者去葱加芍藥一兩嘔者加生薑一兩咽痛者去芍藥加桔梗五錢兩感治法料簡桂枝麻黃皆攻太陽經表藥方各見太陽經其如陽明太陰少陰厥陰並可於風藥寒藥二方論中随証施治陰毒証治陰毒為病手足冷腰背強頭疼腹痛或煩渇精神恍忽額與手背時出冷汗聲音鄭重爪甲色青黑多因脾寒伏陰重感於寒所致附子散治陰毒傷寒唇青面黑身重强四肢冷或因服冷藥過度心腹脹滿昏沈不識人附子三分桂心五錢當歸白术半夏各五錢炮薑三分返陰丹治陰毒傷寒心神煩躁頭痛四肢逆冷面青腹脹脈沉伏者硫黄五兩通明另研硝石另研太陰𤣥精石另研各二兩炮薑桂心附子各五錢右用鐵銚先鋪𤣥精石次下硝石末各一半中間鋪硫黃末又將二石餘末葢上以小盞合着熟炭火三觔燒令得所勿令烟出急取瓦器合着地上四面灰葢勿令烟出候冷取出研細入後藥為末同研勻米糊丸桐子大艾湯下二三十丸頓服汗出為度未退艾炙臍下丹田氣海更不退則以葱饀熨之葱饀熨法治氣虚陽脫身冷無脈氣息欲絶不省人事及傷寒厥陰百藥不效者葱一束以麻缚如餅饀大只用長白二寸許先以火㶸一面令通熱勿致灼人乃以熱處着病人臍上下以熨斗盛火熨令葱餅熱氣透入腹中更作三四餅餅壊不可熨易餅再熨候病人醒手足温有汗服四物湯良陽毒証治陽毒為病躁熱面赤咽痛身斑色如錦紋下利赤黄内外結熱舌焦鼻黑類如烟煤妄言狂走多因腸胃燥熱陽氣獨盛陰氣暴絶妄服燥藥熱食所致升麻湯治陽毒傷寒一二日便成陽毒或服藥吐下後變成陽毒腰背痛煩悶不安面赤狂言或赤或見鬼或下利面赤斑斑如錦紋咽喉痛下膿血脈大浮數五日可治七日不可治升麻五錢犀角射干黄芩人参炙草各一分右剉散每服五錢煎七分去滓熱服并進三四服温覆汗出為度梔子仁湯治陽毒傷寒壯熱百節疼痛黑梔赤芍大青知母各一兩升麻杏仁黃芩石膏各二兩柴胡一兩五錢炙甘草五錢右剉散每服四錢薑三片豉二十粒同煎七分服結胸証治結胸者心下堅滿按之石硬而痛心膈髙起手不得近項强如柔痓狀此本傷寒身熱醫下之熱氣乘虚而入痞結不散之所致也若脈浮大皆不可下下之則死尚宜發汗若沉𦂳者宜以大小陷胸湯量輕重而下之又結胸有不按而痛者有按而痛者有水結胸者胸脇間但頭汗出者有實熱結者有實寒結者治之不可不知其輕重也各有正方大陷胸湯治傷寒表未解醫反下之膈内拒痛手不可近短氣煩躁心中懊憹心下硬大便不通舌燥而渇熱實脉沉而𦂳又治身無大熱有水結在胸脇間者大黃五錢芒硝四錢甘遂右各為末水三盞先煎大黄至一盞入硝煑溶下甘遂末煑一沸分二服得利止後服小陷胸湯治結胸証正在心按之則痛脈浮滑者川黃連一錢栝蔞實一兩半夏六錢水二盞先煎栝蔞實至盞半入前藥煎六分分二服利黄涎沫即愈大陷胸丸治病發於陽而反下之熱入裏因作結胸因下之太早故也其病項强如柔痓狀下之則和大黃二兩葶厯炒杏仁去皮尖炒芒硝各三分右前二味為末將杏仁芒硝合研為脂和藥丸彈子大别杵甘遂末一錢白蜜一大匙水二盞煎七分頓服之一宿乃下如不下更服以下為效甘遂性不馴宜斟酌虚實用之胸痞証治胸痞証者胃中不和心下堅硬乾嘔惡寒汗出噫氣不除亦有因傷寒身冷醫反下之遂成胸痞枳實理中丸治傷寒及諸吐利後胸痞欲絶膈髙氣急手足不得近枳實茯苓人葠炮薑甘草各等分右末蜜丸一兩作四丸熱湯化下渇加花粉下利加牡蠣粉均等分桔梗枳殻湯治中寒氣胸痞滿欲死枳殻桔梗各等分三黃湯治傷寒陰証下之太早以致心下痞按之軟其脈闗上浮者主之若表未解未可攻宜先隨風寒二証投桂枝麻黃湯表解已即服此方大黃黃連黃芩右各等分剉散每服五錢沸湯一盞熱漬之一時乆去滓分二服或汗出惡寒加附子别煎汁入一合同服半夏瀉心湯治心下痞滿而不痛者半夏一兩一錢黃芩人葠甘草炮薑各一兩五錢川黃連五錢右剉散每服五錢水一盞半薑五片棗一枚煎七分去滓温服或傷寒中風醫反下之下利日數十行榖不化胸中鳴心下痞硬乾嘔心煩者加甘草五錢人參一兩名甘草瀉心湯或出解後胃中不和心下痞硬乾噯食臭脇下水鳴下利加生薑一兩减乾薑半兩餘如正方名生薑瀉心湯勞復証治傷寒新瘥後不能將攝因憂愁思慮勞神而復或梳洗沐浴作勞而復皆謂之勞復或飲食不節謂之食復此皆大病後精神氣血腸胃並虚之所致也論有正方可依証調治唯犯房室為女勞復多死不治白术散治傷寒氣脉不和増寒壯熱鼻塞胸悶涕唾稠粘痰嗽壅滯或冐渉風濕憎寒發熱骨節煩疼或中暑嘔吐眩暈及大病後將理失宜食後勞復病証如初悉主之又治五勞七傷氣虚頭眩精神恍忽睡卧不寧肢體倦怠潮熱盗汗脾胃虧損面色痿黄飲食不美嘔吐酸水臟府滑泄腹内虚鳴反胃吐逆心腹絞痛乆瘧乆利及膈氣咽塞上氣喘促坐卧不安或飲食所傷胸膈痞悶腹脇膨脹婦人胎前産後血氣不和霍亂吐瀉氣厥不省人事常服辟四時不正之氣及山嵐瘴疫神效不可具述白芷甘草青皮陳皮茯苓桔梗山藥香附各三兩乾薑五錢白术一兩右末每服二錢水一盞薑三片棗一枚木𤓰一片紫蘇葉兩三葉煎七分若吐瀉入白糖煎嗽入桑皮杏仁煎傷寒勞復入薄荷煎膈氣入木通三寸麝香少許中暑嘔逆入香茹煎胎前産後血氣不和入荆芥煎霍亂入霍香氣厥入鹽湯調下陰陽易証治陰陽易者其男子病新差未平復而婦人與之交接名曰陽易裏急腰踝連腹内痛婦人病新差未平復而男子與之交接名曰陰易身重少氣陰腫入裏腹内絞痛熱上冲胸頭痛不欲舉眼中生花葢男女病相換易故謂之陰陽易燒裩散治傷寒陰易其人身重少氣小腹裏急或引陰中痛拘攣熱上冲胸頭重不欲舉眼中生花膝脛拘急悉皆主之婦人裩襠燒灰存性細研方寸匕水調服小便利陰頭痛即愈猳鼠糞湯治丈夫傷寒病後女人與之交接名曰陽易韮根去青一握約半寸猳鼠糞十四粒兩頭尖者是右二味水一盞煎半盞去滓頻頻温服粘汗出為效未知再服發斑証治傷寒發斑者葢不當下而下之熱則乘虚入胃當下而失下則胃不得泄皆發斑㸃如錦紋赤者易治黒者難治葢熱毒入胃深也𤣥參升麻湯治傷寒或當下而失下或不當下而下之熱毒在胃發斑如錦紋甚則煩躁譫語兼治喉閉腫痛温毒發斑元參升麻甘草各五錢炙右剉散每服五錢煎七分温服三因極一病証方論卷四
