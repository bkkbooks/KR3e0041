body:
  text: 三因極一病證方論卷十一宋陳言撰脹滿叙論內經有鼓脹太素作榖脹治法雖詳而不論其所因原其脹滿之端皆胃與大腸一陽明為二太隂之表大抵隂為之主陽為之正或臟氣不平勝尅相乘相感相應致隂陽失序遂有此證假如怒傷肝肝尅脾脾氣不正必脹於胃名曰勝尅或怒乘肺肺氣不傳必脹於大腸名曰乘尅憂思聚結本臟氣鬱或實或虛推其感涉表裏言之皆內所因或冒寒暑風濕隨其經絡傳致陽明致脹滿者屬外所因飲食飢飽生冷甜膩聚結不散或作痞塊膨脹滿悶屬不內外因當知脹滿該涉三因須以人迎氣口分其內外脉息虛實審其溫利詳而調之無失機要不爾則為心腹痼疾坐受困踣不可不謹脹滿證治論云五積久而必心腹脹滿且五積以五臟氣不平肝為肥氣心為伏梁肺為息賁脾為痞氣腎為奔豚皆聚結痞塊隨所生所成之日分推而䆒之皆喜怒憂思乘尅勝尅相應相感如斯等類從五積法治之可也但內所因不待成積即為脹滿亦當隨其臟氣而平治之所謂虛實補瀉太過不及依經調治大半夏湯治肝氣不平勝尅於脾脾鬱不行結聚涎沫閉於臟氣腑氣不舒胃則脹滿其脉弦遲故知中虛胃冷脹滿服此可下氣進食半夏肉桂各五錢附子人參炙草厚朴薑汁炒當歸茯苓枳殼各三錢麩炒川椒八十粒炒出汗去合口者每服四錢薑五片棗三枚煎服千金溫胃湯治憂思聚結脾肺氣凝陽不能正大腸與胃氣不平脹滿衝咳食不得下脉虛而緊澀附子當歸厚朴生用人參橘皮白芍炙草各一兩乾薑川椒三分炒去汗并去合口者每服四錢煎服附子粳米湯治憂怒相乘神志不守思慮兼并擾亂臟氣不主傳導使諸陽不舒反順為逆中寒氣脹腸鳴切痛胸脅逆滿嘔吐不食附子粳米各三錢半夏炙草一錢乾薑一分千金方無此右銼散每服四錢棗三枚煎溫服七物厚朴湯治腹滿發熱以陽并隂則陽實而隂虛陽盛生外熱隂虛生內熱脉必浮數浮則為虛數則為熱隂虛不能宣導飲食如故致脹滿者為熱脹厚朴一兩炒汁拌炙草大黃各三分枳實五錢麩炒肉桂一分右為銼散每服四錢薑七片棗三枚嘔者加半夏一分利者去大黃寒多加薑十片麝香綿灰散治腹虛脹滿朝緩暮急服諸藥不痊惡風不能宣泄膨悶鼓脹寒蠶綿五錢燒灰麝香五分研細令勻每服一錢濃煎薄荷湯下酒服尤佳不以時一法有乾漆炒青烟出量虛實用之虛者不可用溫中湯治虛人老人飲啖生冷多致腹脹心下痞滿有妨飲食或刺痛泄利氣痞滯悶厚朴甘草生薑清州棗各等分右上二味搗令得所方入生薑再杵令勻取出同棗焙令浥浥微燥却入鍋內慢火炒至紫色再焙乾為細末每服一錢生薑少許㸃湯空心服以知為度氣味殊異兼能愈疾又易修合料簡上件諸方如內因與不內外因皆可選用若外因傷風傷寒傳致陽明經腹脹可以大承氣杏子湯等各見本門濕脹术附湯加苓桂暑脹黃龍丸皆良藥也更有腳氣肢滿脾氣橫泄及石水婦人腸覃血膨或單腹脹之證治之各見本門學者當詳審而治無致混濫失其機要也霍亂叙論霍亂之病為卒病之最者以人起居無時揮霍之間便至變亂悶絶不救甚為可畏臨深履危不足以喻有生之流不可不逹其旨趣蓋其病因涉於內外不內外三種具偹而讀傷寒論者見有本是霍亂今是傷寒之說便謂霍亂是傷寒殊不知因傷寒致霍亂只是外因一證耳况風水濕皆有此證殊不知喜怒思憂飲食飢飽皆能致霍亂之證故不得不偹論霍亂諸證霍亂者心腹卒痛嘔吐下利增寒發熱頭痛眩暈先心痛則先吐先腹痛則先下心腹俱痛吐利並作甚則轉筋入腹則斃惡證之速無越於此蓋隂陽反戾清濁相干陽氣暴升隂氣頓墜隂陽痞隔上下奔逸扶救不先治之唯宜溫暖更詳别三因隨內外以調之不爾則坐視困踣也霍亂外因證治諸惡風惡寒有汗無汗重著煩毒皆外所因蓋傷風則惡風有汗傷寒則惡寒無汗冒濕則重著傷暑則熱煩此雖常論揮霍之間倉卒之際不辨遂致錯誤亂經反常為害不淺豈止本為霍亂今是傷寒而已哉當隨外所因治之乃可理中湯治吐下脹滿食不消心腹痛人參炮薑白术甘草炙各三兩右為銼散每服四錢水一盞煎七分去滓食前服如作散每服方寸匕酒調下服亦可若轉筋加石膏三兩煅若臍上築者腎氣動也去术加肉桂四兩腎惡燥故去术恐作奔豚故加桂吐多者去术加生薑三兩不多者復用术悸者加茯苓二兩渴欲得水加术合前成四兩半腹滿者去术加附子服藥後食頃食粥一杯微自溫覆勿令揭衣被噦則加丁香吐利止身體痛不利者審其原因以和解之如初因傷風用桂枝之類所謂治有本也外因料簡凡外所因必自經絡傳入臟腑須以脉證推其所因隨經調之則盡善矣假如太隂經傷寒當用四逆湯少隂經當用附子麻黃細辛湯厥隂經當用理中湯若在太陽經還用麻黃湯陽明經葛根湯少陽經柴胡湯風暑濕亦然風則桂枝湯暑則香茹飲五苓散濕則苓术湯滲濕湯皆可於諸門隨證檢用不復繁引霍亂內因證治大喜傷心則氣散大怒傷肝則氣激憂傷肺則氣聚思傷脾則氣結恐傷腎則氣却驚傷膽則氣亂臟氣概鬱結聚涎飲痞隔不通遂致滿悶隨其勝復必作吐利當從內所因治之七氣湯治喜怒憂思悲恐驚驚氣鬱發致五臟互相刑尅陽氣反戾揮霍之間變亂不測吐利交作寒熱眩暈痞滿咽塞半夏五兩厚朴肉桂各三兩茯苓白芍各四兩蘇葉橘皮各一兩人參一兩加生薑煎服胃氣丸治憂思過度脾肺氣閉結聚涎飲留滯腸胃氣鬱於隂凝陽於寒隂陽反戾吐痢交作四肢厥冷頭目眩暈或復發熱兼治老人胃寒大便反祕妊娠惡阻全不納食硫黃不拘多少以猪臟縛兩頭以米泔酒童便各一碗煮乾取出剖臟取洗净穢氣乾稱十兩半夏五兩茯苓人參各一兩石膏一分為末生薑汁蒸餅糊為丸空心米湯入少許薑汁下五十丸真珠散治喜怒不常憂思兼并致臟氣鬱結留積涎飲胸腹滿悶或腹㽲痛增寒發熱吐痢交作附子一生一炮去皮臍半夏一兩五錢滑石煉成鍾乳各五錢辰砂三錢為末每服二錢薑七片藿香三葉蜜半匙煎七分食前冷服小便不利加木香茅根煎不內外因證治諸飽食膾炙恣飱乳酪水陸珍品脯醢雜肴快飲寒漿耽縱情欲不以胃為五臟海困脾氣以運行胃既䐜脹脾臟停凝臟氣不行必致鬱發遂成吐痢當從不內外因治之紅丸子治脾胃虛冷飲食不節宿食留飲聚癖腸胃或因氣不調衝冒寒濕忽作霍亂吐痢并作心腹絞痛腸胃纒刺疲倦不勝蓬术三稜各二兩並醋煮胡椒一兩青皮三兩炒阿魏一分右為末醋化阿魏入陳米粉為糊丸礬紅為衣煎生薑甘草湯下胡椒湯治霍亂吐痢極妙胡椒菉豆共三七粒為末米瓜湯調下訶子散治霍亂吐痢一服取效訶子煨炙草厚朴薑汁炒炮薑草米炒去皮陳皮良薑炒茯苓神麯麥芽各等分炒為末每服二錢候發刺痛不可忍時煎七分入鹽服如速則㸃鹽霍亂凡例轉筋者以陽明養宗筋屬胃與大腸今暴下暴吐津液䪺亡外傷四氣內積七情飲食甜膩攻閉諸脉枯削於宗筋宗筋失養必致攣縮甚則卵縮舌卷為難治木瓜湯治霍亂不吐不下轉筋入腹則悶絶木瓜吳茱茰茴香各一分炙草一錢為銼散每服四錢薑三片紫蘇十葉煎七分煩渴者以隂陽反戾清濁相干水與榖併小便祕塞既走津液腎必枯燥引水自救煩渴必矣茯苓澤瀉湯治霍亂後煩渴欲飲水茯苓八兩澤瀉四兩炙草二兩桂心二兩白术為銼散每服四錢薑三片煎七分一法有小麥五兩水浸丹治伏暑傷冷冷熱不調霍亂吐痢口乾煩渴黃丹一兩炒巴豆二十五粒去皮心同黃蠟鎔作汁和為丸桐子大每服五丸水浸少頃别以新汲水下乾霍亂者忽然心腹䐜脹滿絞刺痛蠱毒煩寃欲吐不吐欲利不利狀若神靈所附頃刻之間便致悶絶亦涉三因或臟虛或腸胃素實故吐痢不行鹽湯治霍亂及蠱毒宿食不消積冷心腹煩滿鬼氣極醎鹽湯三升熱飲一升刺口令吐宿食使不吐更服吐訖復飲三吐乃止此法大勝諸治俗人以田舍淺近鄙而不用守死而已凡有此病即先用之嘔吐叙論嘔吐雖本於胃然所因亦多端故有寒熱飲食血氣之不同皆使人嘔吐據論云寒氣上者憂氣在下二氣並爭便出不入此亦一塗未為盡論且如氣內因則有七積不同寒涉外因則六淫分異皆作嘔逆但鬱於胃則嘔豈拘於憂氣而已况有宿食清不消中滿溢出五飲聚結隨氣翻吐痼冷積熱及瘀血凝閉更有三焦漏氣走哺吐利泄血皆有此證不可不詳辨也寒吐證治病者胃中寒心下淡淡四肢厥冷食即嘔吐名曰寒嘔或因傷食過多致傷胃氣或因病曽經汗下致胃氣虛冷之所為也四逆湯治寒嘔脉弱小便復利身有微熱見厥者難治炙草二錢乾薑三分附子六錢生硫黃丸治同前硫黃不拘多少以栁木鎚研細生薑蒸餅糊為丸米湯下五十丸靈液丹治胃中虛寒聚積痰飲食飲不化噫醋吞酸大便反堅心胸脹滿惡聞食氣婦人妊娠惡阻嘔吐不納食者硫黃附子各一兩去皮臍切如菉豆大菉豆四兩用水一碗同附子煮焙乾右為末生薑汁煮糊為丸米湯下五十丸熱嘔證治病者胃中挾熱煩躁聚結涎沫食入即吐名曰熱嘔或因胃熱伏暑及傷寒伏熱不解濕疸之類皆熱之所為也小柴胡湯治熱嘔柴胡半夏黃芩人參甘草加薑棗煎服治法曰病者嘗發汗令陽微膈氣虛脉乃數數為客熱不能消榖胃中虛冷故吐當作寒嘔治之不可用小柴胡湯痰嘔證治病者素盛今瘦水走腸間瀝瀝有聲食入即嘔食與飲並出名曰痰嘔或因氣鬱涎結於胃口或因酒食甜冷聚飲之所為也大半夏湯治心氣不行鬱生涎飲聚結不散心下痞鞕腸中漉漉有聲食入即吐半夏二兩人參三錢分四服水三盞蜜三錢和水揚令勻入藥煎至六分一法有生薑七片治法曰嘔家先渴今反不渴以心下有支飲故也治屬飲家支飲茯苓澤瀉湯治同前茯苓澤瀉炙草桂心白术加生薑煎服食嘔證治病者胸腹脹悶四肢厥冷惡聞食臭入則嘔朝食暮吐暮食朝吐名曰食嘔此由飲食傷脾宿食不化之所為也大養胃湯治飲食傷脾宿榖不化朝食暮吐暮食朝吐上氣復熱四肢冷痺三焦不調反胃虛寒氣在下憂氣在上二氣並爭但出不入嘔不得食厚朴生薑各二兩肥棗三兩三味同炒白术山藥炒人參川芎橘皮當歸五味藿香甘草枇杷葉刷去毛蜜炙黃茋各一兩右為銼散每服四錢薑三片棗一枚煎七分或為細末米湯調下治中湯治中寒飲食不化吞酸哯啘食則膨脝脹滿嘔逆人參白术炮薑炙草青皮陳皮若大便祕入大黃棋子大兩枚煎服血嘔證治病者心下滿食入即嘔血隨食出名曰血嘔此由瘀蓄冷血聚積胃口之所為也茯苓湯治憂怒兼并氣攻血溢停留胃脘喉間血腥嘔吐食飲及娠妊中脘宿冷冷血侵脾惡聞食氣病名惡阻半夏三兩茯苓熟地各一兩八錢橘皮細辛人參芍藥川芎桔梗甘草旋覆花各一兩二錢右銼散每服四錢薑七片若客熱煩渴口瘡者去橘皮細辛加前胡知母腹冷下痢者去地黃入肉桂炒胃中虛熱大便祕小便澀去地黃加大黃一兩八錢黃芩六錢當歸湯治三焦虛損或上下發泄吐唾血皆從三焦起或因熱損發或因酒發悉主之當歸炮薑熟地黃柏小薊羚羊角阿膠三錢炒白术白芍各五錢黃芩甘草各一兩右為銼散每服三錢加竹茹一塊如指大煎八分去滓入伏龍肝三錢髮灰五分蒲黃五分煎六分服氣嘔證治病者心膈脹滿氣逆於胸間食入即嘔嘔盡却快名曰氣嘔胃者足陽明合榮於足今隨氣上逆結於胃口故生嘔病也茱茰人參湯治氣嘔胸滿不納食嘔吐涎沫頭疼吳茱茰五兩人參加生薑五片棗三枚煎七分不以時每服四錢藿香湯治心中虛滿飲食不入時嘔吐惙惙短氣或大病將理不復胃氣無以自養日漸羸弱藿香人參肉桂桔梗木香白术各五錢茯苓半夏一兩薑製枇杷葉十片去毛每服五錢入炒薑絲一分煎服漏氣證治病者身背皆熱肘臂攣痛其氣不續膈間厭悶食入則先吐而後下名曰漏氣此因上焦傷風開其腠理上焦之氣慓悍滑疾麥門冬湯治上焦伏熱腹滿不欲食食入胃未定汗出身背皆熱或食先吐而後下名曰漏氣麥冬生蘆根竹茹白术各五兩炙草二兩茯苓二兩人參橘皮為散每服四錢薑五片陳米一撮煎服走哺證治病者下焦實熱大小便不通氣逆不續嘔逆不禁名曰走哺此下焦氣起於胃下口别入回腸注於膀胱並於胃傳糟粕而下大腸今大小便不通故知下焦實熱之所為也人參湯治下焦伏熱氣逆不續大小便不通嘔吐不禁名曰走哺人參萎㽔黃芩知母茯苓各三錢白术橘皮蘆根山梔各五錢石膏一兩煅為散每服四錢薑五片煎服厚朴湯治乾嘔逆而不吐熱少冷多好吐白沫清涎噫氣反酸此由上焦閉塞厚朴茯苓川芎白术𤣥參吳茱茰各五錢桔梗附子人參橘皮各三錢為散每服四錢薑五片煎三物猪苓湯治嘔吐病在膈上思水者是欲解也猪苓白术茯苓各等分為末調服方寸匕凡例凡先嘔却渴者此為欲解却嘔者為水停心下此屬飲家又傷寒差後餘熱在胃嘔者依傷寒後證治之若腳弱脾疼而嘔者此腳氣內攻宜急氣門治之更有婦人懷孕惡阻嘔吐亦各從其門類或中毒而嘔以毒藥解之酒家嘔吐當以解醒藥解之其如三焦漏氣走哺嘔吐則上見嘔門泄利則見下利門各從其類也然嘔不得輕用利藥惟腹滿則視其前後何部不利利之愈噦逆論證噦者咳逆也古方謂之噦凡吐利後多作噦大率胃實即噫胃虛則噦此由胃中虛膈上熱每一噦至八九聲相連收氣不回至於驚人者若傷寒久病後噦逆聲連經所謂壞病者是也楊上善釋云津泄者如鹽器之津泄於外脉絶者如琴絃之絶葉落者如槁木之狀推此三者衰微之徴以比噦故知是病深之候也亦有噦而心下悸堅痞眩悸者以膈間有痰水所為其他病則各有治法噦治法橘皮竹茹湯治咳逆噦嘔胃中虛冷每一噦至八九聲相連收氣不回至於驚人者橘皮二兩人參一兩炙草五錢每服四錢加竹茹一團薑五片棗一枚多服效羌活散止咳逆羌活附子茴香各五錢木香炮薑丁香各一兩右為末每服二錢煎七分㸃鹽少許煎數沸空心服丁香散治咳逆噎汗丁香柿蒂各一錢炙草良薑各五分為末用熱湯㸃下二錢不時服醋噫證治夫中脘有飲則嘈有宿食則酸食後噫醋吞酸皆宿食證俗謂咽酸是也麯术丸治中脘有宿食留飲酸蟄心痛嘔吐清水噯宿腐氣者神麯三兩炒蒼术米泔浸三宿晒乾炒一兩半右為末生薑另煮神麯糊為丸湯下三五十丸五百丸治宿食留飲聚於中脘噫醋吞酸心腹疼痛并療中虛積聚及臟虛餐泄赤白痢下丁香巴豆去皮油砂仁胡椒烏梅去仁右各一百個蒸餅糊為丸如菉豆大熟水下五七丸日二次􅮴氣叙論夫􅮴飪之邪從口入者宿食也蓋五味入口所以滋養五臟得之則生不得則死傷之則反為生害所以宿食為雜病之先若五臟不平食不輸化血凝氣滯羣證蜂起皆宿食所為也治之當量其臟腑虛實淺深為治養生方戒不得用巴豆令服青木香丸如有食癖非巴豆不克所謂擾乎可擾亦無擾木香丸用牽牛牽牛最瀉人腎不特不能消食積而又害於元精識者知之其病頭痛惡風憎寒心腹脹滿下利不欲食吞酸噫醋宿腐氣若胃實熱食反留滯其脉數而滑宜下之則愈若脾虛其脉浮大按之反澀尺中亦微澀宜溫藥消導􅮴氣治法如神木香丸治􅮴氣聚結癥瘕胸脅悶痛或吐清水食後噫作生熟氣腹脹泄瀉及四肢浮腫木香硇砂滴淋控乾蓬术醋煮半夏乾漆胡椒各五錢砂仁桂心青皮各三錢附子三稜各一兩醋煮炮薑右為末蜜丸桐子大生薑橘皮湯下感應丸治虛中積冷氣弱有傷不能傳化心下堅滿兩脅膨脹心腹疼痛噫宿腐氣及霍亂吐瀉或復遲澀久痢赤白膿血相兼米榖不消久病形羸面黃口淡不能食肉果炮薑百草霜各二兩木香一兩五錢三稜蓽澄茄各一兩巴豆一百粒去油杏仁一百粒去皮尖黃蠟四兩油一兩丁香一兩右除巴豆杏仁外並為細末次下巴杏和勻先將油蠟令鎔化頃在藥內入臼中杵千餘下旋丸如菉豆大滚水下三五丸食後臨卧服小兒如黍米大三丸泄瀉叙論方書所載瀉痢與經中所謂洞泄飱泄溏泄溢泄濡泄水榖注下其實一也乃所因有內外不內外差殊耳經云寒甚為泄春傷風夏飱泄論云濕熱之氣久客腸胃滑而利下皆外所因喜則散怒則激憂則聚驚則動臟氣隔絶精神奪散必致溏泄皆內所因其如飲食生冷勞逸所傷此不內外因以此類推隨證主治則不失其病源也虛寒泄瀉治法桂香丸治臟腑虛為風濕寒所搏冷滑注下不禁老人虛人危篤纍效附子肉果茯苓各一兩肉桂炮薑木香各五錢丁香為末神麯丸如桐子大米湯下五十丸香朴丸治腸胃虛冷泄瀉注下無度脾虛氣閉不進飲食厚朴五兩薑汁炒白术茴香陳皮各三兩訶子赤石脂各一兩五錢煅右為末神麯糊丸桐子大米湯下五十丸常服暖脾胃健脾丸治虛勞羸瘦身重胃冷飲食不消泄瀉不止或作滯下久變五色穢臭赤石脂鍾乳粉各一兩五錢乾薑炮蓯蓉石斛酒浸五味桂心澤瀉桑寄生逺志人參柏子仁當歸酸石榴皮龍骨天雄牡蠣白頭翁炙草各一兩右為末蜜丸桐子大米湯下三十丸豆䓻分氣湯治臟腑虛寒泄瀉瘦極及婦人産後洞瀉危篤者藿香葉草䓻仁青皮各四兩炙草丁香各五錢肉果十兩煨烏梅五十個去仁右銼散每服四錢糯米一撮煎七分服羊肉扶羸丸治脾胃不和飲食不進臟腑虛滑老人虛人宜服之精羊肉一斤微斷血脉焙乾取末四兩白薑一兩炮川椒去目炒出汗肉果各一兩木香附子神麯炒各五錢右為末煮粟米飲為丸如桐子大米湯下五十丸川椒丸治臟虛泄瀉無度川連烏梅肉當歸川椒炒出汗桂心炮薑各等分右為末糊丸桐子大米湯下三五十丸實熱泄瀉治法小承氣湯治下利譫語者有燥屎故也大黃一兩厚朴五錢枳實一錢夫泄瀉却用大黃者乃通因通用也非大實熱勿輕用之冷熱泄瀉治法博濟香薑散治久患脾泄瀉生薑四兩黃連一兩銼如豆大一處炒令薑盡赤去薑研黃連為細末臘茶調下二錢或將薑為末米飲調下治白痢亦效健脾丸治五泄或青白五色雜下休作無時烏頭炮去皮尖三分厚朴薑汁炒炙草乾薑炮各一分止瀉如神丸川烏四兩米泔浸軟去皮切片用鹽四兩炒黃去鹽不用半夏蒼术各半斤米泔浸右為末薑汁糊丸米湯下五十丸戊巳丸治脾胃受濕泄痢不止米榖不化小兒疳痢並宜服之黃連吳茱茰白芍各等分同炒為末米糊丸桐子大米湯下三十丸補脾散治脾泄不止食積不消癥􅛎塊結臟毒下痢腹痛腸鳴麥芽三兩炒神麯三兩炒茴香炒草果麵裹煨熟厚朴薑汁炒炮薑陳皮各一兩木香生用炙草各五錢右為末脾泄瀉訶子湯入鹽調下二錢脾虛腸鳴氣不和瀉不止炒薑酒調下常服鹽湯㸃空心食前服料簡凡治泄瀉須先理中焦如理中湯丸是也次即分利水榖如五苓散是也治中不效然後斷下即用禹餘糧赤石脂等是也玉機真藏論云五虛死謂脉細皮寒少氣前後泄利飲食不入得此必死其有生者漿粥入胃泄注止則活也金匱云六腑氣絶於外者手足寒上氣腳縮五臟氣絶於內者下利不禁甚者手足不仁脉沉弦者為下重脉大者為未止泄利手足不溫無脉炙之不溫脉不還微喘者死有微熱而渴自汗脉或微弦數弱法並當自愈或脉沉遲而面少赤身微熱鬱冒汗出而解必微厥所以然者以其面戴陽下虛故也泄利後腹脹滿身體疼痛者先溫其裏宜四逆湯後攻其表宜桂枝湯以上金匱節文雖於三因不甚分明其脉不可不究既用四逆治傷寒不妨用桂枝加附子治傷風术附加桂治濕五苓散治暑皆可類推又古方泄利與滯下共為一門千金又以宿食不消在熱痢門門類混濫後學難明不可不甄别也三因極一病證方論卷十一
