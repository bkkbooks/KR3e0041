body:
  text: 三因極一病證方論卷二宋陳言撰太醫習業國家以文武醫入官蓋為養民設未有不自學古而得之者學古之道雖别而同為儒必讀五經二十一史諸子百家方稱學者醫者之經素問靈樞是已史書則諸家本草是也諸子則難經甲乙太素中藏是也百家鬼遺龍樹金鏃刺要銅人明堂幼幼新書産科寶慶等書是也儒者不讀五經何以明道德性命仁義禮樂醫不讀靈素何以知陰陽運變德化政令儒不讀諸史何以知人才賢否得失興亡醫不讀本草何以知名物性味養生延年儒不讀諸子何以知崇政衛教學識醇疵醫不讀難素何以知神聖巧工妙理奧義儒不讀百家何以知律厯制度休咎吉凶醫不讀雜科何以知脈穴骨空竒病與異證然雖如是猶未為博况經史之外又有文海類集如漢之班馬唐之韓栁及宋朝人物最盛難以概舉醫在漢亦有張仲景華他唐則有孫思邈王冰等動輒千百卷其如本朝太平聖惠乘間集效聖功萬全備見名醫别録豈特汁牛充棟而已哉使學者一覽無遺博則博矣名醫反約則何以適從豫今所述乃收拾諸經精髓其亦反約之道也讀醫方者當推前賢上聖養民設教之意庶不負乎先覺也五科凡例凡學醫必先識五科七事五科者脈病證治及其所因七事者所因復分為三故因脈以識病因病以辨證隨證以施治則能事畢矣故經曰有是脈而無是證者非也究明三因內外不濫𠫭同脈證盡善盡美凡學診必先識七表八裏九道名體證狀了然分别然後以關前一分應動相類分别內外及不內外又須知二十四脈以四脈為宗所為浮沉遲數分風寒暑濕虗實冷熱交結諸脈隨部説證不亦約乎凡審病須先識名所以中傷寒暑風濕瘟疫時氣皆外所因藏府虗實五勞六極皆內所因外如金瘡踒折虎狼毒蟲皆不內外更有三因偹具各有其名所謂名不正則言不順言不順則事不成學者不可不偹凡學審證須知外病自經絡入隨六經所出井榮俞源經合各有穴道起沒流傳不可不别內病自五藏欎發證候各有部分溢出諸脈各有去處所謂上竟上頭項胸喉中事也下竟下腰肚腹足中事也凡用藥須熟讀本草廣看方書雷公炮炙隨分過製汗下補吐輕重滑澀燥潤等性量病淺深飲食多寡五德五味七情八反升合分兩朝代不同一一備學將欲付治須識前後故經曰先去新病餘當在後凡治病先須識因不知其因病源無自其因有三曰內曰外曰不內外內則七情外則六淫不內不外乃背常經金匱之言實惟要道巢氏病源具列一千八百餘件蓋為示病今曰以此三因病源都盡不亦反約乎凡學醫既明五科須識其要脈有浮沉遲數病有風勞氣冷證有虗實寒熱治有汗下補吐若於三因推明外曰寒熱風濕內曰喜怒憂思不內外曰勞逸作強各有證候詳而推之若網在綱有條不紊凡看古方類例最是朝代沿革升合分兩差殊若數味皆用分兩不足較也苐中間有用升合枚數大段不同升斗寸尺本自積黍黍自不可見度量衡卒亦難明今以錢譜推測粗知梗概也凡度者分寸尺丈引以一黍之廣為分十分為寸十寸為尺十尺為丈十丈為引觀今尺數等不同如周尺長八寸京尺長一尺六寸淮尺長一尺二寸樂尺長一尺二寸五分並以小尺為率小尺既自三微起却自可凖唐武德年鑄開元錢八分當十二錢半得一尺排錢比之十一個巳及一尺又不知唐用何尺顧漢唐籥量並用尺寸分布尺寸如是不齊將何憑據博古君子必有説矣凡量者籥合升斗斛本以黃鐘籥容千二百黍合籥為合重二十四銖今以錢凖則六銖錢四個比開元錢三個重升斗斛皆壘而成數漢唐同用至宋紹興升容千二百銖則古文六銖錢二百個開元錢二百二十個以紹興一升得漢五升其餘私用不足計也凡衡者銖兩斤鈞石亦以黃鐘籥所容重十二銖兩之為兩二十四銖為兩十六兩為斤三十斤為鈞四鈞為石每兩則古文六銖錢四個開元錢三個至宋廣稱以開元錢十個為兩今之三個得漢唐十兩明矣千金本草皆以古三兩為今一兩以古三升為今一升諸藥類例尤為難辨且如半夏一升凖五兩不知用何升何兩此修合製度之要務不可不知漢銅錢質如周錢文曰半兩重其如孝文五年錢益多而輕乃更鑄四銖其名為半兩雜以鉛鐵錫非淆雜為巧則不得贏而姦或盜磨鐵質取鎔有司言錢輕重請郡國鑄五銖錢周郭有質令不得磨取鎔則知漢以二兩半錢為兩重十銖明矣漢唐類以二十四銖為一兩抑未知修史人改作唐例亦不可知觀錢譜漢無六銖至唐方有今以五銖錢十六個正得開元錢十個重又以六銖錢十二個正得開元錢九個重則知開元每個錢重八銖唐武德四年鑄開元通寶徑八分重二銖四壘積十錢為兩似難考據明食貨者必有説焉按藥書漢方湯液大劑三十餘兩小劑十有餘兩用水六升或七升多煎取二升三升並分三服若以古籥量水七升煎今之三十兩未淹得過况散末藥只服方寸刀圭匕圓子如桐子大極至三十粒湯液豈得如此懸絶又如風引湯一劑計五十五兩每兩只用三指撮水三升煮三沸去滓溫服一升觀其煎製每只三指撮未應料劑如此之多此又可疑也今以臆説漢方當用半兩錢二枚為一兩且以术附湯方較若用漢兩計一百八十銖得開元錢二十二個半重若分三服已是今之七錢半重一服若以唐方凖計三百三十六銖得開元錢四十二個重每服計今之十四錢重大略可知若以開元錢凖得一百單五個重分三服每服計三十五錢重此之謂小劑况有大劑名件兩數之多者未易概舉留心此道幸少詳察焉凡古書所詮不出脈病證治四科而撰述家有不知此多致顯晦文義復重要當以四字類明之四字者即名體性用也如脈浮則為名舉有餘按不足為體為風為虗曰性可補可汗曰用如病太陽傷風為名感已嗇嗇為體惡風自汗為性傳變經絡為用如證太陽風證為名頭項疼腰腳痛為體不與諸經濫為性候其進退為用如治藥準則為名出處形色為體德味偹缺為性汗下補吐為用以此推之讀脈經看病源節本草皆用此法無餘藴矣紀用備論夫陰陽運五氣行乎天地之間則神明為之紀故有德化政令變眚之異物類稟五行孕於八方之內則生靈賴其資故有功能氣味性用之殊茍氣運失常非藥石則不療所謂功奪造化恩被裁成者無踰於藥石也故敷和彰顯溽承清潔凄涼者五運之德也安魂育神益氣定魄守志者百藥之功也生榮蕃茂豐偹緊斂清謐者五氣之化也通潤悅懌輕身潤澤益精者百藥之能也舒啓明曜安靜徑功凝肅者五氣之政也開明利脈滑膚堅肌強骨者百藥之氣也風熱燥濕寒者五氣之令也酸苦甘辛鹹者百藥之味也顧兹氣運與萬物雖種種不齊其如成象效法無相奪倫一一主對若合符契至於勝復盛衰不能相多往來升降不能相無故各從其興而動災變亦不相加也於是有振發銷鑠驟注肅殺凜冽者五氣之變也在藥則有收斂乾焦甜緩斂澀滋滑者百藥之性也散落燔炳霜潰蒼隕冰雪者五氣之眚也在藥則有鼽衄溢汗嘔吐涎涌泄利者百藥之用也德化者氣之詳功能者藥之良政令者氣之章氣味者藥之芳古之治法遇嵗主藏害雖有平治之不同必以所勝而命之故經曰上淫於下所勝平之平天氣也下淫於內所勝平之治地氣也故司天之氣風淫所勝平以辛涼諸氣在泉風淫於內治以辛涼此之謂也至於折抑主客鬱發勝復治之亦莫越於功能氣味蓋從其德化政令所謂也今則不然唯取其性用之所利而治其災變之所傷寒者熱之熱者寒之溫者清之清者溫之散者收之收者散之滑者澀之澀者滑之燥者潤之急者緩之堅者軟之脆者柔之衰者補之強者瀉之故略去功能氣味隨其性用以偹治法之要總之合和修製之大綱偹禦災變之要略爾衛生明哲之士當不拘於此也夫五味各歸其所喜故酸先入肝苦先入心甘先入脾辛先入肺鹹先入腎久而增氣則藏氣偏勝偏勝則有偏害偏害則致偏絶夭之由也是以政理觀化藥集商量服餌其藥不具五味五氣而久服之雖一時獲效久必暴夭此之謂也近世庸俗為治令人單服附子為害滋多可不謹乎藏府配天地論韓子曰形而上者謂之天形而下者謂之地介於其兩間者謂之人人受天地之中以生莫不稟二氣以成形是以六氣緯空五行麗地人則默而象之故足厥陰肝居於己手厥陰右腎居於亥己亥為天地之門户故風木化焉足少陰腎居於子手少陰心居於午子午得天地之中故居火位焉足太陰脾居於未手太陰肺居於丑丑未得為歸藏之標本故濕土守焉足少陽膽居於寅手少陽三焦居於申寅申握生化之始終故相火麗焉足陽明胃居於酉手陽明大腸居於卯卯酉為日月之道路故燥金行焉足太陽膀胱居於辰手太陽小腸居於戍辰戌為七政之魁罡故寒水注焉此三才應奉二氣相須不刋之説如指諸掌至於五行六氣遞相資生亦莫不有自然之序如厥隂風木生少陰君火火生太陰濕土土生少陽相火火生陽明燥金金生太陽寒水順天道而左旋所謂運行也或問君火生土土復能生相火火復生金其義何在此生成之道也相火既已發熖暈暈灰滅非土不成木見虗空能聚火金在礦非火不能煆出所以河圖火七居西室金九居南室蓋互顯其生成也若以一性而推之無所不偹故木焚則為火絞則為水石擊則為火鎔則為水洲澶之內江河競注大海之中火光常起此皆性之本有也又何疑土中火火中金夫木火土金水此乃常度人皆知之至於風暑濕燥寒謂之揆度鮮有能明其狀者故以木比風以火比暑以土比濕以金比燥以水比寒仍以上下二氣而配手足三陰三陽則謂之竒度又况五行各各不同正氣有太過不及天地氣化亦然人之藏府亦然感而為病或外邪或本病或稟賦必當推類隨三度而調之非究心明道之士孰能與於此三因論夫人稟天地陰陽而生者蓋天有六氣人以三陰三陽而上奉之地有五行人以五藏六府而下應之於是資生皮肉筋骨精髓血脈四肢九竅毛髮齒牙唇舌總而成體外則氣血循環流注經絡喜傷六淫內則精神魂魄志意思喜傷七情六淫者寒暑燥濕風熱是也七情者喜怒憂思悲驚恐是也若將護得宜怡然安泰役冒非理百病生焉病證既成須尋所自故前哲示教謂之病源經不云乎治之極於一者因得之閉户塞牖繫病者數問其經以從其意是欲知致病之本也然六淫天之常氣冒之則先自經絡流入內舍於藏府為外所因七情人之常性動之則先自藏府欎發外形肢體為內所因其如飲食飢飽呌呼傷氣盡神度量疲極筋力陰陽違逆乃至虎狼毒蟲金瘡踒折疰忤附著畏壓溺等有非常理為不內外因金匱有言千般疢難不越三條以此詳之病源都盡如欲救療就中尋類别其三因或內外兼并淫情交錯推其淺深斷以所因為病源然後配合諸證隨因所治藥石針艾無施不可外所因論夫六淫者寒暑燥濕風熱是也以暑熱一氣燥濕同源故上經收而為四即冬傷寒春傷風夏傷暑夏飱泄秋傷濕秋痎瘧冬咳嗽乃因四時而序者若其觸冒則四時皆能交結以病人且如溫病增寒發熱不特拘傷寒也冒風暑濕皆有是證但風散氣故有汗暑散氣故倦怠濕溢血故重著雖折傷諸證不同經絡傳變咸爾不可不知飱泄亦然經曰寒甚為腸澼又濕熱久客腸胃滑而下利亦不止於傷風痎瘧諸證亦以寒暑風熱互絡而為病因初不偏勝於暑也咳論以微寒為咳熱在上焦咳為肺痿厲風所吹聲嘶發豈獨拘於濕也以是觀之則知四氣本乎六化六化本乎一氣以運變而分陰陽則又為六淫故經曰陰為之主陽為之正若逆之則為病乃亂生化之常矣常則天地四塞治之必求其本當隨交絡互織而推之所謂風寒風濕風溫寒濕濕溫五者為并風濕寒風濕溫二者為合乘前四單共二十一變倘有所傷當如是而推之又兼三陽經絡亦有并合所能簡辨甄别脈證毫釐不差乃可論治非通乎義理之精微其孰能與於此敘中風論夫風為天地浩蕩之氣正順則能生長萬物偏邪則傷害品類人或中邪風鮮有不致斃者故入藏則難愈如其經絡空虗而中傷者為半身不遂手足癱痪涎潮昏塞口眼喎斜肌膚不仁痺痿攣掣隨其藏氣所為不同或左或右邪氣反緩正氣反急正氣引邪歪僻不遂蓋風性急暴善行數變其中人也卒其眩人也暈激人涎浮昏人神亂故推為百病長聖人先以此示教太醫編集所以首論中風也故四氣皆能中人在證亦有縱緩攣急搐搦痺瘁奄然不知人者不可不以脈别故論曰寒濕諸痺所有證候皆如風狀須得脈别可也要知脈浮則為風緊則為寒細則為濕數則為熱外證走注自汗則為風疼痛無汗則為寒緩弱熱煩則為暑停著腫滿則為濕隨其并合尤宜厯辨惟詳其所因合以脈證在絡在經入府入藏依而調之乃可為治五藏中風證肝中風者人迎并左關上脈浮而弦在天為風在地為木在人藏為肝肝虗喜中風為類相從故脈應在左關肝風之狀多汗惡風色微蒼頭目瞤左脅偏痛嗜甘如阻婦狀筋急攣痺不伸診在目其色青心中風者人迎與左寸口脈洪而浮在天為熱在地為火在人藏為心心虗因中風邪乃子母相因故脈應在左寸口心風之狀多汗惡風色微赤翕翕發熱瘖不能言飲食則嘔診在舌其色焦赤脾中風者人迎與右關上脈浮而微遲在天為濕在地為土在人藏為脾脾虗因中風邪為勝尅故脈應在右關上脾風之狀多汗惡風薄黃四肢怠惰皮肉瞤動發熱短氣不欲飲食嗜卧如醉人診在唇其色黃肺中風者人迎與右寸口脈浮澀而短在天為燥在地為金在人藏為肺肺虗因中風邪為乘尅故脈應在右手寸口肺風之狀多汗惡風色皓然白口燥而喘逆氣息肩身重背痛靣脹腫晝輕暮甚診在鼻其色白腎中風者人迎與左尺中脈浮而滑在天為寒在地為水在人藏為腎腎虗因中風邪為母子相感故脈應在左尺中腎風之狀多汗惡風色如炲靣龐然浮腫腰脊痛引小腹隱曲不利昏寢汗愈多志意惶惑診在耳其色黑胃中風者人迎與左關上脈並浮而大六府無中風論唯胃有中風者以胃為藏海納五味以滋養五藏虗而中邪風故其狀額多汗飲食不下膈塞不通腹善滿失衣則䐜脹張口息肩心下淡淡食塞則泄中風治法生薑生附湯治卒中風涎潮昏不知人并主瘀冷癖氣胸滿嘔沫頭痛飲食不消大附子一枚生去皮臍切作八片右以水二碗生薑一兩同煎至一大盞去滓溫冷服一法加沉香一錢一法加辰砂末少匕中風無問冷熱虗實皆可服蓋此藥能正氣消痰散風神效白散子治肝腎虗為風所襲卒中涎潮昏塞不語嘔吐痰沫頭目眩暈上實下虗真陽耗竭兼治陰證傷寒六脈沉伏昏不知人又治霍亂吐瀉飲食不進小便淋瀝不通眼亦口瘡咽喉疼痛大附子生去皮臍滑石各半兩半夏三錢湯洗二十一次右為末每服二錢水二盞薑七片蜜半匙煎七分空腹冷服霍亂加霍香小便不利加木通燈心茅根煎服此藥就有差悮亦無所苦紅龍散治中風開關竅硃砂别研五靈脂各五錢茯神去心中木萆薢各一兩全蝎腦麝各一錢别研右為末每服二錢酒調服次服神異溫風丹神異溫風丹治中風一切諸疾麻黃不去節五兩人參白术乾薑炮各二兩茯神附子炮去皮臍白膠香别研炙草各一兩五錢乳香别研全蝎炒各一兩右將麻黃細銼用水五升熬去半入蜜六兩又熬成膏入前件藥末和丸如彈子大每服一丸溫酒下日三服排風湯治風虗濕冷邪氣入藏狂言妄語精神錯亂肝風發則靣青心悶吐逆嘔沫脅滿頭眩不聞人聲偏枯筋急曲踡而卧心風發則靣赤翕然而熱悲傷嗔怒目張呼唤脾風發則靣黃身體不仁不能行步飲食失味夢寐顛倒與亡人相隨肺風發則靣白咳逆吐膿血上氣奄然而極腎風發則靣黑手足不隨腰痛難以俯仰冷痺骨疼如有此證令人心驚志意不定恍忽多忘若服此湯定志安心聰耳明目通藏府諸風咸皆主之白蘚皮白术芍藥桂心川芎當歸杏仁防風甘草炙各二兩獨活麻黃去節湯煮茯苓各三兩右銼散每服四錢水盞半薑七片棗二枚煎七分去渣服小續命湯治中風欲死身體緩急口目歪斜舌強難言奄奄忽忽神情悶死諸風服之皆驗不令人虗麻黃去節湯煮防己崔氏外臺不用人參黃芩桂心炙草白芍川芎杏仁各一兩去皮尖炒附子一枚去皮臍防風五錢右為散每服四錢水一盞半薑七片棗二枚煎七分去渣不拘時服取汗隨人虗實與所中輕重有人腳弱服此六七劑得差有風瘀家天隂即變輒合服之可以防瘖一云恍忽加茯神遠志骨節疼有熱去附子芍藥古今録驗有白术無杏仁救急無川芎杏仁止十味延年無防風一云遺失小便利産後失血并小兒老人用麻黃桂心甘草各方一法治或歌或笑亂言無所不及用麻黃三兩人參桂枝白术各二兩無防風附子生薑有當歸一兩獨活丹治風噎不能言四肢不收手足嚲曵白芍栝蔞根獨活桂心炙甘草各三兩右為銼散每服四錢薑五片水二盞煎六分去渣入生葛汁一合和勻服三黃湯治中風手足拘攣百節疼痛煩熱心亂惡寒不飲食兼治賊風偏風猥退風半身不遂失瘖不言麻黃去節湯煮一兩黃耆五錢黃芩三錢獨活一兩右為銼散每服四錢水盞半煎七分去渣不拘時服取汗為效心熱加大黃五錢脹滿加枳實一錢氣逆加人參三錢心悸加牡蠣三錢消渴加天花粉寒加附子一枚炮熟入小竹瀝湯治中風涎潮譫語昏塞四肢緩縱不收秦芁去苗防風去蘆附子炮去皮臍獨活各一分右水四盞煎二盞入生地汁竹瀝各半盞煎三五沸去渣分四服不拘時熱服病去以他扶持未知再作燒竹瀝法新竹截尺許長用兩磚對立相去八寸置竹在上每截破作二片仰安磚上急著火磚外兩頭各置碗以盛瀝瀝盡以絹濾清夏秋須沉冷水中防瀝酸大熱有風人亦可單服冷熱隨人勿過度荆瀝亦然獨活散治男子婦人氣虗感風或驚恐相乘肝膽受邪使上氣不守正位致頭招搖手足戰掉漸成目昏獨活地骨皮細辛川芎菊花防風炙草右等分為末每服三錢水煎去渣取六分入竹瀝少許再煎食後溫日兩服又法不用獨活有旋覆花雄硃丸治中風涎潮咽膈作聲目瞑不開口眼歪斜手足不隨但是一切風疾並宜服之烏蛇酒浸炙去皮骨殭蠶南星生用白附子炮各五錢雄黃另研辰砂龍骨麝香另研各一錢右共為細末蜜丸桐子大如中風涎潮牙關不開先用大蒜一瓣搗爛塗在兩牙關腮上用豆淋酒化一丸揩牙齦上即開續用薄荷酒化下一丸如丈夫風氣婦人血氣牙關緊急只用豆淋酒化一丸揩牙如頭風目眩暗風眼黑欲倒者急嚼一二丸薄荷湯下仁壽丸治肝腎氣虗風冷所中筋脈瞤動口眼歪斜常服補肝元行榮衛養氣血附子一兩炮去皮臍桂心茯苓五味枸杞巴戟去心杜仲續斷山茰熟地兔絲子酒浸搗防風各一兩半牛膝二兩酒浸右為細末蜜丸桐子大食前溫酒鹽湯下三五十丸鐵彈丸治男子婦人一切風疾無論遠近癱痪中風口眼歪斜語言蹇澀手足嚲曵難以枚舉或發搐搦或如蟲行或失音不語牙關緊急腳不能行身體頑麻百節疼痛精神不爽頭虗煩悶夜卧不安多涎胸膈不利口乾眼澀多困少力如破傷風身如角弓口噤不開汗出如油及洗頭風腦重眉梁骨痛卒中不語迷悶兼白癜風遍身癮疹鼻多清涕耳內蟬鳴小兒驚風天弔搐搦婦人血風手足煩熱夜多虗汗頭旋倒地並皆治之白附沒藥另研虎脛骨酒浸一宿炙乾全蝎烏頭炮去皮尖麻黃連節自然銅煅存性醋浸各一兩白花蛇酒浸五錢辰砂另研一兩五靈脂一分木鱉子二十個去皮另研不入羅腦麝一分另研乳香栁木槌研右為末蜜丸彈子大用無灰酒一升浸一丸分三十服傷風鼻塞分三十服空心臨卧各一服大風五丸可安活絡通經丸治半身不遂口眼喎斜癱痪諸風通活經絡宣導凝滯常服壯筋骨助血脈起偏廢之疾其效如神川烏頭二兩一兩生不去皮尖一兩炮去皮尖草烏二兩製如上法京墨木鱉子三兩三錢另研班貓一百個去頭足翅醋煮香熟焙烏蛇酒浸去皮骨焙白花蛇酒煮去皮骨焙白膠香各二兩另研當歸一兩五錢五靈脂三兩二錢右為末將木鱉子末醋研為膏和黑豆末一斤好醋抹一丸重一錢以墨為衣空心食前溫酒鹽湯下烏藥順氣散治風氣不順手足偏枯流注經絡並濕毒進襲腿膝變痺筋骨疼痛烏藥麻黃橘皮各二兩炙草川芎枳殼桔梗殭蠶炒去絲白芷各一兩炮薑五錢右為末每服二錢水一盞薑三片薄荷七葉空心服治氣去薄荷用棗肉二枚舒筋保安散治左癱右痪筋脈拘攣身體不遂腿足少力乾濕腳氣及濕滯經絡久不能去宣導諸氣木瓜五兩萆薢五靈脂牛膝酒浸續斷殭蠶松節白芍烏藥天麻黃耆葳靈仙當歸防風虎頭各一兩右用無灰酒一斗浸上件藥二七日緊封扎日數足取藥焙乾搗為細末每服二錢用浸藥酒半盞調下酒完用米湯調下又方添金毛狗脊一兩却將乳香白膠香各一兩同研入乾藥末內松節散治風寒冷濕薄於筋骨使筋骨攣掣痛行步艱難但是諸攣縮掣痛悉主之茯苓心中木一兩銼如米乳香一錢另研右入銀石器內炒存性為末木瓜酒調下二錢芎桂散治中風四肢疼痛及二足俱軟行步不便川烏頭二兩切作片水浸一宿切作算子更以米泔浸一宿不洗晒乾麩炒微赤為度川芎五錢桂心一兩炙草炮薑右為末每服二錢溫鹽酒調下日三服趂風膏治中風手足偏廢不舉穿山甲左癱用左足右癱用右足紅海蛤如棋子者川烏頭大者生用各二兩右為末每用五錢搗蔥白汁和成厚餅約徑一寸半貼在所患一邊腳中心用舊帛裹緊縛定於椅上坐無風密室中椅前用湯一盆將貼藥腳於湯內浸仍用人扶病人恐汗出不能支持候汗出即急去了藥汗欲出身麻木得汗周遍為妙切宜避風自然手足可舉如病未盡除候半月二十日後再照前用一次自然病除仍服治風補裡藥忌口逺欲以自養附子酒治中風風冷痰癖脹滿諸痺大附子一枚去皮臍切作四片用醇酒一升春浸窨夏三日秋冬七日每服一合日二三服以痺住為效未知再作小黃耆酒治風虗痰癖四肢偏枯兩腳弱手不能上頭或小腹縮痛脅下攣急心下有伏水脅下有積飲夜夢悲愁不樂恍忽善忘由風虗五臟受邪所致或久坐腰痛耳聾卒起眼眩頭重或遍體流腫疼痛飲食惡冷嗇嗇惡寒腦中痰滿心下寒疝及婦人産後餘病風虗積冷不除黃耆附子去皮臍防風去義烏頭某驗方用山藥川椒去木并合口者桂心秦芁牛膝白术川芎獨活細辛甘草各三兩大黃葛根山茰乾薑當歸各二兩右為銼散少壯人無熬煉虗老人微熬熬以絹袋盛用清酒二斗漬之春夏五日秋冬七日可先服一合不知日三四合此藥攻痺尤佳亦不令人吐悶小熱宜冷飲大虗加肉蓯蓉二兩下利加女薑三兩多忘加石斛菖蒲紫石英各二兩心下多水加人參茯苓各二兩山藥三兩酒盡可更以酒二斗重漬服之不爾可晒渣搗下篩酒服方寸匕不知稍增之服一劑得力令人耐寒冷補虗治諸風冷神效竇朝議經進仙酒方治大風及偏風一切風疾延年益壽牛蒡根牛膝各一斤秦芁鼠粘子枸杞各一斗蒼术蒸爛二斤防風蠶沙巨勝子炒另研去壳又名大麻子桔梗羌活各二兩右為銼散無灰酒二斗淨甕內浸密封七日開開不得對瓶口日進三服每服一大盞溫服當令靣有酒色甚者不過一斗忌麵食并魚肉動風物料簡類例且人之冒風也輕則為傷重則為中蓋風散氣動於陽腠理開故自汗而惡風其色診皆隨藏氣而言六府無論唯胃有中風者蓋飲食所致故孫真人曰新食竟取風為胃風瘧亦然然五藏經絡既能中豈不能中諸府也雖曰轉輸在大小腸則有朏脹在胞則有轉戾在膽則有懾縮但文缺不論或謂竟中諸藏故不論諸府此亦一説故兩存之諸方論中所謂左癱右痪蓋邪氣中人邪氣反緩正氣反急正氣引邪喎僻不遂入風噎者以心肺間閉不能言但噫噫作聲蓋肺氣入心則能言邪中心肺涎潮逼塞故使然也四肢縱緩為風痱者以風散涎注於關節氣不能行故使四肢不遂舌強不能言者以風入心脾經心之别脈系於舌本脾之脈絡胃夾咽連舌下風涎入其經絡故舌不轉而不能言也四肢拘攣者以中風冷邪氣入於肝藏使諸筋攣急屈而不伸也風柔者以風熱入於肝藏使諸筋弛張緩而不收也故經云寒則攣急熱則弛張風顫者以風入於肝藏經絡上氣不守正位故使頭招搖而手足顫掉也風瘖者以風冷之氣客於中滯而不能發故使口噤而不能言也於前所謂涎塞心肺同候此以口噤為差耳猥退風者半身不遂失音不語臨事不前亦偏中於心肺經所致也諸經類例可推而治之不內外因中風證治凡因不內不外而致中風者各從其類也如新沐中風名曰首風飲酒中風名曰漏風又曰酒風入房中風名曰內風又曰勞風治之各有方附子摩頭散治因沐頭中風多汗惡風當先風一日而病甚頭痛不可以出至風日則少愈名曰首風大附子一枚炮去皮臍鹽等分以二味為散方寸匕沐了摩疢上令藥力行為度麋銜湯治因醉中風多汗惡風少氣口乾善渴近衣則身熱如火臨食則汗出如浴骨節懈怠不欲自勞名曰漏風澤瀉白术各一錢麋銜草五錢右共為末每服二錢酒飲任調下空心服附子湯治房勞中風惡風多汗汗出沾衣口乾上瀆不能勞事身體盡疼名曰內風附子生去皮臍人參各五錢茴香炒茯苓山藥各一錢炙草炮薑各三分右銼散每服四錢水二盞薑三片鹽少許煎至七分去渣空心服敘中寒論夫寒者天地殺厲之氣在天為寒在地為水在人藏為腎故寒喜中腎腎中之多使攣急疼痛昏不知人挾風則眩暈兼濕則腫痛治之唯宜溫劑不可吐下皆逆也然寒性雖喜歸腎五藏皆能中之若中於經絡之表則易散入裏則不消與傷寒脈證無異但輕重不同其在本藏即中寒者經論既載不可不言明也詳論在傷寒門五藏中寒證肝中寒者人迎與左關上脈緊而弦肝虗中寒乃母子相因弦多則吉但緊不弦舌卷而囊縮為不利故使本部脈緊如切繩肝中寒之狀其人灑灑惡寒翕翕發熱薰然靣赤漐漐如有汗胸中煩熱脅下攣急足不得伸心中寒者人迎與左寸口脈緊而洪心虗中寒賊邪相尅脈應本部洪滑則吉但緊舌乾焦為不利心中之狀如噉蒜虀狀劇則心痛掣背背痛掣心猶如人注惡寒四肢厥自吐少間頃時復發休作不已昏塞不知人脾中寒者人迎與右關上脈緊而沉細脾虗中寒寒邪乘尅脈應本部長則吉沉緊唇揭為不利脾中寒之狀心腹䐜脹四肢攣急噯噫不通藏氣不傳或吐或泄肺中寒者人迎與右寸口脈緊而澀肺虗中寒母子相感脈應本部浮者為吉但緊而澀鼻乾燥為不利肺中寒之狀喜吐濁涎氣短不能報息灑灑而寒吸吸而咳腎中寒者人迎與左尺中脈沉緊而滑腎虗中寒寒喜中腎以類相從脈應本部沉滑者吉緊澀耳輪黑目睛眣為不利腎中寒之狀色黑氣弱吸吸少氣耳聾腰痛膝下清拘攣而疼昏不知人餘例見傷寒門中寒治法附子理中湯治五藏中寒口噤四肢強直失音不語昔有武士守邊大雪出帳外觀瞻忽然暈倒時林繼作隨行醫官灌以此藥二劑遂醒大附子炮去皮臍人參炮薑白术炙草右銼散每服四錢水盞半煎七分去渣不以時服口噤則撬開灌之乾薑附子湯治中寒卒然暈倒或吐逆涎沫狀如暗風手足攣搐口噤四肢厥冷或復躁熱炮薑附子炮去皮臍右銼散每服四錢水盞半煎七分去渣食前服入肝加木瓜入肺加桑皮入脾加白术入心加茯苓隨證加之中暑論中暑其脈陽弱而陰虗微遲似芤夫暑在天為熱在地為火在人藏為心故暑喜歸心中之令人噎悶昏不知人入肝則眩暈頑痺入脾則昏睡不覺入肺則喘滿痿躄入腎則消渴小便不利凡暍死治之切不可冷惟宜溫劑得冷則死道途無湯則以熱土尉臍中仍使人更溺概可見矣若發其汗則惡寒甚加溫邪則發熱甚治之不可不謹也然傷寒中暍其實一病也但輕重不同新校正要略者乃云傷寒家别有暍病非也詳論治法見傷暑門中暑治法大黃龍丸治中暑眩暈昏不知人或身熱惡寒頭痛狀如傷寒或往來寒熱煩燥渴甚嘔吐泄瀉常服云暑毒分利陰陽硫黃硝石各一兩雄黃通明者滑石白礬各五錢寒食麵四兩右為末滴水丸如桐子大每服五丸至七丸漸至二十丸新汲水下昏塞不知人則以水化開灌之中暑忌得冷此藥却以冷水下乃熱用寒引疑者釋之中暑凡例中暑悶倒急扶到陰涼處切不可與冷水當以布巾衣物等蘸熱湯尉臍上及氣海續以湯淋布上令徹臍腹暖即漸醒如倉卒無湯掬道上熱土於臍以多為佳冷則易去古法道途無湯即掬熱土於臍上仍撥開作窩子令人更溺於其中以代湯續以解暑毒藥加白虎竹葉石膏湯凡覺中暑即嚼生薑一大塊冷水送下如不能嚼即用水研灌之立醒路中倉卒無水渴甚嚼生蔥二寸許同津咽可抵水二升中濕論中濕者脈沉而細微緩以濕溢人肌肌浮則脈沉細夫濕者在天為雨在地為水在人藏為脾故濕喜歸脾脾虗喜中濕故曰濕流關節中人多使人䐜脹四肢關節疼痛而煩久則浮腫喘滿昏不知人挾風則眩暈嘔噦兼寒則攣卷掣痛治之不得猛發汗及灼艾泄瀉惟利小便為佳故論云治濕不利小便非其治也發汗大汗皆死治法見傷暑門中濕治法白术酒治濕中口噤昏不知人白术一斤酒浸三日三夜飲之不能飲酒煎膏代之四氣兼中證論風寒暑濕本乎一氣性中相同用中相背風寒既能中五藏暑濕其可不論方論有肝著其人常欲蹈其胸上先未苦時但欲飲熱脾著四肢浮腫身重如石不能自反身腎著身重腰中冷如坐水中形如水狀及不渴小便自利飲食如故心肺不見明文恐文簡缺難以臆補或云濕惟中三陰故不及心肺然五藏有本病并乘尅勝尅相感相因而得之假如風中肝為本病中脾為勝尅中肺為乘尅中心為相因中腎為相感則無所不通謂濕未及心肺未為確論故缺以俟明哲暑病亦然况六淫均被四氣皆能中人中風則有汗脈必微弦惡風走注中寒則無汗脈必緊數惡寒疼痛中暑則昏憒靣垢脈必虗緩倦怠中濕則重著脈必輕緩四肢厯疼痛皆能交絡互織所謂風寒風溫風濕寒濕濕溫等當以人迎脈證别之令無差誤更有七情內忤亦能涎潮昏塞手足嚲曵一如中風不可例作六淫氣治甚致夭枉及素蓄痰涎隨氣上厥使人眩暈昏不知人半身不遂口眼喎斜手足嚲曵者故有氣中痰中之别尤當詳辨毋使混濫除外所因方見於此從內所因各見本門四氣兼中治法附子湯治五藏中風寒手足不仁口目歪斜昏暈失音眼目瞤動牙車緊急不得轉動附子炮去皮臍桂心各五錢細辛防風人參炮薑各六分右銼散每服四錢水一盞半薑五片棗一枚去渣空心服或為末酒調下二錢防風湯治中風挾暑卒然暈倒靣青黑四肢緩弱喜伸欠口眼歪斜四肢不仁好笑防風澤瀉桂心杏仁麩炒乾薑炙草等分右銼散每服四錢煎七分去渣空心服生薑生附湯治中風濕昏悶恍忽脹滿身重手足緩縱漐漐自汗失音不語便利不禁附子生去皮臍乾薑各五錢白术一兩炙草一分每服四錢水一盞半去渣空心服附子麻黃湯治寒濕所中昏暈緩弱或腰背強急口喎語聲混濁心腹䐜脹氣上喘不能轉動附子生去皮臍乾薑麻黃去節湯煮白术人參炙草等分右銼散每服四錢水盞半煎七分去渣空心服苓术湯治冒暑遭雨暑濕鬱發四肢不仁半身不遂骨節離解緩弱不收或入浴暈倒口眼歪斜手足嚲曵皆濕溫類也附子茯苓白术炮薑澤瀉桂心等分右銼散每服四錢煎七分去滓空心服三因極一病證方論卷二
