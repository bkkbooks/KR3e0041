body:
  text: 三因極一病證方論卷八宋陳言撰內所因論夫臟腑合手足三隂三陽為十二經各有所主故為十二官心者君主之官神明出焉肺者相傅之官治節出焉肝者將軍之官謀慮出焉脾者諫議之官公正出焉腎者作強之官伎巧出焉膽者正中之官决斷出焉膻中者臣使之官喜樂出焉小腸者受盛之官化物出焉大腸者傳送之官變化出焉胃者倉廩之官五味出焉三焦者决瀆之官水道出焉膀胱者州都之官津液藏焉氣化則能出矣故五臟為隂六腑為陽此十二官不得相失者正猶隂陽消息盈虛當隨四序而調養之不可使其偏勝偏勝則偏復偏復則偏害勝尅流變則真病生焉夫隂陽虛實者乃臟腑更相勝復也若其子母相感則母虛能令子虛子實能令母實經曰實則瀉其母虛則補其子如肝實則瀉腎肝虛則補心如百姓足君孰與不足此經之本意也難經反是及觀金匱之論其得為多肝虛補用酸助用焦苦益用甘味之藥酸入肝焦苦入心甘入脾脾能制腎腎氣微弱則水不行水不行則心火盛心火盛則肺金受制肝氣乃舒肝氣舒則肝病自愈此補子之意也肝虛則用此實則反之千金亦云肝虛當補心心旺則感于肝皆此類也此正本臟十二官冷熱盈虛則為病非外感淫邪及故為背理之比然內所因唯屬七情交錯愛惡相勝而為病能推而明之此約而不濫學者宜留意焉內所因治論論云治傷寒有法醫雜病有方方即義方法即法令外病用法令猶肝邪外擾非刑不除內病用義方猶父子兄弟不是以禮格之而已故內外之治由是而分外邪難辨當以例明內證易知只叙方證學者不可不審膽肝經虛實寒熱證瀉肝湯治肝實熱陽氣伏邪脅痛忿忿悲怒發熱喘逆滿悶目痛視物不明狂悸非意而言乍寬乍急所作反常前胡去苗柴胡秦皮去粗皮細辛山梔黃芩升麻𬎼仁决明子等分右銼散每服四錢水二盞苦竹葉車前葉各五片煎半盞內藥再煎至八分去滓入芒硝一錢匕鎔無時服瀉膽湯治膽實熱及灑灑惡寒腹中氣滿脅下硬口苦咽乾頭疼不欲飲半夏三兩生地黃五兩酸棗仁二兩五錢甘草炙黃芩各一兩逺志去心薑汁炒茯苓各二兩右銼散每長流水一斗糯米一升煮蟹眼沸揚二三千遍澄清每用二盞炒藥四錢匕薑七片煎七分去滓不時服補肝湯治肝虛寒兩脅滿筋急不得太息寒熱腹滿不欲食飲邑邑不樂四肢冷發嗆心腹痛目視昏昏或左脅偏痛筋痿腳弱及治婦人心痛乳􅏴膝熱消渴爪甲枯口面青山茱茰甘草桂心各一兩細辛茯苓桃仁柏子仁防風各二兩川烏頭泡去皮臍五錢右銼散每服四大錢水盞半薑五片棗三枚煎七分去滓空心服溫膽湯治膽虛寒眩厥足痿指不能搖躄不能起僵仆目黃失精虛勞煩擾因驚膽懾奔豚在胸中喘浮腫不睡半夏製麥冬去心各一兩半茯苓二兩棗仁三兩炙草桂心逺志去心薑汁炒黃芩萆􅐺人參各一兩右銼散每服四錢用長流水一斗糯米煮如瀉肝湯法一方見虛煩門心小腸經虛實寒熱證治瀉心湯治心實熱心下痞滿身重發熱乾嘔不安腹中雷鳴淫溲不利水榖不消欲吐不吐煩悶喘急黃連去毛二兩半夏製三兩黃芩炙草人參各一兩炮薑一兩五錢右銼散每服四錢水二盞棗三枚煎七分去滓服并治霍亂若寒加附子一枚泡去皮臍若渴加瓜蔞根嘔加陳皮痛加當歸客熱以生薑代乾薑清脉湯治小腸實熱身熱手足心熱汗不出心中煩滿結塞不通口瘡身重柴胡澤瀉橘皮芒硝枳實麩炒黃芩升麻旋覆花生地黃各等分右銼散每服四錢水一盞半煎七分去滓下芒硝再煎無時服茯苓補心湯治心虛寒痛若悸恐不樂心腹痛難以言心寒恍惚喜悲愁恚怒衄血面黃煩悶五心熱渴獨語不覺咽喉痛舌本強冷汗出善忘恐走及治婦人懷妊惡阻嘔吐眩暈四肢怠惰全不納食白茯苓人參前胡半夏川芎各三分橘皮枳殼紫蘇桔梗炙草乾葛各五錢當歸一兩三分白芍二兩熟地一兩五錢右銼散每服四錢水一盞半薑五片棗一枚煎七分去滓食前服分氣補心湯治心氣鬱結仲悸噎悶四肢浮腫上氣喘急大腹皮炒香附炒去毛白茯苓桔梗木通炙草川芎前胡去苗青皮枳殼於术各三分細辛去苗木香各五錢右銼散每服四錢水一盞薑三片棗一枚煎七分去滓食前溫服溫腸湯治小腸虛寒苦頭偏痛耳項疼下痢赤白腸滑腹中痛裏急後重乾薑五錢當歸黃柏地榆各一兩阿膠麩炒茴香炒石榴皮黃連各一兩右銼散每服四錢水一盞半煎七分去滓溫服脾胃經虛實寒熱證治清脾湯治脾實熱病苦足寒脛熱腹脹滿煩擾不卧舌本強體重而黃頭痛右脅滿痛偏脹口唇燥裂寒熱如瘧茯苓陳皮草果去皮白术各二兩人參桂心白芷炙草川芎各一兩半夏二兩洗七次右銼散每服四錢水二盞薑七片紫蘇三葉煎七分去滓服欲通利加大黃平胃散治胃實熱口唇乾嘔噦煩悶大小便祕澀及熱病後餘熱不除畜於胃中四肢發熱口渴胸滿無汗厚朴製射干米泔浸升麻茯苓各二兩半芍藥二兩枳殼麩炒大黃蒸炙草各一兩右銼散每服四錢煎七分去滓空心服補脾湯治脾虛寒病泄瀉腹滿氣逆嘔吐心煩不得卧腸鳴虛脹飲食不消勞倦虛羸喜噫四肢逆冷多卧少起情意不樂人參茯苓草果去皮炮薑各一兩麥芽炒甘草炙各一兩五錢製厚朴陳皮白术各三分右銼散每服四錢水一盞半煎八分去滓食前服養胃湯治胃虛寒脛寒不得卧淅浙惡風灑灑惡寒腹中痛虛鳴寒熱如瘧唇口乾面目虛浮嘔噦吐瀉四肢疼痛不思飲食或傷寒濕骨節皆痛厚朴製藿香半夏製茯苓各一兩人參炙草附子製陳皮各三分草果去皮白术各五錢右銼散每服四錢水盞半薑五片棗一枚烏梅半個煎七分去滓空心服常服溫胃消痰進食下氣辟寒疫肺大腸經虛實寒熱證治清肺湯治肺實熱肺􅏴汗出若露上氣喘逆咳嗽咽中塞如嘔狀短氣客熱或吐濃血冬瓜子仁三分薏苡仁防已杏仁去皮尖各五錢雞子白皮一分右銼散每服四錢先以葦葉切半握水二盞煎盞半入藥煎七分去滓食前服瀉白湯治大腸實熱腹脹不通挾臍痛食不化喘不能久立口生瘡陳皮淡竹葉黃芩梔子仁柏皮炙各一兩半茯苓芒硝各一兩生地五兩右銼散每服四錢水盞半薑三片棗一枚煎七分空心服補肺湯治肺虛寒逆滿上氣咽中悶塞寒從背起口中如含氷雪語無音聲舌本乾燥吐沫唾血不能飲食欵冬花紫苑茸白石英桂心人參各一兩桑白皮炙四兩五味子鍾乳粉各一兩半麥冬去心二兩右銼散每服四錢水一盞半薑五片棗三枚粳米一撮同煎七分去滓食前服固腸湯治大腸虛寒利下青白腸中雷鳴相逐大便不節小便赤黃氣上冲胸不能久立身腫腹急當臍痛悉主之石榴皮五錢黃連炒地榆各一兩鶯粟殼醋炙茯苓各一兩半右銼散每服四錢水盞半薑五片烏梅一枚煎七分去滓空心服腎膀胱經虛實寒熱證治清源湯治腎實熱小腹脹滿四肢正黑耳聾骨熱小便赤黃腰脊離解及伏水等證茯苓黃芩菖蒲各五兩𤣥參細辛大黃水浸一宿甘草各二兩磁石八兩煆醋淬右銼散每服四錢水一盞煎七分去滓熱服瀉脬湯治膀胱實熱腰脊痛閉塞不通舌乾咽腫悉主之茯苓梔子仁知母各三兩生地黃淡竹葉各五兩石膏八兩煆右銼散每服四錢水盞半煎七分入蜜半匙煎兩沸熱服須利加芒硝一錢溫腎湯治腎虛寒隂痿腰脊痛身重腰軟弱足腰不可以按語音混濁陽氣頓絶乾熟芐一斤肉蓯蓉酒浸麥門冬去心牛膝酒浸五味子巴㦸天去心甘草炙各八兩茯苓乾薑泡去皮五兩杜仲去皮銼薑汁淹炒去絲淨三兩右為末每服二錢酒調下空心日二三服補脬湯治膀胱虛冷腳筋急腹痛引腰背不可屈伸耳聾目昏昏坐欲倒小便數遺白面黑如炭黃茋白茯苓各一兩五錢杜仲去皮薑汁炒磁石煆淬五味子各三兩白术白石英捶碎各二兩半右銼散每服四錢水一盞半煎七分去滓空心服心主三焦經虛實寒熱證治清膽湯治右腎實熱身熱脊脅相引痛足冷小便黃赤如梔子蘖汁每欲小便即莖頭痛榆白皮冬葵子各五兩石葦四兩去毛黃芩通草瞿麥各三兩右為粗末先以水二盞入車前葉數片煎至盞半入藥末四錢再煎七分去滓溫服潤焦湯治三焦實熱目鋭眥急痛腰脅熱脊背連膽中煩悶飲食不進頭面汗出關格不通不吐不下或氣逆不續走哺不禁或泄瀉溺澀淋瀝地骨皮半夏柴胡澤瀉各五兩麥冬茯苓炙草人參各一兩右銼散每服四錢水二盞薑五片竹茹如指大煎七分去滓空心服益志湯治右腎虛寒小便數腰脅引痛短氣咳逆四肢煩逆耳鳴面黑骨間熱夢遺白濁目眩諸虛困乏鹿茸酥塗炙去毛巴㦸去心甘草炙各八兩茯苓乾薑泡去皮五兩杜仲枸杞子乾熟地酒浸肉蓯蓉酒浸牛膝酒浸桂心附子製防風去叉山茰肉白芍藥甘草炙等分右銼散每服四錢水盞半薑五片鹽少許煎七分去滓食前服安中散治三焦虛寒短氣不續腹不安食隨即洞下小便赤濁精泄不禁腳脛酸疼小腹脹滿熟地黃巴㦸去心龍骨各二兩逺志肉茯苓各三兩天雄泡去皮臍五味子山藥各三兩半蓯蓉酒浸續斷蛇床子酒浸各四兩右為細末每服二錢溫酒調下夫三焦屬精藏府精以養身係纍於心脾腎三經人多以醉飽心虛而合隂陽故此病作惟謹之為得三焦精府辨證古人謂左腎為精府其府膀胱右腎為命門其府三焦三焦者有脂狀如手大正與膀胱相對有二白脉自中出夾脊而上貫於腦所以經云丈夫藏精女子繫胞以理推之三焦當如上說有形可見為是扁鵲乃云三焦有位無形其意以為上中二焦如漚如霧下焦如瀆不可遍見故曰有位無形而王叔和輩失其㫖意遽云無狀空有名俾後輩䝉繆不已且名以名實無實奚名果其無形尚何以藏精繫胞為哉其所謂三焦者何也上焦在膻中內應心中焦在中脘內應脾下焦在臍下即腎間動氣分布人身有上下中之異古人湛寂欲想不興則精氣散在三焦榮華百脉及其想念一起欲火熾然翕撮三焦精氣流溢命門輸瀉而去故號此府為精府耳學者不悟可為長太息痼冷積熱證治夫以臟府禀賦不同亦有將理失宜遂至偏冷偏熱故方論中有痼冷積熱之說痼冷者中寒也多因真氣既微胃氣不實復啖生冷氷雪之屬致腸胃虛寒隂既停凝陽不能正大便洞泄小便頻澀并鼻多清涕嘔吐涎沫水榖不化灑灑淅淅者陽虛隂盛之所為也積熱者臟府燥也多因精血既衰三焦煩壅復餌丹石酒炙之屬致腸胃蘊毒陽氣熾盛隂不能制大便祕澀小便赤淋口苦咽乾涎稠眵涕飲食無度輝輝熇熇皆隂虛陽盛之所為也治各有方金液丹固真氣暖丹田堅筋骨強陽道除久寒痼冷補勞傷虛損治男子腰腎久冷心腹積聚脅下冷癖腹中諸蟲失精遺溺形羸力弱腳膝疼痛冷風頑痺上氣衄血咳逆寒熱霍亂轉筋虛滑下利又治痔瘻濕䘌生瘡下血不止及婦人血結寒熱隂蝕疽痔硫黃十斤先飛揀去沙石杵研為末用磁合盛以水和赤石脂封口鹽泥固濟晒乾地內先埋以小罐子盛水令滿放合子在上用泥固濟訖慢火養七日夜候足加頓火一煅俟冷取出研為細末每一兩用炊餅一兩湯浸握去水為丸如桐子大每服三十丸多至百丸溫米飲下空心服之又治傷寒隂證身冷脉微手足厥逆或吐或利自汗不止或小便不禁不拘丸數併服得身熱脉出為度震靈丹補虛壯氣暖腎祛邪益精髓溫脾胃進飲食悅顔色治真氣虛􅉵臍腹冷痛肢體酸疼腰背拘急腳膝緩弱面色痿黃目眩耳鳴心怔氣短大便自利小便頻數口乾煩渴飲食無味又治婦人崩中帶下三十六病小兒驚疳及一切痼冷風虛悉主之常服育神養氣輕身延年此