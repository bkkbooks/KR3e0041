body:
  text: 三因極一病症方論醫家類提要臣等謹案三因極一病症方論十八卷宋陳言撰言字無擇青田人是書分别三因歸於一治其説出金匱要略三因者一曰内因為七情發自臟腑形於肢體一曰外因為六慾起自經絡舍於臟腑一曰不内外因為飲食饑飽呌呼傷氣以及虎狼毒蟲金瘡壓溺之類每類有論有方文詞典雅而理致簡該非他家鄙俚冗雜之比蘇軾傳聖散子方葉夢得避暑録話極論其謬而不能明其所以然言亦指其通治傷寒諸症之非而獨謂其方為寒疫所不廢可謂持平吳澄集有易簡歸一方序稱近代醫方惟陳無擇議論最有根柢而其藥多不驗嚴子禮剽取其論而附以平日所用經驗之藥則兼美矣是嚴氏濟生方其源實出於此宋志著録六卷陳振孫書録解題亦同此本分為十八卷葢何鉅重録所分第二卷中太醫習業一條有五經二十一史之語非南宋人所應見然證以諸家所引實為原書其詞氣亦非近人所及疑校正者不學無術但聞有二十一史之説遂妄改古書不及攷其時代也乾隆四十四年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:1650ea0ef1322db125f88a7d8449421d52bd44ec8b00c4b6d65bc2da4f6893af
