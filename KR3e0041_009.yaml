body:
  text: 三因極一病證方論卷九宋陳言撰胸痞證治病者心下堅滿痞急痛肌中苦痺緛急如刺不得俯仰其胸前皮皆痛手不得犯胸中逼逼而滿短氣咳唾引痛咽塞不利習習如癢喉中乾燥時欲吐嘔煩悶自汗時出痛引徹背不治則數日殺人病名胸痞由下虛極氣上控膈使然其脈陽微隂結瓜蔞丸治胸痞胸中痛徹背氣塞喘息咳喘心腹痞悶瓜蔞去穰取子炒香熟留皮與穰别用枳殼麩炒各等分右二味為細末先取瓜蔞皮穰研細水熬成膏和二物為丸如桐子大滚水下二十五丸食後服橘皮生薑湯治胸中痞噫塞逼逼如滿習習如癢喉口塞咳嗽唾沫陳皮一兩枳實麩炒二錢生薑五錢右為末銼散分二服水二盞煎七分去滓食前服梔子湯治胸痞切痛此方與倉卒散製煮不同故别出之梔子二兩燒存性附子炮二兩右銼散每服三錢水一盞薤白三寸同煎至五分食前溫服健忘證治脾主意與思意者記所往事思則兼心之所為也故論云言心未必是思言思則必是心破外人議思心同時理甚明也今脾受病則意舍不清心神不寧使人建忘盡心力思量不來者是也或曰常常喜忘故謂之建忘二者通治小定志丸治心氣不定五臟不足甚者憂憂愁愁不樂忽忽喜忘朝差暮劇暮差朝發及因事有所大驚夢寐不祥登髙涉險以致神魂不安驚悸恐怯逺志去心薑汁拌炒菖蒲炒各二兩茯苓茯神人參各二兩右為末蜜丸如桐子大辰砂為衣每服五十丸米湯下一方去茯神名開心散每服二錢無時服菖蒲益志丸治喜忘慌忽破積聚止痛安神定志聰明耳目菖蒲炒逺志去心薑汁炒人參桔梗牛膝酒浸各一兩桂心三分茯苓一兩三分附子製一兩右為末蜜丸如桐子大每服三十丸溫酒米湯下食前服虛煩證治虛煩者方論中所謂心虛煩悶是也大抵隂虛則內熱陽盛生外熱外熱曰燥內熱曰煩此不分而分也傷寒大病不復常霍亂吐瀉之後皆使人心虛煩悶婦人産蓐多有此病其證內煩身不覺熱頭目昏疼口乾咽燥不渴清清不寐皆虛煩也方例有虛煩近傷寒之説不可不辨又虛人自汗小便頻併遺泄白濁皆憂煩過度之所致傷寒屬外因憂煩屬內因霍亂兼不內外因學者當辨析而調治之淡竹茹湯治心虛煩悶頭疼短氣內熱不解心中煩悶及婦人産後心虛驚悸煩悶欲絶麥門冬小麥各二兩半炙草一兩人參白茯苓各一兩半半夏二兩製右銼散每服四錢水二盞薑七片棗三個淡竹茹一塊如指大煎七分去滓食前服虛勞煩悶尤宜服之溫膽湯治大病後虛煩不得眠此膽寒故也此藥治之又治驚悸製半夏鮮竹茹枳實麩炒各二兩右銼散每服四錢水一盞半薑五片棗一枚煎七分去滓食前服酸棗仁湯治霍亂吐下增劇勞虛煩擾奔氣入胸中不得眠或發寒熱頭疼暈悶酸棗仁炒一兩三分人參桂心各一分知母茯苓各三錢石膏煆五錢炙草三分右銼散每服四錢水一盞半薑三片棗一枚煎七分去滓食前服五痿敘論夫人身之有皮毛血脈筋膜肌肉骨體以成形內則肺心脾肝以主之若隨情妄用喜怒不節勞逸兼併致內臟精血虛耗榮衛失度發為寒熱使皮血筋骨肌肉痿弱無力以運動故致痿躄狀與柔風腳弱相類以脈證併所因别之不可混濫柔風腳弱皆外所因痿躄則屬內臟氣不足之所為也宜審之五痿證治病者肺熱皮虛弱薄著足痿躄其色白而毛敗名曰皮痿由肺熱葉焦使然也肺為五臟長有所失亡所求不得則發肺鳴肺鳴則肺葉焦論曰五臟因肺熱葉焦發為痿躄病者心下熱膝腕樞紐如折去而不相提挈脛筋縱緩不能任其地其色赤而絡脈溢名曰脈痿由悲哀太息陽氣內動數溲便血故論本病曰太經空虛發為肌痺傳為脈痿病者肝熱口苦筋膜乾筋急而攣其色蒼而瓜枯名曰筋痿由思想無窮所願不得意淫于外入房太甚宗筋弛縱發為筋痿及為白淫故經曰筋痿者生于肝熱內也病者脾熱胃乾而渴肌肉不仁其色黃而肉蠕動名曰肉痿由漸於濕地以水為事居處下澤濡漬痺而不仁故下經曰肉痿者得之濕地也病者腎熱腰脊不舉骨枯而髓減其色黑而齒稿名曰骨痿因有所逺行勞倦遇大熱而渴陽因內乏熱舍於腎致水不勝火則骨枯而髓虛故下經曰骨痿者生于大熱也五痿治法治諸痿法當養陽明與衝脈陽明主胃乃五臟六腑之海主潤宗筋束骨以利機關衝脈者諸經之母主灌溉溪谷與陽明合養於宗筋會于氣街屬於帶脈絡於督脈故陽明虛則宗筋縱帶脈不行故足痿不用也治之各補其榮而通其輸調其虛實和其逆順至筋脈骨肉各得其旺時病乃已矣加味四斤丸治腎臟肝虛熱淫于內致筋骨痿弱不自勝時起居須人足不任地驚恐戰掉潮熱時作飲食無味不生氣力諸虛不足蓯蓉酒浸牛膝酒浸木瓜絲子酒浸通軟别研細鹿茸燎去毛酥塗炙切熟地天麻五味子酒浸各等分右為末蜜丸如桐子大每服五十丸溫酒米湯食前下一法不用五味子有杜仲麋角丸治五痿皮緩毛悴血脈枯稿肌肉著薄筋骨羸弱飲食不滋庶事不興四肢無力爪枯髮落眼昏唇燥疲􅉵不能支持麋角鎊一斤酒浸一宿熟地四兩大附子生去皮臍一兩五錢右用大麥米二升以一半鋪底一半在上以二布巾隔覆炊一日取出藥與麥同研焙乾為末以浸藥酒添清酒煮麥粉為糊搜和得所杵三千下丸如桐子大每服五十丸溫酒米湯任下玉啓玄傳玄珠先生耘苗丹三方序曰張長沙戒人妄服燥烈之藥謂藥勢偏有所助勝尅流變則真病生猶閔苗不長而揠之者也若稟氣受血不強合服此而不服此反忽略之是不耘苗者也上丹養五臟補不足祕固真元均調二氣和暢榮衛保神守中久服輕身耐老健力能食明目降心火交腎水益精氣男子絶陽庶事不堪女子絶隂乃不能妊腰膝重痛筋骨敗面色黎黑心勞志昏寤寐恍忽煩憒多倦夢遺餘瀝膀胱邪熱五勞七傷肌肉憔悴上熱下冷難任補藥服之半月隂陽自和容色肌肉光潤悅澤開心意安魂魄消飲食養胃氣五味子半斤巴戟去心逺志去心枸杞子山藥肉蓯蓉酒浸百部酒浸一宿焙杜仲炒去絲蛇床子防風去義白茯苓柏子仁别研絲子酒浸别研各二兩右為末蜜丸如桐子大食前溫酒鹽湯任下三十丸春煎乾棗湯夏加五味子四兩四季月加蓯蓉六兩秋加枸杞六兩冬加逺志六兩食後兼服衛生湯衛生湯補虛勞強五臟除煩養真退熱順血脈緩中安和神志潤澤容色常服通暢血脈不生􅏴瘍養胃益精當歸芍藥黃茋甘草右各等分銼散水盞半煎七分去滓不拘時服年老加好酒半盞煎服失血敘論夫血猶水也水由地中行百川皆理則無壅決之虞血之周流於人身榮經府俞外不為四氣所傷內不為七情所梏自然順適萬一微爽節宣必至壅閉故血不得循經流絡榮養百脈或泣或散或下而亡敗或逆而上溢乃有吐衄便利汗痰諸證生焉十種走無重於斯隨證别之乃可施治外因衄血證治病者因傷風寒暑濕流傳經絡隂陽相勝故血得寒則凝泣得熱則泛溢各隨臟腑經絡湧泄於清道中衄出一升一斗者皆外所因治之各有方桂枝瓜蔞湯治傷風汗下不解鬱於經絡隨氣湧泄衄出清血或清氣道中閉流入胃管吐出清血遇寒泣之色必瘀黑者桂枝白芍瓜蔞根甘草川芎各等分右銼散每服四錢水一盞半薑三片棗一枚煎七分去滓服頭痛加石膏麻黃升麻湯治傷寒發熱解利不行血隨氣壅世謂紅汗是也麻黃去節湯泡二兩半升麻一兩一分芍藥甘草黃芩石膏茯苓各一兩右銼散每服四大錢水一盞半薑三片煎七分去滓熱服微汗解五苓散治伏暑飲熱暑氣流入經絡壅溢發熱衄或胃氣虛血滲入胃停留不散吐出一二升許方見傷暑門如衄血則以茅花煎湯下屢用得效除濕湯治冒雨著濕鬱於經絡血溢作衄或脾不利濕著經絡血流入胃胃滿吐血茯苓乾薑各四兩甘草白术各二錢右銼散每服四錢水煎去滓服頭疼加川芎二錢內因衄血證治病者積怒傷肝積憂傷肺煩思傷脾失志傷腎暴喜傷心皆能動血蓄聚不已停留胸間隨氣上溢入清氣道中發為鼻衄名五臟衄止衄散治氣鬱發衄無比神效黃茋六錢赤茯苓白芍藥生地黃當歸阿膠炒各三錢右為細末煎黃茋湯調下二錢未知再作不內外因證治病者飲酒過多及噉炙煿五辛熱物動於血血隨氣溢發為鼻衄名酒食衄或墜車馬打撲傷損致血淖溢發為鼻衄名折傷衄加味理中丸治飲酒過多及啖炙煿熱食動血發為鼻衄人參白术炙草乾葛川芎乾薑各等分右銼散每服四錢水一盞煎七分去滓溫服花蕊石散治一切金瘡打撲傷損貓犬咬傷並於傷處摻敷或內傷損血入臟腑壅溢作衄及婦人産後敗血不散花蕊石研細一斤上色硫黃研細四兩右二味拌和入瓶中以紙筋搗黃泥固濟候乾焙令熱透以磚藉用白炭一稱頂上發火燒盡候冷取出再研極細諸臟傷及婦人産後瘀血不行并用童子小便溫酒調一二錢匕取瘀血即效白芨散治鼻衄立效以白芨不拘多少為末冷水調用紙花貼鼻窊中又一方用黃膠泡令軟貼鼻窊中三因吐血證治病者諸血積聚合發為衄而清氣道閉濁道湧溢凝停胸胃中因而滿悶吐出數斗至一升者曰內衄或因四氣傷於外七情動於內及飲食房勞墜墮傷損致榮血留聚膈間滿則吐溢世謂妄行桂枝瓜蔞湯治傷風吐血五苓散治傷暑吐血除濕湯治傷濕吐血以上三方並見外因衄血證治金屑丹治三因吐血及衄血下血一切血溢妄行葉子雌黃右一味為粗末入棗肉內線繫定滿著湯煮用黑錫對雌黃斤兩鎔作汁傾入湯煮一日添湯候冷取出雌黃洗淨乾研為細末却以煮藥棗肉和丸如桐子大每服五七丸黑錫煎湯下傷胃吐血證治病者因飲食過度傷胃或胃虛不能消化致翻胃嘔吐逆物與氣上沖蹙胃口決裂所傷吐出其色必鮮紅者心腹絞痛白汗自流名曰傷胃吐血理中湯能止傷胃吐血者以其功最理中脘分利隂陽安定血脈諸方甚廣如局方但不出吐血證學者當自知之人參白术甘草炙白薑炒各等分右銼散每服四錢水一盞煎七分去滓無時服或只煮乾薑甘草湯飲之亦妙方見養生必用肺疽吐血證治病者因飲啖辛熱熱燥傷肺血得熱則溢因作嘔吐出血一合或半升許名曰肺疽傷於腑則屬胃傷於臟則屬肺右以此分不可不究二灰散治肺疽吐血并妄行紅棗和核燒存性百藥煎煆各等分右為末每服二錢米湯調下折傷吐血證治病者因墜閃朒致傷五臟損裂出血停留中脘臟熱則吐鮮血臟寒則吐瘀血如豆羮汁此名內傷治之各有方川芎白芍藥百合水浸半口當歸荆芥穗各等分右銼散每服四錢水一盞半酒半盞煎七分去滓服折傷瘀血證治病者有所墜墮惡血留內或因大怒肝血洴濕停蓄不散兩脅疼痛腳善瘈骨節時腫氣上不上皆由瘀血在內治之各有方雞鳴散治從髙墜下及木石所壓凡是傷損所瘀之血凝滯氣結欲死并久積瘀血煩躁疼痛呌呼不得並以此藥利去瘀血即此推陳致新治折傷神效大黃一兩酒蒸桃仁三四十粒去皮尖右研細酒一盞煎六分去滓雞鳴時服次日取下瘀血即愈若便覺氣絶不能言取藥不及即擘開口以熱小便灌之病餘瘀血證治病者或因發汗不徹及吐衄不盡瘀蓄在內使人面黃唇白大便黑腳弱氣喘甚則狂悶皆瘀血所致治之各有方犀角地黃湯治傷寒及溫病應發汗而不汗內蓄為瘀血及鼻衄吐血不盡餘血停留以致面黃大便黑犀角一兩生地八兩芍藥三兩丹皮二兩右為散每服四錢水一盞半煎七分去滓狂者加大黃二兩黃芩三兩其人脈大來遲腹不滿自言滿為無熱但依本方不須加也汗血證治病者汗出正赤汚衣名曰汗血皆由大喜傷心喜則氣散血隨氣行婦人産蓐多有此證葎草汁治産婦大喜汗出汚衣赤色及膏淋尿血葎草不拘多少右搗取汁二升醋二合和空腹飲一杯或濃煮汁飲并治淋瀝尿血便血證治病者大便下血或清或濁或鮮或黑或在便前或在便後或與泄物並下此因內外有所感傷凝停在胃隨氣下通亦妄行之類故曰便血伏龍肝湯治先便後血謂之逺血兼治吐衄伏龍肝半斤甘草炙白术阿膠黃芩乾地黃千金作乾薑各三兩右銼散每服五錢水一盞煎七分去渣空心服一法有附子三兩炮入當歸赤小豆湯治先血而後便謂之便血赤小豆五兩當歸一兩右為末漿水服方寸匕日三四服風痢下血證治病者因風停於膚腠乘虛入腸胃風動血故便清血或下瘀血注下無度名曰風痢古方以此為蠱痢非也胃風湯治大人小兒風冷乘虛入宫腸胃水榖不化泄瀉注下及腸胃濕毒下如豆汁或下瘀血日夜無度人參白茯苓川芎桂心當歸白芍藥白术各等分右為銼散每服四錢水一盞半粟米百餘粒煎七分去滓空心稍熱服料簡夫便血有腸痔蠱毒熱痢酒痢血枯肺痿等别有門類其如風痢亦當在痢門以純下清血故附于此不可不知尿血證治病者小便出血多因心腎氣結所致或因憂勞房室過度此乃得之虛寒故養生云不可専以血得熱為淖溢為説二者皆致尿血與淋不同以其不痛故屬尿血痛則當在血淋門髮灰散治小便尿血或先尿而後血或先血而後尿亦逺近之謂也髮灰本草云能消瘀血通關格利水道破癥瘕􅏴腫狐尿刺尸疰雜瘡療轉胞通大小便止咳嗽吐衄右一味每用二錢以米醋二合湯少許調服并井花水調亦可兼治肺疽心衄內崩吐血一二口或舌上血出如針孔若鼻衄吹納立已一法棕梠燒灰米飲調下可治大小便下血又一法同葵子等分為末米飲調下二錢治轉胞尤妙玉屑膏治尿血并五淋沙石疼痛不可忍受者黃茋人參各等分右為末用蘿蔔大者切一指厚三指大四五片蜜淹少時蘸蜜炙乾復蘸盡二兩為度勿令焦炙熟點黃茋人參末吃不以時仍以鹽湯送下癥瘕症治癥瘕積聚隨氣血以分門故方論云以癥瘕屬肝部積聚屬肺部不亦明乎况七者火數屬心蓋血生於心八者木數屬肝蓋血歸於肝雖曰強分理似不混夫癥者堅也堅則難破瘕者假物成形然七癥八瘕之名經論亦不詳出雖有蛟龍蛇鱉肉髮虱米七症初非定名偶因食物相感而致患耳若婦人七癥八瘕則由內外不內外因動傷五臟血氣而成古人將婦人病為痼疾以蛟龍等為生化然亦不必如此執泥婦人癥瘕俱名為血病蛟龍魚鱉等事皆出偶然但飲食間悮中之耳留聚腹臟假血而成自有活性亦猶永徽中僧病噎者腹中有一物其狀如魚即生瘕也與夫宿食停凝結為痞塊雖內外所感之不同治法當以類相從所謂醫者意也如以敗梳治虱瘕銅屑治龍瘕麴蘖治米瘕石灰治髮瘕如此等類方論至多不復繁引學者不可不解大硝石丸治七癥八瘕聚結痞塊及婦人帶下絶産并欲服丹藥腹中有癥瘕者當先下之此藥但去癥瘕不令人困硝石六兩大黃八兩人參三兩甘草炙三兩右為末以三年苦酒三升置銅器中以竹作準每一升作一刻拄器中先納大黃常攪不息使微沸盡一刻乃納餘藥又盡一刻極微火熬使可丸則丸如雞子黃大若不能服大圓作小圓如梧子大米湯下三十丸四日一服婦人或下如雞肝或如米泔正赤黑等三二升下後忌風冷自養如産婦小三稜丸治食癥酒癖血瘕氣塊時發刺痛全不思食及積滯不消心腹堅脹痰逆嘔噦噫醋吞酸脅肋刺痛胸膈痞悶并脾氣橫泄京三稜蓬莪术各四兩右同入磁器中用米醋五升浸滿封器口以炭火煨令乾取出稜术將芫花以餘醋炒令微焦焙乾為末醋糊丸如菉豆大每服十五丸生薑湯下婦人血分男子脾氣橫泄腫痛如水用桑白皮湯下三聖丸治積年堅癥堅瘕癖塊諸藥療不差至妙舶上硫黃一兩水銀五錢碙砂去砂石一分右三物乳盆內滚研如粉却以生鐵銚內用文武火熬鎔成汁以火筯攪令勻停冷刀剗下以紙裹置地坑內埋一宿取出再研細次以用赤芍藥當歸京三稜莪术紅花各一分同用並細銼以法酒一升煎及一半漉出砂盆內研生布絞汁再熬放冷入飛羅麵為糊搜丸如菉豆大治因産後傷於飲食結伏在腹脅時發疼痛不可忍者當歸浸酒一升逐漸取酒暖下七丸至十丸每服磨癖塊空心溫酒下三丸至五丸所餘藥滓製了焙乾為末别入乾地黃五錢真蒲黃芫花各一分醋炒焦黃右為末以前一般糊丸如菉豆大治女人血臟冷氣攻心疼及一切血疾溫酒下十丸一握七丸治臟府宿蘊風冷氣血不和停滯宿飲結為癥瘕痞塊及婦人血瘕腸胃中塞飲食不下咳逆脹滿及下痢赤白霍亂轉筋及踒躃拳攣腰脊腳膝疼痛行步不能常服健脾暖胃堅骨強陽神麴半斤炒黃大附子二個製炙甘草二兩右末蜜丸每左手一握分作七丸每服一丸細嚼米飲下妙應丹治諸臟氣虛積聚煩悶及飲食中蠱毒并食水陸果蓏子卵入腹而成蟲蛇魚鱉或宿食留飲婦人産後敗血不消女子月水不通結為癥瘕時發寒熱唇口焦黑肢體瘦削嗜卧多魘食少腹痛大便糟粕變成冷痢附子四個六七錢重者生去皮臍剜作孔入硇砂共一兩七錢拌麵臍裹煨熟去麵不用蓽撥木香炮青皮破故紙炒各三兩半右為末麵糊搜丸如梧子大每服三十丸生薑橘皮湯下泄痢米湯下加五十丸癲癎敘論夫癲癎病皆由驚動使臟氣不平鬱而生涎閉塞諸經厥而乃成或在母胎中受驚或小感風寒暑濕或飲食不節逆於臟氣詳而推之三因備具風寒暑濕得之外驚恐震懾得之內飲食飢飽屬不內外三因不同忤氣則一傳變則一五臟散及六腑溢諸絡脈但一臟不平諸經皆閉隨其臟氣證候殊分所謂像六畜分五聲氣色脈證各隨本臟所感而生諸症古方有三癎五臟癎六畜癎乃至一百二十種癎以其稟賦不同臟府強弱生理躁靜故諸證蜂起推其所因無越三條病由都盡矣癲癎證治病者旋暈顛倒吐涎沫搐搦騰踴作馬嘶鳴多因挾熱著驚心動膽懾鬱涎入心之所致也名曰馬癎以馬屬在午手少隂君火主之故其病生于心經病者眩暈四肢煩疼昏悶顛倒掣縱吐沫作羊呌聲多因少小臍瘡未愈數洗浴濕襲脾經之所致也名曰羊癎以羊屬未土坤位足太隂濕土主之故其病在於脾經病者昏暈顛倒兩手頻伸呌作雞聲須臾即醒醒後復發多因少小躁氣傷胃煩毒內作鬱涎入胃之所致也名曰雞癎以雞屬酉足陽明躁金主之故其病生于胃經病者眩暈顛倒眼目相引牽縱急強作豬呌鳴吐涎沫食傾方已多因少小吐利挾風之所致也名曰豬癎以豬屬亥手厥隂心包主之故其病生于右腎經病眩暈顛倒目反口噤瘈瘲吐涎作牛吼聲多因少小濕熱傷肺涎留肺系遇燥熱則發動名曰牛癎以牛屬丑手太隂濕土主之故其病生於肺經六珍丹治風癎失性顛倒欲死狀或作牛吼馬嘶雞鳴羊呌豬嘷等音聲臟府相引氣爭掣縱吐涎流沫久而方蘇通明雄黃葉子雌黃未鑽珍珠各一兩鉛二兩熬成屑丹砂五錢水銀一兩五錢右研細令極勻蜜丸如桐子大每服三丸至五丸薑棗湯下須椎一二萬杵方可丸礬丹治五癎百癎不問隂陽冷熱虢丹晉礬各一兩右用磚鑿一窠可容二兩許先放丹在下次放礬在上以白炭五斤煆令炭盡取出細研以不經水豬心血為丸如菉豆大每服十丸至二十丸橘皮湯下大鎮心丹治一百二十種癲癎驚狂譫妄癲倒昏不知人噴吐涎沫及治心驚膽寒清清不睡或左脅偏疼辰砂用黃松節酒煮龍齒用逺志苗醋煮右只取辰砂龍齒各等分為末豬心血為丸如雞豆子大每服一丸以麥門冬葉菉豆燈心生薑白蜜水煎豆熟為度臨卧送下小兒磨化半丸量嵗數與之蛇黃丹治五臟六腑諸風癲癎掣縱吐涎沫不識人及小兒急慢驚風蛇含四個建盞內煆紅以豬膽汁一盞淬乾天南星炮白附子辰砂另研麝香另研各五錢右為末糯米糊為丸如桐子大每服溫湯磨化一丸量大小與服大人嚼三五丸溫湯米湯任下凡例夫五癎合屬五臟而無腎有胃者以腎屬鼠非畜養物神無主治故不作癎胃屬雞係六畜物故有象兼胃為五臟海非餘府比又犬屬戍手少陽小腸經主之雖屬六畜初無犬癎者以辰戌為魁罡四殺沒處不興癎象古方類例未之究也學者宜知之狂證論夫三陽并三隂則陽虛而隂實故癲三隂并三陽則隂虛而陽實故狂陽入隂其病靜隂入陽其病怒怒則狂矣病者發狂不食棄衣奔走或自稱神聖登髙笑歌踰墻上屋所至之處非人所能罵詈妄言不避親屬病名發狂多因陽氣暴折蓄怒不決之所致也故經曰陽明常動太陽少陽不動不動而動為大疾此其候也鎮心丹治心氣不足病若驚悸自汗心煩悶短氣喜怒悲憂悉不自知亡魂失魄狀若神靈所憑及治男子遺泄女子帶下光明辰砂研白礬煆汁盡各等分右為末水丸如雞豆大每服一丸煎人參湯下食後服大補心湯治憂思愁慮過多致神志不寧魂魄失守虛陽外泄則自汗嘔吐泄痢頻煩諸證不生則語言重復忪悸眩暈兼治大病後虛煩不得眠羸瘦困乏及婦人胎前産後悉能主之常服安心神調血脈鎮驚補虛黃茋蜜炙茯神人參酸棗仁炙熟地各一兩五味子柏子仁另研逺志去心炒各五錢右為末蜜丸如桐子大用辰砂為衣每服三十丸米湯溫酒任下盜汗不止麥麩湯下亂夢失精人參龍骨湯下卒暴心痛乳香湯下肌熱虛煩麥門冬湯下吐血人參卷柏葉湯下大便下血當歸地榆湯下小便尿血赤茯苓湯下中風不語薄荷牛黃湯下風癎涎潮防風湯下礬丹治狂證亦妙方見癲癎門凡傷寒陽毒及蓄瘀血皆發狂各見本門九痛敘論夫心痛者在方論則曰九痛內經則曰舉痛一曰卒痛種種不同以其痛在心脘故總而言之曰心痛其實非心痛也若真心痛則手足青至節若甚旦發夕死夕發旦死不在治療之數方中所載者乃心主胞絡經也若十二經絡外感六淫則其氣閉塞鬱於中焦氣與邪爭發為疼痛屬外所因若五臟內動汨以七情則其氣痞結聚於中脘氣與血搏發為疼痛屬內所因飲食勞逸觸忤非類使臟氣不平痞膈於中食飲遁疰變亂腸胃發為疼痛屬不內外因治之當詳內外三因通中解散破積潰堅隨其所因無使混濫依經具録諸症以備治法云爾外所因心痛證治足厥隂心痛兩脅急引小腹連隂股相引痛手心主心痛徹背心煩掌中熱咽乾目黃赤脅滿足太隂心痛腹脹滿澀澀然大便不利膈閉咽塞手太隂心痛短氣不足以息季脅空痛遺矢無度胸滿煩心足少隂心痛煩劇面黑心懸若飢胸滿腰脊痛背輸諸經心痛心與背相引心痛徹背背痛徹心諸府心痛難以俯仰小腹上衝卒不知人嘔吐泄瀉此皆諸府經涉邪所致病屬外所因內所因心痛證治肝心痛者色蒼蒼如死灰終日不得太息真心痛者手足青至節旦發夕死夕發旦死脾心痛者如針錐刺其心腹蘊蘊然氣滿肺心痛者若從心間起動作痛益甚色不變腎心痛與背相引善瘈如物從後觸其心傴僂身胃心痛者腹脹滿不下食食則不消皆臟氣不平喜怒憂鬱所致屬內所因不內外因心痛久積心腹痛者以飲啖生冷果食中寒不能消散結而為積甚則數日不能食便出乾血吐痢不定皆由積物客於腸胃之間遇食還發名積心痛及其臟寒生蛔致生痛者心腹中痛發作腫聚往來上下痛有休止腹熱涎出病屬不內外因方證中所謂九種心痛曰飲曰食曰風曰冷曰熱曰悸曰蟲曰注曰去來痛者除風熱冷屬外所因餘屬不內外因更有婦人惡血入心脾經絡發作疼痛尤有甚於諸痛更有卒中客忤鬼擊尸疰使人心痛亦屬不內外因三因心痛總治蜜附湯治心腹疼痛或吐或瀉狀如霍亂及療冒涉濕寒賊風入腹拘急切痛附子生去皮臍切作四片以白蜜煎令附子變色以湯洗去蜜切五錢桂心芍藥各二錢草草炙四兩右銼散每服四大錢水一盞薑五片棗二枚煎七分去滓食前服大便祕結入白蜜半匙同煎麻黃桂枝湯治外因心痛惡寒發熱內攻五臟拘急不得轉動寒也麻黃去節湯洗焙乾桂心白芍藥細辛去苗乾薑甘草炙各三分半夏湯洗七次香附炒去毛各五錢右銼散每服四大錢水一盞薑五片煎七分去滓食前服大便祕入大黃如象棋子大兩枚煎加味小建湯治心腹切痛不可忍按輕則痛按重則愈皆虛寒證服熱藥并針炙不瘥此藥主之桂心三分甘草炙五錢白芍藥一兩五錢逺志肉五錢右銼散每服四大錢水一盞半薑五片棗一枚煎七分去滓入餳糖一塊如皂莢子大煎令溶食前溫服雞舌香散治心腹卒痛安胃進食調冷熱定泄瀉老少通用丁香一百枚甘草炙五錢良薑一兩白芍藥二兩右細末每服二錢匕陳米飲調下空心食前服王啓玄子序云初余為禁隊因此證處與御醫便令施用後至富貴乃由此始訶子散治心脾冷痛不可忍一服見效及老幼霍亂吐瀉其效如神訶子泡去核甘草炙厚朴製汁乾薑炮茯苓陳皮草果去皮髙良薑炒神麯炒麥芽炒各等分右為末每服二錢候發刺不可忍時用水一盞煎七分入鹽服如速則鹽點九痛丸治九種心痛蟲痛疰痛風痛悸痛食痛飲痛冷痛熱痛往來痛兼治卒中惡腹脹滿痛口不能言又治連年積冷流在心胸痛并冷腫痛上氣落馬墜車瘀血等疾附子三兩製狼毒炙香巴豆去皮心膜炒各一兩人參炮薑吳茱茰浸洗炒各一兩右為末煉蜜丸如桐子大每服空心溫酒下三丸卒中惡心痛不能言服二丸蘇合香丸治傳尸骨蒸殗殢肺痿疰忤鬼氣卒心痛霍亂吐痢時氣鬼魅瘴瘧赤白暴利瘀血月閉痃癖丁腫驚癎鬼忤中人小兒吐乳大人狐狸病蘇合香油入安息香內薰陸香别研龍腦各一兩白术硃砂研水飛青木香丁香白檀香沉香烏犀鎊安息香别為末用無灰酒一升熬膏香附去毛訶子煨去核麝香蓽撥各二兩右為末用安息香等膏同煉蜜旋丸如桐子大淸晨井花水溫冷任意化下四丸老人小兒一丸溫酒化下亦得辟邪用蠟紙裹一丸如彈子縫袋盛帶之撞氣阿魏丸治九種心痛五噎痃癖氣塊冷氣攻刺及脾胃停寒胸滿膨脹腹痛腸鳴嘔吐酸水丈夫小腸氣婦人血氣血刺等證阿魏二錢半酒浸一宿以麵為糊甘草一兩胡椒二錢半茴香炒川芎青皮陳皮丁香皮炒莪术炒各一兩砂仁桂心白芷炒各五錢生薑四兩切作片用鹽一宿淹炒黑右為末阿魏糊為丸如雞豆大每藥一斤用硃砂七錢為衣丈夫小腸氣痛炒薑鹽湯下二丸至三丸婦人血氣醋湯下常服茶酒任下二丸並食前細嚼咽倉卒散治氣自腰腹間攣急疼痛不可屈伸腹中冷重如石痛不可忍自汗如洗手足氷冷久不差垂死山梔子四十九個連皮燒半熟附子一枚製右為末每服二錢酒一小盞入鹽少許煎七分溫服又治胸痞切痛失笑散方見疝門三因極一病證方論卷九
