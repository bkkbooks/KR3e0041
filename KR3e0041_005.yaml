相火此下尅上民病燥熱交合涼風間發寒熱頭痛作渇四之氣太陽寒水加臨太隂濕土此下土尅上水民病暴仆振慄譫妄少氣咽乾引飲心痛􅏴腫瘡瘍骨痿便血五之氣厥隂風木加陽明燥金民病氣餒終之氣少隂君火加臨太陽寒水此下尅上民病温瘧治法宜鹹寒以抑火辛甘以助金汗之清之散之安其運氣審平湯治卯酉之嵗陽明司天少隂在泉民病中熱面浮鼻腫􅍠嚏小便黄赤甚則淋或癘氣行善暴仆振慄譫妄寒瘧􅏴腫便血逺志肉薑汁炒紫檀香各一兩天門冬去心山茰肉各三兩白芍藥白术炙草生薑右㕮咀每服四錢水盞半煎七分去滓食前服自大寒至春分加白茯苓半夏紫蘇生薑各五錢自春分至小滿加𤣥參白薇各五錢自小滿至大暑去逺志山茰白术加丹參澤瀉各五錢自大暑至秋分去逺志白术加酸棗仁車前子各五錢自秋分至大寒並依正方寅申之嵗少陽相火司天厥隂風木在泉氣化運行先天初之氣少隂君火加厥隂風木民病溫氣拂于上血溢目赤咳逆頭痛血崩脇滿膚腠生瘡二之氣太隂濕土加少隂君火民病熱鬱咳逆嘔吐胸膈不利頭痛身熱昏憒膿瘡三之氣少陽相火加少隂君火民病熱中聾瞑血溢膿咳嘔鼽嚏衂渇呵欠喉痺目赤善暴死四之氣陽明燥金加太隂濕土民病腹滿身重五之氣太陽寒水加陽明燥金民避寒邪君子周密終之氣厥隂風木加太陽寒水民病開閉不禁心痛陽氣不藏而欬治法宜鹹寒以平其上辛溫以治其内宜酸滲之泄之清之發之升明湯治寅申之嵗少陽相火司天厥隂風木在泉病者氣鬱血溢目赤欬逆頭痛嘔吐胸臆不利耳聾瞑渴身重心痛陽氣不藏瘡瘍煩躁紫檀香車前子炒青皮半夏酸棗仁薔蘼生薑甘草炙各等分右㕮咀每服四錢水盞半煎七分去滓空心服自大寒至春分加白薇𤣥參各五錢自春分至小滿加丁香一錢自小滿至大暑加漏蘆升麻赤芍各五錢自大暑至秋分加茯苓五錢自秋分至小雪依正方自小雪至大寒加五味子五錢丑未之嵗太隂濕土司天太陽寒水在泉氣化運行後天初之氣厥隂風木加厥隂風木民病血溢筋絡拘強闗節不利身重筋痿二之氣少隂君火加少隂君火民病溫癘盛行逺近咸若三之氣太隂濕土加少陽相火民病身重跗腫胸腹滿四之氣少陽相火加太隂濕土民病腠裏熱血暴溢瘧心腹䐜脹甚則跗腫五之氣陽明燥金加陽明燥金民病皮膚寒氣及體終之氣太陽寒水加太陽寒水民病闗節禁固腰椎痛治法用酸以平其上甘溫以治其下以苦燥之溫之甚則發之泄之賛其陽火令禦其寒化備湯治丑未之嵗太隂濕土司天太陽寒水在泉病者闗節不利筋脉拘急身重痿弱或溫癘盛行逺近咸若或胸腹滿悶甚則浮腫寒瘧血溢腰椎痛乾木𤓰茯神去木各一兩牛膝酒浸附子炮去皮臍各三分乾地黄覆盆子各五錢甘草一分生薑三分右㕮咀每服四錢水盞半煎七分去滓食前服自大寒至春分依正方自春分至小滿去附子加天麻防風各五錢自小滿至大暑加澤瀉三分自大暑直至大寒並依正方子午之嵗少隂君火司天陽明燥金在泉氣化運行先天初之氣太陽寒水加厥隂風木民病闗節禁固腰椎痛中外瘡瘍二之氣厥隂風木加少隂君火民病淋目赤氣鬱而熱三之氣少隂君火加少陽相火民病熱厥心痛寒熱更作咳喘目赤四之氣太隂濕土加太隂濕土民病黄疸􅍠衂嗌乾吐飲五之氣少陽相火加陽明燥金民乃安康伏邪於春為瘧終之氣陽明燥金加太陽寒水民病上腫欬喘甚則血溢下連小腹而作寒中治法宜鹹以平其上苦熱以治其内鹹以軟之苦以發之酸以收之正陽湯治子午之嵗少隂君火司天陽明燥金在泉民病闗節禁固腰痛氣鬱熱小便淋目赤心痛寒熱更作欬喘或􅍠衂嗌咽吐飲黄疸甚則連小腹而作寒中悉主之白薇𤣥參川芎桑皮炙當歸芍藥旋覆花甘草生薑各五錢右㕮咀每服四錢水盞半煎七分去滓空心服自大寒至春分加杏仁升麻各五錢自春分至小滿加茯苓車前子各五錢自小滿至大暑加杏仁麻仁各一分自大暑至秋分加荆芥茵陳各一分自秋分至小雪依正方自小雪至大寒加蘇子五錢己亥之嵗厥隂風木司天少陽相火在泉氣化運行後天初之氣陽明燥金加厥隂風木民病寒於右脇下二之氣太陽寒水加少隂君火民病熱中三之氣厥隂風木加少陽相火民病淚出耳鳴掉眩四之氣少隂君火加太隂濕土民病黄疸跗腫五之氣太隂濕土加陽明燥金燥濕相勝寒氣及體終之氣少陽相火加太陽寒水此下水尅上火民病溫癘治法宜辛涼平其上鹹寒調其下畏火之氣無妄犯之敷和湯治己亥之嵗厥隂風木司天少陽相火在泉民病熱中而反右脇下寒耳鳴淚出掉眩燥濕相搏黄疸浮腫時作溫癘半夏棗肉五味子枳實麩炒茯苓訶子去核炮薑橘皮炙草各五錢右㕮咀每服四錢水盞半煎七分去滓空心服自大寒至春分加鼠粘子一分自春分至小滿加麥冬山藥各一分自小滿至大暑加紫苑一分自大暑至秋分加澤瀉山梔仁各一分自秋分至大寒並依正方六氣凡例凡六氣數起于上而終于下嵗半之前自大寒後天氣主之嵗半之後自大暑後地氣主之上下交互氣交主之司氣以熱用熱無犯司氣以寒用寒無犯司氣以涼用涼無犯司氣以溫用溫無犯司氣同其主亦無犯異主則少犯之謂之四畏若天氣反時可依時及勝其主則可犯以平為期不可太過也三因極一病証方論卷五
