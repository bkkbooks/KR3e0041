body:
  text: 三因極一病証方論卷五宋陳言撰壊傷寒証治壊傷寒者以醫者不辨隂陽錯謬汗下致病不解壊証亂經又傷寒過經熱留臟府病候數變久而不瘥隂陽無復紀律皆名壊病知母麻黄湯治壊傷寒以傷寒瘥後經久精神不守言語謬或潮熱頰赤寒熱如瘧昏沉不愈皆由汗下不正毒在心包間所致也知母一兩五錢麻黄去節甘草炙芍藥黄芩桂心各兩半右剉散每服五錢水一盞半煎七分去滓溫服日三四服若心煩欲飲水稍稍與之無憂散治傷寒調理失序毒氣内結胸腹脹滿坐卧不安日久不瘥狂妄譫語大小便不通或復吐逆臘月黄牛胆一個以天南星為末入胆内缚令緊當風避日懸之候乾取用右為末以人參五錢煎湯七分分半盞調末二錢熱服遲遲更以熱人參湯投之或腄便溺下黄黑惡物取效為度黑奴丸治傷寒調理失宜醫所不治及時行疫病六七日不汗脉洪數面赤目瞪身熱煩躁狂言欲走大渇或口噤精魂已散但心下煖挖開口灌藥下咽即活并治陽毒發斑麻黄去節二兩小麥奴一兩大黄二兩芒硝一兩釡底煤一兩另研梁上塵一兩另研灶突墨一兩另研右末煉蜜為丸桐子大新汲水研下二丸渇者與冷水盡量飲之須臾當寒寒竟汗出便瘥若日移五尺不汗依前法再服病人大渇乃可與之不渇者莫服狐惑証治狐惑証者黙黙欲眠目不得瞑惡飲食面目乍赤乍白乍黑齒無色舌上白聲啞咽乾此因大病後腸胃空虚三蟲求食食人五臟食其咽則為惑其聲啞食下部則為狐其咽乾當看上唇有瘡蟲食其臟下唇有瘡蟲食其肛桃仁湯桃仁去皮尖槐子研艾各一兩右剉散每服五錢水一大盞姜三片棗二枚煎七分去滓食前服黄連犀角湯治傷寒及諸病後有瘡出下部黄連五錢犀角一兩無則以升麻代烏梅七個木香一分右剉散每服五錢水盞半煎七分去滓食前服雄黄銳散治下部䘌瘡雄黄研青葙子苦參黄連各二分桃仁去皮尖研一分右末以生艾搗汁和丸棗核大綿裹納下部扁竹汁更佳無艾只用綿裹散子亦得譫語症治病有言語錯謬者其証有二有虚有實虚則鄭聲實則譫語傷寒胃熱及三陽合病婦人熱入血室及下利而譫語者皆屬實熱大小便利手足逆冷脉㣲細言語鄭重者皆屬虚寒治之各有方虚寒宜溫如四逆湯之類胃實宜下承氣湯之類婦人熱入血室小柴胡湯若譫語而反四肢逆冷脉沉細者不治四逆湯方見兩感柴胡湯方見少陽証大承氣湯方見陽明証病後虚煩証治大病後心虚煩悶發熱與傷寒相似但不惡寒與不頭疼為異汗下後人參竹葉湯嘔者橘皮湯諸病後多有此症各見本門人參竹葉湯治汗下後表裏虚煩不可攻者竹葉兩把人參炙草各三兩半夏二兩半石膏麥冬各五兩右為剉散每服四錢水一盞半薑五片粳米一撮煎至米熟去滓食前服橘皮湯治動氣在下不可發汗發之反無汗心中大煩骨節疼痛目運惡寒食則反嘔榖不得入宜服此方橘皮一兩半炙草五錢人參一分竹茹五錢右㕮咀每服五錢水一盞薑三片棗一枚煎七分去滓食前服料簡凡傷寒中雜病症狀非一當隨門類酌量施治可也如發黄則多用五疸中藥只依黄疸治之發狂已見陽毒門吐衂便利瘀血見失血門下利見滯下奔豚見五積隂陽厥見厥論嘔噦喘咳見本門其他更不繁錄傷暑叙論傷暑者乃夏至前後各三十日有竒少陽相火用事之時也炎熱大行爍石流金草萎河涸人或傷之則發熱自汗面垢背寒倦怠少氣以暑消氣氣消血散與傷寒相類此是夏間即病非冬傷寒至夏發為熱病也當以脉别之傷暑脉虚無力盖因氣血消散致脉虚弱傷寒則氣血内閉脉𦂳而有力大不同也要畧言傷寒家别有暍病盖詮次者見其一條别在後故有是說輕重不同識者知之傷暑証治病者身熱惡寒頭痛状如傷寒或往來寒熱如瘧煩躁渇甚眩暈嘔吐背寒面垢泄瀉昏悶不清其脉隂陽俱虚緩而㣲弱皆由傷暑之所致也却暑散治冐暑伏熱頭目眩暈嘔吐泄瀉煩渇背寒面垢赤茯苓生甘草各四兩寒食麫生薑各一兩右為末每服二錢新汲水調下或湯㸃不拘時服五苓散治傷暑煩渇引飲無度兼治傷寒溫熱表裏未解煩渇引飲水入即吐或小便不利或汗出表解渇不止又治霍亂吐利黄疸溫疫澤瀉二兩五錢桂心一兩猪苓去皮赤茯苓白术各一兩五錢右為末每服二錢沸湯調不拘時服服訖多飲熱湯汗出即愈桂苓丸治煩渇消痰飲寛胸膈桂心白术各一兩赤苓三兩烏梅肉一兩五錢乾薑一兩炙草五錢右為末蜜丸彈子大每服一丸至二丸細嚼滚湯送下香薷丸治大人小兒傷暑伏熱躁渇瞀悶頭目昏眩胸膈煩滿嘔噦惡心口苦舌乾肢體困倦不思飲食或發霍亂吐利轉筋並宜服之香薷紫蘇俱去梗乾木瓜各一兩丁香炙草檀香白茯苓藿香右為末蜜丸彈子大每服一丸至二丸熟水嚼下或新汲水化下亦得小兒半丸消毒丸治中暑煩渇眩暈寒熱半夏湯泡令去滑米泔煮令透茯苓生甘草各五錢右為末蜜丸桐子大每服三十丸新汲水調下不拘時服傷濕叙論經云濕為停着凡闗節疼痛重痺而弱皆為濕着若氣不平亦使人半身不遂口眼喎斜涎潮昏塞此中濕之候也夫寒熱風濕皆能并合為疾所謂風濕寒濕濕溫者其証各有不同其治亦别不可不辨若治風濕寒濕當發其汗但㣲㣲似汗出則風濕俱去若大汗出風去濕不去則不能愈若治痺又中濕只宜利小便不宜以火攻并轉利濕家下之額上汗出㣲喘小便不利者死若下利不止者亦死論曰治濕不利小便非其治也傷濕証治病者身重脚弱闗節煩疼發熱惡寒小便秘澁大便飱泄自汗腰脚冷痺腿膝浮腫小便或自利不渇皆久坐卑濕或為雨露所襲或汗出沾衣受濕漸漬得之名曰濕痺腎着湯治身重腰冷如坐水中形如水狀反不渇小便自利飲食如故病屬下焦從身勞汗出衣裏冷濕久而得之名曰濕痺腰以下冷痛腰重如帶五千錢炙甘草白术各二兩炮薑茯苓各四兩右為剉散每服四錢水一盞半煎七分去滓空心服滲濕湯治坐卧濕地或為雨露所襲身重脚弱闗節疼痛發熱惡寒或小便秘澁大便飱泄或汗出衣裏漬濕漸得之腿膝或腫小便利反不渇蒼术米泔浸白术甘草炙各二兩乾薑炮茯苓各四兩陳皮丁香各五錢右為剉散每服四錢水盞半薑三片棗二枚煎七分去滓溫服寒濕証治病者身體煩疼無汗惡寒發熱脉浮緩細皆寒濕相并所致麻黄白术湯治寒濕身體煩疼無汗惡寒發熱者麻黄去節三兩桂心二兩甘草炙一兩杏仁二十五粒去皮尖白术四兩以上㕮咀每服四錢水一盞半煎七分去滓空心溫服風濕証治病者身疼日晡發熱不能轉側短氣汗出惡風不欲去衣或身㣲腫脉浮弦細此風濕相搏或汗出當風所致也桂枝附子湯治風濕相搏身體煩疼掣痛不得屈伸汗出短氣小便不利惡風不欲去衣或身㣲腫桂枝四兩白术附子炮去皮臍各三兩甘草二兩右㕮咀每服四錢水盞半薑五片棗二枚煎七分去滓空心溫服或大便秘則去桂小便不利悸氣加茯苓三兩痺加防己四兩腹痛加芍藥四兩風濕寒証治病者汗出身重惡風喘滿腹内不和下氣上衝臍下連足冷痺不能自屈伸骨節煩疼近之則痛極如歴節狀此由冐風寒濕三氣雜至而為病也防己黄茋湯治傷風濕寒脉浮𦂳細身重汗出惡風并治風水脉浮身重不渇防己四兩黄茋五兩炙草三兩白术三兩右㕮咀每服五錢水盞半薑五片棗四枚煎七分去滓空心服喘者加麻黄胃中不和加芍藥氣上衝加桂下有積寒加細辛服藥後當如蟲行皮中從腰以下如水浸坐被中又以一被繞腰下溫之令㣲汗出乃瘥風濕溫証治病者煩渇引飲心腹冷痛躁悶面垢口乾惡寒惡風飢不能食眩暈嘔噦此伏暑中風濕所致也治之各有方白术茯苓乾薑湯治伏暑中風濕煩渇引飲心腹疼躁悶口乾面垢洒洒惡寒淅淅發熱惡風㣲汗飢不能食白术乾薑茯苓細辛桂心乾葛甘草橘皮烏梅香豉右等分為細末每服二錢白湯㸃下暑濕風溫証治暑者六經氣之一能與風濕併合為病循經流入諸臟但與寒不相得故有暑濕風溫之証暑濕者惡寒反熱自汗闗節盡痛頭目昏眩手足倦怠不自勝持此併傷暑濕所致也風溫者頭痛身熱常自汗出體重喘息心四肢不收嘿嘿欲眠此由先傷風後傷暑所致也治之各有方法茯苓白术散治冐暑毒加以着濕或汗未乾即浴皆成暑濕茯苓一兩炮薑甘草白术桂心各一兩右㕮咀每服四錢水一盞煎七分去滓空心服萎𬎼湯治風濕兼療冬溫及春月中風傷寒發熱頭眩痛咽喉乾舌強胸内疼痛痞滿腰背拘急葛根麻黄炙草白薇川芎羌活杏仁去皮尖各五錢石膏一兩萎㽔三分青木香一分右㕮咀每服五錢水盞半煎七分去滓空心服木香冬用一兩春用五錢君火論五行各一惟火有二者乃君相之不同相火則麗於五行人之日用者是也至于君火乃二氣之本原萬物之所資始人之初生必投生於父精母血之中而成形精藏腎腎屬水故天一而生水血藏心心屬火故地二而生火識為𤣥𤣥屬木故天三而生木乃太乙含三引六之義也亦道生一一生二二生三之數也則知精血乃裁成於識以識動則暖靜則息靜則無象暖觸可知故命此暖識以為君火正内典所謂暖識息三連持夀命者也然其所以謂之君火者以其行炎暑象君之徳萬物資始象君之化位居少陽象君之政神明出入象君之令故君亦天也天亦君也乾以元亨利貞而運行於其上君以徳化政令而輔成於其下天道順序而生長化收藏不失其時君道助順故進退存亡不失其正其實皆一理也成象成法雖主配于心腎推而明之一㸃精誠無物不備是宜君火之用上合昭昭下合𡨕𡨕與萬物俱生而無所間斷也醫者茍不明此皆墮於術數技藝焉夫瞽史之用易拘拘于卜筮休咎之中吾見其大蔽聖人之道未聞有益于天下後世也悲夫五運論夫五運六氣乃天地隂陽運行升降之常道也五運流行有太過不及之異六氣升降則有逆從勝復之差凡不合於徳化政令者則為變𤯝皆能病人故經云六經波蕩五氣傾移不及太過及專勝兼并所謂治化人之應也或遇變𤯝聿興災沴鬱發以亂真常不徳而致折復隨人臟氣虚而為病者謂之時氣與夫感冐中傷天行疫沴頓然不同前哲知夫天地有餘不足乖戾之氣還以天道所生徳味而平治之經論昭然人鮮留意恐成湮没故叙而紀之五運時氣民病証治凡遇六壬年發生之紀嵗木太過風氣流行脾土受邪民病飱泄食減體重煩寃腸鳴脇支痛甚則忽忽喜怒眩冐顛疾為金所復則反脇痛而吐甚則衝陽絶者死苓术湯治脾胃感風飡泄注下腸鳴腹滿四肢重滯忽忽喜怒眩冐顛暈或左脇偏疼白茯苓厚朴姜汁炒白术青皮乾薑炮半夏湯泡去滑草果去皮炙草各等分右㕮咀每服四錢水盞半薑三片棗二枚煎七分去滓空心服凡遇六戊年赫曦之紀嵗火太過炎暑流行肺金受邪民病痎瘧少氣咳喘血溢泄瀉嗌燥耳聾中熱肩背熱甚胸中痛脇支滿背髀并兩臂痛身熱骨痛而為浸滛為水所復則反譫妄狂越咳喘息鳴血溢泄瀉不已甚則太淵絶者死麥門冬湯治肺經受邪上氣咳喘咯血痰壅嗌乾耳聾泄瀉胸脇滿痛連肩背兩臂膊痛息髙麥冬去心白芷半夏竹葉甘草鍾乳粉桑白皮紫苑去茸人參各等分右㕮咀每服四錢水盞半薑二片棗一枚煎七分去滓空心服凡遇六甲年敦阜之紀嵗土太過雨濕流行腎水受邪民病腹痛清厥意不樂體重煩寃甚則肌肉痿足痿不收胻善瘈脚下痛中滿食減四肢不舉為風所復則反腹脹溏泄腸鳴甚則太谿絶者死附子山茱茰湯治腎經受濕腹痛寒厥足痿