body:
  text: 三因極一病證方論卷七宋陳言撰疝證敘論經論雖云七疝諸疝等更不見名狀但出寒疝㿗疝而已惟大竒論則五臟脈為五疝證所謂腎脈太急沉為腎疝肝脈太急沉為肝疝心脈搏急為心疝肺脈沉搏為肺疝三隂急為脾疝三隂即太隂脾經脈也大抵血因寒凝則為瘕氣因寒聚則為疝但五臟脈理不同不可不辨且腎脈本沉心脈本滑受寒則急於理乃是肝脈本弦肺脈本澀並謂之沉未為了義又脾不出本脈但云急為疝亦文義之缺也凡云緊者急也緊為寒亦可類推且賊風入腹亦為疝冒暑寢濕皆能為疝當隨四氣改易風則浮弦暑則洪數濕則緩細於理甚明要知疝證雖兼臟氣皆外所因也諸疝證治疝之為病隨臟氣虛實感傷外邪寒泣風散暑鬱濕著絞刺擊搏無有定處倉卒之際痛不堪忍世人稱為橫痃膀胱小腸氣賊風入腹等名義不同證狀則一寒則溫之風則散之暑則和之濕則燥之各有方法大烏頭桂枝湯治風寒泣腹中痛逆冷手足不仁身體疼痛炙刺諸藥不能療及賊風入腹攻刺五臟拘急不得轉側發于呌呼隂縮悉主之大烏頭五枚實者去皮尖蜜一大盞煎減半取出湯洗七次桂心芍藥各三錢甘草炙一分右銼散每服四錢水一盞半薑五片棗三枚入前烏頭蜜半合煎七分去滓食前服一法用附子一個不用烏頭為蜜附湯走馬湯治卒疝無故心痛隂縮手足厥逆並治飛尸鬼擊巴豆二錢去皮心炒杏仁二粒去皮尖右二味取綿纒槌令碎熱湯二合捻取白汁飲之當下老少量力與之倉卒散治寒疝入腹心腹卒痛及小腸膀胱氣刺絞痛脾腎氣攻擊急極痛不可忍屈伸不能腹中冷重如石并自汗出山梔子四十九枚燒半過附子一枚炮去皮臍右為末每服二錢水一盞酒半杯煎七分入鹽一捻溫服即愈蔥白散治一切冷氣不和及本臟膀胱氣攻刺疼痛并治婦人胎前産後腹痛胎不安或血刺者兼治血臟宿冷百節倦疼肌瘦怯弱勞傷帶癖久服愈但婦人一切疾病最宜此川芎當歸枳殼麩炒厚朴薑汁炒官桂去皮青皮炮薑茴香炒川楝子炒神麯炒麥芽炒三稜炮莪术醋浸一宿焙人參茯苓芍藥炒木香熟地各一兩甘草炙三分右為末每服三錢水一盞蔥白二寸煎七分鹽少許熱服大便祕澀加大黃煎大便自利加訶子煎食前服失笑散治小腸氣痛及婦人血痛心腹絞痛欲死十餘日百藥不效五靈脂蒲黃炒各等分右為末每服二錢先用釅醋一合熬藥成膏水一盞煎七分熱服神應散治諸疝心腹絞痛不可忍玄胡索胡椒等分右為末每服二大錢酒半盞水半盞煎七分食前溫服大烏頭湯治寒疝繞臍發自汗出手足厥其脈沉弦悉主之大烏頭五個洗淨細沙炒令黑不㕮咀右一味水三盞煎取八分去烏頭入蜜半杯已下煎七分早上空心服牡丹丸治小腸氣腹痛及寒疝心腹刺痛休作無時又治婦人月病血刺疼痛川烏頭五枚炮焦黑去皮尖牡丹皮四兩桂心五兩桃仁五兩去皮尖研右為末煉蜜丸如桐子大每服五十丸溫酒下女人醋湯下小茴香丸治小腸氣腹痛茴香胡椒等分右為末酒糊丸梧子大每服五十丸空心溫酒下苦楝丸治肝腎氣虛風冷相搏心腹絞痛攻刺腰背不能禁受下注隂器腫癢疼痛久服養腎活血駐顔輕身耐老進美飲食川棟子十一個銼碎分三處一用巴豆七粒去皮同炒焦黑色去巴豆不用一用斑貓七個同炒黑去斑貓一用海金沙七錢同炒焦去海金沙亦不用茴香炒破故紙炒葫蘆巴炒木香炮各一兩烏藥二兩右為末酒糊丸桐子大每服三五十丸湯酒任下補腎湯治寒疝入腹上實下虛小腹㽱痛時復泄瀉胸膈痞悶不進飲食常服溫脾補腎人參茯苓白术附子黃茋各一兩沉香四錢木瓜一兩羌活五錢炙草川芎各一分紫蘇三分右銼散每服三錢水一盞薑三片棗一枚煎七分去滓食前服嘔加半夏五錢薑七片煎敘厥論經云厥者逆也有寒厥有熱厥有六經厥有尸厥寒厥者隂氣起於足五指之裏集于膝下聚于膝上故隂氣勝則從五指至膝上寒陽氣不能滲營其經絡陽氣日損隂氣獨在故手足為之寒名曰寒厥熱厥者陽氣起於足五指之表集於足下聚於足心故陽氣勝則從五指至足心熱熱入於胃絡脈滿經脈虛隂虛陽入腎氣衰陽氣獨勝故手足為之熱名曰熱厥六經厥者頭重足弱發為瞑仆名曰太陽厥妄言走呼腹滿面赤名陽明厥暴聾頰脅胻拘痛名少陽厥腹脹後閉食則寒嘔名太隂厥口乾溺赤腹滿心痛名少隂厥溲不利䯒熱隂縮名厥隂厥尸厥者脹滿暴不知人或至半日逺至一日此以隂氣盛於上則下虛下虛則腹脹腹脹則下氣重上而邪逆逆則陽氣亂而不知人矣名曰尸厥經論如此雖粗分六經殊不出寒熱二證所因欲求備治當歷明之寒厥則因多欲而奪其精故致陽衰隂盛熱厥則因醉飽入房精虛熱入故致隂虛陽盛考其厥因多以不勝乘其所勝氣不得行遂致於逆如腎移寒於脾則水乘於土水既不行乃成寒厥如心移熱於腎則火乘於水火既不行乃成熱厥六經皆然可以次第論也所謂得其要者一言而終矣尸厥亦然正由臟氣相刑或與外邪相忤則氣遏不行閉於經絡諸脈匿伏昏不知人惟當隨其臟氣而通之寒則熱熱則寒閉則通如經所謂盛則瀉虛則補不盛不虛以經取之其義一也經中以數醉為熱厥之因學者不可拘此蓋傷寒溫病皆有熱厥張仲景所謂熱深厥亦深聖意以酒能發百脈熱故舉此以為例耳不可不知隂陽厥脈證治隂陽相乘而生寒熱厥者證脈似同而大異寒厥者初得之四肢冷脈沉微而不數多惡寒引衣自覆下利清榖外症多惺惺熱厥者初得之必發熱頭疼脈雖沉伏按之必數其人或畏熱喜冷揚手掉足煩躁不眠大小便祕澀外證多昏冒傷寒亦然治之各有方四逆湯治寒厥表裏熱寒下利清榖食入即吐或乾嘔或大汗大吐大下之後四肢氷冷五內拘急舉體疼痛不渴脈沉伏者大附子去皮臍生用五錢乾薑五錢炙草一兩右銼散每服四錢水二盞煎七分去滓食前溫服併進取效白虎湯治熱厥腹滿身重難以轉側而垢譫語遺溺手足厥冷自汗脈沉滑表有熱也石膏碎四兩知母一兩五錢炙草五錢右銼散每服四大錢粳米一撮煮米熟去滓取七分清汁服可併進服其煎水用二盞承氣湯亦治熱厥方見傷寒門此以為例當觀病淺深量多寡飲之卒厥尸厥證治追魂湯治卒厥暴死及主客忤鬼擊飛尸奄忽氣絶不覺口噤麻黃去節三兩杏仁去皮尖一百八十粒炙草一兩右銼散每服四錢水一盞半煎七分去滓灌之通治諸感客忤或口噤撮口不開起齒下湯入口下活不下分病人髮左右捉搦肩引之下藥漸令服盡取效千金有桂心二兩金匱云寸脈沉大而滑沉則為實滑則為氣氣實相搏血氣入臟則死入腑則愈若卒厥脣口青身冷為入臟即死和汗自出為入腑即愈納鼻散治尸厥脈動而無氣氣閉不通靜而若死狀名卒厥石菖蒲為末納兩鼻孔中吹之令入仍以桂末安舌下眩暈證治方書所謂頭面風者即眩暈是也然眩暈既涉三因不可専為頭面風如中傷風寒暑濕在三陽經皆能眩人頭目頭重項強但風則有汗寒則掣痛暑則熱悶濕則重著吐逆眩倒屬外所因喜怒憂思致臟氣不行鬱而生涎涎結為飲隨氣上厥伏留陽經亦使人眩暈嘔吐頭目疼痛眼不得開屬內所因或飲食飢飽甜膩所傷房勞過度下虛上實拔牙金瘡吐衄便利去血過多及婦人崩傷皆能眩暈眼花屋轉起則眩倒屬不內外因治之各有方法大豆紫湯治中風頭眩惡風自汗吐冷水及産後百病中風痱痓背強口噤直視煩熱獨活一兩五錢大豆半升酒三升右先以酒浸獨活煎一二沸别炒大豆極焦煙出急投酒中密候冷去豆每服一二合許得少汗則愈日數十服此湯能去風消血結如妊娠折傷胎死腹中服此得瘥三五七湯治感寒頭眩惡寒口眼喎斜耳聾大附子三兩炮去皮臍山茰肉五兩山藥七兩右為末每服二錢匕酒調服或㕮咀每服四大錢水一盞半薑五片棗一枚煎七分去滓服黃龍丸治感冒眩暈昏不知人方見中暑門麯术散治冒濕頭眩經久不瘥嘔吐飲食無味神麯三兩炒白术三兩右為末每服二錢生薑煎湯調下或以酒糊丸桐子大每服三五十丸飲湯任下薯蕷湯治七情內動臟氣不行鬱而生涎涎結為飲隨氣上厥伏留陽經心中忡悸四肢緩弱翕然面熱頭目眩冒如欲搖動薯蕷人參麥冬去心各四兩白芍熟地前胡各二兩枳殼逺志肉薑汁製各三分白茯苓茯神各一兩半炙草五錢黃茋蜜炙一兩製半夏一兩一分右銼散用千里流水一盞半薑七片秫米一撮煎七分去滓食前服白散子治上實下虛眩暈昏塞方見中風門芎藭湯治産後去血過多暈悶不省及傷胎去血多崩中去血多金瘡去血多拔牙去血多不止懸虛心煩眩暈頭重目昏耳聾舉頭欲倒川芎當歸洗去土焙乾各等分右銼散每服四錢水一盞半煎七分去滓熱服黑錫丹治隂陽不升降上熱下冷頭目眩暈病至危篤或服暖藥僣上愈甚者當服此藥硫黃二兩透明如皂莢子大候鋁成汁入硫黃在內勿令𦦨起候硫黃化傾出于九重紙內入于地上以碗蓋自朝至暮待火毒出候用川練子蒸去皮核黑鉛不夾錫者先溶化成汁各二兩陽起石煆木香不見火沉香青皮炒各五錢肉豆蔲一兩􅔇裹煨茴香炒官桂去皮不見火附子製葫蘆巴酒浸炒破故紙炒各一兩烏藥去木心銼一兩右為末酒糊丸如桐子大每服三十五十至百丸濃煎人參茯苓薑棗湯吞下食前服痓敘論夫人之筋各隨經絡結束於身血氣內虛外為風寒濕熱之所中則痓故寒則筋縮熱則弛張風則弦急溫則脹緩四氣兼并當如常説以風散氣故有汗而不惡寒曰柔痓寒泣血故無汗而惡寒曰剛痓熱消氣故為瘈瘲濕溢血故為緩弱經中所謂大筋緛短小筋弛長筋短為拘弛長為痿皆濕熱不攘之所為也原其所因多由亡血筋無所營故邪得以襲之所以傷寒汗下過多與夫病瘡人及産致斯病者概可見矣診其脈狀皆沉弦緊但陽軟隂急則几几拘攣隂緩陽急則反張強直二證不可不辨痓敘例治法破傷風破傷濕並附病者身熱足寒頭項強急時頭熱面赤惡寒獨頭搖動卒口噤背反張以發熱惡寒不惡寒有汗無汗分剛柔者風寒痓也脈沉細者為濕痓瘡瘍未合風入為破傷風濕入為破傷濕二者害人最急倉卒不知其因甚為難認􅏴疽瘰癧膿潰之後尤宜謹之産婦汗多或因怒厥皆成此疾治之各有方括蔞桂枝湯治柔痓身體強几几然脈反沉逆自汗括蔞根二兩桂心白芍各三兩甘草右銼散每服四大錢水二盞薑五片棗二枚煎七分去滓溫服汗不透食頃啜熱粥發之葛根麻黃湯治剛痓無汗小便少氣上衝胸口噤不能言葛根四兩麻黃去節四兩桂心白芍甘草右銼散每服四大錢水一盞半薑五片棗三枚煎七分去滓食前服大承氣湯治剛痓胸滿口噤卧不著席腳攣急齗齒緊方主之大黃四兩厚朴八兩製枳殼二兩麩炒右銼散每服四大錢水盞半煎七分去滓入芒硝二錢煎溶服得利止後服此以陽明養宗筋陽明者胃也風濕寒入於胃則熱甚宗筋無以養故急宜利陽明以治其能養也參桂湯治卒然半身不遂手足拘急不得屈伸體冷或知或否或身強直不語或生或死狂言不可名狀角弓反張或欲得食或不用食或大小便不利悉主之人參桂心當歸獨活黃芩炮薑甘草炙各一兩石膏一兩五錢杏仁一百六十粒麩炒去皮尖右銼散每服四錢水一盞半煎七分去滓服無汗加麻黃去節三分倉公當歸酒治賊風口噤角弓反張痓者當歸防風各三分獨活一兩半麻黃去節兩一分細辛去苖五錢附子一枚六錢重炮去皮臍右銼散每服四錢水酒各半盞煎七分去滓口不開者抉開口細灌一服蘇二服少汗三服大汗愈破傷風濕治法防風散治風自諸瘡口入為破傷項強牙關欲絶死者防風去義天南星湯炮各等分右為末每服三錢童子小便一大盞煎七分熱服牡蠣散治破傷濕口噤強直右牡蠣取末粉傅瘡口仍以末二錢煎甘草湯調下香膠散治破傷風口噤強直右魚膠燒七分留性研細入麝香少許每服二錢酒調下不飲者米湯下又一方以蘇木煎酒下三因極一病證方論卷七
