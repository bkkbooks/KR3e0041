body:
  text: 三因極一病證方論卷十七宋陳言撰婦人論夫天地造端於夫婦乾坤配合於隂陽雖清濁動靜之不同而成象效法之有類原兹婦人之病與男子不同者亦有數焉古方以婦人病比男子十倍難治不亦言之深乎但三十六病産蓐一門男子無之其如外傷風寒暑濕內積喜怒憂思飲食房勞虛實寒熱悉與丈夫一同也依源治療可得而知之求子論夫有夫婦則有父子婚姻之後必求嗣續聖人謂不孝有三無後為大言嗣續之至重也凡欲求子當先察夫妻有無勞傷錮疾之屬依方調治使內外和平則夫婦樂而有子矣蕩胞湯治婦人立身以來全不産育及斷緒久不産二三十年者朴硝牡丹皮當歸大黃蒸桃仁湯泡去皮尖麵炒各五錢細辛去苗厚朴去皮薑汁炒桂去皮赤芍桔梗人參茯苓甘草炙牛膝酒浸陳皮各三錢附子泡去皮臍一兩虻蟲去嘴翅炒焦水蛭切炒各四十箇右㕮咀每服四大錢水酒各一盞半煎取六分去滓空心服日三夜一溫覆得少汗血必下積血及冷赤膿如小豆汁斟酌下盡若力弱大困不堪者只一二服然恐惡物不盡不得藥力能盡服儘好不爾著坐導藥坐導藥治全不産及斷緒後服前蕩胞湯惡物不盡用此方皂角去净皮子吳茱茰當歸各一兩細辛去苖五味子乾薑炮各二兩大黃蒸礬石枯戎鹽蜀椒各半兩右為末以絹袋盛大如指長三寸餘盛藥令滿縳定納婦人隂中坐卧任意勿行走小便時去之更安一日一度易新者必下青黃冷汗汗盡止未見病出者可十日安之本謂子宫有冷惡物故令無子值天隂冷則發疼痛須候病出盡方已不可中輟每日早晚用苦益菜煎湯薰洗秦桂丸治婦人無子昔金城范守進此方見經驗秦芁桂心杜仲去皮薑汁炒净去絲厚朴去皮薑製防風附子去皮臍生用茯苓各一兩半白薇乾薑炮牛膝酒浸沙參半夏泡各五錢人參一兩細辛去苗二兩一分右為末煉蜜丸赤豆大每服五十丸食前溫酒醋湯任下如未效更加數丸覺有則止探胞湯斷經三月不知是胎驗之方川芎一味不拘多少為末濃煎艾湯調二錢空心服微動有胎脉例經云隂搏陽别謂之有子搏者近也隂脉逼近于下陽脉别見於上隂中見陽乃知陽施隂化法當有子又少隂脉動甚者妊子也手少隂屬心足少隂屬腎心主血腎主精精血交㑹識投子其間則有娠又三部脉浮沉正等無病者有妊也餘並如脉惡阻說惡阻婦人中脘宿有風冷痰飲經脉不行飲與痰搏多喜病阻其狀顔色如故脉理順時不知病之所在但覺四肢沉重頭目眩暈惡聞食臭喜啖醎酸至三四月則大劇吐逆不自勝持多卧少起此由經血既閉水漬於臟臟氣不得宣通頭目潰悶經脉祕塞使四肢沉重挾風則頭目眩暈留飲則嘔吐無時竹茹湯治妊娠擇食嘔吐頭疼顛倒痰逆四肢不和煩悶人參橘皮麥冬去心白术各一兩甘草炙一分白茯苓厚朴製各五錢右㕮咀每服四大錢水一盞半薑五片又竹茹一團如指大同煎去滓空心服半夏茯苓湯治妊娠惡阻心中潰悶頭目眩暈四肢怠惰百節煩疼痰逆嘔吐嫌聞食氣好啖醎酸多卧少起不進飲食半夏泡三錢茯苓熟地各一兩炙陳皮細辛蘇葉川芎人參芍藥桔梗甘草各一兩六錢右㕮咀每服四大錢水二盞薑七片煎七分去滓空心服有客熱煩渴口生瘡者去橘皮細辛加前胡知母腹冷下痢者去地黃入桂心炒胃中虛熱大便祕小便澀加大黃一兩八錢去地黃加黃芩六錢茯苓丸治妊娠阻病心中煩悶頭目暈重憎聞飲食氣滯嘔逆吐悶顛倒四肢重弱不自勝持服之即效要先服半夏茯苓湯兩劑可服此藥茯苓人參桂心炒乾薑炮半夏製陳皮各一兩白术葛根枳實麩炒甘草炙各二兩右為末蜜丸桐子大每服三五十丸米飲下日三服小地黃丸治妊娠酸心吐清水腹痛不能食人參乾薑炮各等分右為末用生地黃汁丸如梧子大每服五十丸米湯下空心服養胎大論夫養貽須分能所母為能養子為所養名義既殊致養亦别故謂之重身父母交㑹之初子假父精母血投識於其間然後成孕元氣資始之謂也一月血聚謂之始衃二月精凝謂之始膏三月成形謂之始胎此亦無中次第也道生一一生二二生三三生萬物既以三而成故不得不數月而分也成物之後隂陽化施男女始分故見外象而有感於內四月始受少隂君火氣以養精五月受太隂濕土氣以養肉六月受少陽相火氣以養氣七月受陽明燥金氣以養皮八月受太陽寒水氣以養血九月受厥隂風木氣以養筋十月臟腑俱偹神氣已全待時而生此皆所以養胎息之成始成終也若能養者惟在乃母依經所載而時養之母妄服食針炙勞佚等不特傷胎亦乃自傷不可不偹學也為保傅母尤宜熟識之謹偹列母之能養避忌諸法以繼於後避忌法一月足厥隂脉養內屬于肝肝藏血不可縱怒及疲極筋力并冒觸邪風亦不可妄針灸其經二月足少陽脉養內屬於膽膽合于肝共榮于血不可驚動及針灸其經三月手少隂心主筋養內屬右腎腎主精不可縱欲及悲哀觸冒寒冷亦不得針灸其經四月手少陽脉養內屬三焦精府合腎以養精不可勞佚及針灸其經五月足太隂脉養內屬脾脾養肉不可妄思及饑飽觸冒卑濕亦不可針灸其經六月足陽眀脉養內屬于胃胃為臟海合于脾以飬肉不得雜食及針灸其經七月手太隂脉養內屬于肺肺以養皮毛不可憂鬱及呌呼觸冒煩燥亦不得針灸其經八月手明陽脉養內屬于大腸合肺以養氣母食燥物致氣澀及不得針灸其經九月足少隂脉屬于腎以養骨不可懷恐及房勞觸冒生冷亦不得針灸其經十月足太陽脉養內屬于膀胱以合腎太陽為諸陽主氣故使兒脉續緌皆成六腑通暢與母分氣神氣各全俟辰而生惟不說手少隂心養者蓋心為五臟主如帝王不可有為也若將理得宜無傷胎臟更能知轉男胎教之法斯為盡善叙列於後轉女為男法論曰陽施隂化所以有娠遇三隂所㑹多生女子但懷娠三月名曰始胎血脉不流象形而變是時男女未定故令于子滿三月間服藥方術轉令生男也其法以斧置妊婦牀下繫刀向下勿令人知恐不信者令待雞抱卵時依此置窠下一窠盡出雄雞此雖未試亦不可不知凡受胎三月逐物變化故古人立胎教能令生子良善長夀忠孝仁義聰明無疾蓋須十月之內長見好境象無近邪僻真良教也如有觸忤傷胎治各有法據徐之才逐月養胎安胎等方偹則偹矣事煩少用故不暇録識者當自閲今出安胎方如後安胎飲治妊娠胎寒腹痛或胎熱多驚舉重腰痛腹滿胞急卒有所下或䪺仆閃胸飲食毒物或感時疾寒熱往來致傷胎臟川芎一兩五錢枳殼麩炒一兩五錢熟地三兩糯米二合右㕮咀每服四大錢水一盞半薑五片棗一枚金銀少許同煎七分空心服白术散治妊娠宿有風冷胎痿不長或失於將理動傷胎氣多致損墮常服保護胎臟白术川芎各四兩川椒去合口并目炒出汗三兩牡蠣煅粉二兩右為末每服二錢溫酒米湯任調下腹痛加白芍藥心下毒痛加川芎心煩嘔吐加細辛一兩半夏二十粒湯泡入若渴者以大麥汁調服病雖愈盡服勿置味惡多阻人宜作丸服亦治室女帶下諸病罩胎散治妊娠傷寒大熱悶亂燥渴恐傷胎臟捲荷葉嫩者焙乾一兩蚌粉花五錢右為末每服二錢入蜜少許新汲水調下空心服漏阻例懷妊全假經血以養胎忽因事驚奔或從髙墜下顛仆失據或冒涉風寒觸忤邪祟致暴下血胎乾不動奔上搶心腹中急迫或血從口出皆傷胎症也膠艾湯治妊娠不問月數深淺因䪺仆胎動不安腰腹痛或有所下或胎奔上搶心短氣熟地二兩艾葉炒當歸炙草芍藥川芎阿膠炒黃茋各一兩右㕮咀每服四錢水一盞半煎七分去滓空心服胸中逆冷加生薑五片棗三枚同煎苧根湯治胎無故下血腹疼不可忍或下黃汁如漆如小豆汁者野苧根三兩銼炒金銀各一兩右為一劑水酒各一盞煎至一盞去滓分二服桂枝茯苓丸治婦人宿有癥瘕妊娠經斷未及三月即動此癥也經斷三月而得漏下不止胎動在臍上者為癥痼害當去其病又論云妊娠六月動者前三月經水利時胎下血者後斷三月衃血也所以下血不止者其癥不去故也當去其癥桂心不焙茯苓丹皮桃仁去皮尖麩炒白芍等分右為末煉蜜丸如彈子大每服一丸嚼細溫酒米湯任下空心服千金保生丸養胎益血安和子臟治妊娠將理失宜或勞役過度胎動不安腰腹痛重胞阻漏胎惡露時下子臟挾疾久不成胎或受妊不能固養痿燥不長過月不産日月雖滿轉動無力及臨産乖宜或驚動太早産時未至惡露先下胎胞枯燥致令産難或橫或􅊇痛極悶亂連日不産子死腹中腹上氷冷口唇青黑吐出冷沫新産惡血上冲暈悶不省喘促汗出及瘀血未盡臍腹㽲痛寒熱往來或因産勞損虛羸未復面黃體瘦心怔盜汗飲食不進漸成蓐勞八月常服壯氣飬胎正順産理潤胎易産産後常服滋飬血氣調和隂陽密腠理實臟府治風虛除痼疾或偶致墜損炙草貝母秦椒去目炒出汗炮薑桂心黃芩石斛去根石膏煆糯米炒大豆卷炒各一分當歸酒浸一宿微炒五錢麻子仁一兩半另研右為末煉蜜丸如彈子大每服一丸溫酒棗湯任下細嚼空心服子煩證治竹葉湯治妊娠苦煩悶者以四月受少隂君火氣以飬精六月受少陽相火氣以飬氣若母心驚膽寒多好煩悶名子煩防風去義黃芩麥冬去心各三兩白茯苓四兩右㕮咀每服四大錢水一盞半竹葉數十片煎七分去滓溫服腹痛下痢治法當歸芍藥散治妊娠腹中絞痛心下急滿及産後血暈內虛氣乏崩中久痢常服通暢血脉不生􅏴瘍消痰飬胃眀目益精白芍八兩當歸茯苓白术各二兩澤瀉四兩川芎四兩右為末每服二錢溫酒調下二錢空心服元和記調經云本六氣經緯丸能祛風補勞飬真陽退邪熱緩中安和潤容澤色散邪寒瘟疫時氣安期先生賜李少君久餌之藥後仲景增减為婦人懷妊腹痛本方用芍藥四兩澤瀉茯苓川芎各一兩當歸白术各一兩亦可以蜜為丸服雞黃散治懷妊下痢絞刺疼痛雞子一箇烏雞者尤妙卵頭破一小孔傾出清者留黃黃丹一錢入前雞子殼內打令黃勻以厚紙裹黃泥固濟煨取焙乾右為末每服二錢米飲調下一服愈是男兩服愈是女凡冷熱滯下門中選無毒者皆可用小便病證治凡妊娠胎滿逼胞多致小便不利或心腎氣不足不能使胞清濁相干為諸淋病或胞系豫戾小便不通名曰轉胞又胞滿尿出不知時名遺溺治之各有方苦參丸治小便難飲食如故當歸川貝苦參各三兩滑石五錢右為末蜜丸小豆大米飲下三十丸葵子散治妊娠小便不利身重惡寒起則眩暈及水腫者葵子五兩茯苓二兩右末米湯調下二錢小水利則愈一法入榆白皮二兩八味丸治婦人病飲食如故煩熱不得卧而反倚息以胞系子戾不得溺故致此病名轉胞但利小便則愈以八味丸中有茯苓故也方見少隂腳氣門白薇芍藥散治妊娠遺尿不知出時白薇芍藥各等分為末酒服方寸匕日二三胎水證治凡婦人宿有風寒冷濕妊娠喜腳腫俗呼為皺腳亦有通身腫滿胎腹急漲名曰胎水鯉魚湯治妊娠腹大胎間有水氣白术五兩芍藥當歸各三兩茯苓四兩右㕮咀以鯉魚一頭條事如法煮取汁去魚不用每服藥劑四錢入魚汁一盞半薑七片陳皮少許煎七分空心服商陸赤小豆湯治妊娠手腳腫滿攣急赤小豆商陸乾等分每一兩水一碗煎七分去滓溫服腎著湯治妊娠腰腳腫滿茯苓白术各四兩炮薑炙草各二兩杏仁三兩去皮尖麩炒每服四錢煎七分滑胎例凡懷孕已滿十月形體成就神識咸偹分氣趣産宜服滑胎散枳殼散瘦胎易産河陽公主服枳殼四兩麩炒黑色炙草二兩右為末每服二錢空心滚湯㸃服至七月方可服臨月忌登髙厠榆白散治臨産預服滑胎榆白皮槐皮瞿麥木通火麻仁右各等分㕮咀每服五錢水二盞煎七分日二服産難證治婦人懷憂無踰妊産頃刻之間便致夭害故以陳前健兒為比不亦危乎凡欲生産切不得喧閙選一髙年性善老娘并諄語家婦扶持不得揮霍致令産婦憂恐如腹中痛甚且令扶行或痛陳多眼中火出方是兒轉至走不得方好上蓐産自有時産不痛甚名曰弄痛須至忍耐時至自産莫妄費力定當難産切忌喪孝穢汚家人來産訖亦不可見恐傷子須依産圖方位無致觸犯禁忌為佳圖見太醫局方催生湯治産婦痛陳踈難産經兩三日不生或胎死腹中或産母氣乏委䪺産道乾澀才覺陳痛便可投之蒼术二兩米泔浸桔梗一兩陳皮六錢白芷肉桂炙草各三錢當歸川芎炮去皮尖炮薑厚朴製南星炮附豫炮去皮臍半夏茯苓芍藥各二兩杏仁麩炒去皮尖阿膠各二錢五分麩炒川烏一錢五分枳殼四錢麩炒木香一錢為末每服一錢溫酒下覺熱悶用新汲水調白蜜服鉛丹催生及難産橫􅊇水銀二錢黑鉛一錢銚內鎔投水銀結成砂子右以熟絹中紐出水銀細研以汗衫角子紐做丸子菉豆大臨坐草時吞一二丸立效仍須敬仰産科論序世傳産書甚多千金外臺㑹王産寶馬氏王氏崔氏皆有産書巢安世有衛生寶集子母祕録等偹則偹矣但倉卒之間未易歷録試惟李師聖序郭稽中産科經驗寶慶集二十一篇凡十八方用之頗驗但其間序論未為至當姑用料理簡辨於諸方之下以偹識者非敢好辨也産科二十一篇評第一論曰熱病胎死腹中者何答曰因母患熱病至六七日以致臟府極熱薰煮其胎是以致死緣兒身冷死不得出但服黑神散暖其胎須臾胎氣暖即自出何以知其胎之已死但看産婦舌色青者是也黑神散肉桂當歸白芍炙草炮薑生地各一兩黑丑炒去皮二兩附子五錢右為末每服二錢溫酒調下一法無附子有蒲黃評曰夫妊娠謂之重身二命係焉將理失宜皆能損胎不特病薰煮所致或因傾仆驚恐出入觸動及素有癥瘕積聚壞胎最多候其舌青即知子死養胎論云面青舌赤母死子生唇青吐涎母子俱死又有雙懷二胎或一活一死其候尤難知自非臨岐觀變未易預述然亦不可不備述也以黑神散溫胎未若補助産母使其氣正免致虛乏困䪺胎自下矣催生湯殊勝黑神散催生湯蒼术桔梗陳皮白芷肉桂炙草當歸川烏炮厚朴南星附子半夏茯苓芍藥杏仁阿膠川芎枳殼木香第二論曰難産者何胎側有成形塊為兒枕子欲生時枕破與敗血裹其子故難産但服勝金散逐其敗血即自生若橫逆並皆治之勝金散麝香一錢鹽䜴一兩青布裹燒令紅急以乳捶研細右為末取稱捶燒紅以酒淬之調下一錢評曰産難不只胎側有兒枕破與敗血裹凝隨其胎息因緣自有難易其遇橫􅊇多因坐草太早努力過多兒轉未逮或已破水其血必乾致胞難轉若先露腳謂之逆先露手謂之橫法當以微針刺之使自縮入即服神應黑散以固其血必自轉生飬生方云倉徨之間兩命所繫不可不廣傳蓋贊黑散之功也或以鹽塗兒腳底指􅎲之間神應黑散治橫生逆生難産百草霜香白芷等分右為末每服二錢童便好醋各一茶盞腳許調勻更以滚湯浸四五分服止一服見功甚者再服即分娩矣一名烏金散第三論曰胎衣不下者何答曰母生子訖血流入衣中衣為血所服是故不得下治之稍緩脹滿腹中以次上冲心胸痛疼喘急者但服奪命丹以逐去衣中之血血散服消胎衣自下而無所患更有牛膝湯用之甚效奪命丹附子五錢丹皮乾漆一分炒盡烟右為末釅醋一升大黃末一兩同熬成膏和藥丸桐子大溫酒下六七丸牛膝湯治産兒已出胞衣不下腹堅脹急痛甚及子死腹中不得出牛膝酒浸瞿麥各四兩滑石八兩當歸酒浸木通各六兩葵子五兩第四論曰産後血暈者何答曰産後氣血暴虛未得安靜血隨氣上迷亂心神故眼前生花極甚者令人悶絶不知人事口噤神昏氣冷醫者不識呼為暗風若作此治之病必難愈但服清魂散自愈小産同前清魂散澤蘭葉人參荆芥穗川芎右等分為末溫熱湯各半盞調下急灌之下咽即開眼氣定省人事評曰産後眩暈頃刻害人須量虛熱為治若胸中宿有痰飲阻病不除産後多眩暈又血盛氣弱氣不使血逆而上攻此等皆非清魂可療瘀暈仍用半夏茯苓湯血壅須用牡丹但駃藥尤難輒用當識輕重所謂擾乎可擾亦無擾若氣血平人因去血多致暈者川芎湯尤佳半夏茯苓湯半夏茯苓熟地陳皮細辛蘇葉川芎人參白芍桔梗甘草隨症加减見惡阻門牡丹散治産後血暈悶絶若口噤則撬開灌之必效丹皮大黃芒硝各一兩瓜子仁半合桃仁三十七粒去皮尖右㕮咀每服五錢水三盞煎盞半去渣入硝再煎分二服欲産先煎下以偹緩急金匱以治腸􅏴但分兩少異芎藭湯川芎當歸第五論曰産後口乾痞悶者何名曰産後衛氣太虛血氣未定食麵太早胃不能消化麵毒結聚於胃脘上薰胸中是以口乾燥渴心下痞悶醫者不識認為胸膈壅滯以藥下之萬不得已但服見晛丸薑黃三稜蓬术蓽澄茄陳皮人參良薑各三兩為末用蘿蔔慢火煮爛研細將汁煮麵糊丸桐子大蘿蔔湯下三十丸評曰産後口乾痞悶未必止因食麵或産母內積煩憂外傷燥熱飲食肥甘卒使口乾痞悶當隨其所因調之可也煩心宜四物湯去地黃加人參烏梅煎若外傷燥熱看屬何經當隨經為治難以偹舉飲食所傷見睍丸却效第六論曰産後乍寒乍熱者何答曰隂陽不和敗血不散能令乍寒乍熱産後氣血虛損隂陽不和隂勝則乍寒陽勝則乍熱隂陽相乘則或寒或熱若因房勞臟府血弱不得宣越故令敗血不散入於肺則熱入於脾則寒醫人若悮作瘧疾治之則謬矣隂陽不和宜增損四物湯敗血不散宜奪命丹又問二者何以别之答曰時有刺痛者敗血但寒熱無他症者隂陽不和宜增損四物湯皆隨症加减增損四物湯當歸人參芍藥川芎炮薑炙草評曰乍寒乍熱榮衛不和難以輕議若其敗血不散豈止入脾肺二臟耶大抵一隂閉一陽即作寒熱隂甚故寒陽勝故熱只可云敗血循經流入閉諸隂則寒閉諸陽則熱血氣與衛氣解則休遇再㑹而復作大調經散五積散大調經散治産後血虛惡露未消氣為敗濁凝滯榮衛不調隂陽相乘增寒發熱或自汗或腫滿皆氣血未平之故也大豆一兩五錢去皮茯神一兩真神一錢為末濃煎烏豆紫蘇湯下五積散蒼术桔梗陳皮白芷炙草當歸川芎芍藥茯苓半夏麻黃春夏少秋冬多乾薑秋冬多枳殼肉桂厚朴加醋少許煎第七論曰産後浮腫者何答曰産後敗血乘虛停積於五臟循經流入四肢留淫日深却還不得腐㑹如水故令四肢面目浮腫醫人不識便作水氣治之凡治水法多用導水藥極虛人夫産後既虛又以藥虛之是謂重虛往往多致夭損但服調經散調經散沒藥琥珀肉桂赤芍當歸各一錢細辛麝香各五分為末每服五分生薑汁溫酒各少許服評曰産後浮腫多端有自懷孕腫至産後不退者亦有産後失於將理外感風寒暑濕內作喜怒憂驚血與氣搏留滯經絡氣分血分不可不辨要當以隨所因脉證治之宜得其情調經散治血分固效但力淺難憑不若吳茱茰湯枳實湯奪魄散大調經要藥也加减吳茱茰湯治婦人臟氣本虛宿挾風冷胸膈滿痛腹脅絞刺嘔吐惡心飲食减少身面浮腫惡寒戰栗或泄瀉不止少氣羸困及因生産臟氣暴虛邪冷內勝宿病轉甚吳茱茰一兩半桔梗炮薑炙草麥冬防風當歸半夏茯苓丹皮肉桂各五錢右㕮咀每服四錢煎七分服枳术湯治心下堅大如盤邉如旋盤水飲所作名曰氣分枳實一兩五錢白术三兩每服四錢煎七分服腹中軟即散奪魂散治婦人産後虛腫喘促利小便即愈生薑汁白麵各三兩半夏七分以生末汁搜麵裹半夏為七餅炙熟為末滚水調一錢小便利為效大調經散治産後腫滿喘急煩渴小便不利大豆茯神琥珀等分紫蘇烏豆湯調下第八論曰産後乍見鬼神者何答曰心主身之血脉因産傷耗血脉心氣則虛敗血停積上干於心心不受觸遂致心中煩燥起卧不安乍見鬼神言語顛倒醫工不識呼為血邪如此治之必不得愈但服調經散每散加龍腦一捻得睡則安方見第二論中第九論曰産後不語者何答曰人心有七孔三毛産後虛弱多致停積敗血閉於心竅神氣不能明又心氣通於舌心氣閉塞舌亦强矣故令不語如此但服七珍散七珍散人參生地石菖蒲川芎各一兩細辛防風硃砂各五錢為末每服一錢薄荷湯調下又方川芎生地當歸白芍丹參石菖蒲熟大黃第十論曰産後腹痛又瀉利者何答曰産後腸胃虛弱寒邪易侵若未滿月飲冷當風乘虛入留於肓膜散於腹脅故腹痛作陳或如錐刀所刺流入大脅水榖不化洞泄腸鳴或下赤白胠脅䐜脹或走痛不定急服調中湯立愈若醫者以為積滯取之則禍不旋踵謹之調中湯良薑當歸肉桂芍藥附子川芎各一兩炙草五錢每服三錢評曰産後下利非止一證當隨所因而調之既云飲冷當風何所不致寒熱風濕本屬外因喜怒憂思還從自性况勞逸飢飽皆能致病若其洞瀉可服調中赤白帶下非此能愈各隨門類别有正方今録桃膠散白頭翁湯以偹用餘從滯下門中選用之沉香桃膠散治産後利下赤白裏急後重㽲刺疼痛等證桃膠瓦上焙乾沉香蒲黃隔紙炒各等分為末陳米飲調下二錢白頭翁湯治産後下痢白頭翁甘草阿膠各二兩黃連柏皮秦皮各五兩第十一論曰産後遍身疼痛者何答曰産後百節開張血脉流走遇氣弱則經絡分肉之間血多留滯纍月不散則骨節不利筋脉急引故腰背不得轉側手足不得動搖身熱頭疼也若醫者認為傷寒治之則汗出而筋脉動搖手足厥冷變生他病但服趂痛散以默除之趂痛散牛膝炙草薤白各一分當歸肉桂白术黃茋獨活生薑各五錢評曰趂痛散不獨治産後氣弱血滯兼能治太陽經感風頭痛腰背痛自汗發熱若其感寒傷食憂驚恐怒皆致身疼發熱頭痛况有蓐勞證尤甚趂痛散皆不能療不若五積散入醋煎用却不妨第十二論曰産後大便祕澀者何答曰産後水血俱下腸胃虛弱津液不足是以大便祕澀不通也若遇六七日腹中脹悶此有燥糞在臟府以其乾澀未能出耳宜服麻仁丸以津潤之若誤以為有熱而投以寒藥則陽消隂長變病百出性命危矣麻仁丸麻仁枳殼人參大黃各等分為末蜜丸桐子大酒下二十丸未通加數丸評曰産後不得利利者百無一生去血過多臟燥大便祕澀澀則固當滑之大黃似難輕用惟葱涎調臘茶為丸復以臘茶下之必通阿膠枳殼丸治産後虛大便祕塞阿膠枳殼為末蜜丸桐子大另研滑石為衣酒下二十丸半日未通再服第十三論曰産後血崩者何答曰産後傷耗經脉未得平復而勞役損動致血暴崩淋瀝不止或因鹽鹹不節傷蠧榮衛氣衰血弱亦變崩中若小腹滿痛肝經已壞為難治急服固經丸以中之固經丸艾葉赤石脂補骨脂木賊各五錢附子一箇炮去皮臍右末陳米飲和丸桐子大溫酒米酒下三十丸評曰血崩不是輕病况産後有此是謂重傷恐不止鹽酸不節而能致之多因憂驚恐恚臟氣不平或産後服斷血藥早致惡血不消鬱滿痞堅亦成崩中固經丸似難責效不若大料煮芎歸加白芍湯候定續次隨症合諸藥治之為得芎歸加芍湯川芎當歸芍藥第十四論曰産後腹脹悶嘔吐不定者何答曰敗血散於脾胃脾受之不能運化精微而成腹脹胃受之則不得受水榖而生吐逆醫者不識若以尋常治脹止吐藥療之病與藥不相干轉更相動正氣病愈難治但服抵聖湯抵聖湯赤芍半夏澤蘭人參陳皮各三錢炙草一錢加薑一片煎服第十五論曰産後口鼻黑氣起及鼻衄者何答曰陽眀者經脉之海起於鼻交額中還出挾口交人中左之右右之左産後氣消血散榮衛不理散亂入於諸經却還不得故令口鼻黑氣起及變鼻衄此緣産後虛熱變生此證其疾不可治名胃絶肺敗此證不可治不出方第十六論曰産後喉中氣急喘者何答曰榮者血也衛者氣也榮行脉中衛行脉外相隨上下謂之榮衛因産所下過多榮衛暴竭衛氣無生獨肺中聚故令喘也此名孤陽絶隂為難治若惡露不快敗血停凝上薰於肺亦令喘急但服奪命丹血去喘息自定方見第二論評曰産後喘急固可畏若是敗血上薰於肺猶可責效奪命丹若感風寒宜旋覆花湯若榮衛暴絶宜大料芎藭湯亦自可救性理鬱發宜小調經散用桑白皮杏仁煎湯調下傷食宜見睍丸五積散旋覆花湯治産後傷感風寒暑濕咳嗽喘滿痰嗽壅塞坐卧不安旋覆赤芍半夏前胡麻黃荆芥五味炙草茯苓杏仁第十七論曰産後中風者何答曰産後五七日內强力下床或一月之內傷於房室或懷憂發怒擾蕩冲和或因著艾傷動臟府得病之初眼澀口噤肌肉瞤搐漸至腰脊筋急强直者不可治此乃人作非偶爾中風所得也評曰問産後中風風是外邪血虛則或有中之者直答以人作不可治問答不相領解如何開示後人立論之難有如此者若是中風當以脉辨看在何臟依經調之强力下床月內房室憂愁著炙非中風類蓐勞性氣火邪治各有法非産後病不暇繁引學者識之第十八論曰産後心痛者何答曰心者血之主人有伏宿寒因産大虛寒搏於血血凝不得消散其氣遂上冲擊於心之絡脉故心痛以太岩蜜湯治之寒去則血脉溫而經絡通心痛自止若誤以為傷治之則虛極寒益甚矣心絡寒甚傳心之正經則變為真心痛旦發夕死夕發旦死藥不可輕用大岩蜜湯熟地當歸獨活吳茱萸炮薑白芍肉桂炙草逺志薑汁炒各一兩細辛五錢評曰産後心痛雖非産蓐常病庸或有之凡痛未必便是血痛設是岩蜜湯豈可用熟地熟地泥血安能去痛此方本出千金用生地耳茱茰一升合准五兩乾薑三兩細辛治陳寒在下焦方本一兩却减作半兩制竒制偶量病深淺自有品數不可妄意加减然以岩蜜湯治血痛不若失笑散用之更效失笑散五靈脂蒲黃炒各等分為末醋調二錢熬膏入水煎七分服第十九論曰産後熱悶氣上轉為腳氣者何答曰産卧血虛生熱復因春夏取凉過多地之蒸濕因足履之所以著而為腳氣其狀熱悶掣瘲驚悸心煩嘔吐氣上皆其候也可服小續命湯二三劑必愈若醫者誤以逐敗血藥攻之則血去而病益增劇小續命湯麻黃防已人參黃芩肉桂炙草白芍川芎杏仁防子附子加薑棗煎評曰腳氣固是常病未聞産後能轉為者往往讀千金見産婦多此疾之語便出是證文辭害意概可見矣是熱悶氣上如何服此湯此藥本主少陽經中風非拘治諸經腳氣須要依腳氣方論隂陽經絡調之此涉轉悶門未易輕論既非産後要病更不繁引第二十論曰産後汗出多而變痓者何也答曰産後血虛肉理不密故多汗因遇風邪搏之則變痓也痓者噤口不開背强而直如發癎狀搖頭馬鳴身反折須臾十發氣息如絶宜速斡口灌小續命湯稍緩即汗出如雨手拭不及者不可治評曰産後汗出多變痓亦令服續命湯此又難信既汗多如何更服麻黃官桂防已輩不若大豆紫湯為佳太醫局方大聖散亦良藥也大豆紫湯獨活一兩五錢大豆半升酒三升右先以酒三升浸獨活煎一二沸另炒大豈極焦烟出急投酒中密封候冷去豆每服一二合得少汗則愈日數服第二十一論曰産後所下過多虛極生風者何答曰婦人以榮血為主因虛血下太多氣無所主唇青肉冷汗出目瞑神昏命在須臾此但虛極生風也如此則服濟危上丹若以風藥治之則誤矣乳香𤣥精石五靈脂硫黃陳皮阿膠桑寄生卷柏生各等分右將上四味同研勻石器內微火炒勿令焦再研極細復入餘藥為末用生地汁和丸桐子大酒下或當歸酒下二十丸評曰所下過多傷損虛弱少氣唇青肉冷汗出神昏此皆虛脫證何以謂之生風風是外淫必因感冒中傷經絡然後發動臟府豈能自生風也虛之說蓋因脉經云浮為風為虛此乃兩病合說在人迎則為風在氣口則為虛後學無識便謂風虛是一病謬濫之甚學者當知右保慶集二十一論人用既多因評其說仍將得效方附行外有歷科諸證併叙于後三因極一病證方論卷十七
