body:
  text: 三因極一病證方論卷六宋陳言撰敘疫論夫疫病者皆四時不正之氣春夏有寒凊時秋冬有暄熱時一方之內長幼病狀率皆相類此即謂之天行是也若春時應暖而清氣折之則責邪在肝病曰青筋牽夏時應暑而寒氣折之則責邪在心病曰赤脈㩌秋時應涼而熱氣折之則責邪在肺病曰白氣貍冬時應寒而暖氣折之則責邪在腎病曰黑骨瘟土無正形因火而名故附金木水火而變病曰黃肉隨其天行之病大則流毒天下次則一方一鄉或偏著一家悉由民庶宿業所致故天地神祗假兹不正之氣而行責罰且人命有遭逢時有否泰故有偏著一家者既有斯害氣還以天地所生之物而防備之命曰賢人知方四季疫證治病者發熱腰痛強急腳縮不伸胻中欲折目中生花或澀澀增寒復熱頸外雙筋牽不得屈伸項直背強眼赤黃欲轉動合目坰側病名青筋牽者由春三月其源從厥隂涉足少陽少陽之氣始發少隂之氣始衰隂陽怫鬱於腠理臟府受厲氣而生若府虛則為隂邪所傷故發熱若臟實則為陽毒所損故增寒治青筋牽肝之府臟溫病隂陽毒膽府虛為隂邪所傷腰脅強急腳縮不伸胻中欲折目中生花色蒼蒼者柴胡去苗五兩茯苓梔子仁半夏大青各三兩桂心竹茹香豉炙草各一兩右㕮咀每服五錢水二盞薑五片煎七分去滓空心服治青筋牽肝府臟溫病隂陽毒肝臟實為陽毒所傷澀澀惡寒翕翕發熱頸外雙筋牽不得屈伸項直背強眼赤黃轉動則合身回側色蒼蒼者玄參一兩細辛梔子仁黃芩升麻芒硝各三兩石膏煆八兩右銼散每服五錢水二盞入車前草葉三片淡竹葉七片煎七分去滓空心服病者脈促身戰掉不能禁或內熱口乾舌破咽塞聲嘶病名赤脈㩌以夏三月其病從少隂太陽之氣相搏而停則榮衛不通皮肉痠起太陽之氣發動少隂淫邪之氣因而作厲則臟府隨時而受病疫也若府虛為隂邪所傷則寒戰若臟實為陽毒所侵則內熱治赤脈㩌心府臟溫毒隂陽毒若府虛為隂邪所勝脈促身戰掉不能禁色昏赤者茯苓人參桔梗各三分甘草五錢白芷青皮各一兩炮薑五錢右銼散每服五錢水二盞煎七分去滓食前服治心府臟溫病隂陽毒心臟實則為陽毒所傷內熱口乾舌破咽塞聲嘶色焦赤者天門冬麥門冬車前子炒梔子仁黃芩升麻炙草寒水石煆各等分右銼散每服五錢水二盞煎七分去滓食前服病者身重頸直皮肉強痺或蘊而結核起于喉頸之側布熱毒於皮膚分肉之中上散入髮際下貫顳顬隱之而熱不相斷離病名黃肉隨以四季各十八戊巳日其病從太隂陽明相格寒濕不調關節格滯若府虛則皮肉強痺若臟實則布熱毒發于皮膚治黃肉隨脾府臟溫病隂陽毒胃府虛則為隂毒所傷頭重頸直皮肉強痺色黃黑者厚朴薑汁炒一兩半白术陳皮各一兩炮薑紫蘇炙草半夏湯泡各三分右銼散每服五錢水二盞煎七分去滓食前服治黃肉隨脾府臟溫病隂陽毒臟實為陽毒所傷蘊熱結核起喉頸之側布毒氣於皮膚分肉之中散入髮際下貫顳顬畜熱不散色黃黑者葛根蒼术米泔浸升麻白芷桔梗青皮各一兩大黃五錢右銼散每服五錢水二盞煎七分去滓食前服病者身重頸直乍寒乍熱損肺傷氣暴嗽嘔逆或體熱發斑喘咳引氣病曰白氣貍以秋三月其源從陽明係手太隂受疫淫邪之氣若府虛隂邪反傷則乍寒乍熱若臟實為陽毒所傷則體熱發斑治白氣貍肺府臟溫病隂陽毒大腸府虛為隂邪所傷寒熱互作上氣咳逆大腸飱泄色皓皓者白术人參各一兩炮薑麥蘖炒各三分白茯苓五味子肉豆蔲草果烏梅炙草各五錢右銼散每服五錢水盞半煎七分去滓食前服治白氣貍肺府臟溫病隂陽毒臟實為陽毒所傷體熱肌膚發斑氣喘引飲色昏白者紫苑茸一兩梔子仁升麻前胡各三分葶藶炒一分杏仁炙草右銼散每服五錢水二盞煎七分去滓食前服病者裏熱外寒意欲守火而反引飲腰痛欲折或胸脅切痛類如刀刺不得轉動熱彭彭服冷多則洞瀉病名黑骨溫以冬三月其源從足太陽少隂相搏蘊積壅塞若府虛為隂邪所傷則裏熱外寒若臟實為陽毒所損則彭彭發熱治黑骨溫腎府臟溫病隂陽毒腎府虛為隂邪所傷則裏熱外寒煩渴引飲反喜守火或腰脅滿痛小便赤黃面色俱黑附子茯苓各一兩山茱茰細辛山藥澤瀉各五錢麻黃三分杏仁五分右銼散每服五錢水二盞煎七分去滓食前服治黑骨溫腎府溫病隂陽毒腎臟實為陽毒所傷胸脅切痛不能轉動大小便祕澀腹脹食冷則洞泄色昏黑者吳茱茰黑牽牛大黃蒸萆􅐺杜仲薑汁炒去絲桃仁各等分右銼散每服五錢水二盞煎七分去滓食前服料簡諸疫證治凡春分以前秋分以後天氣合清涼忽有溫暖之氣折之則民病溫疫春分以後秋分以前天氣合溫熱忽有清涼之氣折之則民病寒疫治之各有法不可拘以日數汗下皆宜據方論一體而分既有寒溫二疫風溫亦宜備論如己未年原缺二字人疫汗之死下之亦死服五苓散則愈此無他溫疫也以此為法每遇年有不正之氣即當紀而用之假如冬合寒時有溫暖之氣則春必患溫疫春合溫而有清涼之氣則夏必患燥疫夏合熱而有寒氣折之秋必病寒疫秋合晴而反霪雨冬必病濕疫此亦一途而推之更須以時斟酌不可偏執况疫之所興或溝渠不泄畜其穢惡薰蒸而成者或地多尸氣鬱發而成者或官吏枉抑怨讟而成者世謂獄瘟傷瘟墓瘟廟瘟社瘟山瘟海瘟家瘟竈瘟嵗瘟天瘟地瘟等不可不究古法辟之用屠蘇酒務成子螢火丸李子建殺鬼煎老君神明散皆辟瘟法惟劉根别傳令于州治太嵗六合處穿地濶三尺深亦如之取淨沙三斛實之以醇酒三升沃其上俾使君祝之此亦濟人除疫之良術所謂太嵗六合者嵗泄氣之所在故以厭禳屠蘇酒治疫氣令人不染及辟瘟病傷寒大黃桔梗川椒白术桂心各一兩烏頭泡去皮尖六錢菝葜一兩二錢右銼散縫袋盛以十二月晦日日中懸沉井中令至泥正月朔旦出藥置酒中煎數沸于東向户飲之先從少起多少任意一方有防風一兩六錢太乙流金散辟瘟氣雄黃雌黃羖羊角燒各二兩鬼箭羽枯礬各一兩半右末以縫袋盛一兩帶心前并挂門户上若逢大疫之年以月旦青布袋一刀圭中庭燒之瘟病人亦燒薰之敗毒散治傷寒瘟疫風溫頭痛目昏眩四肢疼痛增寒壯熱項強眼睛痛尋常風眩拘急風痰並宜服之羌活獨活人參甘草柴胡前胡茯苓枳殼川芎桔梗各等分右銼散每服四錢水一盞薑三片薄荷五葉煎七分去滓熱服寒多則熱服熱則溫服傷濕加白术腳痛加天麻本方為細末亦可點服初虞世南究其方知出道藏乃敘云自非異人傑出志與神會則莫之敢為良可歎服煙瘴之地或瘟疫時行或人多風多痰多氣或處卑濕腳弱此藥不可缺也世人不師故常務作新竒蔽于俗學故備論之此藥治腳氣下注焮熱赤腫加大黃棋子大煎併進兩服立效應夢人參散治傷寒體熱頭疼及風壅痰嗽咯血白芷乾葛青皮桔梗白术人參各三分甘草炙一兩半炮薑一錢三分右末每服二錢水一盞薑三片棗二枚煎七分通口服如傷寒入豉數粒同煎熱服大有效崇寧癸未米芾為太常博士始造待漏冒寒得疾痰嗽如膠有血更三醫不退一日謁太尉蔡公公取人參散一貼并棗授之繼歸有客承議郎薛道至時藥已熟進一服良久痰嗽立止客怪曰公氣色頓快何藥也為道其由求方蔡公又送一貼越三日病全除往見蔡公公曰此藥僧伽方也元祐中泗州守劉士彥病八日不汗女求僧伽甚確夜夢告曰翌日塔中取藥遂于大士鉢中取得此藥題印云太平州楊家人參散今太醫局中亦賣無甘草乾葛兼無分兩疑非真方喝起散蒼术麻黃荆芥各二兩石膏煆三兩大黃一兩五錢括蔞根乾葛芍藥白芷甘草右末每服二錢水盞半薑三片蔥三寸煎七分空心服入瘟家令不相染法明雄黃研細末調以筆濃蘸塗鼻中與病人同牀亦不相染初洗面後及臨卧時點之凡疫家自生惡氣聞之即病入上元宫遂散百脈而成斯疾宜以紙撚探鼻嚏之為佳如以雄黃點鼻則自不聞并辟諸惡夢神良聖散子方東坡敘云昔嘗觀千金方三建方於病無所不治而孫思邈著論以謂此方用藥節度不近人情至于救急其驗特異乃知神物效靈不拘常制至理觀感智不能知今余所謂聖散子殆此類也自古論病唯傷寒至為危急表裏虛實日數證候應汗應下之法差之毫釐輒至不救而用聖散子者一切不問隂陽兩感男女相易狀至危篤者連飲數劑則汗出氣通飲食漸進神宇完復更不用諸藥連服取差其飲輕者額微汗正爾無恙藥性小熱而陽毒發斑狂之類入口即覺清涼殆不可以常理詰也時疫流行平旦輒煮一釡不問老少良賤各飲一大盞則時氣不入其門平居無病能空腹一服則飲食快美百病不生真衛生濟世之寶其方不知所從來而故巢君數世寶之以此治病百不失一余既得之謫居黃州連嵗大疫所全活者至不可數巢君初甚惜此方指江水為盟不傳與人子竊隘之乃以傳蘄水龎君安常龎以醫聞於世乂善著書故以授之且使巢君之名與此方同不朽也用藥如後草豆蔲十個豬苓去皮石菖蒲茯苓良薑銼炒獨活柴胡吳茱茰附子麻黃去節厚朴薑汁炒藁本芍藥枳殼白术蒼术半夏澤瀉藿香防風細辛各五錢甘草炙一兩右銼散每服五錢水盞半煎七分去滓熱服此藥似治寒疫因東坡作序天下通行辛未年永嘉瘟疫被害者不可勝數頃時寒疫流行其藥偶然得中抑未知方上有所偏宜未可執也東坡便謂與三建散同類一切不問似大不近人情夫寒疫亦自能發狂蓋隂能發躁陽能發厥物極則反理之當然不可不知今録以備療寒疫之用宜審之不可不究其寒溫二疫也辛已年余嘗作指治至癸已復作此書見石林避暑録亦曰宣和間此藥盛行於京師太學生信之尤篤殺人無數醫頓廢之然不妨留以備寒疫無使偏廢也凡例夫疫雖以三事鍾成若天行多假六淫反錯鬱折而致之者既有寒溫二疫風濕其可不辨但證似傷濕而脈色不同與夫一方相染長幼同病即當作疫治除辟法外治濕用五苓散加甘草治風用桂枝湯加黃芩無不愈者其如淫邪交結互織當以類推之五苓散治傷寒濕熱病表裏未解頭痛發熱口燥咽乾煩渴引水水入即吐或小便不利及汗出表解煩渴不止者宜服之又治霍亂吐利方見傷寒暑門仍加炙草一兩桂枝黃芩湯治風疫脈浮數而不弱頭項疼腰脊痛發熱惡風其證皆如太陽傷風但脈浮不弱相傳為異耳桂枝去皮芍藥黃芩各一兩半炙草一兩右銼散每服五錢水盞半薑三片棗一枚煎七分去滓食前服沃雪湯治傷寒溫疫濕疫熱疫蒼术炮薑炙草各六兩防風乾葛厚朴薑汁炒芍藥各四兩右銼散每服三錢水二盞煎七分服瘧敘論夫藥備內外不內外三因外則感四氣內則動七情飲食飢飽房室勞逸皆能致瘧經中所謂夏傷暑秋痎瘧者此則因時而序耳不可專以此論之則知溫病飱泄咳嗽亦不可拘也夫瘧之始發也先以毫毛欠伸乃作寒栗鼓頷腰脊俱痛寒去則內外皆熱頭痛而渴唯欲飲冷者以隂陽上下交爭虛實更作若陽并於隂則隂實而陽虛陽明虛則寒栗鼓頷太陽虛則腰背頭項俱痛少陽虛則身體解赤心惕惕然三陽俱虛則隂氣勝骨寒而痛隂并於陽則陽實而隂虛太隂虛則不嗜食善嘔嘔已乃衰少隂虛則熱多寒少嘔甚其病難已厥隂虛則腰腹痛小便不利如癃三隂俱虛則陽氣勝熱甚悒悒不樂隂盛則內熱熱生於外故中外皆熱此皆因外感寒暑風濕內鬱喜怒憂思蘊積痰涎乃至飲食飢飽勞逸之所為也病氣與衛氣并居故病作衛氣晝行於陽夜行於隂得陽而外出得隂而內薄所以日作其氣內薄於藏橫連於膜原其道逺其氣深其行遲不能與衛氣俱出故間日作以衛氣一日一夜大會於風府日下一節以此日作稍晏至二十五日至骶骨二十六日入脊內其氣上行故日作益早也瘧氣所以更盛更虛當氣之所在者在陽則躁熱在隂則寧靜極則隂陽俱衰衛氣相離則病休衛氣集則復病也於是有日作間作早晏不同又邪氣中于頭項者氣至頭項則作中於背者氣至背則作中于腰脊者氣至腰脊則作各隨其所中而作但衛氣之所在與邪氣相合則病作也更有疫瘧鬼瘧等亦以邪氣中衛氣之所致也除疸瘧純熱溫瘧先熱牝瘧無熱外諸瘧皆先寒而後熱又經曰無刺熇熇之熱無刺渾渾之脈無刺漉漉之汗為其病逆未可治也知此則病方來與正作與將過皆不可治以反傷真氣不可不知也所因備列于後瘧病外所因治病者先寒後熱寒則湯火不能溫熱則氷水不能寒以先傷寒後傷風故先寒而後熱名曰寒瘧病者先熱後寒煩躁自汗惡風以先傷風後傷寒風為陽寒為隂故先熱而後寒名溫瘧病者但熱不寒隂氣孤絶陽氣獨發少氣煩寃手足熱而欲嘔必渴以其傷於暑熱故名疸瘧病者寒熱身重骨節煩疼脹滿濈濈自汗善嘔因汗出復浴濕舍皮膚及冒雨濕名曰濕瘧病者寒多不熱但慘戚振栗亦以時作此以陽虛隂盛多感隂濕陽不能制隂名曰牝瘧右五種瘧證以外感風寒暑濕與衛氣相并而成治有各種方法白虎加桂湯治溫瘧先熱後寒惡風多汗石膏煆四兩知母一兩五錢炙甘草五錢桂心一兩粳米一合右銼散每服四錢水一盞半煎七分去滓未發時進三服术附湯治冒雨濕著於肌膚與衛氣相并或腠開汗出自浴得之附子白术各一兩炙草茯苓桂心各五錢右銼散每服四錢水盞半薑五片棗二枚煎七分去滓食前服麻黃白术湯治傷風寒暑濕滯留經絡與衛氣相并病以日作寒熱交煎麻黃去節湯浸白术茯苓桂心各一兩陳皮青皮桔梗白芷甘草半麴烏梅紫蘇各三分乾薑五錢右銼散每服四錢水兩盞薑三片棗二枚煎七分去滓當發日空心一服臨發一服尤妙亦治時疫太醫常山飲治諸瘧先寒後熱或先熱後寒或寒熱獨作或連日併發或間日一發頭疼惡心煩渴引飲氣息喘急口苦咽乾諸藥不效川常山知母甘草草果不去皮各二兩烏梅一兩良薑一兩右銼散每服四錢水盞半棗五枚煎七分去滓溫服未發前進三服桂薑湯治牝瘧寒多微熱或但寒不熱柴胡八兩桂心一兩黃芩牡蠣煆甘草炙乾薑炮各三兩括蔞根四兩右銼散每服四錢水二盞煎七分去滓空心服日三服初服微煩汗出愈一法有半夏三兩瘧病內所因證治病者寒熱顔色蒼蒼然善太息如死狀以蓄怒傷肝氣鬱所致名曰肝瘧病者心煩欲飲清水反寒多不甚熱乍來乍去以喜傷心心氣耗散所致名曰心瘧病者寒多腹中熱痛或渴或不渴不熱不泄腸鳴汗出以思傷脾氣鬱涎結所致名曰脾瘧病者心寒寒甚則發熱熱間善驚如有所見以憂傷肺肺氣凝痰所致名曰肺瘧病者手足寒灑然腰脊痛發熱大便難目眴以失志傷腎名曰腎瘧五種瘧疾以臟氣不和鬱結涎飲所致治之各有方法七棗湯治五臟氣虗隂陽相勝作為痎瘧不問寒熱先後與夫獨作疊間日作悉能主之附子一枚炮製以鹽水浸再炮如此凡七次至第七次不必浸去皮臍右銼散水一盞薑七片棗七枚煎八分當發日空心服仍吃三五個棗子忌如常良方用烏頭兼不用鹽水浸不特服之潛燥亦不能分隂陽去滓服四獸飲治五臟氣虛喜怒不節勞逸兼并以致隂陽相勝結聚涎飲與衛氣相搏發為瘧疾悉主之兼治疸瘧最效半夏茯苓人參草果陳皮甘草烏梅肉白术生薑棗子各等分右銼散鹽少許淹食頃厚皮紙裹水淹入慢火煨香熟焙乾每服稱半兩水二盞煎七分去滓未發前并進三服交解飲治脾胃氣弱隂陽勝復發為痎瘧製厚朴肉豆蔲麵裹煨草豆蔲製如上甘草半生半炙右等分銼散每服四錢水二盞煎八分去滓空心服草果飲治脾寒等瘧青皮草果川芎白芷紫蘇良薑甘草炙右等分為粗末每服二錢水一盞煎七分去滓熱服當發日連進三服驅瘧飲子前胡柴胡各四兩桂心桔梗厚朴半夏去滑三兩黃茋炮薑甘草各二兩右銼散每服四錢水盞半薑三片棗二枚煎七分去滓溫服瘧病不內外因證治病者發寒熱一嵗之間長幼相似若或染時行變成寒熱名曰疫瘧以嵗運推之病者寒熱日作夢寐不祥多生恐怖名曰鬼瘧宜用禁避厭禳之法病者乍寒乍熱乍有乍無南方多生此病名曰瘴瘧當隨方土所宜治之病者寒熱善飢而不能食食已支滿腹急㽱痛病以日作名曰胃瘧六腑無瘧惟胃有之蓋因飲食飢飽所傷胃氣而成謂之食瘧或因諸瘧飲食不節變為此證病者經年不瘥瘥後復發逺行久立下至微勞力皆不任名曰勞瘧亦有數年不瘥百藥不斷結成癥癖在腹脅下名曰老瘧亦曰母瘧以上諸證名狀不同各有治方宜推而用之麻黃白术湯治一切疫瘧方見外所因門經效瘧丹治鬼瘧殊效真阿膠五錢桃枝栁枝各長一尺七莖雄黃通明者五錢研辰砂一錢另研留一半右為末以端午日五家角黍為丸如桐子大所留辰砂一半為衣遇發時用淨器水磨一丸塗鼻尖并人中未退以冷水服一丸合時須端五日大正氣散治山嵐瘴氣發作寒熱遂成瘧疾附子厚朴製桂心炙草炮薑陳皮各一兩吳茱茰五錢略炒右細末每服二錢水盞半薑五片棗一枚煎七分去滓熱服不拘時兼治霍亂吐瀉一切氣疾清脾湯治胃瘧發作有時先覺伸欠乃作寒栗振頥頷中外皆寒腰背俱痛寒戰既已內外皆熱頭痛如破渴欲飲冷或痰聚胸中煩滿欲嘔或先熱後寒先寒後熱少寒多熱少熱多寒或寒熱相半或但熱不寒但寒不熱或隔日一發或三五日一發者悉主之製厚朴烏梅肉半夏青皮良薑各二兩草果去皮一兩甘草炙五錢右銼散每服四錢水二盞薑三片棗一枚煎七分去滓未發日并進三服忌生冷油膩時果此藥溫脾化痰治胸膈痞悶心腹脹滿噫醋吞酸可常服常山飲治勞瘧虛人老人皆可服常山川山甲醋炙木通秦艽各一錢辰砂半字另研炙草五錢右銼散作一劑水三盞烏梅棗子各七枚煎半盞再入酒一杯煎八分去滓入辰砂溫服老瘧飲治久瘧結成癥瘕在腹脅諸藥不去者蒼术草果去皮桔梗青皮陳皮良薑各五錢白芷茯苓半夏枳殼炙草桂心乾薑炮各三分蘇葉川芎各二錢右銼散每服四錢水二盞鹽少許煎七分去滓空心服日三夜一仍吞下紅丸子紅丸子治食瘧尤妙莪术三稜各二兩醋煮一伏時胡椒一兩青皮二兩炒香阿膠一分醋化右為末另研陳倉米末用阿膠醋煮米糊搜和丸如桐子大炒土砂為衣每服五十丸至百丸以老瘧飲下古方雖有鱉甲煎等不特服不見效抑亦藥料難備妙應丹治諸瘧不問寒溫悉主之黃丹三分炒木香半兩研為末青皮陳皮吳茱茰各五錢米醋二升熬青皮以下三味至一升去滓再煎醋成膏右以黃丹木香為末入醋膏搜和為丸如桐子大辰砂為衣每服十丸當未發前一服須白湯下再將前三件滓添木香五錢為末别研入黃丹三分和勻以醋糊為丸如桐子大每服三五十丸治瘧神妙名曰捷丹紅散子須當發日早晨服黃連炒色變右入好建茶合和二錢白湯調下或溫酒調不入茶雄黑豆四十四粒端午日井水浸次日取出去皮拭乾研為膏真砒一分研右于五月五日午時丸如菉豆大隂乾辰砂為衣密器封之發日空心井花水下一丸忌見雞犬若女人病令男子閉目送入口忌熱食孕婦不得服於發日以絲綿繫一丸於右脊背上小兒不能吞服隨男左女右繫之又方黃丹不拘多少五月五日用獨頭蒜煨熟研細丸如桐子大每服五丸當發前一食頃桃栁枝煎湯吞下塞耳丹青黛桂心砒巴豆硫黃各等分右並不去皮殼不修治為末以五月五日五家角黍為丸棗核大綿裹當發日塞耳中男左女右忌葷腥三因極一病證方論卷六
