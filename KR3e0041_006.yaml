body:
  text: 三因極一病証方論卷六宋陳言撰叙疫論夫疫病者皆四時不正之氣春夏有寒凊時秋冬有暄熱時一方之内長幼病狀率皆相類此即謂之天行是也若春時應暖而清氣折之則責邪在肝病曰青筋牽夏時應暑而寒氣折之則責邪在心病曰赤脉㩌秋時應凉而熱氣折之則責邪在肺病曰白氣貍冬時應寒而暖氣折之則責邪在腎病曰黑骨瘟土無正形因火而名故附金木水火而變病曰黄肉隨其天行之病大則流毒天下次則一方一鄉或偏着一家悉由民庶宿業所致故天地神祗假兹不正之氣而行責罰且人命有遭逢時有否泰故有偏着一家者既有斯害氣還以天地所生之物而防備之命曰賢人知方四季疫証治病者發熱腰痛強急脚縮不伸胻中欲折目中生花或濇濇增寒復熱頸外雙筋牽不得屈伸項直背強眼赤黄欲轉動合目冋側病名青筋牽者由春三月其源從厥隂渉足少陽少陽之氣始發少隂之氣始衰隂陽怫鬱於腠理臟府受厲氣而生若府虚則為隂邪所傷故發熱若臓實則為陽毒所損故増寒治青筋牽肝之府臟温病隂陽毒胆府虚為隂邪所傷腰脇強急脚縮不伸胻中欲折目中生花色蒼蒼者柴胡去苗五兩茯苓梔子仁半夏大青各三兩桂心竹茹香豉炙草各一兩右㕮咀每服五錢水二盞薑五片煎七分去滓空心服治青筋牽肝府臟溫病隂陽毒肝臟寔為陽毒所傷濇濇惡寒翕翕發熱頸外雙筋牽不得屈伸項直背強眼赤黄轉動則合身回側色蒼蒼者𤣥參一兩細辛梔子仁黄芩升麻芒硝各三兩石膏煆八兩右剉散每服五錢水二盞入車前草葉三片淡竹葉七片煎七分去滓空心服病者脉促身戰掉不能禁或内熱口乾舌破咽塞聲嘶病名赤脉㩌以夏三月其病從少隂太陽之氣相搏而停則榮衛不通皮肉痠起太陽之氣發動少隂淫邪之氣因而作厲則臟府隨時而受病疫也若府虚為隂邪所傷則寒戰若臟實為陽毒所侵則内熱治赤脉㩌心府臟溫毒隂陽毒若府虚為隂邪所勝脉促身戰掉不能禁色昏赤者茯苓人參桔梗各三分甘草五錢白芷青皮各一兩炮薑五錢右剉散每服五錢水二盞煎七分去滓食前服治心府臟溫病隂陽毒心臟寔則為陽毒所傷内熱口乾舌破咽塞聲嘶色焦赤者天門冬麥門冬車前子炒梔子仁黄芩升麻炙草寒水石煆各等分右剉散每服五錢水二盞煎七分去滓食前服病者身重頸直皮肉強痺或蘊而結核起于喉頸之側布熱毒於皮膚分肉之中上散入髪際下貫顳顬隱之而熱不相斷離病名黄肉隨以四季各十八戊巳日其病從太隂陽明相格寒濕不調闗節格滯若府虚則皮肉強痺若臟實則布熱毒發于皮膚治黄肉隨脾府臟溫病隂陽毒胃府虚則為隂毒所傷頭重頸直皮肉強痺色黄黑者厚朴薑汁炒一兩半白术陳皮各一兩炮薑紫蘇炙草半夏湯泡各三分右剉散每服五錢水二盞煎七分去滓食前服治黄肉隨脾府臟溫病隂陽毒臟實為陽毒所傷蘊熱結核起喉頸之側布毒氣於皮膚分肉之中散入髪際下貫顳顬畜熱不散色黄黑者葛根蒼术米泔浸升麻白芷桔梗青皮各一兩大黄五錢右剉散每服五錢水二盞煎七分去滓食前服病者身重頸直乍寒乍熱損肺傷氣暴𠻳嘔逆或體熱發斑喘欬引氣病曰白氣貍以秋三月其源從陽明係手太隂受疫淫邪之氣若府虚隂邪反傷則乍寒乍熱若臟實為陽毒所傷則體熱發斑治白氣貍肺府臟溫病隂陽毒大腸府虚為隂邪所傷寒熱互作上氣咳逆大腸飱泄色皓皓者白术人參各一兩炮薑麥蘖炒各三分白茯苓五味子肉荳蔲草果烏梅炙草各五錢右剉散每服五錢水盞半煎七分去滓食前服治白氣貍肺府臟溫病隂陽毒臟實為陽毒所傷體熱肌膚發斑氣喘引飲色昏白者紫苑茸一兩梔子仁升麻前胡各三分葶藶炒一分杏仁炙草右剉散每服五錢水二盞煎七分去滓食前服病者裏熱外寒意欲守火而反引飲腰痛欲折或胸脇切痛類如刀刺不得轉動熱彭彭服冷多則洞瀉病名黑骨溫以冬三月其源從足太陽少隂相搏蘊積壅塞若府虚為隂邪所傷則裏熱外寒若臟寔為陽毒所損則彭彭發熱治黑骨溫腎府臟溫病隂陽毒腎府虚為隂邪所傷則裏熱外寒煩渴引飲反喜守火或腰脇滿痛小便赤黄面色俱黑附子茯苓各一兩山茱茰細辛山藥澤瀉各五錢麻黄三分杏仁五分右剉散每服五錢水二盞煎七分去滓食前服治黒骨溫腎府温病隂陽毒腎臟寔為陽毒所傷胸脇切痛不能轉動大小便秘澁腹脹食冷則洞泄色昏黑者吳茱茰黒牽牛大黄蒸萆􅐺杜仲薑汁炒去絲桃仁各等分右剉散每服五錢水二盞煎七分去滓食前服料簡諸疫証治凡春分以前秋分以後天氣合清涼忽有溫煖之氣折之則民病溫疫春分以後秋分以前天氣合溫熱忽有清涼之氣折之則民病寒疫治之各有法不可拘以日數汗下皆宜據方論一體而分既有寒溫二疫風溫亦宜備論如己未年原缺二字人疫汗之死下之亦死服五苓散則愈此無他溫疫也以此為法每遇年有不正之氣即當紀而用之假如冬合寒時有溫煖之氣則春必患溫疫春合溫而有清涼之氣則夏必患燥疫夏合熱而有寒氣折之秋必病寒疫秋合晴而反霪雨冬必病濕疫此亦一途而推之更須以時斟酌不可偏執况疫之所興或溝渠不泄畜其穢惡薫蒸而成者或地多屍氣鬱發而成者或官吏枉抑怨讟而成者世謂獄瘟傷瘟墓瘟廟瘟社瘟山瘟海瘟家瘟竈瘟嵗瘟天瘟地瘟等不可不究古法辟之用屠蘇酒務成子螢火丸李子建殺鬼煎老君神明散皆辟瘟法惟劉根别傳令于州治太嵗六合處穿地濶三尺深亦如之取淨沙三斛寔之以醇酒三升沃其上俾使君祝之此亦濟人除疫之良術所謂太嵗六合者嵗泄氣之所在故以厭禳屠蘇酒治疫氣令人不染及辟瘟病傷寒大黄桔梗川椒白术桂心各一兩烏頭泡去皮尖六錢菝葜一兩二錢右剉散縫袋盛以十二月晦日日中懸沉井中令至泥正月朔旦出藥置酒中煎數沸于東向户飲之先從少起多少任意一方有防風一兩六錢太乙流金散辟瘟氣雄黄雌黄羖羊角燒各二兩鬼箭羽枯礬各一兩半右末以縫袋盛一兩帶心前并挂門户上若逢大疫之年以月旦青布袋一刀圭中庭燒之瘟病人亦燒薫之敗毒散治傷寒瘟疫風溫頭痛目昏眩四肢疼痛增寒壯熱項強眼睛痛尋常風眩拘急風痰並宜服之羌活獨活人參甘草柴胡前胡茯苓枳殻川芎桔梗各等分右剉散每服四錢水一盞薑三片薄荷五葉煎七分去滓熱服寒多則熱服熱則溫服傷濕加白术脚痛加天麻本方為細末亦可㸃服初虞世南䆒其方知出道藏乃叙云自非異人傑出志與神㑹則莫之敢為良可歎服烟瘴之地或瘟疫時行或人多風多痰多氣或處卑濕脚弱此藥不可缺也世人不師故常務作新竒蔽于俗學故備論之此藥治脚氣下注焮熱赤腫加大黄棋子大煎併進兩服立效應夢人參散治傷寒體熱頭疼及風壅痰𠻳咯血白芷乾葛青皮桔梗白术人參各三分甘草炙一兩半炮薑一錢三分右末每服二錢水一盞薑三片棗二枚煎七分通口服如傷寒入豉數粒同煎熱服大有效崇寧癸未米芾為太常博士始造待漏冐寒得疾痰𠻳如膠有血更三醫不退一日謁太尉蔡公公取人參散一貼并棗授之繼歸有客承議郎薛道至時藥已熟進一服良久痰𠻳立止客怪曰公氣色頓快何藥也為道其由求方蔡公又送一貼越三日病全除往見蔡公公曰此藥僧伽方也元祐中泗州守劉士彦病八日不汗女求僧伽甚確夜夢告曰翌日塔中取藥遂于大士缽中取得此藥題印云太平州楊家人參散今太醫局中亦賣無甘草乾葛兼無分兩疑非真方喝起散蒼术麻黄荆芥各二兩石膏煆三兩大黄一兩五錢括蔞根乾葛芍藥白芷甘草右末每服二錢水盞半薑三片葱三寸煎七分空心服入瘟家令不相染法明雄黄研細末調以筆濃蘸塗鼻中與病人同牀亦不相染初洗面後及臨卧時㸃之凡疫家自生惡氣聞之即病入上元宫遂散百脉而成斯疾宜以紙撚探鼻嚏之為佳如以雄黄㸃鼻則自不聞并辟諸惡夢神良聖散子方東坡叙云昔嘗觀千金方三建方於病無所不治而孫思邈著論以謂此方用藥節度不近人情至于救急其驗特異乃知神物效靈不拘常制至理觀感智不能知今余所謂聖散子殆此類也自古論病唯傷寒至為危急表裏虚實日數証候應汗應下之法差之毫釐輙至不救而用聖散子者一切不問隂陽兩感男女相易狀至危篤者連飲數劑則汗出氣通飲食漸進神宇完復更不用諸藥連服取差其飲輕者額㣲汗正爾無恙藥性小熱而陽毒發斑狂之類入口即覺清涼殆不可以常理詰也時疫流行平旦輙煮一釡不問老少良賤各飲一大盞則時氣不入其門平居無病能空腹一服則飲食快美百病不生真衞生濟世之寶其方不知所從來而故巢君數世寶之以此治病百不失一余既得之謫居黄州連嵗大疫所全活者至不可數巢君初甚惜此方指江水為盟不傳與人子竊隘之乃以傳蘄水龎君安常龎以醫聞於世乂善著書故以授之且使巢君之名與此方同不朽也用藥如後草豆蔲十個猪苓去皮石菖蒲茯苓良薑剉炒獨活柴胡吳茱茰附子麻黄去節厚朴薑汁炒藁本芍藥枳殻白术蒼术半夏澤瀉藿香防風細辛各五錢甘草炙一兩右剉㪚每服五錢水盞半煎七分去滓熱服此藥似治寒疫因東坡作序天下通行辛未年永嘉瘟疫被害者不可勝數頃時寒疫流行其藥偶然得中抑未知方上有所偏宜未可執也東坡便謂與三建散同類一切不問似大不近人情夫寒疫亦自能發狂盖隂能發躁陽能發厥物極則反理之當然不可不知今錄以備療寒疫之用宜審之不可不究其寒溫二疫也辛已年余嘗作指治至癸已復作此書見石林避暑錄亦曰宣和間此藥盛行於京師太學生信之尤篤殺人無數醫頓廢之然不妨留以備寒疫無使偏廢也凡例夫疫雖以三事鍾成若天行多假六淫反錯鬱折而致之者既有寒溫二疫風濕其可不辨但証似傷濕而脉色不同與夫一方相染長幼同病即當作疫治除辟法外治濕用五苓散加甘草治風用桂枝湯加黄芩無不愈者其如淫邪交結互織當以類推之五苓散治傷寒濕熱病表裏未解頭痛發熱口燥咽乾煩渇引水水入即吐或小便不利及汗出表解煩渴不止者宜服之又治霍亂吐利方見傷寒暑門仍加炙草一兩桂枝黄芩湯治風疫脉浮數而不弱頭項疼腰脊痛發熱惡風其証皆如太陽傷風但脉浮不弱相傳為異耳桂枝去皮芍藥黄芩各一兩半炙草一兩右剉散每服五錢水盞半薑三片棗一枚煎七分去滓食前服沃雪湯治傷寒溫疫濕疫熱疫蒼术炮薑炙草各六兩防風乾葛厚朴姜汁炒芍藥各四兩右剉散每服三錢水二盞煎七分服瘧叙論夫藥備内外不内外三因外則感四氣内則動七情飲食飢飽房室勞逸皆能致瘧經中所謂夏傷暑秋痎瘧者此則因時而序耳不可專以此論之則知溫病飱泄咳𠻳亦不可拘也夫瘧之始發也先以毫毛欠伸乃作寒慄鼓頷腰脊俱痛寒去則内外皆熱頭痛而渴唯欲飲冷者以隂陽上下交爭虚實更作若陽并於隂則隂實而陽虚陽明虚則寒慄鼓頷太陽虚則腰背頭項俱痛少陽虚則身體解赤心惕惕然三陽俱虚則隂氣勝骨寒而痛隂并於陽則陽實而隂虚太隂虚則不嗜食善嘔嘔已乃衰少隂虚則熱多寒少嘔甚其病難已厥隂虚則腰腹痛小便不利如癃三隂俱虚則陽氣勝熱甚悒悒不樂隂盛則内熱熱生於外故中外皆熱此皆因外感寒暑風濕内鬱喜怒憂思蘊積痰涎乃至飲食飢飽勞逸之所為也病氣與衛氣并居故病作衛氣晝行於陽夜行於隂得陽而外出得隂而内薄所以日作其氣内薄於藏横連於膜原其道逺其氣深其行遲不能與衛氣俱出故間日作以衛氣一日一夜大㑹於風府日下一節以此日作稍晏至二十五日至骶骨二十六日入脊内其氣上行故日作益早也瘧氣所以更盛更虚當氣之所在者在陽則躁熱在隂則寧靜極則隂陽俱衰衛氣相離則病休衛氣集則復病也於是有日作間作早晏不同又邪氣中于頭項者氣至頭項則作中於背者氣至背則作中于腰脊者氣至腰脊則作各隨其所中而作但衛氣之所在與邪氣相合則病作也更有疫瘧鬼瘧等亦以邪氣中衞氣之所致也除癉瘧純熱溫瘧先熱牝瘧無熱外諸瘧皆先寒而後熱又經曰無刺熇熇之熱無刺渾渾之脉無刺漉漉之汗為其病逆未可治也知此則病方來與正作與將過皆不可治以反傷真氣不可不知也所因備列于後瘧病外所因治病者先寒後熱寒則湯火不能溫熱則氷水不能寒以先傷寒後傷風故先寒而後熱名曰寒瘧病者先熱後寒煩躁自汗惡風以先傷風後傷寒風為陽寒為隂故先熱而後寒名溫瘧病者但熱不寒隂氣孤絶陽氣獨發少氣煩寃手足熱而欲嘔必渇以其傷於暑熱故名癉瘧病者寒熱身重骨節煩疼脹滿濈濈自汗善嘔因汗出復浴濕舍皮膚及冒雨濕名曰濕瘧病者寒多不熱但慘戚振慄亦以時作此以陽虚隂盛多感隂濕陽不能制隂名曰牝瘧右五種瘧証以外感風寒暑濕與衛氣相并而成治有各種方法白虎加桂湯治溫瘧先熱後寒惡風多汗石膏煆四兩知母一兩五錢炙甘草五錢桂心一兩粳米一合右剉散每服四錢水一盞半煎七分去滓未發時進三服术附湯治冒雨濕著於肌膚與衛氣相并或腠開汗出自浴得之附子白术各一兩炙草茯苓桂心各五錢右剉㪚每服四錢水盞半薑五片棗二枚煎七分去滓食前服麻黄白术湯治傷風寒暑濕滯留經絡與衛氣相并病以日作寒熱交煎麻黄去節湯浸白术茯苓桂心各一兩陳皮青皮桔梗白芷甘草半麴烏梅紫蘇各三分乾薑五錢右剉散每服四錢水兩盞薑三片棗二枚煎七分去滓當發日空心一服臨發一服尤妙亦治時疫太醫常山飲治諸瘧先寒後熱或先熱後寒或寒熱獨作或連日併發或間日一發頭疼惡心煩渇引飲氣息喘急口苦咽乾諸藥不效川常山知母甘草草果不去皮各二兩烏梅一兩良薑一兩右剉散每服四錢水盞半棗五枚煎七分去滓溫服未發前進三服桂薑湯治牝瘧寒多㣲熱或但寒不熱柴胡八兩桂心一兩黄芩牡蠣煆甘草炙乾薑炮各三兩括蒌根四兩右剉散每服四錢水二盞煎七分去滓空心服日三服初服㣲煩汗出愈一法有半夏三兩瘧病内所因証治病者寒熱顔色蒼蒼然善太息如死狀以蓄怒傷肝氣鬱所致名曰肝瘧病者心煩欲飲清水反寒多不甚熱乍來乍去以喜傷心心氣耗散所致名曰心瘧病者寒多腹中熱痛或渇或不渇不熱不泄腸鳴汗出以思傷脾氣鬱涎結所致名曰脾瘧病者心寒寒甚則發熱熱間善驚如有所見以憂傷肺肺氣凝痰所致名曰肺瘧病者手足寒洒然腰脊痛發熱大便難目眴以失志傷腎名曰腎瘧五種瘧疾以臟氣不和鬱結涎飲所致治之各有方法七棗湯治五臟氣虗隂陽相勝作為痎瘧不問寒熱先後與夫獨作叠間日作悉能主之附子一枚炮製以鹽水浸再炮如此凡七次至第七次不必浸去皮臍右剉散水一盞薑七片棗七枚煎八分當發日空心服仍吃三五個棗子忌如常良方用烏頭兼不用鹽水浸不特服之潛燥亦不能分隂陽去滓服四獸飲治五臟氣虚喜怒不節勞逸兼并以致隂陽相勝結聚涎飲與衛氣相搏發為瘧疾悉主之兼治癉瘧最效半夏茯苓人參草果陳皮甘草烏梅肉白术生薑棗子各等分右剉散鹽少許淹食頃厚皮紙裹水淹入慢火煨香熟焙乾每服秤半兩水二盞煎七分去滓未發前并進三服交解飲治脾胃氣弱隂陽勝復發為痎瘧製厚朴肉荳蔲麺裹煨草荳蔲製如上甘草半生半炙右等分剉散每服四錢水二盞煎八分去滓空心服草果飲治脾寒等瘧青皮草果川芎白芷紫蘇良薑甘草炙右等分為粗末每服二錢水一盞煎七分去滓熱服當發日連進三服驅瘧飲子前胡柴胡各四兩桂心桔梗厚朴半夏去滑三兩黄茋炮薑甘草各二兩右剉散每服四錢水盞半薑三片棗二枚煎七分去滓溫服瘧病不内外因証治病者發寒熱一嵗之間長幼相似若或染時行變成寒熱名曰疫瘧以嵗運推之病者寒熱日作夢寐不祥多生恐怖名曰鬼瘧宜用禁避厭禳之法病者乍寒乍熱乍有乍無南方多生此病名曰瘴瘧當隨方土所宜治之病者寒熱善飢而不能食食已支滿腹急㽲痛病以日作名曰胃瘧六腑無瘧惟胃有之盖因飲食飢飽所傷胃氣而成謂之食瘧或因諸瘧飲食不節變為此証病者經年不瘥瘥後復發逺行久立下至㣲勞力皆不任名曰勞瘧亦有數年不瘥百藥不斷結成癥癖在腹脇下名曰老瘧亦曰母瘧以上諸証名狀不同各有治方宜推而用之麻黄白术湯治一切疫瘧方見外所因門經效瘧丹治鬼瘧殊效真阿膠五錢桃枝栁枝各長一尺七莖雄黄通明者五錢研辰砂一錢另研留一半右為末以端午日五家角黍為丸如桐子大所留辰砂一半為衣遇發時用淨器水磨一丸塗鼻尖并人中未退以冷水服一丸合時須端五日大正氣散治山嵐瘴氣發作寒熱遂成瘧疾附子厚朴製桂心炙草炮薑陳皮各一兩吳茱茰五錢畧炒右細末每服二錢水盞半薑五片棗一枚煎七分去滓熱服不拘時兼治霍亂吐瀉一切氣疾清脾湯治胃瘧發作有時先覺伸欠乃作寒慄振頥頷中外皆寒腰背俱痛寒戰既已内外皆熱頭痛如破渇欲飲冷或痰聚胸中煩滿欲嘔或先熱後寒先寒後熱少寒多熱少熱多寒或寒熱相半或但熱不寒但寒不熱或隔日一發或三五日一發者悉主之製厚朴烏梅肉半夏青皮良薑各二兩草果去皮一兩甘草炙五錢右剉散每服四錢水二盞薑三片棗一枚煎七分去滓未發日并進三服忌生冷油膩時菓此藥溫脾化痰治胸膈痞悶心腹脹滿噫醋吞酸可常服常山飲治勞瘧虚人老人皆可服常山川山甲醋炙木通秦艽各一錢辰砂半字另研炙草五錢右剉散作一劑水三盞烏梅棗子各七枚煎半盞再入酒一杯煎八分去滓入辰砂溫服老瘧飲治久瘧結成癥瘕在腹脇諸藥不去者蒼术草果去皮桔梗青皮陳皮良薑各五錢白芷茯苓半夏枳殻炙草桂心乾薑炮各三分蘇葉川芎各二錢右剉散每服四錢水二盞鹽少許煎七分去滓空心服日三夜一仍吞下紅丸子紅丸子治食瘧尤妙莪术三稜各二兩醋煮一伏時胡椒一兩青皮二兩炒香阿膠一分醋化右為末另研陳倉米末用阿膠醋煮米糊捜和丸如桐子大炒土砂為衣每服五十丸至百丸以老瘧飲下古方雖有鱉甲煎等不特服不見效抑亦藥料難備妙應丹治諸瘧不問寒溫悉主之黄丹三分炒木香半兩研為末青皮陳皮吳茱茰各五錢米醋二升熬青皮以下三味至一升去滓再煎醋成膏右以黄丹木香為末入醋膏捜和為丸如桐子大辰砂為衣每服十丸當未發前一服須白湯下再將前三件滓添木香五錢為末别研入黄丹三分和匀以醋糊為丸如桐子大每服三五十丸治瘧神妙名曰㨗丹紅散子須當發日早晨服黄連炒色變右入好建茶合和二錢白湯調下或溫酒調不入茶雄黑豆四十四粒端午日井水浸次日取出去皮拭乾研為膏真砒一分研右于五月五日午時丸如菉豆大隂乾辰砂為衣密器封之發日空心井花水下一丸忌見雞犬若女人病令男子閉目送入口忌熱食孕婦不得服於發日以絲綿繫一丸於右脊背上小兒不能吞服隨男左女右繫之又方黄丹不拘多少五月五日用獨頭蒜煨熟研細丸如桐子大每服五丸當發前一食頃桃栁枝煎湯吞下塞耳丹青黛桂心砒巴豆硫黄各等分右並不去皮殻不脩治為末以五月五日五家角黍為丸棗核大綿裹當發日塞耳中男左女右忌葷腥三因極一病証方論卷六
