body:
  text: 三因極一病証方論卷十三宋陳言撰痰飲叙論人之有痰飲病者由榮衛不清氣血敗濁凝結而成也内則七情擾亂臟氣不仁鬰而生涎涎結為飲為内所因外有六滛侵冒六腑不通當汗不泄蓄而為飲為外所因或飲食過傷嗜慾無度叫呼疲極運動失宜津液不行聚為痰飲屬不内外因三因所成証狀非一或為喘為咳為嘔為泄眩暈嘈雜忪悸愪㦜寒熱疼痛腫滿攣癖癃閉痞隔如風如癲未有不由痰飲之所致也痰飲証論古方惟分四飲六証不説三因不知其因病源無自觀夫治飲之法既用大小青龍桂枝防己五苓承氣得非外因参苓苓术八味参蘇得非内因十􅀥葶藶大小半夏控涎破飲不内外因理固明矣以此類推頗得倫要今叙列諸証以為治門須原本因施用藥湯學者自宜詳審所謂四飲者即懸飲溢飲支飲痰飲也懸飲者飲水流在脇下咳唾引痛溢飲者水留於四肢當汗出而不出汗身體疼痛支飲者咳逆倚息短氣不得卧其形如腫痰飲者其人素盛今痩水走腸間瀝瀝有聲又有留飲者背寒冷如手大或短氣而渇四肢歴節疼脇下痛引缺盆咳𠻳則轉甚又有伏飲者膈滿喘咳嘔吐發則寒熱腰背痛目淚出其人振振惡寒身瞤惕故曰四飲生六証或云五飲者即留飲伏飲合為一証是也其脉皆弦㣲沉滑治之之法懸飲當治之溢飲當發其汗支飲則随証汗下痰飲則用温藥從小便去之其間或随氣上厥伏留陽分使人嘔吐眩暈背寒或一臂不随有類風狀不可不知痰飲治法十􅀥湯治懸飲咳唾引脇下痛又治支飲咳煩胸中痛至百日其脉弦者芫花炒甘遂大㦸炒等分右為末􅀥十個煎八分去􅀥調藥壯人一錢平旦温服不下者次日更加半錢下後糜粥自養若已下不可再服大青龍湯治溢飲身體疼重汗不出拘急痛麻黄七錢五分桂枝炙草各二錢半石膏杏仁四十粒去皮尖炒右為剉散每服四錢薑五片􅀥二枚煎七分温服汗者勿再服復服汗多亡陽虚逆惡風煩躁不得眠也小青龍湯治溢飲支飲倚息不得卧及喘滿者麻黄桂枝炙草芍藥細辛炮薑各三錢五味子二錢半夏三錢右為剉散每服四錢煎七分渇者去半夏加花粉三錢㣲利去麻黄加炒芫花噎者去麻黄加附子小便不利者去麻黄加茯苓五錢喘者去麻黄加杏仁三錢咳而上氣肺脹其脉浮心下有水氣者胸中痛引缺盆加石膏二錢防己桂枝湯治膈間支飲其人喘滿心下痞堅面色黧黒其脉沉𦂳得之數十日醫吐下之不愈防己三兩桂枝二兩人参四兩石膏六兩右為剉散每服四錢煎七分温服虛者即愈實者復發再服不愈宜去石膏加茯苓四兩芒硝一兩㣲利愈小承氣湯治支飲胸滿厚朴四兩汁炒大黄二兩枳實一兩麩炒每服四錢茯苓五味子湯治支飲手足冷多唾口燥氣從小腹上衝胸咽手足痺面熱翕然如醉狀因復下流隂股小便難時復眩冒嘔腫茯苓四兩桂心炙草各三兩五味子二兩半右㕮咀每服四錢煎七分服之衝氣即低反更咳滿者去桂加乾薑細辛各三兩咳滿止而後渇衝氣更發者以細辛乾薑為熱藥此法不當逐渇反止者為支飲也支飲法當冐冐者必嘔嘔者復納半夏二兩半以去其飲飲去則止其人形腫與痺加杏仁二兩半若面赤如醉以胃中熱上薰加大黄三兩須詳証加减大半夏湯治膈間有飲卒嘔吐心下痞眩悸半夏五錢茯苓三錢薑七片煎服小半夏湯治支飲嘔吐不渇半夏薑十片煎七分服葶藶大􅀥瀉肺湯治支飲不得倚息葶藶炒令黄研細丸如桐子大以水三盞煑􅀥十枚至一盞去􅀥入藥煎至七分食後服金匱令先投小青龍湯三服乃進此藥五苓散治痩人臍下有悸者挾涎沫而癲眩者飲也茯苓澤瀉桂心白术猪苓肉桂各等分煎服茯苓湯治心氣不行鬰而生涎胸脇支滿目眩以胸中有痰飲故也茯苓澤瀉桂心白术各二兩炙草二兩每服四錢利小便則愈参苓飲治胸中停痰宿水自吐出痰後心胸間虛氣滿不能食人参茯苓白术各三兩枳實二兩麩炒陳皮一兩半薑三片煎服八味丸治失志腎虚鬰而生涎短氣喘咳當從小便去之中有茯苓故也方見消渇門参蘇飲治痰飲停胸中中脘嘔吐痰涎眩暈嘈雜忪悸噦逆及痰氣中人停留闗節手足軃曵口眼喎斜半身不遂食已即吐頭痛發熱狀如傷寒人参紫蘇前胡茯苓桔梗半夏枳殻陳皮木香甘草嘔者加乾葛腹痛加白芍右剉散每服四錢加薑七片􅀥一枚煎七分服破飲丸治五飲停蓄胸腹結為癥瘕支滿胸脇傍攻兩脇搶心疼痛飲食不下翻胃吐逆九種心疼積年宿食不消久瘧久痢遁尸疰忤癲癎厥暈心氣不足憂愁思慮婦人諸疾但是腹中諸病悉能治療久服不傷臟氣蓽撥丁香胡椒砂仁烏梅青皮巴豆去皮木香蝎稍各等分右以青皮同巴豆漿水浸一宿次日漉出同炒青皮焦去巴豆將所浸水淹烏梅肉炊一熟飲細研為膏丸如菉豆大每服五六丸臨卧薑湯下津唾下尤佳控涎丹凡人忽患胸背手脚頸項腰胯隠痛不可忍連筋骨牽引鈎痛坐卧不寧時時走易不定俗醫不曉謂之走注便用風藥及針灸皆無益又疑是風毒結聚欲為􅏴疽亂以藥貼亦非也此乃是痰涎伏在心膈上下變為此疾或令頭痛不可舉或神意昏倦多睡或飲食無味痰唾稠粘夜間喉中如鋸聲多流唾涎手脚重腿冷痺氣不通悞認為癱瘓亦非也凡有此疾但服此藥數劑其疾如失甘遂去心炮薑紫大㦸去皮白芥子真者各等分右為末糊丸桐子大晒乾食後臨卧淡薑湯下三五丸如疾猛氣實加數丸不妨强中丸治胃脘虛寒冷痰留滯痞塞不通氣不升降口苦無味不思飲食良薑炮薑陳皮青皮各一兩半夏二兩為末生薑自然汁煮糊為丸桐子大每服二十丸至三十丸生薑湯下凡中滿氣痞服之甚效凡例前証用藥多出漢方但古料劑與今不同已詳酌改從今為用其如校定偹是前説惟外所因証候難明風燥寒凝暑爍濕滯皆能閉諸絡鬰而生涎不待飲水流入四肢而致支溢痛疼也當以理推無謬軌轍喘脉証治夫五臟皆有上氣喘咳但肺為五臟華葢百脉取氣於肺喘既動氣故以肺為主病者右手寸口氣口以前脉隂實者手太隂經肺實也肺必脹上氣喘逆咽中寒如欲嘔狀自汗皆肺實証若氣口以前脉虚者必咽乾無津少氣不足以息乃肺虚氣乏也杏参散治上氣喘滿倚息不能卧杏仁桃仁並麩炒桑皮米泔浸一宿蜜炙人参各一兩右為末每服二錢薑三片􅀥二枚神秘湯定喘補心腎下氣阿膠一兩雞䏶胵五錢白仙茅五錢泔浸三宿炒乾團参一分為末每服二錢糯米飲下真應散治逺年喘急不得眠卧百藥無效白石英四兩通明者以生絹囊盛用猪肚一個以藥入線縫定煮熟取藥出再換雄猪肚一個如前法煑三煑了取藥出控乾研為末以欵冬花末二錢入藥末二錢再入桑皮二寸薑三片􅀥一枚煎七分通口服猪肚亦可服只不用醬醋椒薑等調和麥冬湯治上氣大逆喘急咽喉不利麥冬一兩半夏六錢人参一錢炙草一分清肺湯治上氣脉浮咳逆喉中作水雞聲喘息不通呼吸欲絶紫苑杏仁訶子煨各二兩漢防己一兩每服四錢煎七分入雞子清冲服神秘湯治上氣不得卧陳皮桔梗紫蘇五味人参各等分煎服皺肺丸貝母知母欵冬秦芁阿膠紫苑百部糯米各一兩杏仁四兩去皮尖右為末將羊肺一個先以水灌看容得水多少即以許水更添些煮杏仁令沸濾過灌入肺中繫定以糯米泔煮熟搗細成膏捜和前藥末杵數千下丸桐子大每服五十丸食前桑皮湯下理氣丸治氣不足動便喘咳逺行久立皆不任汗出鼻乾心下急痛苦悲傷卧不安杏仁桂枝各一兩益智炮薑各二兩為末蜜丸桐子大鍾乳粉為衣米湯下三十丸黒錫丹硫黄二兩先溶黒鉛成汁入硫黄在内勿令焰起候硫黄化傾出於九重紙上着地急以盌葢令出火毒黒鉛二兩不夾錫者川楝陽起石木香沉香青皮各五錢肉果一兩茴香炒官桂附子葫蘆巴炒烏藥破故紙各一兩為末酒糊丸桐子大每服三五十至百丸濃人参茯苓薑􅀥湯下白散子附子滑石半夏肺痿肺􅏴叙論肺為五臟華葢百脉取氣運動血脉衛養臟腑灌注皮毛将理失宜氣與血俱亂則成肺痿肺􅏴矣然五臓皆有􅏴痿而獨論此者以肺為金數盡於陽九位最髙而為五臟長多致此病故獨論此餘如内􅏴及五痿說此病多生喘咳故列於痰飲喘咳云肺痿証治病者寸口脉數而虚按之濇身冷内煩多唾唇燥小便反難大便如爛𤓰豚肝狀欲咳不咳咳出乾沫唾中出血心中愠愠然上氣喘滿或燥而渇者多因發汗利小便或嘔吐消渇數服駃藥重亡津液致熱在上焦故成肺痿甘草乾薑湯治肺痿多唾涎沫小便數肺中冷必眩不渇不咳必遺溺所以然者上虚不能制下也炙草四兩炮薑二兩每服四錢棗三個煎七分服人参甘草湯治肺痿咳唾涎沫不止咽燥而渇人参一兩炙草一兩三錢薑五片􅀥三枚煎七分服温液湯治肺痿唾涎多出血心中愠愠液液炙草肺􅏴証治病者寸口脉數而實按之滑咳唾膿血口中辟辟燥胸中隠隠痛口乾喘滿咽燥不渇多唾濁沫腥臭時時振寒熱之所過血為凝滯蓄結􅏴膿吐如米粥故為肺􅏴始萌可救膿成則難治葶藶大􅀥瀉肺湯治肺􅏴胸滿脹一身并面目浮腫鼻塞清涕出不聞香臭咳逆上氣葶藶炒令黄研細丸如彈子大以􅀥十枚煑湯煎入藥食後服金匱令先進小青龍湯乃進此藥如聖湯治咳而胸滿振寒脉數滑咽乾不渇時腥臭久久吐膿若粥者為肺􅏴桔梗一兩甘草炙二兩服無時葦葉湯治肺􅏴米仁冬𤓰子桃仁去皮尖各等分先煎葦葉湯入藥煎食後服或吐膿血勿怪腰痛叙論夫腰痛雖屬腎經亦渉三因所致在外則臟腑經絡受邪在内則憂思恐怒以及房勞墜堕皆能使之方書五種之說未為詳論但去世愈逺文藉簡脱難以計論雖是缺文不可棄置随其有無提其綱目庶㡬後學以類推尋為治療之典據耳外因腰痛論太陽腰痛引項脊尻骨如重狀陽明腰痛不可以顧顧則如有所見善悲少陽腰痛如針刺其皮循循然不可俛仰不可以顧太隂腰痛煩熱腰下如有横木居其中甚則遺溲少隂腰痛痛引脊内厥隂腰痛腰中强急如張弩弦以為外因治偹大抵太陽少隂多中寒少陽厥隂多中風熱太隂陽明多燥濕以類推之當随脉别其如經中有解脉散脉同隂㑹隂陽繼衡絡直陽飛陽昌陽里尻交等穴皆不出六經流注但别行各有所生不欲繁引請尋内經刺腰痛論以備明之准此從所因汗下施治内因腰痛論失志傷腎鬰怒傷肝憂思傷脾皆致腰痛以腎肝同系脾胃表裏脾滯胃閉最致腰痛其証虚羸不足面目黎黒逺行久立力不能盡失志所為也腹急脇脹目視荒荒所求不得意淫於外宗筋弛張及為白淫鬰怒所為也肌肉濡潰痺而不仁飲食不化腸胃脹滿閃墜腰脇憂思所為也准此從内所因調理施治不内外因腰痛論腎着腰痛腰冷如冰身重不渴小便自利飲食如故腰以下冷重如帶五千錢因作勞汗出衣裏冷濕久久得之䐴公對反腰痛者傴偻腫重引季脇痛因於墜地惡血流滯及房勞疲力耗竭精氣致腰疼痛准此從不内外因補瀉施治腰痛治法獨活寄生湯夫腰痛皆腎氣虚弱卧冷濕地當風所得不急速治流入脚膝為偏枯冷痺緩弱疼重或腰痛攣脚痺重宜急服此獨活三兩桑寄生杜仲細辛牛膝秦芁茯苓白芍肉桂川芎防風炙草人参熟地當歸各二兩每服四錢煎七分服氣虚下利除地黄併治新産腹痛不得轉動及脚腰攣痛痺弱不得屈伸此湯最除風消血肘後方有附子一枚無寄生人参甘草當歸近人治歴節風並脚氣流注甚效小續命湯治風腰痛最妙麻黄防風人参黄芩肉桂炙草白芍川芎杏仁附子加桃仁麩炒去皮尖牛膝酒唐州刺史王紹顔傳信方云頃年予在蘇州得腰痛不可忍醫以腎傷風毒攻刺此方即製一劑服之便減五分歩履漸輕牛膝川芎羌活骨皮五加皮米仁各一兩甘草生地海桐皮各二兩右㕮咀入無灰酒二斗浸冬二七日夏月分數服浸三五日每服一杯日三四杯長令酒氣不絶為佳一法入杜仲一兩薑汁炒杜仲酒治風冷傷腎腰痛不能屈伸並補腎虚杜仲一斤薑汁炒以無灰酒三升酒浸十日每服三合日四五服腎着湯治腎虚傷濕停着為病身重腰冷如水洗狀不渇小便自利飲食如故腰以下冷痛如帶五千錢炮薑茯苓各四兩炙草白术各二兩一法茯苓白术各四兩炙草炮薑各二兩右㕮咀每服四錢煎七分又治體虚自汗甚效鹿角丸治腎虚傷冷冷氣入腎其痛如掣附子一兩肉桂三分鹿角屑二兩酥炙黄為末酒糊丸桐子大鹽酒下三十丸安腎丸治腎虚腰痛陽事不舉膝骨痛耳鳴口乾面色黎黒耳輪焦枯補骨脂葫蘆巴茴香川楝續斷各三兩桃仁杏仁山藥茯苓各二兩右為末蜜丸桐子大鹽酒下五十丸青蛾丸治肝腎虚腰腿重痛並治風濕脚氣常服壮筋骨填精益髄杜仲一斤薑汁炒生薑十兩晒乾破故紙一斤略炒胡桃肉一百二十個湯浸去皮研成膏右藥為末以胡桃肉膏捜匀入蜜丸桐子大鹽酒下五十丸神應丸治腎經不足風冷乘之腰痛如折或引背膂俛仰不利轉側亦難或勞役過度傷於腎經或卧冷濕地傷腰或墜堕傷損並可服之威靈仙二兩桂心當歸各一兩右為末酒糊丸桐子大煎炒茴香湯下三五十丸婦人煎官桂湯下孕婦忌服一方加破故紙桃仁地膚子各等分立安丸治五種腰痛常服補腎强腰脚治脾氣破故紙川斷木𤓰牛膝杜仲薑汁炒各一兩萆薢為末蜜丸桐子大鹽湯鹽酒任下五十丸五積散治感寒濕與脾胃氣閉腰痛蒼术桔梗陳皮白芷炙草當歸川芎芍藥茯苓半夏麻黄乾薑枳殻桂心厚朴若太隂經加桃仁薑棗煎七分服熟大黄湯治墜堕閃肭腰痛不能屈伸大黄生薑各五錢二味同炒令焦黄水浸一宿煎去滓五更服天明所下如雞肝色者即惡物出也橘子酒治打撲腰痛惡血蓄瘀不可忍橘子炒去皮研細每服二錢酒調服未效再服或用猪腰子一雙去筋膜破開入藥同葱白茴香青鹽濕紙裹煨熟細嚼温酒下桃仁酒治腎虚風勞所傷腫毒掣痛牽引小腹連腰痛桃仁麩炒去皮尖每服四錢熱酒調下汗出愈虚損証治難經論損從皮毛至於筋骨此乃辨氣脉深淺次第也原其所因屬不内外或大病未復便合隂陽或疲極筋力飢飽失節盡神度量呌呼走氣所以諸証蜂起吐血衂血便血瀉血遺泄血濁冷滑洞泄自汗盗汗嘔吐咯啘涎沫痰飲遂致榮衛之失虚勞損傷皆自此始葢皆由於人身而致然也况婦人産蓐過於大病虚損尤甚不可不知列而論之証狀非一姑舉數條以為治偹要當攷尋脉理推其元氣胃氣資始資成扶助隂陽辨别標本葢不可随証冷熱妄行施治要論曰粗工嘻嘻以為可攻治熱未已寒病復始同証異形迷氣亂經學者謹之精思有靈正元散大治元氣虚臍腹脹滿心脇刺痛泄利嘔吐自汗陽氣漸㣲手足厥逆及傷寒隂証霍亂轉筋久下冷利少氣羸困一切虚寒人参茯苓白术黄茋炙草烏藥山藥附子川芎乾葛各一兩烏頭肉桂紅豆炮薑陳皮各三錢加薑棗鹽煎服麝香鹿茸丸治精氣耗散血少不増陽道不興服此調榮衛利腰脚補精血主諸虚百病鹿茸酥炙一兩􅍄地二兩沉香三分麝香一錢研右為末蜜丸桐子大温酒下三十丸大山萸丸治諸虚百損五勞七傷肌體沉重骨節酸疼心中煩悸唇口乾燥面容少色情思不樂咳喘傷血傷氣夜多異夣盗汗失精腰背强痛臍腹弦急嗜卧少起善驚多忘飲食减少肌肉痩悴又治風虚頭目眩暈心神不寧又病後氣不復常漸成勞損久服補不足愈風氣百病山茰七兩半當歸肉桂神麯􅍄地大豆黄卷各一兩半人参一兩七錢川芎白芍白术麥冬杏仁柴胡茯苓桔梗各一兩阿膠一兩七錢半麩炒炮薑三分欵冬五錢防風一兩半大棗一百個煑去皮核加琥珀一兩逺志二兩茯苓二兩半即是養心丹右為末蜜與􅀥同舂和丸彈子大每服一丸温酒鹽湯任下虚勞遺泄白濁加龍骨二兩羊肉丸治真陽耗竭下元傷􅉵耳輪焦枯面色黎黒腰重脚弱陽事不興常服壮元陽補真氣益精駐顔補骨脂葫蘆巴茴香川棟以上炒川斷附子茯苓各三兩桃仁杏仁山藥各二兩為末精羊肉四兩酒煑爛同硏入麵和丸如桐子大鹽酒湯任下三五十丸大補丸治元臟虚􅉵血氣不足白濁遺泄自汗自利口苦舌乾四肢羸痩婦人諸虚皆主之木香附子茴香蓯蓉川椒炒去汗各十兩桃仁葫蘆巴牛膝巴㦸五味黄茋白蒺藜澤瀉羌活梹榔天麻川芎肉桂各二兩為末蜜丸桐子大温湯鹽酒任下三五十丸兎􅁝子丸治腎氣虚損五勞七傷小腹拘急四肢酸疼面色黎黒唇口乾燥目暗耳鳴心忪氣短夜夢驚恐精神困倦喜怒無常悲愁不樂飲食無味舉動乏力心腹脹滿腰膝緩弱小便滑數陽事不興股内濕癢水道澁痛小便出血時有遺瀝兎􅁝酒浸桂心鹿茸去毛切酥炙澤瀉石龍苪各一兩蓯蓉杜仲薑汁炒茯苓熟地巴㦸山茰蓽澄茄沉香茴香炒補骨脂石斛牛膝川斷川芎五味覆盆子桑螵蛸為末酒糊丸桐子大每服三十丸温酒鹽湯任下脚膝無力木𤓰湯下淋閉木通湯下妙應丸治脾虚元氣弱久積隂冷心腹滿痛面色青黒肌體痩弱怠惰嗜卧食少多傷噫氣吞酸噦逆惡心腹中虚鳴大便泄利胸膈痞塞飲食不下霍亂嘔吐肌冷轉筋及五隔五噎久痛久痢附子四個六錢重者生去皮臍剜作孔入碙砂一兩七錢麵裹煨熟去麵不用蓽撥木香青皮各二兩破故紙三兩為末麵糊捜匀丸如桐子大生薑陳皮湯下三十丸増損樂令湯治虛不足小腹急痛脇肋䐜脹臍腹中滿煩悸面色瘁黄唇乾口燥手足逆冷體常自汗腰背强急骨肉酸痛咳𠻳喘乏不能飲食或因勞傷過度或因病後不復黄茋人参橘皮當歸桂心細辛前胡甘草茯苓麥冬芍藥各二兩附子熟地各一兩半夏二兩半逺志三分每服四錢加薑五片􅀥二枚煎七分服若腹滿食少去􅀥下焦虛冷不甚渇小便數倍人参當歸附子煩渇引飲加花粉遺泄白濁加龍骨白蘞小腹急引心痛者加乾薑人参養榮湯治積癆虛損四肢沉滯骨肉酸疼吸吸少氣行動喘咳小便拘急腰背强痛心虚驚悸咽乾唇燥飲食無味隂陽衰弱悲憂􅆭戚多卧少起久者積年急者百日漸至痩削五臟氣竭難可振復又治肺與大腸俱虚咳𠻳下利喘促乏氣嘔吐痰涎人参當歸桂心甘草陳皮白术各一兩白芍熟地五味茯苓各三分逺志五錢右㕮咀每服四錢加薑􅀥煎七分服遺精加龍骨一兩咳𠻳加阿膠一兩十補丸治真氣虚損下焦傷竭臍腹强急腰脚疼痛亡血盗汗遺精血濁大便自利小便滑數或三焦消渇飲食倍常肌肉倍常陽事不舉顔色枯槁久服補五臟行榮衛益精髄進飲食附子炮薑肉桂兔絲酒研厚朴薑炒巴㦸天逺志薑炒破故紙赤石脂煅各一兩川椒炒出汗去合口者二兩為末酒糊丸桐子大温酒下逺志丸治心腎氣不足驚悸健忘夢寐不安面少顔色足脛酸疼逺志山藥熟地天冬龍齒水飛各六兩麥冬五味車前茯苓茯神骨皮肉桂為末蜜丸桐子大温酒下三十丸至五十丸張走馬家秘真丹治房室過度或用意思惟精洩汗出腰背酸弱不能屈伸食不生肌兩足㾓痛不能歩履草烏或用川烏以牡蠣炒裂去皮臍去牡蠣不用一兩五棓子五錢為末糯米和丸桐子大鹽湯下三五十丸蓮子丸治真氣虚􅉵口苦舌乾心常惨戚夜多異夢晝少精神或夢與鬼交遺泄白濁小便餘瀝陽事不舉目暗耳鳴面色黎黒新蓮肉四兩白龍骨一兩醋煑甘草一分為末車前草汁入麵少許煑和丸鹽湯任下三十丸威喜丸治精氣不固餘瀝常流小便白濁夣泄及婦人血海久冷白帶白漏白滛身常滛濕小便如米泔或無子息白茯苓四兩猪苓一分去皮煑茯苓數十滚黄蠟四兩右只茯苓一味為末溶黄蠟為丸彈子大空心細嚼令口生津液徐嚥兼治耳鳴口乾鎻陽丹治脱精洩不禁龍骨一兩茯苓一兩桑螵蛸三兩瓦上焙􅏫黄為末和丸桐子大煎茯苓湯下五十丸一方用茯苓猪苓木饅頭和皮子切各等分為末一方用破故紙青鹽搥碎同炒香為末並服二錢米飲調下十四支丸補心腎虚怔忡昏瞶神志不寧睡卧不安故經曰臟有所傷情有所倚人不能懸其病則卧不安當歸熟地茯苓茯神人参𤣥参阿膠蛤粉炒􅀥仁炒栢子仁紫石英逺志各一兩肉桂一兩辰砂一分龍齒二兩右為末蜜丸桐子大􅀥湯下三十丸宣和賜茋絲方治少年色慾過度精血耗竭心腎氣􅉵遺泄白濁腰背疼痛面色黎黒耳聾目昏口乾脚弱消渇便利夢與鬼交陽事不舉當歸酒浸焙乾半斤兎絲子酒浸煑搗焙乾一斤米仁茯神石蓮肉鹿角霜熟地各四兩右為末用黄茋二斤搥碎水六升浸一宿次早挼洗味淡去渣於銀石器中熬汁成膏捜數和得所搗數千杵丸桐子大每服五十丸加至百丸米湯温酒任下常服守中安神禁固精血益氣駐顔延年不老参香散治心氣不寧諸虚百損肢體沉重情思不樂夜多異夣盗汗失精恐怖煩悸喜怒無常口乾咽燥渇欲飲水飲食减少肌肉痩悴漸成勞瘵常服補精血調心氣進飲食安神守中功難盡述人参黄茋茯苓白术山藥蓮肉各一兩砂仁烏藥橘紅炮薑各五錢木香一分炙草三分丁香檀香各一分沉香二錢每服四錢薑􅀥煎七分一法有熟附子五錢三因極一病証方論卷十三
