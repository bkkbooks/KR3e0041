拘時服虎骨酒治肝勞虚寒口苦闗節疼痛筋攣縮煩悶虎骨五兩炙焦碎如豆大丹參一兩地骨皮乾薑川芎各一兩熟地一兩三分猪椒根五加皮楮實白术各一兩一分右剉散每服以絹袋盛醇酒四升浸四日初服二三合漸加至一盞日食前再服泄熱湯治心勞實熱口舌生瘡大便秘澁不通心滿痛小腸塞澤瀉梔子仁黄芩各三兩桂心通草各三兩石膏八兩大黄蒸甘草炙各一兩右剉散每服四錢水盞半煎七分去滓食後服熱甚者煎熟加芒硝一錢無時服定心湯治心勞虚寒驚悸恍忽多忘夢寐驚壓神志不安茯苓四兩桂心炙草白芍炮薑逺志肉炒人參各二兩右剉散每服四錢水盞半棗二枚煎七分去滓食前溫服半夏湯治脾勞實熱四肢不和五臟乖戾脹滿肩息氣息不安茯苓白术杏仁麸炒去皮尖各五錢陳皮芍藥各二兩半夏製四兩右剉散每服四錢水盞半薑七片棗二枚煎七分去滓無時服茱茰膏治脾勞虚寒氣脹咽滿食不下通噫宿食臭呉茱茰湯洗一兩三分白术五兩一分猪膏五兩宿薑汁八兩右搗茱茰白术二味為末納薑汁膏中煎成膠飴每服大匙食前溫酒調下引氣湯治肺勞實熱氣喘鼻張面目苦腫陳皮五錢細辛白术桂心各三兩紫蘇一兩麻黄去節杏仁麸炒去皮尖石膏八兩半夏製各一兩一分右剉散每服四錢水一盞薑七片竹葉五片煎七分去滓食後服人參厚朴湯治肺勞虚寒心腹冷氣逆遊氣胸脇氣滿從胸達背痛嘔逆飲食即吐虚乏不足人參厚朴製炙草各二兩桂心四兩半夏製五兩陳皮麥冬去心各三兩右剉散每服四錢水二盞薑七片去滓食前服痛加當歸梔子湯治腎勞實熱小腹脹滿小便赤黄末有餘瀝數而少莖中痛隂嚢生瘡梔子仁白芍藥通草石葦各三兩滑石八兩紫蘇四兩熟地黄榆白皮各五两右剉散每服四錢水盞半淡竹葉七片煎七分去滓不時服五加皮湯治腎勞虚寒恐慮失志傷精損髓嘘吸短氣遺泄白濁小便赤黄隂下濕痒腰脊如折顔色枯悴五加皮十兩丹參八兩石斛酒浸六兩杜仲酒浸炒去絲附子炮各五兩牛膝酒浸秦艽川芎防風桂心獨活茯苓各四兩麥冬地骨皮各三兩米仁一兩右剉散每服四錢水盞半薑五片大麻子一撮研碎同煎七分去滓食前服六極証治臟猶庫藏主秘藏腑猶會府主轉輸臟實則腑無不實腑虚則臟亦因而致虚故六極者由腑虚致臟虚隂陽失度榮衛走散無以養筋脉皮肉骨髓故六極物皆極極者窮極之謂也與洪範六極同意犀角地黄湯治筋實極軟而兩脇下痛不可轉動脚下滿不得逺行脚心痛不可忍手足爪甲青黒四肢筋急煩滿生地犀角各一兩乾葛𤣥參梔子升麻大黄蒸各五錢芍藥一兩五錢右剉散每服四錢水盞半煎七分去滓不時服惡寒體痛加麻黄頭痛加石膏五錢煎烏蔴酒治筋脉虚極好悲思嘘呼四肢脚手拘攣伸動縮急腹内轉痛十指甲痛數轉筋甚則舌卷嚢縮唇靑面色蒼白不得飲食烏蔴十兩人參防風茯苓細辛秦椒黄茋當歸牛膝桔梗各一兩半乾地黄丹參山藥礬石煆各三兩山茰肉川芎各二兩麻黄去節白术各二兩半五加皮乾薑各五兩大棗鍾乳粉製各三兩右剉散以小袋盛清酒二斗半同浸五宿溫服三合日再服地黄湯治脉實極氣衰血竭唇焦髪落好怒唇舌赤甚則言語不悟色不澤飲食不為肌膚麥門冬生乾地黄各五兩人參茯苓芍藥各三兩萎􅅋四兩石膏六兩逺志肉十兩甘草炙二兩白术三兩右剉散每服四錢水盞半煎七分去滓服防風丸治脉虚極則欬欬則心痛喉中介介如哽甚則咽腫防風桂心通草茯苓人參逺志去心炒甘草炙麥冬白石英各三兩右為末蜜丸如桐子大食前酒服二十丸石楠散治肉實極肌瘅淫淫如鼠走津液脫腠理開汗大泄或不仁四肢急痛或復緩弱唇口壊皮膚變色石楠一兩一分天雄炮去皮臍山藥桃仁製炒去皮尖芍藥甘菊炙草各一兩升麻萎􅅋各一兩五錢黄茋辰砂另研各三分石膏二兩山茰肉一兩三分右為末每服二大錢食前溫酒調下大黄茋湯治内虛極體重怠惰四肢不欲舉闗節疼痛不嗜飲食食則欬欬則右脇下痛隂引背及肩不可轉動黄茋桂心巴㦸去心石斛酒浸澤瀉茯苓乾薑炮各三兩防風獨活人參各二兩天雄炮去皮臍芍藥附子製半夏製細辛去苗白术黄芩括蒌根各一兩右剉散每服四錢水二盞薑七片煎七分去滓食前服前胡湯治氣實極喘息衝胸常欲自恚心腹滿痛内外有熱頻嘔不安甚則唾血氣短乏不欲食口燥咽乾前胡八兩半夏製麻黄去節湯泡白芍藥各四兩黄芩三兩枳實麸炒一兩右剉散每服四錢水二盞薑七片棗一枚煎七分服鍾乳散治氣虚極皮毛焦津液不通力乏腹脹甚則喘急氣短息塞晝差夜劇鍾乳粉煉成者另研附子製桔梗茯苓乾薑炮細辛去苗桂心人參各一兩一分白术一兩防風去义牡蠣煅𤓰蒌根各二兩半右為末每服二大錢溫酒調下食前服竹葉湯治精實極眼視不明齒焦髪落形衰遍身虚熱甚則胸中㾓痛煩悶泄精生地五兩芍藥四兩黄茋茯苓澤瀉炙草麥冬去心各三兩右剉散每服四錢水盞半薑三片淡竹葉三片煎七分去滓無時服磁石丸治精虚極尫羸驚悸夢中遺泄尿後遺瀝小便白濁甚則莖弱核㣲小腹裏急磁石龍齒煅蓯蓉酒浸茯苓各二兩人參麥冬去心逺志續斷赤石脂煅醋淬鹿茸酥炙各一兩半乾地黄三兩韮子炒栢子仁丹參各一兩一分右為末蜜丸桐子大食前溫酒下三十丸至五十丸三黄丸治骨實極耳鳴面色焦枯隱曲膀胱不通牙齒腦髓苦痛手足酸疼大小便秘黄芩六兩冬月三兩大黄二兩冬月半夏二兩黄連春四兩夏七兩秋六兩冬二兩右三味搗和蜜丸如荳大每服十丸至十五丸米湯送下鹿角丸治骨虚極面腫垢黑脊痛不能乆立氣衰髪落齒槁腰背相引痛甚則喜唾不了方見五痿門七氣叙論夫五臟六腑隂陽升降非氣不生神靜則寧神動則亂故有喜怒憂思悲恐驚七者不同各隨其本臟所生所傷而為病故喜傷心其氣散怒傷肝其氣激憂傷肺其氣聚思傷脾其氣結悲傷心包其氣急恐傷腎其氣怯驚傷胆其氣亂雖七診自殊無踰於氣黄帝曰余知百病之生於氣也但古論有寒熱憂恚而無思悲恐驚似不倫類予恐未然六腑無說恐胆有者葢是寄恒净府非轉輸例故能畜驚而為病七氣証治夫喜傷心者自汗而不可疾行不可久立故經曰喜則氣散怒傷肝者上氣不可忍時來盪心短氣不得息欲絶故經曰怒則氣擊憂傷肺氣心系急上焦閉榮衛不通夜卧不安故經曰憂則氣聚思傷脾者氣留而不行積聚在中脘不得飲食腹脹滿四肢怠惰故經曰思則氣結悲傷心包者善忘不識人置物在處還取不得筋攣四肢浮腫故經曰悲則氣急恐傷腎者上焦氣閉不行下焦回還不散猶豫不决嘔逆惡心故經曰恐則精却驚傷胆者神無所歸慮無所定說物不竟而廹故經曰驚則氣亂七者雖不同本乎一氣臟氣不行鬱而生涎隨氣積聚堅大始塊在心腹中或塞咽喉如粉絮吐不出嚥不下時去時來每發欲死狀如神靈所作逆害飲食皆七氣所生而成治之有方七氣湯治臟腑神氣不守正位為喜怒憂思悲恐驚悸鬱而不行遂聚涎飲結積堅牢有如痞塊心腹絞痛不能飲食時發時止半夏製五兩人參桂心炙草各一兩右剉散每服四錢水盞半薑七片棗一枚煎七分去滓食前服大七氣湯治喜怒不節憂思兼併多生悲恐或時震驚致臟氣不平增寒發熱心腹脹滿傍中兩膀上塞咽喉有如炙臠吐嚥不下皆七氣所生半夏製五兩白茯苓四兩厚朴薑製三兩紫蘇二兩右剉散每服四錢水盞半薑七片煎七分去滓食前服五噎証治夫五噎者即氣噎憂噎勞噎思噎食噎雖五種不同皆以氣為主謂氣噎者心悸上下不通噫噦不徹胸背痛謂憂噎者遇天隂寒手足厥冷不能自溫謂勞噎者氣上膈脇下脹滿胸中填塞攻背疼痛謂思噎者心怔悸喜忘目視􅍃􅍃謂食噎者食無多少胸中苦寒疼痛不得喘息皆由喜怒不常憂思過度恐慮無時鬱而涎涎與搏升而不降逆害飲食五膈相同但此在咽嗌故名五噎五噎散治五種噎飲食不下胸背痛嘔噦不徹攻刺疼痛淚與涎俱出人參茯苓厚朴枳殻麸炒桂心炙草白术訶子炮去核白薑炮陳皮三稜炮神麯炒麥芽炒各二兩木香炮梹榔莪术炮各五錢右為末每服二錢水一盞薑三片棗一枚煎七分空心溫服湯㸃亦得沉香散治五噎五膈胸中久寒諸氣結聚嘔逆噎塞飲食不化結氣不消常服寛氣通噎白术茯苓各五錢木通當歸陳皮青皮大腹皮大腹子梹榔芍藥各一兩甘草一兩五錢白芷三兩蘇葉四兩枳殻三兩沉香一兩右為末每服二錢水一盞薑三片棗一枚煎七分空心服嘉禾散治中滿下虚五噎五膈脾胃不和胸膈痞悶脇肋脹滿心腹刺痛不思飲食如中焦虚痞不任攻擊臟府虚寒不受峻補或因病氣衰不復稟受怯弱不能多食尤宜服之枇杷葉去毛薑汁塗炙米仁炒砂仁人參茯苓各一兩石斛細剉酒拌炒藿香杜仲去皮薑汁塗炙㣲焦隨風子如無以小訶子代之各三分榖芽炒白豆䓻㣲炒五味子㣲炒桑皮丁香大腹子㣲炒青皮各五錢半夏餅炙黄神麯各一分炙草一兩半陳皮白术炒各二兩右為末每服二錢水一盞薑三片棗三枚煎七分食後溫服五噎入乾柿一枚同煎十服見效膈氣吐逆羸困入薤白三寸棗五枚同煎鹽津丸治五瘧八痞獨頭蒜不拘多少每個開七竅入去皮江子七粒濕紙裹煨研為膏非大蒜也右為末用蒜膏為丸如桐子大先嚼鹽少許令生津液乾嚼二粒漸加三丸至五丸臨卧服廣五行記永徽中有僧維則病噎不能食語弟子曰我死之後便可開我胸喉視有何物言絶而卒弟子果開視胸中得一物形似魚而有兩頭遍體皆肉鱗置器中跳躍不止或戯以諸味皆隨化盡時夏中藍盛作澱有一僧以澱置器中此蟲遂繞器中走須㬰化為水此乃生瘕非五噎比後人因以治噎矣五膈証治病有五膈者胸中氣結津液不通飲食不下羸痩短氣名戞膈中脘寔滿噫則醋心飲食不消大便不利名思膈胸脇逆滿噎塞不通嘔則筋急惡聞食臭名怒膈五心煩熱口舌生瘡四肢倦怠身重發熱胸痺引背不能多食名喜膈心腹脹滿咳𠻳氣逆腹下若冷當鳴繞臍痛不能食名恐膈此皆五情失度動氣傷神致隂陽不和結於胸膈之間病在膻中之下故名五膈若在咽嗌即名五噎治之五病同法五膈丸治憂恚思慮膈塞不通及食冷物即發其病苦心痛不得氣息引背痛如刺心下堅大如粉絮𦂳痛欲吐吐即飲食不下甚者手足冷短氣或上氣喘急嘔逆悉主之麥冬炙草各五兩人參四兩川椒炒出汗逺志肉炒細辛去苗桂心各三兩炮薑二兩附子製一兩右為末蜜丸彈子大含化日三夜二胸中當熱七日愈亦可丸如桐子大米湯下二三十丸延年方夏加麥冬甘草人參各一兩經心錄以吳茱茰代桂遇寒冷則心痛咽中有物咯不出嚥不下飲食減少並可服寛膈丸治氣不升降胸膈結塞木香三稜青皮各五錢大腹子一分製半夏三分右為末薑汁糊為丸如桐子大食後米湯下二十丸嘉禾散沉香散二方并見前五噎門三因極一病証方論卷八
