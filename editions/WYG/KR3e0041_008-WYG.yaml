body:
  text: 三因極一病証方論卷八宋陳言撰内所因論夫臟腑合手足三隂三陽為十二經各有所主故為十二官心者君主之官神明出焉肺者相傅之官治節出焉肝者將軍之官謀慮出焉脾者諫議之官公正出焉腎者作強之官伎巧出焉膽者正中之官决斷出焉膻中者臣使之官喜樂出焉小腸者受盛之官化物出焉大腸者傳送之官變化出焉胃者倉廩之官五味出焉三焦者决凟之官水道出焉膀胱者州都之官津液藏焉氣化則能出矣故五臟為隂六腑為陽此十二官不得相失者正猶隂陽消息盈虚當隨四序而調養之不可使其偏勝偏勝則偏復偏復則偏害勝尅流變則真病生焉夫隂陽虚實者乃臟腑更相勝復也若其子母相感則母虚能令子虚子實能令母實經曰實則瀉其母虚則補其子如肝實則瀉腎肝虚則補心如百姓足君孰與不足此經之本意也難經反是及觀金匱之論其得為多肝虚補用酸助用焦苦益用甘味之藥酸入肝焦苦入心甘入脾脾能制腎腎氣㣲弱則水不行水不行則心火盛心火盛則肺金受制肝氣乃舒肝氣舒則肝病自愈此補子之意也肝虚則用此實則反之千金亦云肝虚當補心心旺則感于肝皆此類也此正本臟十二官冷熱盈虚則為病非外感淫邪及故為背理之比然内所因唯屬七情交錯愛惡相勝而為病能推而明之此約而不濫學者宜留意焉内所因治論論云治傷寒有法醫雜病有方方即義方法即法令外病用法令猶肝邪外擾非刑不除内病用義方猶父子兄弟不是以禮格之而已故内外之治由是而分外邪難辨當以例明内証易知只叙方証學者不可不審胆肝經虚實寒熱証瀉肝湯治肝實熱陽氣伏邪脇痛忿忿悲怒發熱喘逆滿悶目痛視物不明狂悸非意而言乍寛乍急所作反常前胡去苗柴胡秦皮去粗皮細辛山梔黄芩升麻􅅋仁决明子等分右剉散每服四錢水二盞苦竹葉車前葉各五片煎半盞内藥再煎至八分去滓入芒硝一錢匕鎔無時服瀉胆湯治膽實熱及洒洒惡寒腹中氣滿脇下硬口苦咽乾頭疼不欲飲半夏三兩生地黄五兩酸棗仁二兩五錢甘草炙黄芩各一兩逺志去心薑汁炒茯苓各二兩右剉散每長流水一斗糯米一升煮蟹眼沸揚二三千遍澄清每用二盞炒藥四錢匕薑七片煎七分去滓不時服補肝湯治肝虚寒兩脇滿筋急不得太息寒熱腹滿不欲食飲邑邑不樂四肢冷發嗆心腹痛目視􅍃􅍃或左脇偏痛筋痿脚弱及治婦人心痛乳􅏴膝熱消渇爪甲枯口面青山茱茰甘草桂心各一兩細辛茯苓桃仁栢子仁防風各二兩川烏頭泡去皮臍五錢右剉散每服四大錢水盞半薑五片棗三枚煎七分去滓空心服溫胆湯治胆虚寒眩厥足痿指不能搖躄不能起僵仆目黄失精虚勞煩擾因驚胆懾奔豚在胸中喘浮腫不睡半夏製麥冬去心各一兩半茯苓二兩棗仁三兩炙草桂心逺志去心薑汁炒黄芩萆􅐺人參各一兩右剉散每服四錢用長流水一斗糯米煮如瀉肝湯法一方見虚煩門心小腸經虚實寒熱証治瀉心湯治心實熱心下痞滿身重發熱乾嘔不安腹中雷鳴淫溲不利水榖不消欲吐不吐煩悶喘急黄連去毛二兩半夏製三兩黄芩炙草人參各一兩炮薑一兩五錢右剉散每服四錢水二盞棗三枚煎七分去滓服并治霍亂若寒加附子一枚泡去皮臍若渇加𤓰蒌根嘔加陳皮痛加當歸客熱以生薑代乾薑清脉湯治小腸實熱身熱手足心熱汗不出心中煩滿結塞不通口瘡身重柴胡澤瀉橘皮芒硝枳實麸炒黄芩升麻旋覆花生地黃各等分右剉散每服四錢水一盞半煎七分去滓下芒硝再煎無時服茯苓補心湯治心虚寒痛若悸恐不樂心腹痛難以言心寒恍惚喜悲愁恚怒衂血面黄煩悶五心熱渇獨語不覺咽喉痛舌本強冷汗出善忘恐走及治婦人懐姙惡阻嘔吐眩暈四肢怠惰全不納食白茯苓人參前胡半夏川芎各三分橘皮枳殻紫蘇桔梗炙草乾葛各五錢當歸一兩三分白芍二兩熟地一兩五錢右剉散每服四錢水一盞半薑五片棗一枚煎七分去滓食前服分氣補心湯治心氣鬱結仲悸噎悶四肢浮腫上氣喘急大腹皮炒香附炒去毛白茯苓桔梗木通炙草川芎前胡去苗青皮枳殻於术各三分細辛去苗木香各五錢右剉散每服四錢水一盞薑三片棗一枚煎七分去滓食前溫服溫腸湯治小腸虚寒苦頭偏痛耳項疼下痢赤白腸滑腹中痛裏急後重乾薑五錢當歸黄栢地榆各一兩阿膠麸炒茴香炒石榴皮黄連各一兩右剉散每服四錢水一盞半煎七分去滓溫服脾胃經虚實寒熱証治清脾湯治脾實熱病苦足寒脛熱腹脹滿煩擾不卧舌本強體重而黄頭痛右脇滿痛偏脹口唇燥裂寒熱如瘧茯苓陳皮草果去皮白术各二兩人參桂心白芷炙草川芎各一兩半夏二兩洗七次右剉散每服四錢水二盞薑七片紫蘇三葉煎七分去滓服欲通利加大黄平胃散治胃實熱口唇乾嘔噦煩悶大小便秘澁及熱病後餘熱不除畜於胃中四肢發熱口渇胸滿無汗厚朴製射干米泔浸升麻茯苓各二兩半芍藥二兩枳殻麸炒大黄蒸炙草各一兩右剉散每服四錢煎七分去滓空心服補脾湯治脾虚寒病泄瀉腹滿氣逆嘔吐心煩不得卧腸鳴虚脹飲食不消勞倦虚羸喜噫四肢逆冷多卧少起情意不樂人參茯苓草果去皮炮薑各一兩麥芽炒甘草炙各一兩五錢製厚朴陳皮白术各三分右剉散每服四錢水一盞半煎八分去滓食前服養胃湯治胃虚寒脛寒不得卧淅浙惡風洒洒惡寒腹中痛虚鳴寒熱如瘧唇口乾面目虚浮嘔噦吐瀉四肢疼痛不思飲食或傷寒濕骨節皆痛厚朴製藿香半夏製茯苓各一兩人參炙草附子製陳皮各三分草果去皮白术各五錢右剉散每服四錢水盞半薑五片棗一枚烏梅半個煎七分去滓空心服常服溫胃消痰進食下氣辟寒疫肺大腸經虚實寒熱証治清肺湯治肺實熱肺􅏴汗出若露上氣喘逆咳𠻳咽中塞如嘔狀短氣客熱或吐濃血冬𤓰子仁三分薏苡仁防已杏仁去皮尖各五錢雞子白皮一分右剉散每服四錢先以葦葉切半握水二盞煎盞半入藥煎七分去滓食前服瀉白湯治大腸寔熱腹脹不通挾臍痛食不化喘不能久立口生瘡陳皮淡竹葉黄芩梔子仁栢皮炙各一兩半茯苓芒硝各一兩生地五兩右剉散每服四錢水盞半薑三片棗一枚煎七分空心服補肺湯治肺虚寒逆滿上氣咽中悶塞寒從背起口中如含氷雪語無音聲舌本乾燥吐沫唾血不能飲食欵冬花紫苑茸白石英桂心人參各一兩桑白皮炙四兩五味子鍾乳粉各一兩半麥冬去心二兩右剉散每服四錢水一盞半薑五片棗三枚粳米一撮同煎七分去滓食前服固腸湯治大腸虚寒利下青白腸中雷鳴相逐大便不節小便赤黄氣上冲胸不能久立身腫腹急當臍痛悉主之石榴皮五錢黄連炒地榆各一兩鶯粟殻醋炙茯苓各一兩半右剉散每服四錢水盞半薑五片烏梅一枚煎七分去滓空心服腎膀胱經虚實寒熱証治清源湯治腎實熱小腹脹滿四肢正黑耳聾骨熱小便赤黄腰脊離觧及伏水等証茯苓黄芩菖蒲各五兩𤣥參細辛大黄水浸一宿甘草各二兩磁石八兩煆醋淬右剉散每服四錢水一盞煎七分去滓熱服瀉脬湯治膀胱實熱腰脊痛閉塞不通舌乾咽腫悉主之茯苓梔子仁知母各三兩生地黄淡竹葉各五兩石膏八兩煆右剉散每服四錢水盞半煎七分入蜜半匙煎兩沸熱服須利加芒硝一錢溫腎湯治腎虚寒隂痿腰脊痛身重腰軟弱足腰不可以按語音混濁陽氣頓絶乾熟芐一觔肉蓯蓉酒浸麥門冬去心牛膝酒浸五味子巴㦸天去心甘草炙各八兩茯苓乾薑泡去皮五兩杜仲去皮剉薑汁淹炒去絲凈三兩右為末每服二錢酒調下空心日二三服補脬湯治膀胱虚冷脚筋急腹痛引腰背不可屈伸耳聾目􅍃􅍃坐欲倒小便數遺白面黒如炭黄茋白茯苓各一兩五錢杜仲去皮薑汁炒磁石煆淬五味子各三兩白术白石英搥碎各二兩半右剉散每服四錢水一盞半煎七分去滓空心服心主三焦經虚實寒熱証治清胆湯治右腎實熱身熱脊脇相引痛足冷小便黄赤如梔子蘖汁每欲小便即莖頭痛榆白皮冬葵子各五兩石葦四兩去毛黄芩通草瞿麥各三兩右為粗末先以水二盞入車前葉數片煎至盞半入藥末四錢再煎七分去滓溫服潤焦湯治三焦實熱目銳眥急痛腰脇熱脊背連胆中煩悶飲食不進頭面汗出闗格不通不吐不下或氣逆不續走哺不禁或泄瀉溺澁淋瀝地骨皮半夏柴胡澤瀉各五兩麥冬茯苓炙草人參各一兩右剉散每服四錢水二盞薑五片竹茹如指大煎七分去滓空心服益志湯治右腎虚寒小便數腰脇引痛短氣欬逆四肢煩逆耳鳴面黑骨間熱夣遺白濁目眩諸虚困乏鹿茸酥塗炙去毛巴㦸去心甘草炙各八兩茯苓乾薑泡去皮五兩杜仲枸杞子乾熟地酒浸肉蓯蓉酒浸牛膝酒浸桂心附子製防風去叉山茰肉白芍藥甘草炙等分右剉散每服四錢水盞半薑五片鹽少許煎七分去滓食前服安中散治三焦虚寒短氣不續腹不安食隨即洞下小便赤濁精洩不禁脚脛酸疼小腹脹滿熟地黄巴㦸去心龍骨各二兩逺志肉茯苓各三兩天雄泡去皮臍五味子山藥各三兩半蓯蓉酒浸續斷蛇床子酒浸各四兩右為細末每服二錢溫酒調下夫三焦屬精藏府精以養身係累於心脾腎三經人多以醉飽心虚而合隂陽故此病作惟謹之為得三焦精府辨証古人謂左腎為精府其府膀胱右腎為命門其府三焦三焦者有脂狀如手大正與膀胱相對有二白脉自中出夾脊而上貫於腦所以經云丈夫藏精女子繫胞以理推之三焦當如上說有形可見為是扁鵲乃云三焦有位無形其意以為上中二焦如漚如霧下焦如瀆不可遍見故曰有位無形而王叔和輩失其㫖意遽云無狀空有名俾後輩䝉繆不已且名以名實無實奚名果其無形尚何以藏精繫胞為哉其所謂三焦者何也上焦在膻中内應心中焦在中脘内應脾下焦在臍下即腎間動氣分布人身有上下中之異古人湛寂慾想不興則精氣散在三焦榮華百脉及其想念一起慾火熾然翕撮三焦精氣流溢命門輸瀉而去故號此府為精府耳學者不悟可為長太息痼冷積熱証治夫以臟府禀賦不同亦有將理失宜遂至偏冷偏熱故方論中有痼冷積熱之說痼冷者中寒也多因真氣既㣲胃氣不實復啖生冷氷雪之屬致腸胃虚寒隂既停凝陽不能正大便洞泄小便頻澁并鼻多清涕嘔吐涎沫水榖不化洒洒淅淅者陽虚隂盛之所為也積熱者臓府燥也多因精血既衰三焦煩壅復餌丹石酒炙之屬致腸胃蘊毒陽氣熾盛隂不能制大便秘澁小便赤淋口苦咽乾涎稠眵涕飲食無度煇煇熇熇皆隂虚陽盛之所為也治各有方金液丹固真氣煖丹田堅筋骨強陽道除久寒痼冷補勞傷虚損治男子腰腎久冷心腹積聚脇下冷癖腹中諸蟲失精遺溺形羸力弱脚膝疼痛冷風頑痺上氣衂血咳逆寒熱霍亂轉筋虚滑下利又治痔瘻濕䘌生瘡下血不止及婦人血結寒熱隂蝕疽痔硫黄十觔先飛揀去沙石杵研為末用磁合盛以水和赤石脂封口鹽泥固濟晒乾地内先埋以小罐子盛水令滿放合子在上用泥固濟訖慢火養七日夜候足加頓火一煅俟冷取出研為細末每一兩用炊餅一兩湯浸握去水為丸如桐子大每服三十丸多至百丸溫米飲下空心服之又治傷寒隂証身冷脉㣲手足厥逆或吐或利自汗不止或小便不禁不拘丸數併服得身熱脉出為度震靈丹補虚壯氣煖腎祛邪益精髓溫脾胃進飲食悅顔色治真氣虚􅉵臍腹冷痛肢體酸疼腰背拘急脚膝緩弱面色痿黄目眩耳鳴心怔氣短大便自利小便頻數口乾煩渴飲食無味又治婦人崩中帶下三十六病小兒驚疳及一切痼冷風虚悉主之常服育神養氣輕身延年此