body:
  text: 三因極一病証方論卷十五宋陳言撰瘰􅊓証治夫九漏形疹皆瘰􅊓於項腋之間發作寒熱其根在臟府千金所叙雖名九漏别録方証其名更多狼漏根於肝得之憂怒鼠漏根於胃得之食鼠毒螻蛄漏根於大腸得之食菓蜂漏根於脾得之飲流水有蜂毒蚍蜉漏根於腎得之食中有蚍蜉毒蠐螬漏根於心得之喜怒哭泣浮蛆漏根於膽得之思慮瘰􅊓漏根於腎得之新沐髪轉脉漏根於小腸得之驚卧失枕等因之証文義不明未知所始若以理例較之怒根在肝鼠毒在胃食菓𤓰在大腸蜂水在脾姑且通俗易曉如轉脉因驚根當在膽却云在小腸浮蛆因思慮根當在脾却云在膽瘰􅊓因沐髪亦不當在腎名義不通似難考據又况喜怒蠐螬之名思慮浮蛆之名此尤不可曉也其外更有風漏冷漏蝎漏蟻漏蜣螂漏蚯蚓漏蝦蟆漏等名狀不一諒皆出於土俗隨象命名難以考據治之之法觀其未著於肌肉而外為膿血者從本引末可使針之炙之敷之觧之從其所因宣通本臓皆有成法千金又有决死生反其目視其中有赤脉從上貫瞳子見一脉一嵗死一脉半一嵗半死二脉二嵗死三脉三嵗死赤脉不下貫瞳子可治雖有是説騐之病者少有是証亦難考據此徃徃是三陽傳諸隂經方有之若非臓發未必有是學者知之必勝丸治瘰癧不論年深日近及腦後両邉有小結核連復數箇及癆瘵腹中有塊鯽魚一箇去子及腸肚入雄黄一枚如雞子大硇砂一錢在腹内仰安魚於炭火上燒煙盡取出以全蜈蚣一條蓬术五錢梔子五箇皂角二挺並燒萆蔴子五箇去皮燈上燒更用黄明膠二條皂角二挺去皮酥炙右為末别用皂角二挺去皮搥碎以水三碗揉汁去渣煮精羊肉四両爛軟入輕粉五匣男子乳汁半両同硏為膏和藥末丸如菉豆大硃砂為衣温酒清晨下十丸日一服至脱下肉疙瘩為效若項有五箇則以五服藥取之視其所生多少以為服數既可更進數服如熱毒瘡􅟻未有頭腦者一服亦須消散白花蛇散治九漏瘰癧發於項腋之間増寒發熱或痛或不痛白花蛇酒浸軟去皮骨焙乾二両生犀角鎊五錢黑牽牛五錢半生半用炮青皮五錢右為末每服二錢膩粉五分研匀五更時糯米飲調下已時下惡物乃瘡之根也更候十餘日再進一服忌發風壅熱物如已成瘡一月可效用之神騐四聖散治瘰癧用白花蛇散取效後須用此補之永去其根海藻洗石决明煅羌活瞿麥穗各等分右為末每服二錢米湯調下日三服下清水盡為度蝸牛散治瘰癧已潰未潰皆可貼蝸牛不拘多少以竹索串瓦上晒乾燒存性右為末入輕粉少許猪骨髓調用紙花量病大小貼之一法以帯殻蝸牛七箇生取肉入丁香七枚於七殻内燒存性與肉同硏成膏用紙花貼之旱蓮子丸治少長臓氣不平憂怒驚恐諸氣抑鬰結聚瘰癧滯留項腋及外傷風寒燥濕飲食百毒結成諸漏發作寒熱偏於項腋無問乆近悉主之旱蓮子連翹子威靈仙何首烏蔓荆子京三稜醋浸濕紙裹煨赤芍藥各一両木香二両大皂角三挺去皮酥灸無酥用羊脂灸右為末糊丸桐子大建茶清下三十丸至五十丸日三服小兒量與之食後服癭瘤証治夫血氣凝滯結癭瘤者雖與癰疽不同所因一也癭多著於肩項瘤則隨氣凝結此等皆數年深逺浸大浸長堅硬不可移者名曰石癭皮色不變即名肉癭筋脉露結者名筋癭赤脉交絡者名血癭隨憂愁消長者名氣癭五癭皆不可妄决破决破則膿血崩潰多致夭枉瘤者有六骨瘤脂瘤肉瘤膿瘤血瘤亦不可决潰肉瘤尤不可治治則殺人惟脂瘤破而去其脂粉則愈破結散治石癭氣癭勞血癭憂癭等証海藻洗龍膽海蛤通草昆布礬石煆枯松蘿各三分麥麯四両半夏右為末酒服方寸匕日三服忌鯽魚猪肉五辛生菜諸雜毒物十日知二十日愈白膏治一切風熱毒腫及臓氣鬰結丹石發動結為癰疽瘰癧諸瘡腫未潰即令消散九漏浸淫膿汁淋漓諸治不瘥者悉主之白蘞白􅅔白芨白芷薤白各五錢洗剉以清油一觔煎至半觔濾去渣入黄茋甘松藿香零陵香防風當歸各五錢再入煎油煎拾上火綿濾去渣再入定粉二両黄蠟三両寒水石煆水飛過二両硏細右再煎滴水成珠為度磁器盛之以腦子少許糁其上煎時忌鐵器以柳枝攪附骨疽証治附骨疽與白虎飛尸歴節風皆相類歴節則走注不定白虎飛尸痛淺按之則止附骨疽痛深按之無益又一説白虎飛尸亦能作膿著骨而生及其腐潰碎骨盡出方愈如是則附骨疽與白虎飛尸是一病但淺深不同耳白虎飛尸俗名風煞然病附骨疽少有骨出者宣㧞毒氣不可執泥一向五香連翹漏蘆之屬當先温腎如靈寳膏乃神藥惟在針烙淺深刺㧞其毒根則易愈不爾則順脉流走遍體紅腫卒致不救蟾蜍膏治附骨疽乆不瘥膿汁敗壊或骨從瘡孔出大蝦蟆一隻亂髪一把如雞子大猪脂油一觔右同煎二物畧盡濾去滓凝如膏貼之凡欲貼瘡須先以桑白皮烏豆煎湯淋洗拭乾以龍骨煅為粉糁瘡四邉令易收然後方用膏貼黒鯽膏治附骨疽膿熟已破未破或膿出不愈黒色鯽魚一箇去腸肚入白鹽令細線縫之右銅石器中煮一盞水盡魚乾焦為末脂油調敷已破則乾糁少有痛意勿怪赤术丸治附骨疽膿出淋漓乆乆不瘥已破未破皆可服赤术一觔米泔浸三宿取出洗净晒乾再以天蔴腐汙浸水十餘日許入川椒二十一粒葱白七根煮黒取出洗净焙乾破故紙炒川練子剉炒茯苓舶上茴香炒杜茴香白芷桃仁去皮尖炒各半觔右為末煉蜜丸桐子大每服五十丸温酒鹽湯任下一方用槲樹皮燒灰為末餘方寸匕又方用蜜陀僧為末以猪骨髓調敷之兼治漏痔不愈疔瘡証治世醫諸傷寒在諸風之前癰疽冠雜病之首言此二証重大急切然方論疔瘡又在癰疽之先其意謂急切甚矣但江左少見少病醫者不以為事病源既有不可不知且依千金類例具列於後既不能究其源亦不敢有改作一曰麻子疔肉上起頭如黍米色稍黑四邉㣲赤多癢忌食麻子及麻衣入麻田中行二曰石丁度因相連色烏黒如黒豆甚硬刺之不得入肉隠隐㣲痛忌瓦礫磚石之屬三曰雄疔皰頭黒黶四畔仰瘡皰漿起有水出色黄大如錢孔忌房事四曰雌疔瘡頭稍黄向裏黶亦赤似灸病四畔皰漿起似錢孔色赤亦忌房事五曰火疔狀如湯火燒灼瘡頭黒黶四邉有泡漿起如赤粟米忌火爍灸六曰爛疔色稍黒有白斑瘡中潰潰有濃水流出瘡形大小如匙面忌食沸爛等物七曰三十六疔頭黒浮起形如黒荳四邉起大赤色今日生一明日生二三日生三若滿三十六疔藥所不治俗名黒泡忌嗔怒蓄積愁恨八曰蛇眼疔瘡頭黒皮上浮生形如小荳状似蛇眼大體硬忌惡眼㸔之并嫉妬人見反毒九曰鹽膚疔狀如匙面四邉皆赤有黒粟粒起忌醎食十曰水洗疔狀如錢或如錢孔瘡頭大裏黒黶汗出中硬忌飲漿水水洗渡河十一曰刀䥥疔瘡濶狹如韮葉大長一寸左側肉黒如燒灼忌刺及刀䥥切割鐵刅所傷可以藥治十二曰浮漚疔瘡體曲圓少許不合長而濶如韮葉内黄外黒黒處刺不痛内黄處刺之則痛十三曰牛拘疔肉泡起掐不破此十三証初發必先癢後痛先寒後熱熱定又復發寒四肢浮腫沉重頭痛心驚眼花大重者嘔􅊇嘔􅊇則難治麻子疔始末唯癢所録忌者勿犯犯即難治浮漚疔牛拘疔無甚忌縱不治亦不殺人欲知犯觸但脊强痛極甚不可忍者是犯之狀也學者宜潛心焉治三十六種疔悉以此方治之以綿一片裹藥取匝為限亂髪雞子大攤布帛上牛黄如桐子大反鈎棘針二十一枚赤小荳七粒為末並布髪上捲緋帛作團外以髪作繩十字縛之熨斗中急火燒灰硏篩細以枸杞或子或根皮枝葉隨得為末用枸杞末二匕緋帛灰一匕硏匀分二服空心酒調下蒼耳散治一切疔腫神效方蒼耳根莖苖子但取一色便可用以一味燒為灰醋泔淀和如泥塗上乾即換之不過十度即能㧞根出矣腸癰証治癰疽初無定處隨其所發即便命名在外則為發背發腦在内則為腸癰内癰心癰腎癰肺癰臍癰等治得其法則生失法則死外症易識内症難明不可不偹述也腸癰為病其身甲錯腹皮急按之濡如瘇狀腹無積聚身無熱脉數此為腸内有膿乆積隂冷所成也故金匱用附子温之小腹腫痞按之痛如淋小便自調發熱身無汗復惡寒其脉遲𦂳膿未成可下之當有血脉洪數者膿已成不可下以内結熱所成也故金匱以大黄和之甚者腹乃脹大轉側聞水聲或繞臍生瘡或膿從臍出或大便出膿血不治必死其如五内生瘡亦止分别隂陽而已不比外癰須依四節八事之次第也千金引官羽林郎婦病醫診之其脉滑數滑則為實數則為熱滑則為榮數則為衛衛數下降榮滑上升榮衛相干血為敗濁小腹堅痞小便或濇或復汗出或復惡寒膿為已成設脉遲𦂳即為瘀血血下即愈更内經所載有息積病此見有得之二三年遍身㣲腫續乃大腸與臍連日出膿遂致不救此亦腸癰之類也薏苡附子敗醬散治脉數身無熱腹無聚積按之濡此為腸癰薏苡仁二両半附子炮五錢敗醬一両一分右㕮咀每服四錢水二盞煎七分去滓空心服以小便利為效大黄牡丹湯治腸癰小腹腫痞按之即痛小便自調時時發熱自汗出復惡寒其脉遲𦂳者膿未成可以下之當有血脉洪數者膿已成不可下大黄半両蒸丹皮一錢桃仁五錢去皮尖𤓰子三分芒硝二分右㕮咀為一服以水三盞煎八分去滓入芒硝再煎沸頓服無時薏苡仁湯治腸癰腸中㽲痛煩躁不安或脹滿不食小便濇婦人産後虚熱多有此病縱非癰但疑是便可服就有差訛亦無害薏苡仁五両丹皮桃仁各三両𤓰瓣仁四両右剉散每服四大錢水一盞半煎七分去滓服五痔証治經云腸澼為痔如大澤中有小山突出為痔於人九竅中凡有小肉突出者皆曰痔不特於肛門邉生亦有鼻痔眼痔牙痔等肛門中証狀非一方書分出五種曰牝曰牡曰脉曰腸曰氣牡痔者肛邉腫痛突出一枚五六日潰出膿血自愈牝痔者肛邉發㿔數箇如鼠乳狀脉痔者無頭脉中并小竅注下清血腸痔者生於腸内更衣時非挼搦不能入氣痔者遇憂怒則發肛門腫痛氣散則愈治之之法切勿用生砒毒氣入腹反至為患貴人遭此痛不忍言因書以戒後學五灰散治五痔不問内外牝牡寒濕悉主之鱉甲治牡痔蝟皮治牝痔猪左足懸蹄甲治腸痔蜂房治脉痔蛇殻治氣痔各等分右燒存性隨証倍一分為末水調二錢空心卧時一服薫法蝟皮方三指大切薫黄􅀥大研熟艾雞子大一團右為末用瓶器以灰實一半如燒香法安長桶内坐其上薫之煙從口出為佳凡三度薫永瘥勿犯風冷忌雞肉毒物洗法海桐皮剉蛇床子各一両香楠藤剉葱白切各三両右用水一斗入藥五両煎减半去滓候温着手輕輕洗以絹拭之乾一法止用槐白皮煎湯淋渫最妙貼藥蜀葵子五錢蝉退五箇梹榔一枚右為末以􅀥三枚取肉研細捜和藥末如覺硬滴蜜少許研成膏量大小貼病處辯腸風論夫有五痔人登圊則下血或㸃滴或洴箭或清或濁面黄脣白心忡脚弱頭目眩暈此因飽食坐乆腸澼所為亦有飲酒房勞過度所致醫多指此為腸風臓毒然腸風臓毒自屬滯下門臓毒即是臓中積毒腸風即是邪入臓純下清血謂之風痢今五痔下血乃是酒痔脉痔其血自肛門邉别有一竅如針孔大滴淋而下與洩物不共道不可不知烏連湯治脉痔下血不止量冷熱加减黄連烏頭泡去皮尖各等分右剉末毎服二錢水一盞半煎七分去滓空心服熱加黄連冷加烏頭酒連丸治酒痔下血伏暑乆治不效黄連不拘多少燎去鬚酒浸銀器中重湯煮漉出晒乾添酒煮七次止右為末以餘酒為丸如桐子大毎服五十丸米湯下加味四君子湯治五痔下血面黄心忪耳鳴脚弱氣乏口淡食不知味人参白术茯苓甘草炙黄茋扁荳蒸各等分右為末毎服二錢匕湯㸃服此方人未之信服者頗效所謂看不上手而自有竒效荆芥散治脉痔下血荆芥穗槐花炒焦各一両石菖蒲一両五錢右為末米飲調下空心服日二劑白玉丹治乆年腸痔下血百藥不效者凝水石煅不拘多少煅紅研細水飛再入煅窝中煅右糯米糊為丸如桐子大毎服陳米飲下五十丸只一服愈又方单服白梅亦效瘡痬証治瘡疥雖不致害人浸淫不已亦有數年不愈者多因心腎有虧傷神失志或飲食不節積滯腸胃致氣凝留發於肌肉皮膜之間色自極異所謂馬疥惡露反花瘑瘡腫状不同或癢或痛汁水淋漓愈而復發諸治不瘥要當調養心腎去腸間菀莝理無不愈升麻和氣飲治疥瘡發於四肢臀髀痛癢不常甚致増寒發熱攻刺疼痛浸淫浮腫及􅒃風入臓隂下濕耳鳴眼痛蒼术二両米泔浸桔梗升麻乾葛各一両陳皮八錢甘草芍藥各三分半夏製當歸二錢大黄五錢白芷茯苓各二分枳殻厚朴薑汁炒乾薑各五錢右剉散毎服四大錢水一半寸三片燈心十五寸煎七分去滓空心服天麻煎治風毒入胃及心腎經絡攻注百節疼痛頭目虚腫痰涎不利下注腰脚緩弱生瘡婦人血風男子􅒃風及風濕脚氣攻注皮膚搔癢癮􅇙偏正頭風川烏頭洗浄灰炒去皮尖草烏頭水浸三日洗去皮各四両荆芥穗半觔乾薄荷五両杜當歸水浸三日晒乾一觔右為末醋糊丸梧子大清茶下三十丸此方與癮􅇙門加味烏荆丸相類但此方入草烏併製法不同耳殺疥藥羊蹄根生切一両薑一分礬半分硫黄一分草烏一箇右以米泔浸一宿研極細入釅醋和勻入治時抓破敷之遲頃以温湯洗去絶妙百草膏治一切惡瘡不問乾濕痛癢日近年深百藥不瘥羊屎一味不拘多少上下以瓦盛葢蘖木燒令煙盡末之蔴油調敷癢者入輕粉少許痛者入麝香少許神效一法以杏仁輕粉等分研勻搽之最能殺蟲􅒃風証治男子精血不調外為風冷所襲以致隂中濕癢搔之不已流注於脚患生瘡瘍名曰􅒃風世謂腎臓風者乃認􅒃為腎也􅒃屬宗筋系於肝胃陽明養之陽明主肌肉循經流入四肢故使四肢生瘡正謂之􅒃風非腎臓風也四生散治􅒃風上攻下注耳鳴目癢鼻赤齒浮或作口瘡下注隂濕四肢搔癢遍體生瘡及婦人血瘡白附子沙苑蒺藜黄茋羌活各等分右為末毎服二錢塩酒調下有人將猪腎破開入塩糁藥於其間煨服亦佳􅒃屬宗筋胃陽明飬之故有是証烏頭煮塩丸治元臓氣虚􅒃風入胃上攻頭疼眼赤多淚昏濇口乾咽燥下注四肢歴節重着隂下濕癢足脛腰膝遍生瘡瘍及風水浮腫川烏頭洗净大者破開小者全用蒼耳吳茱茰各四両京三稜五錢白芷十二両用水煮四味候烏頭透控乾洗盡塩右為末米糊丸桐子大毎服五十丸空心温酒塩湯任下凡水病必忌塩此藥用塩無所忌升麻和氣飲治如前方見瘡瘍門天麻煎治如前方見瘡瘍門癬証治凡癬種類亦多所謂苔癬瓦癬荷葉癬雖以皮膚血氣凝滯所為或有血氣濕搏成者或為人傳染得之者種種不同治之各有方昨荷葉散治一切癬不問風濕氣血與夫相染而生者昨葉何草即瓦上松晒乾一兩枯礬五錢䧺黄五錢右為末以羊蹄菜根先蘸醋揩癬上令癢破即以藥末乗濕塗敷不過三両次即愈妒精瘡証治夫邏慾人多患妒精瘡者以婦人隂中先有宿精男子與之交接虚熱即成初發在隂頭如粟拂之則痛甚至両目出清膿作臼孔蝕之大痛婦人亦有此病生在玉門内正似疳蝕瘡不痛為異耳麝香散治妒精瘡麝香黄礬青礬各等分右為末小便後敷之白散子治妒精瘡癢不可忍者及皮膚諸瘡手搔諸瘡晉礬不拘多少煆輕粉毎服入少許右研勻糁瘡上立瘥如治漏瘡毎挑一錢入黄柏末一錢輕粉五分津調散治妒精瘡膿汁淋漓臭爛黄連欵冬花各等分右為末以地骨皮蛇床子煎湯洗用軟帛挹乾以津調藥敷之最忌不得用生湯洗諸瘡皆然蒲黄散治隂蝕瘡蒲黄三両水銀一両右研勻先以猪肉湯浸洗挹乾以藥参之一方治男女隂蝕以硫黄末敷之大風叙論經所載癘風者即方論中所謂大風惡癩是也雖名曰風未必皆因風大率多是嗜慾勞動氣血熱發汗洩不避邪風冷濕使淫氣與衛氣相干致肌肉憤䐜氣有所凝則肌肉不仁榮衛泣濁則拊熱不利故色敗皮膚爛潰鼻梁塌壊千金所謂自作不仁極猥之業雖有悔言而無悔心良得其情然亦有傳染者又非自致此則不謹之故氣血相傳豈宿業縁㑹之所為也原其所因皆不内固渉外所因而成也証候多端并見於後大風治法凡治大風皆推其所因况因風寒濕熱勞逸飲食與夫傳染不可混濫散寒濕風濕清熱調和氣血顯然不同若例以㵼風藥治之則失其機要矣昔見一僧得病狀如白􅒃卒不成瘡但毎旦起白皮一升許如蛇殻醫者謂多啖炙煿所致與局方觧毒雄黄丸三四服而愈豈非得其因邪治之第一浴法麻黄根地骨皮草烏頭各二両右為剉散研朴硝二両和勻每用藥二両水一桶椒一合葱三十莖艾葉一両同煎十沸入米醋一盞打勻去滓坐温室中且用手巾搭四肢候湯可浴即浴令汗透面上如珠流更坐室中或睡片時尤佳候汗觧方着衣避風而出五日再浴如此両三次便服換骨丹換骨丹九次鱉甲去裙海蜈蚣右以塩泥固濟候乾火煅存性為末巴豆五錢去皮膜順手研青州􅀥七箇去核入巴豆膏在棗中火煨令焦存巴豆五分性將􅀥巴豆爛研如泥入前二味末同研勻以醋煮糊為丸如菉豆大毎服七丸虚者四五丸用濕薺汁下候利惡物如膿血爛魚腸即止即此両三服未利更服一二丸次進遇仙丹遇仙丹人参紫蘓各一両苦参白殭蠶去嘴各二両右為末白麵糊丸桐子大毎服三十丸鹽湯吞下空心日二次服疏風散疏風散梔子一両半大黄滑石熟地懸豆右為末入朴硝五錢令勻毎服一錢食後淡茶清調下次以佛手膏去瘡佛手膏去黒紫瘡核斑猫七箇去翅足巴豆七粒去皮杏仁二十七粒去皮尖紅娘子二十七箇去翅足砒一錢另研盆硝一錢黄蠟韶粉瀝青研各五錢硫黄黄丹各三錢膩粉炒一両菉豆一合槐角三條麻油四両亂髪一両右用油煎令髪化次下紅娘子次下巴豆槐角等逐味下焦者漉出方下硫黄盆硝丹粉等以箆子不住手攪令自滴水成珠為度用時先将針輕手刺瘡核用藥一粟米大放針處次日擠瘡有黒臭膿血三両日血漸少次服去毒丹去毒丹赤芍藥甘草滑石各五錢巴豆去皮炒别研後入黒牽牛一両半生半炒大黄朴硝各一分右為末麵糊丸菉豆大臨卧時服十五丸金銀花薄荷湯下加至二三十丸次服甘草㪚甘草散炙草滑石各五錢山豆根一兩生大黄一錢生右為末毎服一錢蜜熟水調下日二服次服觧毒丸觧毒丸瓜蒌根三両甘草五錢炒大黄一分生朴硝一分另研右為末麵糊丸如菉豆大毎服二十丸至三十丸白湯下次服福神丹福神丹訶子四箇炮巴豆炒黒牽牛各五錢甘遂三錢生赤小豆四十九粒右為末麵糊丸如菉豆大毎服十丸至十五丸薄荷湯下次用水膏藥水膏藥敷貼破處及足面足上瘡令生肉陳皮去灰土半觔炒紫色陳米半升炒紫藿香馬蹄香各一両麝香一錢另研右同為末入麝香用冷水調掃敷瘡上有膿處如損破即煎槐枝湯洗再上藥此十方倪處士所傳甚騐大要病人須能如法將息理㑹敬而信之通天再造散治大風惡疾鬰金五錢生大黄一両炮白牽牛六錢半生半炒皂角刺一両炮經年黒大者右為末毎服五錢日未出面東以無灰酒下盡量為度脱利黒頭小蟲病稍輕者止利如魚腸臭惡物忌毒半月但食稠粥軟飯漸生眉毛皮膚如常甚者不過三両次須將理不可妄有勞動及終身不得食馬驢騾等肉犯者死不救三濟丸治如前當歸熟地川芎荆芥各二両防風細辛各一両桂心一分右㕮咀先以醋一升浸一宿漉出焙乾再以生地黄一觔搗汁浸一宿焙乾酒一升浸一宿旋入乳香五錢以餘酒醋地黄汁釋蒸餅為丸如桐子大用川烏一箇炮裂剉荆芥穗五錢浸酒三升旋温下藥五十丸
