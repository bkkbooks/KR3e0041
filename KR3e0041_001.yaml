body:
  text: 三因極一病証方論卷一宋陳言撰脉經序學醫之道須知五科七事五科者脉病証治及其所因七事者所因中復分為三博約之説於斯見矣醫學者脉為醫門之先雖流注一身其理甚微妙廣大配天地變化合陰陽六氣緯虗五行麗地無不揆度是以聖人示教有精㣲氣象之論後賢述作為太素難經之文仲景類集於前叔和詮次於後非不昭著六朝有高陽生者剽竊作歌訣劉元賔從而解之遂使雪曲應稀巴歌和衆經文溺於覆没正道翳於詖辭良可歎息今乃料簡要義别白討論分人迎氣口以辨内外因列表裏九道以叙傷感病証六經不昧五臓昭然識病推因如指諸掌類眀條備文畧義詳倘能留神則思過半矣學診例凡欲診脉先調自氣壓取病人脉息以候其遲數過與不及所謂以我醫彼智與神㑹則莫之敢違凡診脉須先識脉息兩字脉者血也息者氣也脉不息動為氣使然所為長則氣治短則氣病也凡診須識人迎氣口以辨内外因其不與人迎氣口相應為不内外因所謂闗前一分人命之主凡診先識五臓六腑本脉然後方識病脉嵗主害臓氣候逆傳陰陽有時與脉為期此之謂也凡診須認識二十四字名狀與關前一分相符推識証狀與病者相應使無差忒庶可治療總論脉式經云診法常以平旦陰氣未動陽氣未散飲食未進經脉未盛絡脉調匀血氣未亂乃可診有過之脉或有作為當停寧食頃俟定乃診師亦如之釋曰停寧俟定即不可拘於平旦况倉卒病生豈待平旦學者知之經云切脉動静而視精明察五色觀五臓有餘不足六腑强弱形之盛衰可以參決死生之分釋曰切脉動静者以脉之潮㑹必歸於寸口三部診之左闗前一分為人迎以候六淫為外所因右闗前一分為氣口以候七情為内所因推其所自用背經常為不内外因三因雖分猶乃未備是以前哲類分二十四字所謂七表八裏九道七表者浮芤滑實弦𦂳洪八裏者㣲沉緩濇遲伏濡弱九道者細數動虗促結代革散雖名狀不同証候差别皆以人迎氣口一分而推之與三部相應而説証故脉贊曰闗前一分人命之主左為人迎右為氣口神門㫁決而在闗後而漢論亦曰人迎𦂳盛傷於寒以此推明若人迎浮盛則傷風虗弱沉細為暑濕皆外所因喜則散怒則激憂濇思結悲𦂳恐沉驚動皆内所因㸔與何部相應即知何經何臓受病方乃不失病機也其如診按表裏名義情狀姑如後説但經所述謂脉者血之府也長則氣治短則氣病數則煩心大則病進文藻雖雅義理難尋動静之辭有博有約博則二十四字不濫絲毫約則浮沉遲數總括紀綱辭理粲然故知浮為風為虗沉為濕為實遲為寒為冷數為熱為燥風濕寒熱屬於外虗實冷燥屬於内内外既明三因須别學者宜詳覽不可憚煩也經中所謂視精明者葢五臓精明聚於目精全則目明神定則視審審視不瞭則精明敗矣直視上視眩瞑眊瞑皆可兼脉而論病狀也所謂察五色者乃氣之華也赤欲如帛裹朱不欲如赭白欲如鵞羽不欲如鹽青欲如蒼玉之澤不欲如藍黃欲如羅裹雄黃不欲如黃土黒欲如重漆色不欲如地蒼五色精㣲象見矣其夀不乆也所謂觀五臓有餘不足候之五聲者臓之音中之守也中盛則氣勝中衰則氣弱故聲如室中言者是氣之澁也言㣲終日乃復言者是氣之奪也譫妄不避善惡神明之亂也鄭聲言語不相續陰陽失守也故曰得守者生失守者死是也所謂六腑强弱以候形之盛衰頭者精明之府頭傾視深精神奪矣背者胸中之府背曲肩隨府将壊矣腰者腎之府轉摇不能腎将􅉵矣膝者筋之府屈伸不能筋将􅉵矣骨者髓之府行則振掉骨将􅉵矣倉廩不蔵者腸胃不固也水泉不止者膀胱不蔵也得强者生失强者死此等証狀醫者要明在脉難明惟証易辨是故聖智垂論備教學者宜兼明之不可忽也三部分位三部從魚際至髙骨得一寸名曰寸口從寸口至尺名曰尺澤故曰尺中寸後尺前名曰闗陽出陰入以闗為界又云陰得尺内一寸陽得寸内九分從寸口入六分為闗分從闗分又入六分為尺分故三部共得一寸九分六經所屬心部在左手寸口屬手少陰經與小腸手太陽經合肝部在左手闗上屬足厥陰經與膽足少陽經合腎部在左手尺中屬足少陰經與膀胱足太陽經合肺部在右手寸口屬手太陰經與大腸手陽明經合脾部在右手闗上屬足太陰經與胃足陽明經合右腎在右手尺中屬手厥陰心包經與三焦手少陽經合手少陰之脉起於心中屬心系下膈絡小腸其支者從心系上挾咽系目其直者復從心系却上肺出腋下下循臑内後廉行太陰心主之後入肘内廉循臂内後廉抵掌後鋭骨之端入掌内廉循小指之内出其端手太陽之脉起於小指之端循手外側上腕出踝中直上循臂骨下廉出肘内側兩筋之間上循臑外廉出肩繞肩髀交肩上入缺盆絡心循咽下膈抵胃属小腸其支别者從缺盆循頸上頰至目鋭眥部入耳中其支者别循頰上䪼抵鼻至目内眥足厥陰之脉起於大指聚毛之上循足跗上㢘去内踝一寸上踝三寸交出太隂之後上骨内亷循股入隂毛中環隂器抵小腹挾胃屬肝絡膽上貫膈布脇肋循喉嚨之後上入頏顙連目系上出額與督脉㑹於巔其支者從目系下頰裏環唇内其支者復從肝别貫膈上注肺足少陽膽之脉起於目鋭眥上抵頭循角下耳後循頸行手少陽之脉前至肩上却交出手少陽之後入缺盆其支别者從耳後入耳中出走耳前至目鋭眥後其支者别目鋭眥下大迎合手少陽抵於䪼下交頰車下頸合缺盆下胸中貫膈絡肝屬膽循脇裏出氣街繞毛際横入髀厭中其直者從缺盆下腋循胸過季脇下合髀厭中以下循髀外出膝外亷下外輔骨之前直下抵絶骨之端下出外踝之前循足跗上入小指次指之間其支者從跗上入大指循岐骨内出其端還貫入爪甲出三毛足少隂之脉起於足小指之下斜趨足心出然谷之下循内踝之後别入跟中上踹内出膕内廉上股内後廉貫脊屬腎絡膀胱其直者從腎上貫膈入肺中循喉嚨挾舌本其支者從肺出絡心注胸中足太陽之脉起於目内眥上額交巔上其支别者從巔至耳上角其直行者從巔入絡腦還出别下項循肩膊内挾脊抵腰中入循膂絡腎属膀胱其支别者從腰中下貫臀入膕中其支别從膊内左右别下貫脾挾脊内過髀樞循髀外後廉下合膕中以下貫踹内出外踝之後循京骨至小指外側端手太陰之脉起於中焦下絡大腸還循胃口上膈屬肺從肺系橫出腋下循臑内行少陰心主之前下肘中循臂内上骨下廉入寸口上魚際循魚際出大指之端其支者從腕後直出次指内廉出其端手陽明之脉起於大指次指之端循指上廉出合谷兩骨之間上入兩筋之中循臂上廉入肘外廉循臑内前廉上肩出髃骨之前廉上出柱骨之會於大椎下入缺盆絡肺下膈屬大腸其支别者從缺盆上頸貫頰下入齒縫中還出俠口交人中左之右右之左上挾鼻孔足太陰之脉起於大指之端循指内側白肉際過竅骨後上内踝前廉上踹内循䯒骨後交出厥陰之前上循膝股内前廉入腹屬脾絡胃上膈俠咽連舌本㪚舌下其支别者復從胃别上膈注心中足陽明之脉起於鼻交額中旁約太陽之脉下循鼻外入上齒中還出俠口環唇下交承漿却循頥後下廉出大迎行頰車上耳前過客主人循髪際至頭顱其支别者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直行者從缺盆下乳内廉下俠臍入氣街中其支者起胃口下循腹裡下至氣街中而合以下髀闗抵伏兎下入膝臏中下循䯒外廉下足跗入中指内間其支者下膝三寸而别以下入中指外間其支者别跗上入大指間出其端手厥陰之脉起於胸中出屬心包下膈厯絡三焦其支者循胸出脇下腋三寸上抵腋下下循臑内行太陰少陰之間入肘内下臂行兩筋之間入掌中循中指出其端其支别者從掌中循小指次指出其端手少陽之脉起於小指次指之端上出兩指之間循手表腕出臂外兩骨之間上貫肘循臑外上肩交出足少陽之後入缺盆交膻中㪚絡心胞下膈屬三焦其支者從膻中上出缺盆上項俠耳後直上出耳上角以屈下頰至䪼其支者從耳後入耳中却出至目鋭眥五臓所屬左寸外以候心内以候膻中右寸外以候肺内以候胸中左闗外以候肝内以候膈中右闗外以候脾内以候胃脘左尺外以候腎内以候腹中右尺外以候心内以候腰釋曰五臓六腑十二經絡候之無踰三部要之前布六經乃候淫邪外入自經絡而及於臓後説六臓乃情意内鬰自臓腑出而應於經内外所因顯然明白學診之道當自此始外因雖自經絡而入必及於臟須識五臟部位内因欎滿於中必應於經亦須據經説証不可偏局故經云上竟上胸喉中事也下竟下腰足中事也不可不通五臓本脉體人之脉者乃血之隧道也非氣使則不能行故血為脉氣為息脉息之名自是而分呼吸者氣之槖籥動應者血之波瀾其經以身寸度之計十六丈二尺一呼脉再動一吸脉亦再動呼吸定息脉五動閏以太息則六動一動一寸故一息脉行六寸十息六尺百息六丈二百息十二丈七十息四丈二尺計二百七十息漏水下二刻盡十六丈二尺營周一身百刻之中得五十營故曰脉行陽二十五度行陰二十五度也息者以呼吸定之一日計一萬三千五百息呼吸進退既遲於脉故八息三分三毫三釐方得一寸八十三息三分三毫行一尺八百三十三息三分行一丈八千三百三十三息行十丈餘六丈二尺計五千一百六十七息通計一萬三千五百息方行盡十六丈二尺經絡氣周於一身一日一夜大會於風府者是也脉屬隂隂行速猶太陰一月一周天息屬陽陽行遲猶太陽一嵗一周天如是則應天常度故春肝脉弦細而長夏心脉浮大而洪長夏脾脉軟大而緩秋肺脉浮濇而短冬腎脉沉濡而滑各以其時而候旺相休囚脉息無太過不及之患故曰平人平人常氣禀於胃必以胃氣為本取其資成也合五臓氣三分㣲似弦洪緩濇沉則為平脉若真臓脉見則不佳矣廣如後説六經本脉體六經所以分手足陰陽者以足為本手為標如是厥陰風木肝與足少陽相火膽為表裏同在一處足太陰濕土脾與足陽明燥金胃足少陰相火腎足太陽寒水膀胱皆相附近至於手三陽三陰相去頗遠葢足陰陽本乎地奠方有常手隂陽法乎天變化無定足為常度手為揆度體常盡變故為竒度竒常揆度其道一也足厥隂肝脉在左闗上弦細而長足少陰腎脉在左尺中沉濡而滑足太陰脾脉在右闗上沉軟而緩足少陽膽經脉在左闗上弦大而浮足陽明胃脉在右闗上浮長而濇足太陽膀胱脉在左尺中洪滑而長手厥陰心主包絡在右尺中沉弦而數手少陰心脉在左寸口洪㣲而實手太隂肺脉在右寸口濇短而浮手少陽三焦脉在右尺中洪散而急手陽明大腸脉在右寸口浮短而滑手太陽小腸脉在左寸口洪大而𦂳此手足隂陽六經脉體及其消息盈虗而化理不滯運動宻移與天地參同彼春之暖為夏之暑彼秋之忿為冬之怒四變之動脉與之應者乃氣候之至脉也故要論云厥陰之至其脉弦一云沉短而數少陰之至其脉鈎一云𦂳細而㣲太陰之至其脉沉一云𦂳大而長少陽之至大而浮一云乍踈乍數乍短乍長陽明之至短而濇一云浮大而短太陽之至大而長本脉至脉雖識體狀又須推尋六氣交變南政北政司天在泉少隂之脉應與不應如要論所詮乙庚丙辛丁壬戊癸金木水火四運者皆曰北政少隂在泉故寸不應甲巳土運徳流四政辟如巡狩而居南靣此之謂南政少隂在泉故寸亦不應若北政厥隂在泉則右不應太隂在泉則左不應若南政厥隂司天則右不應太隂司天則左不應諸不應者及其診則見矣此乃常度合不應而反應是謂太過應而不應是謂不及皆為外淫所因所以欲知少陰應否者以君火為萬物資始不可不知此且以一嵗而論之若細推尋當以日論精㣲之道不可不知若嵗主臓害自當揆度平治不能反隅則不復也五臟傳變病脉右手闗前一分為氣口者以候臓氣鬰發與胃氣兼并過與不及乗尅傳變也以内氣鬱發食氣入胃淫精於脉自胃口出故候於氣口以五臓皆禀氣於胃胃者五臟之本臟氣不能自致於手太隂必因胃氣而生邪氣勝胃氣衰故病甚胃氣絶真臓脉獨見則死如春肝脉弦多胃少曰肝病但弦無胃氣曰死若其乗尅春雖有胃氣而有濇脉見則秋必病濇甚則今病夏心脉洪多胃少曰心病但洪無胃氣曰死如乗尅見㣲沉則秋病沉甚則今病秋肺脉濇多胃少曰肺病但濇無胃氣曰死秋見洪脉為夏病洪甚則今病冬腎脉沉多胃少曰腎病但沉無胃氣曰死冬見濡為長夏病濡甚為今病夏脾脉濡多胃少曰脾病但濡無胃氣曰死長夏見弦脉為春病弦甚為今病又如春肝脉合弦細而長太過則實强令人善怒忽忽弦冐而癲疾不及則虗㣲令人胸痛引背兩脇胠滿夏心脉合洪而㣲實太過則來去皆盛令人身熱膚痛為浸滛不及則來不盛去反盛令人煩心上咳唾下氣泄秋肺脉合浮而短濇太過則中堅傍虗令人逆氣背痛愠愠然不及則毛而㣲令人呼吸少氣上咯血下喘聲冬腎脉合沉而𦂳實太過則如彈石令人解㑊脊脉痛少氣不欲言不及則其去如數令人心懸如饑眇中清脊中痛小腹滿小便變長夏脾脉當沉而濡長太過則如水之流令人四肢不舉不及則如烏之啄令人九竅不通名曰重强太過不及脉之大要迫近而㣲不可失機又人之五臓配木火土金水以養魂神意魄志生怒喜憂思恐故因怒而魂門弛張木氣奮激肺金乘之脉必弦濇因喜則神廷融泄火氣赫羲腎水乘之脉必沉㪚因思則意舍不寧土氣凝結肝木乗之脉必弦弱因憂則魄户不閉金氣聚濇心火乗之脉必洪短因恐則志室不遂水氣旋却脾土乗之脉必沉緩此葢五情動不以正侮所不勝既不能慕徳反能勝而乗之侮反受邪此之謂也其病有五五五二十五變若其能所傳受尅流變又當詳而論之故曰五臓受氣於其能生傳之於其所勝氣舍於其所生死於其所不勝如肝受氣於心傳於脾氣舍於腎至肺而死心受氣於脾傳於肺氣舍於肝至腎而死脾受氣於肺傳於腎氣舍於心至肝而死肺受氣於腎傳於肝氣舍於脾至心而死腎受氣於肝傳於心氣舍於肺至脾而死則知肝死於肺候於秋庚篤辛死餘皆倣此又如甲乙主寅卯丙丁主已午庚辛主申酉壬癸主亥子戊巳主辰戍丑未一日一夜五分則可以占死者之蚤暮此病之次也然卒發者不必治於傳或其傳化不以次不以次入者憂恐怒喜思令不得以其次故令人有大病矣此五臓傳變之大要學者宜留神焉六經中傷病脉左手闗前一分為人迎者以候寒暑燥濕風熱中傷於人其邪咸自絡而入以迎納之故曰人迎前哲方論謂太陽為諸陽主氣凡感外邪例自太陽始此考尋經意似若不然風喜傷肝寒則傷腎暑則傷心包濕則傷脾熱則傷心燥則傷肺以暑熱一氣燥濕同源故不别論以類推之風當自太陽始濕當自陽明入暑當自三焦入寒則自太陽入故經曰陰為之主陽與之正别與陽者知病從來此之謂也足太陽傷寒生左手尺中與人迎皆浮𦂳而盛浮者足太陽脉也𦂳者傷寒脉也盛者病進也其証頭項强腰脊痛無汗惡寒不惡風足陽明傷濕右手闗上與人迎皆濇細而長濇者足陽明脉也細者傷濕脉也長者病襲也其証闗節疼痛重痺而弱小便澁秘大便飱泄足少陽傷風左手闗上與人迎皆弦浮而㪚弦者足少陽脉也浮者傷風脉也㪚者病進也其証身熱惡風自汗項强筋緩手少陽傷暑右手尺中與人迎皆洪數而虗洪者手少陽脉也虗者傷暑也數者病增也其証身熱惡寒頭痛狀如傷寒煩渇足太陽傷濕右手闗上與人迎皆濡細而沉濡者足太隂脉也細者濕脉也沉者病着也其証身重脚弱闗節煩疼冷痺脹滿足少陰傷寒左尺中與人迎皆沉𦂳而數沉者足少陰脉也𦂳者寒脉也數者病傳也其証口燥舌乾而渇背惡寒反發熱倦怠足厥陰傷風左闗上與人迎皆弦弱而急弦者厥陰脉也弱者風脉也急者病變也其証自汗惡風而倦小腹急痛手厥隂心包傷暑在右尺中與人迎弱而緩沉者心包脉也弱者傷暑也緩者病倦也其証往來寒熱状如痰瘧煩渇眩暈背寒靣垢此乃分布六經感傷外邪除燥熱外叙此四氣以為宗兆若其傳變自當依六經别論所傷隨經説証對証施治或燥熱傷心肺亦當依經推明理例調治如四氣兼并六經交錯亦當隨其脉証審處明白或先或後或合或并在經在絡入表入裏四時之動脉與之應氣候以時自與脉期㣲妙在脉不可不察察之有紀從陰陽始始之有經從陰陽生此之謂也五用乖違病脉察脉必以人迎氣口分内外所因者乃學診之要道也所以脉讃云闗前一分人命之主然既有三因固不可不盡詳而考之於理自偹且如疲極筋力盡神度量飲食饑飽呌呼走氣房室勞逸及金瘡痿折虎狼毒蟲鬼疰客忤畏壓溺等外非六淫内非七情内外不收必屬不内不外雖漢論曰人迎𦂳盛傷於寒氣口𦂳盛傷於食殊不知飲食入胃能助發宿藴其所以應於氣口者正由七情鬱發因食助見本非宿食能應氣口且如宿食脉有浮大而㣲濇者有數而滑實者在隂則濇在陽則滑宿食不化脉則沉𦂳宿食成瘕脉則沉重此等名証皆曰傷胃何闗於氣口耶其如疲極筋力其脉弦數而實筋痛則動皆傷肝也凝思則滑神耗則㪚皆傷心也絃誦耗氣脉濡而弱呌呼走氣脉㪚而急皆傷肺也房勞失精兩尺浮㪚男子遺精女人半産弦大而革皆傷腎也右件明文氣口何與况臓寒蜖厥脉自㣲浮及為𦂳滑胃虗不食其脉必緩亦有㣲濡五飲停伏浮細而滑乆蓄積聚沉細而軟形虗自汗脉皆㣲濡揮霍變亂脉皆沉伏跌仆墜下脉皆細滑踒折傷損瘀血在内疝瘕癥癖五内作痛脉皆弦𦂳中寒癥結脉則遲濇五積六聚食飲痰氣伏留不㪚隧道節滯脉皆促結三消熱中尺中洪大顛狂神亂闗上洪疾氣實脉沉血實脉滑氣血相搏脉亦沉實婦人姙娠脉則和滑遁尸尸疰脉沉而上不至寸或三部𦂳急鬼祟附着脉兩手乍大乍小乍長乍短陽邪來見脉則浮洪陰邪來見脉則浮𦂳鬼疰客忤三部皆滑洪大嫋嫋沉沉澤澤但與証不相符者皆五尸鬼邪遁疰之所為也如診得此等脉証雖與人迎氣口相應亦當分類推尋三因交結四季料簡所謂單内單外不内不外亦内亦外亦不内外脉理微妙藝能難精學然後知不足教然後知困此之謂也然形與脉兆􅕍於數義未有不學而能者亦未有學而不成者學者宜留心焉又如忽見異像驚惑眩亂脉多失序急症卒中五臓閉絶脉不往來辟如堕溺脉不可察與夫金瘡踒折頓失血氣脉亦無凖學者當㸔外証不可拘脉脉偶名狀浮者按之不足舉之有餘與人迎相應則風寒在經與氣口相應則榮血虗損沉者按之有餘舉之不足與人迎相應則寒伏陰經與氣口相應則闕遲者應動緩極按之盡牢與人迎相應則寒濕凝遲與氣口相應則虗冷沉積數者來去急促與息數至與人迎相應則風燥熱煩與氣口相應則陰虗陽盛虗者遲大而軟按之豁然與人迎相應則經絡傷暑與氣口相應則榮衞走本實者按舉有力不疾不遲與人迎相應則風寒貫經與氣口相應則血氣壅脉緩者浮大而軟去來微遲與人迎相應則風熱入臓與氣口相應則怒極傷筋𦂳者動轉無常如紉單線與人迎相應則經絡傷寒與氣口相應則臓内作痛洪者來之至大去之且長與人迎相應則寒壅諸陽與氣口相應則氣攻百脉細者指下尋之往來如線與人迎相應則諸經中濕與氣口相應則五臓凝涎滑者往來流利有如貫珠與人迎相應則風痰潮溢與氣口相應則涎飲凝滯濇者三五不調如雨沾沙與人迎相應則風濕寒痹與氣口相應則津汗血枯弦者端𦂳徑急如張弓弦與人迎相應則風走注痛與氣口相應則積飲溢疼弱者按之欲絶輕軟無力與人迎相應則風濕緩縱與氣口相應則筋絶弛痿結者往來遲緩時止更來與人迎相應則陰㪚陽生與氣口相應則精阻百節促者往來急數時止復來與人迎相應則痰壅陽經與氣口相應則積留胃府芤者中空傍實如按慈葱與人迎相應則邪壅吐衂與氣口相應則血熱妄行㣲者極細而軟似有若無與人迎相應則風暑自汗與氣口相應則陽㣲脱泄動者在闗如豆厥厥動揺與人迎相應則寒疼冷痛與氣口相應則心驚膽寒伏者沉隐不出着骨乃得與人迎相應則寒濕痼閉與氣口相應則凝思滯神長者往來流利出於三闗與人迎相應則㣲邪自愈與氣口相應則臓氣平治短者按舉似數不及本位與人迎相應則邪閉經絡與氣口相應則積遏臓氣濡者按之不見輕手乃得與人迎相應則寒濕㪚漫與氣口相應則飱泄緩弱革者沉伏實大如按鼓皮與人迎相應則中風着濕與氣口相應則半産脱精㪚者有陽無陰按之滿指與人迎相應則滛邪脱泄與氣口相應則精血敗絶代者臓絶中止餘蔵代動無論内外所因得此必死七表病脉浮為在表為風應人迎為氣應氣口為熱為痛為嘔為脹為痞為喘為厥為内結為滿不食浮大為鼻塞浮緩為不仁浮大而長為風眩癲疾浮滑疾為宿食浮大而濇為宿滯氣浮短為肺傷諸氣浮滑為飲為走刺浮細而滑為傷飲浮滑疾𦂳為百合病浮數大便堅小便數浮𦂳為淋為癃閉芤為脱血寸芤為吐血㣲芤為衂血闗芤為大便出血尺芤為下焦虗小便出血滑為吐為滿為欬為熱為伏痰為宿食為蓄血為經閉為鬼疰為氣血俱實滑數為結熱滑實為胃熱和滑為姙娠滑而大小不匀必吐為病進為泄痢滑而浮大小腹痛滑而弱則陰中痛肛門疼實為熱為嘔為痛為氣塞為喘欬為大便不通實𦂳為陰不勝陽為胃寒為腰痛弦為寒為痛為瘧為飲為水氣為中虗為厥逆為拘急為寒癖弦𦂳為惡寒為疝瘕為癖為瘀血雙弦脇急痛弦而鈎為脇下刺痛弦長為積隨上下左右應之𦂳為寒為痛為欬為喘為滿浮𦂳為肺有水氣𦂳急為遁尸𦂳數為寒熱𦂳滑為蜖動為宿食為吐逆洪為滿為痛為熱為内煩洪實為顛洪大為祟洪𦂳為􅏴疽為喘急亦為脹洪浮為陽邪來見八裏病脉㣲為虗為弱為衂為嘔為泄為亡汗為拘急㣲弱為少氣為中寒沉為在裏為實為水為寒為喘為癥瘕沉弱為寒熱沉細為少氣臂不能舉沉𦂳為懸飲沉滑為風水為下重沉𦂳為上熱下寒沉重而直前者為瘀血沉重而中㪚為寒食成瘕沉重不至寸徘徊欲絶者為遁尸沉重為傷暑發熱沉遲為痼冷緩為在下為風為寒為瘧為痺為疼為不仁為氣不足為眩暈緩而滑為熱中緩而遲為虗寒相搏食冷則咽痛濇為少血為亡汗為氣不足為逆冷為下痢為心痛濇而𦂳為痺為寒濕遲為寒為痛遲而濇為癥瘕咽酸伏為霍亂為疝瘕為水氣為溏泄為停痰為宿食為諸氣上衝為惡膿貫肌濡為虗為痺為自汗為氣虗弱為下重濡而弱為内熱外冷自汗為小便難弱而虗為風熱為自汗九道病脉細為氣血俱虗為病在内為積為傷濕為寒為後泄為神勞為憂傷過度為腹滿細而滑為僵仆為發熱為嘔吐細而𦂳為癥瘕積聚為刺痛數為熱為虗為吐為痛為煩渇為煩滿動為痛為驚為泄為攣為恐虗為寒為虗為脚氣為食不消化為傷暑促經文並無釋曰其促有五一曰氣二曰血三曰飲四曰食五曰痰但臓熱則脉數以氣血痰飲留滯不行則止促促非惡脉也結為痰為虗為血為積為氣釋曰氣寒脉緩則為結數則為促雖緩數不同紿亦當促脉分别可也散脉經文並無釋曰六府氣絶於外者則手足寒上氣五藏氣絶於内者則下利不禁甚者不仁其脉皆散散則不聚病亦危矣革為滿為急為虗寒相搏婦人半産漏下釋曰革者革也固結不移之狀三部應之皆危脉也代者一蔵絶代蔵代至釋曰代真死脉不分三部隨應皆是如前所列皆本聖經學者當熟讀令心開眼明識取體狀然後交絡互識所謂六經流注五蔵相傳各以部位推尋使了然不昧其如隨病分門諸脉証状尤當參對審詳之如是精誠方可為醫者之萬分不爾則旁倚聖教欺罔賢良為含靈之巨賊幸宜勉之三因極一病証方論卷一
