body:
  text: 三因極一病證方論卷三宋陳言撰叙痺論夫風寒濕三氣雜至合而為痺雖曰合痺其用自殊風勝則為行痺寒勝則為痛痺濕勝則為著痺三氣襲人經絡入於筋脈皮肉肌骨久而不已則入五藏凡使人煩滿喘而吐者是痺客於肺煩心上氣嗌乾空噫厥脹滿者是痺客於心多飲數小便小腹痛如懷孕夜卧則驚者是痺客於肝善脹尻以代踵脊以代頭者是痺客於腎四肢懈怠發咳嘔沫上為大寒者是痺客於脾又有腸痺者數飲而小便不利中氣喘急時發飱泄又胞痺者小便按之內痛若沃以湯澀於小便上為清涕又六府各有俞風寒濕中其俞而飲食引之故循俞而入各舍其府治之隨其府俞以施針灸之法仍服逐風溫寒發散等藥則病自愈大抵痺之為病寒多則痛風多則行濕多則著在骨則重而不舉在脉則血凝而不流在筋則屈而不伸在肉則不仁在皮則寒逢寒則急逢熱則縱又有血痺以類相從附於此門外有支飲作痺見痰飲門合痺治法附子湯治風濕寒痺骨節疼痛肌膚不仁皮肉腫著四肢緩縱附子生去皮臍白芍桂心人參茯苓各三分白术一兩甘草右為銼散每服四錢水二盞煎七分去滓食前服黃耆五物湯治尊榮人骨弱肌膚盛重困疲勞汗出卧不時動搖如被微風遂得之作血痺脈當陰陽俱微尺中小緊身體如風痺狀黃耆白芍桂心各三分生薑五片大棗三枚右為銼散食前服黃耆酒治風濕寒痺舉體腫滿疼痛不仁飲食惡冷嗇嗇惡寒胸中痰滿心下塞塞方見中風門厯節論夫厯節疼痛不可屈伸身體尫羸腳腫如脫其痛如掣流注骨節短氣自汗頭眩嗢嗢欲吐者皆以風濕寒相搏而成其痛如掣者為寒多腫滿如脫者為濕多厯節黃汗出者為風多顧病源所載飲酒當風汗出入水浴水從汗孔入得之遂成斯疾原其所因雖涉風濕寒又有飲酒之說自屬不內外因亦有不能飲酒而患此者要當推求所因分其所因先後輕重為治久而不治令人骨節蹉跌變為癲病不可不知厯節治法芍藥知母湯治諸肢節疼痛身體尫羸腳腫如脫頭眩短氣嗢嗢欲吐桂心知母防風各四兩芍藥炙草麻黃附子炮去皮臍每服四錢加生薑五片空心服一法加白术川芎杏仁半夏烏頭湯治病厯節痛不可屈伸烏頭五枚銼以蜜二升煎取一升烏頭去之炙草麻黃去節芍藥黃耆右銼散每服四錢水二盞煎至七分去滓投前蜜煎一升空心服千金方有乾薑桂心大棗無黃蓍麻黃治寒疝腹痛絞痛賊風入腹攻五臟拘急不得轉側呌呼發作有時使人手足厥逆並治之附子八物湯治厯節風四肢疼痛如鎚煆不可忍附子炮薑白芍茯苓炙草桂心各三兩人參一兩白术四兩每服四錢去滓食前服一方去桂用地黃二兩獨活寄生湯治厯節風近人用之甚效亦治腰背痛及腳氣流注獨活杜仲薑製細辛牛膝秦艽人參桑寄生茯苓炙草白芍川芎當歸熟地防風桂心各三兩每服四錢空心服叙腳氣論夫中風寒暑濕與腳氣皆漸䪺淺深之不同中風寒暑濕得之䪺而淺腳氣得之漸而深以其隨臟氣虛實寒熱發動故得氣名其如循經絡入臟府證候雖不一然三陽多熱躁三陰多熱煩亦可推求但腳氣不專主一氣亦不專在一經故與中風寒暑濕為異耳兼有續生諸病混多端未易分别治之須尋其經絡病證所在去處然後以脉察其虛實淺深為治假如三陽經絡其診多在足外踝及手背三陰經絡其診多在足內踝及臂內以此粗分陰陽可知大概矣其如風寒濕暑性用各各不同所謂風為行寒為痛暑為頑濕為著乃不刋之論千金方論與董氏專門類皆蹈襲舊說似難憑據惟留心斯道者必有至當之論焉叙千金論千金論腳氣皆由感毒所致多不令人便覺或因他病乃始發動或奄然大悶經三兩日方乃覺之庸醫不識謾作餘疾治之莫不盡斃緣始覺甚微飲食嬉戲氣力如故惟卒起腳屈弱為異耳乃論風毒相冒云夫有腳未覺異而頭項臂膊已有所苦諸處皆未悉知而心腹五內已有所因或見食嘔吐憎聞食臭或腹痛下利或大小便祕澀或胸中忡悸不欲見光明或精神昏憒語言錯亂或壯熱頭痛或身體酷冷疼煩或覺轉筋或䏶腿頑痺或時緩縱不隨或時百節攣急或腫或小腹不仁皆謂腳氣狀貌也至於婦人産後取凉多中此毒其熱悶掣縱驚悸心煩嘔吐氣上臍下冷痞愊愊然不快兼小便淋瀝不同生平皆係腳氣之候頑弱為緩風疼痛為濕痺千金節文偹叙諸證不說陰陽經絡所受去處亦不分風濕寒熱四氣及內藏虛實所因後學從何為治若一一信書不若無書為愈此之謂也腳氣脈證腳氣證狀固多但當以脉診分其陰陽使無差誤所謂脈浮為風緊為寒緩細為濕洪數為熱見於諸陽病在外宜發散之則愈沉而弦者亦為風沉而緊者為寒沉細為濕沉數為熱見諸陰病在裏宜溫利之則愈外證自汗走注為風勝無汗疼痛攣急為寒勝腫滿重著為濕勝煩渴熱頑為暑勝四氣兼有但推其多者為勝治之諸證互辨而分表裏寒則溫之熱則寒之在表則散在裏則下若大虛氣乏間作補湯隨病冷熱而用之不可拘不可服補藥之說叙太陽經腳氣證病者頭痛目脫項強腰脊連體摳循臂外出外踝之後循京骨至小指外側皆痛者乃足太陽膀胱經為風寒暑濕流注自汗者為風勝無汗疼痛為寒勝熱頑為暑勝重著腫滿為濕勝諸經皆當如此推凡太陽經宜隨四氣發散而愈太陽經腳氣治法麻黃左經湯治風寒暑濕流注足太陽手足攣痺行步艱難增寒發熱無汗惡寒或自汗惡風頭痛眩暈腰重關節疼痛麻黃去節乾葛細辛白术茯苓防己桂心羌活防風炙草各等分右為粗末每服四錢水二盞薑三片棗一枚煎七分去滓空心服自汗去麻黃加桂枝白芍重著加白术橘皮無汗减桂加杏仁澤㵼所加並等分陽明經腳氣證病者凄凄寒熱呻缺口鼻乾腹脹髀膝臏中循胻外廉下足跗入中指內間皆痛者乃足陽明胃經為風寒暑濕流注之所為四氣偏勝並如上說治之宜隨四氣微利之陽明經腳氣治法大黃左經湯治風寒暑濕流注足陽明經使足腰痺痛行步艱難涎潮昏塞大小便祕澀腹痛嘔吐或復下利惡聞食氣喘滿肩息或自汗譫語大黃細辛茯苓防風羌活黃芩前胡枳殼麩炒厚朴炙草杏仁麩炒去皮尖右銼散每服四錢薑三片棗一枚煎七分去滓空心熱服腹痛加白芍祕結加阿膠喘加桑皮蘇子小便祕加澤瀉四肢瘡癢浸淫加升麻並等分荷葉藁本湯治足脛生瘡浸淫腿膝膿汁淋漓熱痺痛癢乾荷葉四張藁本等分以水二升煎减五合去滓溫暖得所淋泄乃服大黃左經湯少陽經腳氣證病者口苦善太息脅痛面垢體無膏澤頭額目鋭眥痛缺盆并眼下馬刀腫自汗振寒發熱胸中脅肋髀膝外至胻絶骨外踝及諸指節皆痛者乃足少陽膽經為風寒暑濕流注四氣偏勝例如前說治之宜隨四氣和解少陽經腳氣治法半夏左經湯治足少陽經為風寒暑濕流注發熱腰肋痛頭痛眩暈嘔吐宿汁耳聾心悸熱悶心煩氣上喘滿肩息腿痺緩縱不隨半夏乾葛細辛白术茯苓桂心炙甘草防風炮薑黃芩逺志柴胡麥冬各三分每服四錢薑三片棗一枚煎七分空心服熱悶加竹瀝半合喘滿加杏仁桑皮料簡三陽併合腳氣三陽經有併有合如太陽併少陽少陽併陽明陽明併太陽三陽合病皆於經絡中推考其診隨證治之所謂併者二經相并合者三經㑹合以此強分使名義易曉不必論其三也三陽併合腳氣證治病者增寒壯熱自汗惡風或無汗惡寒眩暈重著關節掣痛手足拘攣疼痛冷痺緩縱不隨心燥氣上嘔吐下利此皆三陽經中風寒暑濕其脈必浮弦緊數大神祕左經湯治風寒暑濕流注三陽經手足拘攣疼痛行步艱難增寒發熱自汗惡風頭眩身重關節掣痛或卒中昏塞大便祕澀或腹痛嘔吐下利惡聞食氣髀腿頑痺緩縱不隨熱悶驚悸心煩氣上臍下冷痺喘滿肩息麻黃乾葛細辛厚朴茯苓防己枳殼桂心羌活防風柴胡黃芩逺志炮薑半夏麥冬甘草各等分右銼散每服四錢加生薑三片棗一枚空心服自汗加牡蠣白术去麻黃腫滿加澤瀉木通熱甚無汗去桂加陳皮前胡升麻腹痛吐利去黃芩加芍藥附子大便祕加大黃竹瀝喘滿加杏仁桑皮紫蘇所加並等分凡有此病詳認證狀逐一加减無不愈者常服下氣消痰散風濕退腫進飲食令人不虛南方諸師固祕此方雖父子兄弟不傳學者當敬用之加味敗毒散治三陽經腳氣流注腳踝上焮熱赤腫寒熱如瘧自汗惡風或自汗惡寒羌活獨活前胡柴胡枳殼桔梗人參茯苓甘草川芎大黃蒼术右銼散每服四錢薑三片薄荷一頭煎七分熱服不過二服愈皮膚搔癢赤疹加蟬退太陰經腳氣證治病者腹滿挾咽連舌系急胸膈痞滿循行骨下股膝內前廉內踝過核骨後連足大指之端內側皆痛者乃足太陰脾經為四氣流注之所為也四氣偏勝並如前說治之各隨其氣所中輕重溫散之六物附子湯治四氣流注於足太陰經骨節煩疼四肢拘急自汗短氣小便不利惡風怯冷頭面手足時時浮腫附子桂心各五錢白术三兩防己四兩茯苓三兩甘草二兩少陰經腳氣證治病者腰脊痛小指之下連足心循內踝入跟中上踹內入膕中內廉股內皆痛上衝胸咽飢不能食面黑小便淋祕咳唾不已善恐心惕惕若人將捕之狀小腹不仁者難治足少陰腎為四氣流注之所為也四氣偏勝並如前說治之各隨其氣所中輕重而溫散之八味丸治少陰腎經腳氣入腹小腹不仁上氣喘急嘔吐自汗此證最急以腎乘心水尅火死不旋踵熟地八兩丹皮茯苓澤瀉各三兩山茰山藥四兩附子肉桂各一兩右為末蜜丸桐子大酒下五十丸厥陰經腳氣證治病者脅肋偏疼足大指連內廉內陰小腹臍脹痛腳攣面塵脫色咽乾嘔瀉小便難或時遺溺并狐疝足厥陰肝經為四氣流注之為也四氣偏勝並如前說治之各隨其氣所中輕重而調治神應養真丹治厥陰肝經為四氣進襲肝臟左癱右瘓涎潮昏塞半身不遂手足頑麻語言蹇澀頭旋目眩牙關緊急氣喘自汗心神恍惚肢體緩弱上攻頭目下注腳膝榮氣凝滯遍身疼痛兼治産後中風角弓反張墜車落馬打撲傷損瘀血在內川芎當歸白芍熟地羌活天麻各等分一法無羌活加木瓜炒阿膠為末蜜丸雞子黃大每服一丸木瓜兔絲子浸酒下腳痺米仁浸酒下中風溫酒下料簡三陰併合腳氣三陰合併傷寒三陽有合併三陰無合併惟腳氣不然以久滯臟氣隨其虛實寒熱流注故有併合當合併三陰所中之證而治之三陰併合腳氣治法病者腹滿胸痞骨節煩疼四肢浮腫上氣喘急小腹不仁腰脊足心踹膕皆痛脅腰偏疼陰器抵小腹夾臍諸處脹痛此皆三陰經中風寒暑濕其脉必沉細遲弦地龍丸治肝腎臟虛風濕進襲流注腿膝行步艱難漸成風濕腳氣足心如火上氣喘急小腹不仁全不進食赤小豆炒四兩五靈脂白膠香破故紙狗脊木鱉子海桐皮威靈仙地龍草烏米泔浸三日净洗去皮尖各一兩右為末酒糊丸桐子大硃砂為衣鹽酒下五十丸川膝煎治肝腎虛為風寒濕毒所中流注腿膝厯節疼痛如錐刀煆刺不可名狀大烏頭十箇端正者捶破以紙袋盛用黑豆一升襯覆蒸一日取出去豆不用去皮尖晒乾川牛膝二兩晒乾以二味並不見銅鐵器緣肝氣惡之木臼搗碎牛膝同入石磨中磨為末酒糊丸如桐子大每服四十丸用好酒一瓶將木瓜一隻切作片子入瓶中浸木瓜爛為度用此酒下不以時服十全丹治腳氣上攻心腎相繫足心隱痛小腹不仁煩渴小便或祕或利關節攣痺疼痛神效不可具述肉蓯蓉酒浸石斛酒浸狗脊火去毛萆薢茯苓牛膝酒浸地仙子逺志各一兩熟地三兩杜仲三兩右為末蜜丸桐子大溫酒鹽湯任下乳香宣經丸治體虛為風濕寒暑所襲四氣相搏半身不遂手足頑麻骨節煩疼足脛浮腫惡寒發熱漸成腳氣肝腎不足四肢攣急遍身攻注或閃脞打撲內傷筋骨及風邪內搏男子疝氣婦人經脉不調活血止痛補虛壯筋骨威靈仙烏藥茴香川練子牽牛子桔梗萆薢防風各二兩五靈脂乳香各五錢草烏用黑豆一升同煮竹刀切看黑透為度去皮焙五錢右為末酒糊丸桐子大鹽酒下五十丸婦人食前醋湯下大犀角湯治脾腎經腳脛腫痺小腹頑麻上攻頭面通身浮腫小便不利上氣喘滿悶絶欲死犀角黃芩白术肉桂防己旋覆花各二兩香豉橘皮茯苓各三兩前胡桑皮四兩紫蘇莖葉四兩每服四錢加薑五片棗三枚喘加杏仁四蒸木瓜丸治肝腎脾三經氣虛為風寒濕搏著流注經絡竭日曠嵗治療不痊凡遇六化更變七經不寧必致發動或腫滿或頑痺增寒壯熱嘔吐自汗葳靈仙苦葶藶同入黃耆續斷同入蒼术橘皮同入烏藥黃松節同入右各五錢以大木瓜四隻切蓋去穰入前件藥仍用蓋簪定酒蒸熟三蒸三晒取藥出焙乾為末研瓜為膏搜和搗千杵丸如桐子大空心溫酒鹽湯任下五十丸世傳木瓜丸最多惟此方有效宜當敬之黃松節即茯苓中木是也逐毒湯治肝脾腎三經為風濕寒熱毒氣上攻陰陽不和四肢拘攣上氣喘滿小便祕澀心熱煩悶遍身浮腫半夏四兩黃耆當歸人參厚朴獨活炙甘草陳皮各一兩熟地芍藥枳實麻黃去節各二兩桂心三兩五棓子二十一箇每服四錢薑七片棗三枚空心溫服日三夜一腳氣總治千金腳氣論在論中風之前良有以也方論雖多識病者少或覺之傷晚或狐疑不决枉死者半信不誣者矣凡有此證最宜急治縱則入腹攻五臟雖神丹亦無如之何又久患續生諸病如大小便不利腫滿飲食傷等不妨剖别為治所為先去新病餘當在後若總而治之則亦庶乎其可也烏藥平氣湯治腳氣上攻喘滿及五臟偏勝諸氣不和喘咳奔冲坐卧不安頭暈腳弱上實下虛烏藥人參白术川芎當歸茯苓炙甘草白芷木瓜五味蘇子各等分加薑棗為末亦可蘇子湯治腳弱上氣陰陽交錯清濁不分上重下虛中滿喘急嘔吐自汗無復紀律千金云宋湘王在南州患腳氣困篤服此得效蘇子半夏各五兩前胡厚朴當歸炙甘草各二兩桂心陳皮各三兩右為銼散每服四錢薑七片棗二枚煎七分食後服人謂俞山人降氣湯也好事者復加附子黃蓍又改其分兩一班入太醫方用者宜知之木瓜牛膝丸治寒濕腳氣冷濕下注腳弱無力或腫急疝痛兼治婦人血風大固腎氣活血壯筋絡木瓜大者三四箇切開蓋去心先用糯米漿過鹽焙乾為末即將鹽末入瓜內令滿仍用蓋針定蒸三次爛研成膏川烏大者去皮尖用好酒一升浸薄切片酒煮乾研成膏三兩牛膝萆薢茴香羌活青皮青鹽别研入狗脊燎毛巴㦸海桐皮各一兩右為末入青鹽和勻將前二膏搜為末如硬再入酒杵數次丸如桐子大食前鹽酒下五十丸茱茰丸治腳氣入腹腹脹不仁喘悶欲死吳茱茰湯泡木瓜去心切片右等分酒糊丸桐子大酒下百丸或以木瓜蒸爛研膏為丸尤妙黑附丸治乾濕腳氣附子黑豆半斤入磁瓶內漫火煮以附子爛為度右以熟豆一合同附子研作餅焙乾為末蜜丸皂仁大每服二丸空心麝香酒下木通散治腳氣服補藥太過小便不通淋閉臍下脹當歸赤芍赤苓生草梔子仁炒各一兩右為散每服二錢桑皮赤豆散治腳氣小便澀兩足腫氣脹赤小豆半斤桑皮蘇葉一握生薑五錢右為散水三升煮豆熟取豆食去滓仍取餘汁飲之勝酸丸治元氣不足真氣虛弱及諸虛寒濕氣進襲手足卷攣足指連足面拘急走注疼痛筋脈不伸行步不隨常服益真氣壯筋骨黑髭鬚滑皮膚一切足弱鶴膝諸風附子一箇泡去皮臍當歸一兩酒浸天麻酒浸牛膝酒浸棗仁炒熟地防風二兩木瓜四兩麝香一分全蝎去鈎乳香五錢另研木香沒藥另研羌活炙草各一兩右為細末用生地三斤净洗研如泥入無灰酒四升煮爛如膏以前藥令勻和杵令堅每兩作十丸每服一丸臨卧細嚼酒下地黃膏春夏極多遇冬或無地黃蜜丸桐子大鹽湯下或溫酒下五十丸加减法檳榔萆薢蓯蓉破故紙巴㦸天右五味各添一兩內熟地當歸各增一兩尤妙如服此藥或五七日或半月日見效甚速行步如飛千里可至乃名勝酸換腿丸治足三陰經虛為風寒暑濕進襲攣痺緩弱上攻胸脅肩背下注腳膝疼痛漸成風濕腳氣行步艱難足心如火上氣喘急全不進食石楠藤天南星石斛酒浸牛膝酒浸羌活防風米仁炒萆薢黃耆蜜炙天麻當歸續斷各一兩半木瓜四兩檳榔二兩五錢右為末酒煮麵糊為丸桐子大空心溫酒鹽湯下三因極一病證方論卷三
