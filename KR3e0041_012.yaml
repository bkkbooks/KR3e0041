body:
  text: 三因極一病證方論卷十二宋陳言撰滯下叙論經中所載有血溢血泄血便注下古方則有清膿血及泄下近世病名痢疾其實一也但以寒熱疳蠱分為四門亦未為至當且疳蝕瘡膿中蠱下血與利膿證狀大别疳蝕雖下赤白當在疳濕瘡門蠱利清血當在中蠱毒門今之滯下赤白者至多皆是冷熱相搏非干疳濕蝕瘡類下利清血亦多與中蠱毒者異臨證須詳不可道聽治法錯訛立見夭傷勉之滯下三因證治病者滯下人皆知赤為熱白為寒而不知純下清血為風下如豆羮汁為濕夫六氣之傷人初無輕重以暑熱一氣燥濕同源收而為四則寒熱風濕不可偏廢方云風停於膚腠後乘虛入客腸胃或下瘀血或下鮮血注下無度濕毒下如豆羮汁皆外因之明文也古文有五泄因臟氣鬱結隨其所發使利膿血作青黃赤白黑之不同者即內所因也又飲服冷熱酒醴及醯醢縱情恣欲房室勞逸致損精血腸胃枯溢久積冷熱遂成毒痢皆不內外因治之先推其嵗運以平其外察其鬱結以調其內審其所傷以治不內外使條然明白不致妄投也白頭翁湯治熱痢滯下下血連月不瘥白頭翁二兩黃連柏皮秦皮各三兩每服四錢桃花丸治冷痢腹痛下如魚腦白物赤石脂煅炮薑各等分為末蒸餅糊丸米湯下三五十丸胃風湯治風冷乘虛入客腸胃水榖不化泄瀉注下腹脅虛滿腸鳴㽲痛及腸胃濕毒下如豆汁或下瘀血日夜無度並宜服之人參茯苓白术川芎當歸白芍肉桂各等分為散每服四錢粟米一百粒煎七分服露宿湯治風痢下清血杏仁七粒苦木瘡一掌大烏梅一個草果一個酸石榴皮半隻青皮甘草㕮咀作一劑水二碗薑三片煎七分露星月夜一宿次早空心服苦散治脾濕氣泄痢不止米榖不化黃連銼豆大吳茱茰白芍藥銼豆大各二兩同炒令赤色為末每服二錢駐車丸治冷熱下痢腸滑赤白如魚腦日夜無度腹痛不可忍者黃連六兩阿膠麩炒當歸各三兩炮薑二兩為末醋煮米糊為丸桐子大米飲下五十丸萬金丸治冷熱痢􅎆粟殼一兩用赤白各一半白不炙赤蜜炙橘皮甘草各一兩並如上半生半炙右銼散每服四錢以百沸湯七分一盞急用盞蓋之候澄清服血痢入烏梅一個按􅎆粟殼本草不載治痢近用之甚效其功不下地榆黃柏秦皮但性緊澀服之則嘔不可不知固腸湯治腸虛下痢赤白頻併日久無度老幼産婦俱可服􅎆粟殼三兩醋浸炙微黃枳殼麩炒白芍各二兩陳皮當歸炙草各一兩訶子煨木香煨人參白薑炮各五錢每服四錢煎七分服三聖丸治下痢赤白日夜無度及泄瀉注下厚黃柏大蒜研􅎆粟殼去瓣細切蜜炙各等分右一處搗篩過粗者更搗同淹一宿次日慢火炒香熟研末粟米飯為丸桐子大米湯下五十丸斷下丸治下痢赤白無問久近長幼皆可服􅎆粟殼十四個蜜炙草果一個炒白术一錢炙草一錢茯苓一錢右作一劑水一大碗薑七片棗七枚煎一盞空心分二服或下純血赤加黑豆二十七粒血白則加炮薑一錢厚腸湯治下痢赤白􅎆粟殼八兩地榆六兩白术紫蘇木木瓜各二兩右㕮咀每服四錢薑七片棗二枚煎七分服水煮木香丸治腸胃虛弱風濕進襲泄瀉水榖滯下膿血㽲刺疼痛裏急後重日夜無度當歸芍藥炙草訶子各五錢厚朴薑汁炒青皮陳皮各一兩砂仁木香各一錢􅎆粟殼醋浸炒五錢右為末蜜丸一兩作五丸服每服一丸水一盞煎七分空心服料簡凡血得熱則淖溢故鮮得寒則凝注故瘀當審其風熱風冷二證與蠱利大别外有血痔血枯內衄酒利肺疽腸胃蓄瘀逺近血等各有門類不可混雜古方云積冷積熱及水榖實而下利者並以大黃湯下之養生方亦云脉大則踈滌之更不知有寒熱風濕虛實不同後人尋方妄用被害者多吁可傷哉祕結證治夫胃大小腸膀胱者倉廪之本營之居也名曰器能化糟粕轉味出入者也人或傷於風寒暑濕熱盛發汗利小便走枯津液致腸胃燥澀祕結不通皆外所因或臟氣不平隂陽關格亦能致大便不通名曰臟結皆內所因或飲食燥熱而成熱中胃氣强澀大便反堅小便頻數謂之脾約屬不內外因既涉三因亦當分其所因而治之燥則潤之澀則滑之祕則通之結則解之各有成法神功丸治氣壅風盛大便祕塞後重疼痛煩悶此藥當量虛實加減大黃四兩人參訶子皮麻仁二兩另研右為末蜜丸桐子大酒米飲皆可下二十丸麻子仁丸治趺陽脉浮而澀浮則胃氣强盛澀則小便澀浮澀相搏大便則堅其脾為約大便堅小便利而不渴麻仁五兩研芍藥枳實各八兩麩炒大黃一斤熟厚朴五兩半薑汁炒杏仁五兩半去皮尖為末蜜丸桐子大每服二十丸溫水下未知加至五十丸一法麻仁一兩半杏仁三分大黃一兩枳實芍藥厚朴各五錢此係局方出本是仲景方合用大黃一斤正得今八兩厚朴當用四兩杏仁當用六錢麻仁一兩二錢芍藥一兩乃均制合理用當以理推半硫丸治髙年風祕冷祕心腹一切痃癖冷氣暖元臟止泄瀉進飲食硫黃研細半夏湯洗七次煨乾為末等分以生薑汁熬蒸餅末攪勻杵數百下丸桐子大溫酒薑湯下三十丸胃氣丸治老人虛人風祕不通不可服冷藥用此妙硫黃十兩半夏五錢茯苓人參各一兩石膏一分煅右為末生薑自然汁為丸米湯入生薑湯下五十丸蜜兑法蜜三合鹽少許煎如餳傾於冷水中揑如指大長三寸許納下部立通脫肛證治肛門為肺主下口大腸肺臟實則熱熱則肛門閉塞腑虛則大腸寒寒則肛門脫出婦人産蓐力用過度及小兒呌呼及久痢後皆使肛門帶出蝟皮散治肛門或因洞泄或因用力脫出不收蝟皮燒存性用一個磁石五錢煅碎桂心為末飲方寸匕忌舉重及房室時後治女人隂脫加以鱉頭灰香荆芥散治肛門脫出大人小兒悉主之香附荆芥為末每用三匙水一大碗煎十來沸服又方用五棓子為末每三錢水二盞煎减半入白礬一塊放小桶內洗之立效鐡粉散治脫肛歷年不愈鐡粉研細每用少許摻之控令入即愈又方用木賊燒灰存性為末摻肛門上按之水聖散子治小兒脫肛不收浮萍草晒乾為細末乾貼用磨刀水洗亦效淋閉叙論淋古謂之癃名稱不同也癃者罷也淋者滴也今名雖俗於義為得古方皆云心腎氣鬱致小腸膀胱不利復有冷淋濕淋熱淋等屬外所因既言心腎氣鬱與夫驚憂思恐即內所因况飲啖冷熱房室勞逸及乘急忍溺多致此病豈非不內外因三因偹明五淋通貫雖證狀不一皆可類推所謂得其要者一言得而終也內經云膀胱不利為癃不約為淋首句缺酌淋證治諸淋大率有五曰冷曰熱曰膏曰血曰石五種不同皆以氣為本多因淫情交錯內外兼并清濁相干隂陽不順結在下焦遂為淋閉生附散治小便冷淋祕澀數起不通竅中疼痛增寒凛凛多因飲水過度或為寒泣心虛志耗皆有此證附子生去皮臍滑石各五錢瞿麥木通半夏各三分右為末每服二錢加薑七片燈心二十寸蜜半匙煎七分空心服石葦散治熱淋多因腎氣不足膀胱有熱水道不通瀝淋不宣出少起數臍腹急痛蓄作有時勞倦即發或尿如豆汁或便出砂石石葦去毛木通各三兩甘草當歸王不留行各一兩滑石白术瞿麥芍藥秋葵子各三兩為末每服二錢煎小麥湯調下空心日三服兼治大病後餘熱不解後為淋者地膚子湯治下焦有熱及諸淋閉不通地膚子三兩知母黃芩猪苓瞿麥枳實升麻通草葵子海藻各二兩洗去腥右㕮咀每服四錢大便俱閉者加大黃女人房勞小便難大腸滿痛脉沉細者用猪腎半隻水二盞煎减半去腎下藥煎七分服鹿角霜丸治膏淋多因憂思失意志舍不寧濁氣干清小便淋閉或復黃赤白黯如脂膏狀疲極筋力或傷寒濕多有此證鹿角霜茯苓秋石各等分為末糊丸米湯下五十丸葎草汁治膏淋及尿血葎草搗汁三升醋二合和空心服一盞又濃煮汁飲亦治淋瀝尿血立效散治血淋多因下焦結熱小便黃赤淋閉疼痛所出如血或外挾風冷風熱或內傷志勞神或房室過度丹石發動便鮮血者為風熱傷心瘀血者為風冷傷腎及大小便俱出血者瞿麥穗一兩炙草三分山梔五錢炒右為末每服五錢至六七錢水一碗入葱白三寸棗七個燈心五十寸生薑五片同藥煎此藥未必均治宜煎木通湯下麝香鹿茸丸兔絲子丸等所以養生方云不可專以血得熱則淖溢為說於理甚明不復詳引丸方見虛損門石燕丸治石淋多因憂思鬱氣注下焦結熱所食醎氣而成令人小便磣痛不可忍出砂石而後小便通石燕燒令通紅水中淬三次搗研水飛焙乾滑石石葦葉去毛瞿麥穗各一兩右為末糊丸桐子大煎瞿麥燈心湯下十丸食前服日二三甚則石葦瞿麥各一錢通草四錢陳皮茯苓各三錢為末每服三錢水煎七分服瞑眩膏治諸淋疼痛不可忍及砂石淋證大蘿蔔一個切一指厚四五片好白蜜淹少時置鐵鏟上慢火炙乾則再蘸蜜取盡二兩蜜翻覆炙令香軟不可焦候溫細嚼以鹽湯送下立效沉香散治氣淋多因五內鬱結氣不得舒隂滯於陽而致壅閉小腹脹滿使溺不通大便不通分泄小便方利沉香石葦滑石王不留行當歸各五錢葵子白芍各三錢炙草橘皮各一分為末煎大麥湯下二錢髮灰散治飲食忍小便或走馬及房勞致而壅閉轉胞臍下急痛不通髮灰研細用二錢米醋二合湯少許調服一法與葵子等分為末飲調二錢服訖即炒黑豆葉尉其上則通猪苓散治傷風感寒脉浮發熱渴欲飲水小便不利猪苓茯苓澤瀉阿膠滑石各等分煎服五苓散治傷寒暑夜熱小便不利煎茅根湯調下甚妙方見傷暑門料簡方書所載淋證狀不一出所謂諸淋亦不能盡偹若隨其所因而命名如勞如驚如寒如濕如風如暑以至暴淋等雖無定論皆不出三因之所致也當詳此施治無施不可又有轉胞以胞系了戾小便不通證狀自别不可不辨然治之亦當利其小便古方令服腎氣八味丸其中有茯苓故也遺尿失禁證治經云膀胱不利為癃不約為遺尿者乃心腎氣傳送失度之所為也故有小澀而遺者有失禁而出不自知者又婦人産蓐産理不順致傷膀胱遺尿無時又小兒胞冷尿牀亦照成人者治之各有主方家韭子丸治少長遺尿及男子虛極陽氣衰敗小便白濁夜夢泄精此藥補養元氣進飲食韭子六兩鹿茸四兩酥炙蓯蓉牛膝熟地當歸各二兩巴㦸兔絲各一兩半杜仲石斛肉桂炮薑各一兩右為末酒糊丸每服五十丸加至百丸鹽湯溫酒下小兒遺尿多因胞寒亦禀受不足故也别作小丸服之阿膠飲治小便遺失不禁阿膠二兩牡蠣鹿茸酥炙各四兩每服四錢空心服張真君茯苓丸治心腎氣虛神志不守小便淋瀝不禁及遺精白濁白茯苓赤茯苓等分為末以新汲水挼洗澄去新沫别取地黃汁同好酒熬膏搜和為丸彈子大空心鹽酒嚼下雞內金散治溺牀失禁雞䏶胵一具并腸洗淨燒為灰男用雌者女用雄者以瓦上炙脆研細酒調服又方以羊肚系盛水令滿線縛兩頭煮熟取中水頓服又方以猪脬胞洗淨鐵鏟上炙香熟細嚼酒下九蟲叙論古方論九蟲雖未必有亦當備識其名狀若蛔蟲則固不待言而知其他皆由臟虛雜食肥甘宣節不時腐敗凝滯之所生也又有神志不守精魂失守及五臟勞熱又病餘毒氣血積鬱而生或食瓜果與夫畜獸內藏遺留諸蟲子類而生不可具載亦猶生􅛎殆非九數可盡姑列諸例為學者偹九蟲例九蠱者一曰伏蟲長四寸為羣蟲之長二曰白蟲長一寸相生至多其母長至四五尺則殺人三曰肉蟲狀如爛杏令人煩滿四曰肺蟲其狀如蠶令人咳五曰胃蟲狀如蝦蟆令人吐逆嘔噦六曰弱蟲狀如瓜瓣令人多唾七曰赤蠱狀如生肉令人腸鳴八曰蟯蟲狀如菜蟲居洞腸間多則為痔漏􅏴疽諸無所不為九曰蛔蟲長一尺貫心則殺人又有尸蟲與人俱生狀如犬馬尾或如薄筋依脾而居長三寸則害人然多因臟虛寒勞熱而生治之有各方焉九蟲治法烏梅丸治蛔厥冷病者靜而復煩須臾復止臟氣上入膈故煩得食而嘔又煩者蛔聞食臭出其人自吐蛔烏梅一百五十個當歸川椒細辛附子肉桂人參黃柏各三兩炮薑五兩川連八兩右為末以苦酒浸烏梅肉一宿去核蒸之五斗米下熟搗成泥和藥入臼中與蜜杵一二千下丸桐子大服十丸至二三十丸集效丸治因臟腑虛弱或多食甘肥以致蛔蟲動作心腹絞痛發則腫聚往來上下痛有休止腹中煩熱口吐涎沫是蛔咬宜服此藥若積年不瘥亦愈又治下部有蟲并痔漏痛癢木香鶴虱檳榔蕪荑訶子附子炮炮薑各七分大黃三分半右為末蜜丸桐子大陳皮湯下三十丸婦人醋湯下化蟲圎治寸白蟲兼治諸蟲硫黃一兩木香五錢蜜陀僧三分附子生用一枚先以附子為末用好醋一升熬成膏入三藥和丸桐子大荆茶清放冷下二十丸蟲即化為水檳榔散治諸蟲在臟腑久不瘥檳榔一兩為末茶蜜湯下一錢咳嗽叙論人之所以滋養其身者惟氣與血呼吸定息衛氣之常失常則為嗽津液流潤榮血之常失則為痰涎咳嗽吐痰氣血已亂矣顧世治嗽之藥極多而卒不能遍效者蓋其致病之因不一世謂五嗽且以五臟而言之要之內因七情外合六淫飲食起居房勞呌呼皆能單復綺互而為病故經云五臟六腑感寒熱風濕皆令人咳又微寒微咳厲風所吹聲嘶發咳熱在上焦咳為肺痿秋傷濕冬咳嗽皆外所因喜則氣散怒則氣激憂則氣聚思則氣結悲則氣緊恐則氣怯驚則氣亂皆能發咳即內所因其如飲食生冷房勞作役致咳尤多皆不內外因其可一法而治之當推其三因隨脉證治療之散之下之溫之吐之以平為期外因證治傷風咳者憎寒壯熱自汗惡風口乾煩躁傷寒咳者憎寒發熱無汗惡寒煩躁不渴傷暑咳者煩躁引飲口燥或吐涎沫聲嘶咯血傷濕咳者骨節煩疼四肢重著灑灑浙浙並屬外因診其脉浮為風緊為寒數為熱細為濕隨其部位與人迎相應推其臟腑則見病源也內因證治喜傷心者咳而喉中介介如腫狀甚則咽腫喉痺名曰心咳咳不已則小腸受之小腸咳狀與氣俱失怒傷肝者咳而兩脅下痛甚則不可以轉轉則兩胠下滿名曰肝咳咳不已則膽受之膽咳之狀咳嘔之狀膽汁思傷脾者咳而右脅下痛隂隂引肩背甚則不可以動名曰脾咳咳不已則胃受之胃咳之狀咳而嘔嘔甚則長蟲出憂傷肺者咳而喘息有聲甚則唾血名曰肺咳咳不已則大腸受之大腸咳狀咳而遺屎恐傷腎者咳而腰背相引痛甚則咳涎名曰腎咳咳不已則膀胱受之膀胱咳狀咳而遺尿久咳不已則三焦受之三焦咳狀咳而腹滿不欲食此等皆聚於胃關於肺肺與肺俞最近故內因多先有所感世人並名肺咳嗽也並屬內所因診其脉隨其部位與氣口相應浮緊則虛寒沉數則實熱弦澀則少血洪滑則多痰以此類推無施不可不內外因病者咳嗽發作寒熱引腰背痛或復喘滿此因房勞傷腎病者中滿腹脹搶心痛不飲食此因飢飽傷脾病者咳嗽左脅疼引小腹并膝腕疼此因疲極傷肝病者咳嗽吐白涎口燥聲嘶此因呌呼傷肺病者咳嗽煩熱自汗咽乾咯血此因勞神傷心並屬不內外因診其脉隨其證假如尺脉浮澀而數則知傷腎右關脉濡則知飲食傷脾左關脈弦短則知疲極傷肝不應人迎氣口者即是不內外因皆可類推咳嗽治法華蓋散治肺虛或感風寒暑濕及勞逸抑鬱憂思喜怒飲食飢飽致臟氣不平咳嗽膿血漸成肺痿增寒發熱羸瘦困頓皮膚甲錯將成癆瘵甜葶藶苦葶藶各五錢並用隔紙炒茯苓人參細辛炮薑桔梗杏仁去皮尖麩炒紫苑欵冬炙草陳皮各一分右為末用羊肺一個心血不透者切細研爛漸漸入藥摻肺內再研勻藥盡為度泥土牆上以濕紙七重蓋覆每日去紙一重七日藥就候乾刮下再研羅為細末每服二錢溫酒鹽湯調下米飲亦得日三服五味子湯治秋冬之交皮膚為寒濕所搏寒氣內折咳嗽晝夜不已陳皮四兩麻黃炙草杏仁去皮尖麩炒茯苓蘇子各一兩為末每服二錢煎七分帶熱服日三度白术湯治五臟傷濕咳嗽痰涎增寒發熱上氣喘急白术二兩五味茯苓各一兩甘草一分半夏四個洗去滑破作十六片右銼散分作十六服薑五片入半夏一片煎七分丁香烏梅丸治膈氣壅蔽外感風寒咳嗽涎白沫胸背痛不能俯仰口乾咽燥烏梅肉四兩紫蘇木瓜各二兩茯苓二兩四錢甘草三兩二錢檀香人參各七錢麝香一字為末用蜜一斤蠟二兩為丸如櫻桃大含化不以時人參散治咳嗽肺虛不能制下大腸泄瀉上氣喘急服熱藥不效人參欵冬罌粟殼醋炙各等分右㕮咀每服四錢加阿膠一片烏梅半個同煎七分睡正著時急喚醒服太白丹治肺感風寒發熱咳嗽無度枯礬鍾乳粉寒水石煅水飛各等分右研勻蒸餅糊丸如雞豆大每服一丸先嚼生薑胡桃各一片令細吸太陽氣和藥咽仍用清茶或溫酒送下阿膠散治一切咳嗽虛人老人皆可服阿膠麩炒馬兜鈴各一兩五靈脂研桑皮各五錢炙草一分右為末每服一錢平氣飲治一切咳嗽嘔吐痰涎惡風不能食人參白术川芎當歸五味炙草各一分木瓜蘇子茯神烏藥杏仁肉桂白芷各等分為末每服二錢薑三片棗一枚煎七分溫服杏仁煎治暴嗽失音不語杏仁去皮尖桑皮生薑汁蜜砂糖各一半木通貝母各一兩三錢紫苑五味各一兩右將桑皮木通貝母紫苑五味為銼散以水三升慢火熬取一升濾去渣入杏仁糖蜜薑汁熬成膏旋含化蛤蚧散治元氣虛寒上氣咳嗽經年不瘥蛤蚧一對炙煉鍾乳欵冬花肉桂白礬飛過炙草各五錢右為末每服五分以蘆管吹之或覺咽乾口燥以茶酒送下欵冬花散治傷風冷嗽諸未效欵花一味為粗末爐上燒以酒漏斗蓋吸咽烟覺咽乾口燥以茶酒送下白散子治經年咳嗽不愈者附子一枚煨熟新水浸一時久去皮臍焙乾為末每服一錢白沙蜜二錢煎七分服青金丹治肺虛氣壅咳嗽喘滿咯痰血杏仁去皮尖一兩牡蠣煅取粉入杏仁同炒黃色去牡蠣粉不用青黛一兩右研勻入黃蠟一兩鎔投和丸彈子大壓匾如餅每日中用乾柿一個去核入藥在內濕紙裹煨約藥鎔方取出去火毒細嚼糯米飲下一法名甲乙餅治嗽出血片兼涎內有血條不問年久月深但聲啞者一服效用青黛一分牡蠣粉二錢杏仁七粒去皮尖研蠟丸子湯便並同用僧伽應夢人參散治風壅痰嗽咯血及傷寒體熱頭疼白芷乾葛青皮桔梗白术人參各三兩炙草一兩五錢炮薑一錢右為末每服二錢薑三片棗二枚煎七分如傷寒加豉數粒同煎數服大有神效神效散治老少嗽喘神效杏仁一兩半去皮尖炙草旋覆花各三兩白术蓮肉射干前胡御米百合水浸去沫扁豆炒川芎各三兩人參茯苓各四兩神麯炒五錢乾葛六兩桔梗七兩右為末每服二錢薑三片棗二枚煎七分服三因極一病證方論卷十二
