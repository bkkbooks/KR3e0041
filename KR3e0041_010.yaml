body:
  text: 三因極一病証方論卷十宋陳言撰勞瘵叙論夫骨蒸殗殢復連尸疰癆疰蟲疰毒疰熱疰冷疰食疰鬼疰等皆曰傳尸者以疰者注也病自上注下與前人相似故曰疰其變有二十二種或三十六種或九十九種大略令人寒熱盗汗夢與鬼交遺泄白濁髪乾而聳或腹中有塊或腦後兩邉有小結核連復數箇或聚或散沉沉黙黙咳𠻳痰涎或咯膿血如肺痿肺􅏴狀或復下痢羸痩困乏不自勝持積月累年以致於死死後乃疰易傍人以至滅門者有之更有飛尸遁尸塞尸喪尸尸疰等謂之五疰及大小附著等証不一知其所苦無䖏不惡乃挾諸鬼邪而害人以三因推之内非七情所忤外非四氣所襲雖若麗乎不内外因奈其証多端傳變遷移難以推測故自古及今愈此病者十不得一所謂狸骨獺肝天靈葢銅鏡鼻徒有其説未嘗見效惟膏肓俞崔氏穴若早知灸之可愈若稍晩亦不濟也近集得經騐方服之頗效漫録於左餘缺以俟明哲勞瘵諸証病者増寒發熱自汗面白舌乾口苦精神不守恐畏不能獨卧其傳在肝病者増寒發熱面黒鼻燥忽忽喜忘大便苦難或復泄瀉口瘡其傳在心病者増寒發熱面青唇黄舌本强不能嚥飲食無味四肢羸痩吐涎沫其傳在脾病者増寒發熱面赤鼻白乾燥毛折咯𠻳喘急時吐白沫或有血線其傳在肺病者増寒發熱面黄耳輪焦枯䯒骨㾓痛小便白濁遺瀝胸痛其傳在腎所謂勞蒸者二十四種随証皆可考尋毛折髪焦肌膚甲錯其蒸在皮外人覺熱自反惡寒身振瞤劇其蒸在肉髪焦鼻衂或復尿血其蒸在血身熱煩躁痛如針刺其蒸在脉爪甲焦枯眼昏兩脇急痛其蒸在筋板牙黒燥大杼酸疼其蒸在骨背膂疼痛䯒骨酸嘶其蒸在髄頭眩熱悶口吐濁涎眼多眵淚其蒸在腦男子失精女人白濁其蒸在玉房乍寒乍熱中脘與膻中煩悶其蒸在三焦小便赤黄凝濁如膏其蒸在膀胱傳道不均或秘或泄腹中雷鳴其蒸在小腸大腹隠痛舌鼻乾疼其蒸在大腸口鼻乾燥腹脹睡卧不安自汗出其蒸在胃口苦耳聾脇下痛其蒸在胆裏急後重肛門澁閉其蒸在囬腸小腹㽲痛筋脉緩縱隂氣自重强其蒸在宗筋眼昏淚下時復眩暈躁怒不常其蒸在肝舌焦黒氣短煩悶洒洒析析其蒸在心唇乾口瘡胸腹脹悶畏寒不食其蒸在脾咳𠻳喘滿吐痰咯血聲嘶音啞其蒸在肺耳輪焦枯脚氣酸痛起居不得其蒸在腎情想不寧無故精泄白物綿綿而下其蒸在右腎心主胞絡心膈噎塞攻擊疼痛俯仰煩寃其蒸在膈諸証雖曰不同其根多有蟲嚙其心肝治之不可不絶其根也勞瘵治法取勞蟲方青桑皮栁枝石榴皮桃枝梅枝各七莖各長四寸許青蒿一小把右用童便一升半葱白七莖煎及一半去滓别入安息香阿魏各一分再煎至一盞濾清調硃砂末五分梹榔一分麝香一匙分作二服調下五更初一服五更三㸃時一服至已牌時必取下蟲紅色者可救青者不治見有所下即進軟粥飯温煖將息不可任意及食生冷毒物合時須擇良日不得令貓犬孝服穢惡婦人見神授散治諸傳尸勞氣殺蟲方得之於清源郡王府川椒二斤去目并合口者炒去汗右為末每服二錢空心米湯下須癉悶暈少頃如不能禁即以酒糊為丸桐子大空心服三五十丸昔人嘗與病癆婦人交婦人死遂得疾遇一異人云氣已入臟遂與此方急合服二觔其病當去如其言服之㡬盡大便出一蟲如蛇自此遂安續有人服之獲其效者多矣潤神散治勞瘵増寒發熱口乾咽燥自汗疲劇煩躁人参黄茋麥冬桔梗炙草淡竹葉右各等分為末每服二錢自汗加小麥同煎温金散治積勞咳𠻳喘悶咯痰其中有血杏仁去皮尖以五味各一兩米泔浸一宿取出乾去五味不用略炒麥冬一錢桑皮五錢茯神五錢防風黄芩各五錢甘草右為末每服二錢入黄蠟如指大同煎七分食後熱服蛤蚧散治積癆久𠻳失音蛤蚧一對去口足水浸去膜刮去血脉用好醋炙訶子阿膠熟地麥冬細辛甘草各五錢為末蜜丸皂莢子大每服一丸含化不拘時服蘇合香丸治傳尸骨蒸殗殢肺痿疰忤鬼氣氣厥氣不和者甚有神效蘇合香油一兩入安息香内安息香二兩另為末用無灰酒一升熬膏乳香龍腦各一兩白术硃砂青木香丁香白檀香沉香犀角鎊香附訶子麝香蓽撥各二兩右為末用安息香等膏同煉蜜丸如桐子大早朝井花水温冷任意化下四丸老人小兒一丸温酒化服用黄蠟丸裹縫紗囊盛帶亦可辟邪疰忤中惡証治病者卒心腹脹滿吐利不行如乾霍亂狀世所謂中惡是也由人精神不全心志多恐遂為邪鬼所擊或復附着沉沉黙黙寢卧譫語誹謗罵詈訐露人事不避嫌疑口中好言未然禍福及至其時毫髪不失人有起心已知其肇登渉險髙如履平地或悲泣呻吟不欲見人其狀萬端如醉如狂不可概舉此皆鬼神及諸精魅附着惑人或復觸犯忌諱土地神靈為其所作非有真實但随方俗考騐治之還魂湯治卒中惡感忤鬼擊飛尸諸奄忽氣絶無復知覺或已死絶口噤不開去齒下湯或湯入口不下者分病人髪左右捉踏肩引之藥下復増取盡一升須㬰立甦麻黄三兩去節煮過桂枝二兩甘草一兩杏仁去皮尖二百五十粒桃奴丸治心氣虚有熱恍忽不常言語錯亂尸疰客忤魘夢不祥小兒驚癎並宜服之桃奴七枚另研硃砂五錢另研牛黄另研龍腦各一分另研桃仁十四粒去皮尖麸炒生玳瑁鎊一兩雌黄桃葉煮水研飛三分黒犀鎊五錢麝香一兩另研琥珀三分另研安息香一兩無灰酒洗去砂以銀器入桃仁琥珀熬成膏右為末和入前膏丸如芡實大隂乾磁器封閉静室安置煎人参研下一丸食逺臨卧服蘇合香丸治卒中惡忤疰方見前蠱毒叙論廣西閩中山間人以蛇虺蜈蚣蜒蝣蝦蟆等百蟲同器畜之使其自相啖食勝者為靈以事之取其毒雜以菜菓飲食之類以害人妄意要福以圖富貴人或中之証狀萬端廣如治百蠱説或年嵗聞人多死又有人家香火伏事如家先者亦謂之蠱能病人世謂之蠱註以姓類屬五行謂之五蠱此皆邉鄙邪僻之地多有此事中都則蔑聞也中蠱証治夫中蠱毒者令人心腹絞痛有如物嚙吐下血皆如爛肉若不急治食人五臟即死騐之令病人唾水中沉者即是蠱有人行蠱毒以病人若欲知其姓名以敗鼓皮燒灰作末飲服方寸匕湏臾自呼蠱家姓名可語令呼喚將去則愈治之亦有方丹砂丸治毒從酒食中下蠱者端午日合辰砂另研雄黄另研水飛赤足蜈蚣續随子各一兩麝香一分右為末糯米飲為丸雞荳大若覺中毒即以酒下一丸蛇蝎所螫醋磨塗之凡例凡諸蠱多假是假蠱毒藥以投之知時宜煮大豆甘草薺苨汁飲之通治諸藥毒礬石散治中諸物毒晉礬建茶各等分為末每服三錢新汲水調下得吐即止未知再作觧毒丸治悞食毒草並百物毒救人於不死貫仲去毛青黛甘草各一兩板藍根四兩洗净日晒乾右為末蜜丸桐子大以青黛别為衣如稍覺精神恍忽惡心即是悞中諸毒急取藥十五丸嚼爛用新汲水送下即解此方傳自異人京師陳道士用水浸炊餅為丸尤妙亦解暑毒青黛雄黄丸凡始覺中毒及蛇蟲咬癰疽纔作即服此令毒氣不聚上好青黛雄黄等分為末新汲水調下二錢凡中毒嚼生黒荳不腥氣嚼白礬味甘者皆毒無疑蛇蟲傷治法白芷散治惡蛇咬傷頓仆不可療者香白芷一味為末水調下頃刻咬處出黄水腫盡消皮合白礬半夏散治蝎螫痛不可忍白礬半夏等分為末釅醋調貼五絶治法凡魘寐産絶自縊壓溺五者令人卒死謂之五絶半夏散治魘寐卒死及為墻屋竹木所壓水溺金瘡卒致悶絶産婦惡血冲心諸暴絶証半夏湯泡去滑七次為末吹鼻中大荳許立甦但心頭温者可治牡丹散治産後血暈悶絶若口噤則撬開灌之必効丹皮大黄芒硝各一兩冬𤓰子半合桃仁二十七粒去皮尖右㕮咀每服五錢水三盞煎半去滓入芒硝再煎分二服救自縊法徐徐抱解不得截繩上下安被卧之一人以脚踏兩肩手少挽其髪當絃勿縱之一人以手按胸上數動之一人摩將臂脛屈伸之若已强但漸屈之并按其腹如此一炊頃氣從口出呼吸眼開而猶引按莫置亦勿苦勞之須㬰可少進湯及粥清含與之令濡喉漸漸能嚥乃稍稍止耳外令兩人以管吹其兩耳此法最善無不活者自旦至暮雖冷亦可自暮至旦少難救壓死方以死人安着將兩手袖掩其鼻口眼上一食頃乃活眼開乃與熱小便若初覺氣絶而不能言可急劈開口以熱小便灌之打撲悶絶者亦可用此夫壓死折傷惟禮法君子守垂堂巖墻之戒固無是事然安車良馬時有跌足奔輪歩砌臨流未免虚舟飄瓦况行商征賈捕獵漁人渉歴既多不測尤甚其如寃仇加害凶險刼持打撲金瘡皆致夭枉治之不可不急也雞鳴散治從髙墜下及木石所壓凡是傷損血瘀凝積氣絶死并久積瘀血煩躁疼痛呌呼不得並以此藥利去瘀血即愈大黄一兩酒蒸桃仁三四十粒去皮尖右研細酒一盞煎六分雞鳴時服次日取下瘀血即愈若氣絶不能言取藥不及即劈開口以熱小便灌之大獄活血丹治男子婦人外傷内損狗咬蟲傷驢馬撲墜手足傷折一切疼痛腹中瘀血刺脇築心及左癱右瘓走注疼痛産後敗血灌注四肢並宜服之花桑枝取臂火者炭火煆赤烟盡淬於米醋中取出焙乾一斤金墨半斤一半用萆麻三兩研細塗墨上塗盡薄紙裹黄泥濟令乾火煆通紅冷地葢去火性一半用醋化􅗠砂二兩塗盡炙乾大黒荳一斤去皮焙乾亂髪二斤煆存性栗楔一斤用栗蓬中心扁者薄切晒乾乳香四兩細研入米醋一碗熬膏皂角刺一斤燒通赤淬粱醋内焙乾右六味為末入乳香膏内和杵三千下丸如彈子大如膏少加醋糊痛者一服一丸輕者半丸以無灰酒一盞乳香一荳大先磨香盡次磨藥盡煎三五沸臨卧時温服以痛䖏就牀卧如欲出汗以衣被覆之仍用藥磨塗損處忌一切動風物婦人諸疾服者用當歸一錢依法煎服孕婦忌服接骨散治跌撲手脚脛骨脆折水蛭不拘多少於新瓦上炙令香熟勿太過為末每服一錢熱酒調入麝香五分折處不可手觸藥行良久覺痛折處漸痒如蟻噆之遂要人捻揉骨折處相接即用杉木夾縛兩三日去之骨全矣花蕊石散治一切金瘡打撲傷損或内損血入臟腑壅溢作衂及婦人産後敗血不散蕊石一斤研細末上色硫黄四兩研細右二味拌匀入藏瓶中以紙筋搗黄泥固濟候乾焙令熱透以磚襯瓶底用白炭十斤頂上發火燒炭盡候冷取出再研極細諸臟傷及婦人産後瘀血不行并用童便温酒調一二錢匕取瘀血取效白芨散治鼻衂即止白芨不拘多少為末冷水調用紙花貼鼻窊中救溺死法竈中灰急將溺者埋灰中從頭至足水出七升即活驚悸証治夫驚悸與忪悸不同驚悸則因事有所大驚或聞虚響或見異相登髙渉險夢寐不祥驚忤心神氣與涎鬰遂使驚悸名曰心驚胆寒在心胆經屬不内外因其脉必動忪悸則因汲汲富貴戚戚貧賤久思所愛遽失所重觸事不意氣鬰涎聚遂致忪悸在心脾經意思所生屬内所因或冐寒暑濕閉諸經令人忽忽若有所失恐懼如人將捕中脘忪悸此乃外邪非因心病况五飲停蓄閉於中脘最使人忪悸治屬飲家除悸與外内因所治各見本門温胆湯治心胆虚怯觸事易驚或夢寐不祥或見異物致心驚胆懾氣鬰生涎涎與氣搏變生諸証或短氣悸乏或體倦自汗四肢浮腫飲食無味心虚煩悶坐卧不安半夏枳實竹茹各二兩橘皮三兩茯苓一兩五錢炙草一兩加生薑五片枣一枚同煎七分鎮心丹大治驚悸辰砂用黄松節酒煮過龍齒用逺志苖醋煮右二味等分為末猪心血為丸如芡實大每服一丸以麥冬菉豆燈心生薑白蜜煎豆熟為度臨卧嚥下小兒磨半定志丸治心驚胆懾逺志薑汁淹炒菖蒲各二兩茯苓茯神人参各一兩右為末蜜丸桐子大硃砂為衣米湯下五十丸寒水石散治因驚心氣不行鬰而生涎涎結為飲遂為大疾忪悸愪㦜不自勝持少小遇驚尤宜服之但中寒者不宜服寒水石煆滑石煆各一兩甘草一錢右為末每服二錢熱則新汲水下怯寒則薑棗湯下入龍腦少許尤佳小兒量嵗與之自汗証治夫自汗多因冐風傷暑及喜怒驚恐房室虚勞皆能致之無問睡醒浸浸自出名曰自汗或睡着汗出名曰盗汗若其飲食勞碌負重渉逺登髙疾走因動汗出非自汗也人之氣血猶隂陽之水火平則寧偏則過隂虚陽必凑故發熱自汗如水熱自湧陽虚隂必乘故發厥自汗如水溢自流考其所因風暑渉外喜怒驚渉内房室虚勞渉不内外理亦甚明其間如􅊓癤腸􅏴脚氣産蓐等病皆有自汗治之當推其所因為病源無使混濫如經脉别論所載但原其汗所出處初非自汗証不可不知正元散治下元虚臍腹脹滿心脇刺痛泄利嘔吐自汗陽氣漸㣲手足厥冷及傷寒隂証霍亂轉筋久下冷痢少氣羸痩一切虚寒並宜服之常服常助陽消隂正元氣温脾胃進飲食人参茯苓白术甘草黄茋烏藥山藥薑汁炒附子川芎乾葛各兩烏頭炮去皮臍桂心各五錢紅荳乾薑橘皮各三錢右為末每服二錢薑一片枣一枚鹽少許煎七分食前温服自汗加浮麥牡蠣散治諸虚不足及新病暴虚津液不固體常自汗夜卧即甚久而不止羸瘠枯痩心忡驚惕短氣煩倦牡蠣米泔浸煆麻黄根黄茋各一兩右剉散每服三錢浮小麥一百粒同煎一法為細末每服三錢葱白三寸煎一盞半分五服麥煎散治榮衛不調夢内盗汗四肢煩疼飲食少膚痩黄秦芁鱉甲醋煮三五十沸去裙醋塗炙黄柴胡各二兩乾漆炒烟盡人参茯苓乾葛川烏炮去皮尖各一兩𤣥参右為末每服二錢先用小麥三七粒煎湯一盞去麥入藥煎七分臨卧服如久患後亦宜服此以其退勞倦調理經絡桂枝湯治傷風自汗桂枝芍藥甘草加薑三片枣一枚煎服却暑散治傷暑自汗赤茯苓甘草各四兩寒食麵生薑各一斤為末每服二錢新汲水調下防己黄茋湯治傷濕自汗防己四兩黄茋五兩炙草三兩白术三兩加薑三片枣三枚温粉止汗如神川芎白芷藁本各一分米粉二分撲身上消渇叙論夫消渇皆由精血走耗津液枯乏引飲既多小便必數浸浸衰㣲肌肉脫削諸脉不榮精髄内竭推其所因渉内外與不内外古方不原病本但出禁忌似屬不内外因藥中用麻黄逺志得非内外兼并况心虚煩悶最能發渇風寒暑濕病冷作熱入干腎經引水自救皆明文也不知其因施治錯悞縁醫之大患不可不知三消脉証渇病有三曰消渇消中消腎消渇屬心故煩心致心火散漫渇而引飲經云脉軟散者當病消渇諸脉軟散皆氣虚血虚也消中屬脾痺熱成則為消中消中復分為三有熱中寒中强中寒中隂勝陽鬰乆必為熱中經曰脉洪大隂不足陽有餘則為熱中多食數溲為消中隂狂興盛不交精泄則為强中三消病至强中亦危矣消腎屬腎盛壯之時不自謹惜快情恣慾極意房中年長腎衰多餌丹石真氣既喪孤立唇口焦乾精溢自洩不飲而利經云腎實則消不渇而小便自利名曰腎消亦曰内消三消治法真珠丸治心虚煩悶或外傷暑熱内積愁煩酣飲過多皆致煩渇口乾舌燥引飲無度小便或利或不利知母一兩川連一兩苦参一兩𤣥参一法無鐡孕粉一兩牡蠣一兩硃砂二兩麥冬苦粉各五錢銀箔二百片一法有白扁荳一兩金箔二百片右為末蜜入生花粉汁少許丸如桐子大用金箔為衣每服二十丸先用生花粉汁下一服次用麥冬熟水下病退日二服忌炙煿酒色次服蓯蓉丸補之肉蓯蓉丸肉蓯蓉酒浸磁石煆醋淬熟地山茰桂心山藥牛膝茯苓黄芪鹽水炒澤瀉􅎷茸去毛切片酥炙逺志石斛覆盆五味萆觧破故紙巴㦸去心酒浸兎絲酒浸龍骨杜仲薑汁炒去絲各五錢附子製六錢右為末蜜丸桐子大米湯下五十丸薑粉散治消中多因外傷痺熱内積憂思喜啖鹹食及麵致脾胃乾燥飲食倍常不為肌膚大便反堅小便無度生薑輕粉捜匀每服二錢長流水調下齒浮是效次投猪肚丸附子猪肚丸附子梹榔各一兩鱉甲一兩當歸知母木香川練秦芁大黄龍胆白芍破故紙枳殻各五錢右為末分作三分入猪肚内縫定令蜜酒三升童便五升同入砂鍋煮爛搗細入一分末同搗捜為丸桐子大温酒米湯下五十丸烏金散治熱中多因外傷燥熱内傷用意傷脾飲啖肥膩熱積胸中致多食數溲小便過於所飲亦有不渇而飲食自消為小便者黄丹京墨煆各一兩研匀每服三錢食後先用水一碗𠻳口待心中熱索水便以冷水調下爛金丸治熱中消渇止後將補精血益諸虚解勞倦去骨節間熱定心强志安神定魄固臟腑進飲食免生瘡瘍猪肚一個黄連三十兩蜜生薑各二十兩先將猪肚洗浄復以葱麵醋椒等洗控乾同煎藥并水酒入銀石器内煮半日漉出黄連洗出蜜酒令盡剉為細末再用酒調膏入洗净猪肚内縫定入銀石器内水熬爛研為膏捜下項藥人参二兩黄茋四兩五味山藥杜仲石斛山茰車前鱉甲熟地當歸新蓮肉各二兩槐角茯苓磁石各一兩川芎沉香各五錢麝香一錢兎絲子一兩為末用猪肚膏捜和得所膏少則添熟蜜杵千百下丸桐子大食前温酒糯米湯下五十丸一法有白术二兩陽起石一兩石子薺苨湯治强中多因躭嗜色慾及快意飲食或服丹石真氣既脫致煩渇飲水飲食倍常隂氣常興不交精出故中焦虚熱注於下焦三消之中最為難治薺苨石膏各三兩人参茯苓花粉磁石知母乾葛黄芩甘草各二兩右剉散用水三盞腰子一隻去脂膜黒豆一合煮至盞半去腰子大豆入藥四錢煎七分去滓食後服下焦熱則夜間服渇止勿服次投補藥黄連猪肚丸治强中消渇先服石子薺苨湯病若退可服此補養黄連粱米花粉茯神各四兩知母麥冬各二兩右為末用猪肚洗極净入藥末縫定甑中炊極爛取出藥别研猪肚為膏捜前藥得所乾即添蜜少許杵數千下丸桐子大食前服胡桃丸治消腎亦曰消渇亦曰内消多因快情縱慾極意房中年少懼不能房多服丹石及失志傷腎遂致唇口乾燥精溢自出或小便赤黄五色浮濁大便燥實小便大利而不甚渇茯苓桃肉附子一枚去皮臍切片薑汁一盞蛤粉一分同煎等分為末蜜丸桐子大米飲下三五十丸古瓦湯治消腎消中飲水無度小便頻數乾葛花粉人参雞䏶胵洗净焙乾各等分右為末每服二錢用多年古瓦碓碎煎湯調下不以時候服􅎷茸去毛切片三分麥冬二兩熟地黄茋雞䏶胵麩炒蓯蓉山茰破故紙牛膝五味各三分茯苓𤣥参各五錢人参三分地骨皮五錢右為末蜜丸桐子大米湯下三十丸逺志丸治心腎虚煩渇引飲胸氣短小便自利白濁泄遺人参茯苓炮薑牡蠣逺志各汁炒一兩右為末用蓯蓉一兩酒熬成膏丸如桐子大糯米湯下五十丸六神湯治三消渇疾蓮房乾葛枇杷葉炙草花粉黄芪各等分每服四錢小便不利加茯苓童根桑白皮湯治三消渇疾或飲多利少或不飲自利肌膚痩削四肢倦怠常服補虚止渇利童根桑白皮未移栽者取根去粗皮晒乾不焙茯苓人参麥冬乾葛山藥桂心各一兩甘草五錢𤣥兎丹治三焦渇利神藥常服固精止白濁延年兎絲子酒浸通軟乘濕焙乾十兩茯苓新蓮肉各三兩五味子酒浸七兩右為末另研山藥末六兩將所浸酒餘者添酒煮糊捜和搗千杵丸桐子大米湯下五十丸梅花湯治消渇疾大枣四十九枚鮮蓮肉四十九粒西木香一錢五分炙草二兩右用雄猪脊筋一尺二寸同煎藥用水五碗於銀石器内煮去滓取汁一碗空腹任意呷服八味丸治消渇小便多熟地八兩山藥四兩山茰四兩茯苓丹皮澤㵼各三兩肉桂附子各一兩文蛤散治渇欲飲水不止文蛤即五倍子最能囬津為末以水飲任調方寸匕不以時烏梅木𤓰湯治酒食過度中焦藴熱煩渇枯慘小便反多遂成消中兼治瘴渇所謂瘴渇北人徃南方瘴地多生此疾乾木𤓰烏梅麥芽草果去皮炒甘草各五錢右剉散四錢薑五片煎七分去滓不以時服羊乳丸治嶺南山瘴風熱毒氣入腎中變寒熱脚弱虚滿而渇黄連生花粉生地汁羊乳或牛乳人乳亦可和為丸米飲下三十丸一法濃煮小麥粥飲下渇疾有人依山谷方单用兎絲子酒浸透炒服甚效亦有用黄茋六兩甘草一兩服之尤效又渇人病愈須防發􅏴疽宜服忍冬丸忍冬草一味不拘多少根莖花葉皆可用一名老翁鬚一名蜜啜花一名金銀花右以米麯酒於瓶内浸以糠火煨一宿取出晒乾入甘草末少許即以所浸酒為糊丸桐子大每服五十丸至百丸酒飲任下不以時此藥不特治􅏴亦能止渇麥門冬煎治諸渇麥冬人参黄茋各二兩茯苓山茰山藥桂心各一兩半黒豆三合煮去皮另研為末以生地汁二碗牛乳二盞熬為膏丸桐子大麥飲下五十丸竹龍散治消渇五靈脂五錢黒豆五錢為末煎冬𤓰仁湯調下二錢澄源丹治三消渇疾神效牡蠣煆粉苦参蜜陀僧知母水銀以白蠟炒結砂子各一兩花粉黄丹一兩與水銀砂同研右為末男子用雌猪肚女子用雄猪肚入藥在内以線縫定用繩縛在新磚上别用生花粉半斤切碎同煮早晨至午時取藥出不用花粉只研爛猪肚和藥為丸每服三十粒食前米湯下日三服十日可去病根料簡或云渇無外所因且傷寒脉浮而渇屬太陽有汗而渇屬陽明自利而渇屬少隂及陽毒傷寒倍重燥甚而渇甚者有中暑伏熱累取不瘥而渇者有瘴毒氣染寒熱而渇者得非外因治法如傷寒論中不復繁引酒煮黄連丸治中暑熱渇最妙又有婦人産蓐去血過多而渇者名曰血崩非三消類不可不審五疸叙論古方叙五種黄病者即黄汗黄疸榖疸酒疸女勞疸是也觀别録則不至於斯然疸與黄其實一也今古立名異耳黄汗者以胃為脾表屬陽明陽明蓄熱喜自汗汗出因入水中熱必鬰故汗黄也黄疸者此由暴熱用冷水洗浴熱留胃中所致以與諸疸不同故用黄字字之又云因食生黄𤓰氣上薫所致人或疑其不然古賢非妄詮也必有之矣酒疸者以酒能發百脉熱由大醉當風入水所致榖疸者由失飢發熱食多傷胃胃氣衝鬰所致女勞疸者由大熱交接竟入水水流濕入於脾因腎氣虚脾以所勝尅入致腎氣上行故有額黒身黄之証世謂脾腎病者即此証也其間兼渇與腹脹者並難治發於隂必嘔發於陽則振寒而㣲熱雖本於胃氣鬰發土色上行然發於脾則為肉疸發於腎則為黒疸若論所因外則風寒暑濕内則憂怒喜驚酒食房勞三因悉偹世醫獨麗於傷寒論中不亦濫矣學者宜識之黄汗証治病者身體腫發熱不渇狀如風水汗出染衣色正黄如柏汁名曰黄汗桂枝加黄茋湯治黄汗身腫汗出出已輙輕久久必身瞤胸中痛腰已下無汗腰髖弛痛如有物在皮中劇者不能食煩躁小便不利桂枝芍藥各三兩甘草二兩黄茋五兩右剉散每服四錢薑五片枣二枚煎七分温服仍飲熱粥以助藥力覆取㣲汗未知再服黄茋苦酒湯治身體紅腫發熱自汗汗如栢汁其脉沉黄茋五兩芍藥桂枝各三兩右為剉散每服四錢苦酒三合煎至七分不以時服初服當心煩以苦酒阻故也至六七日稍愈黄疸証治病者發黄身面眼悉黄如金色小便如黄栢汁名曰黄疸麻黄醇酒治傷寒瘀熱不解鬰發於表發為黄疸其脉浮𦂳者以汗解之麻黄三兩去節以醇酒五升煮取二升每服一盞温服汗出愈秋冬用酒煮春夏用水煮榖疸証治病者發黄内熱食則腹滿眩暈榖氣不消胃中苦濁濁氣下流小便不通隂被其寒熱流膀胱身體盡黄名曰穀疸穀疸丸治胃蓄熱氣濁食穀不消大小便不利脹滿不下食趺陽脉𦂳而數亦治因勞發熱熱鬰發黄苦参三兩龍胆草一兩山梔去皮五錢人参三分為末猪胆汁入蜜丸大麥飲下五十丸日三服紅丸子最治穀疸蓬术醋煮三稜醋煮各三兩胡椒一兩青皮三兩麩炒阿魏一分右為末醋化阿魏入陳米粉為糊丸如桐子大礬紅為衣生薑甘草湯下酒疸証治五疸惟酒疸變証最多葢酒之為物随人性量不同有盈石而不醉者有濡吻而輙亂者以醖釀而成有大熱毒渗入百脉為病則不特發黄溢於皮膚為黒為腫流於清氣道中則眼黄鼻􅏴種種不同故方論中酒疸外有肉疸黒疸癖疸勞溢乃致令人恍忽失常等數証不同半夏湯治酒疸發黄身不熱清言了了腹滿欲嘔心煩足熱或成癖癥心口懊憹其脉沉弦或𦂳細半夏茯苓白术各三兩前胡枳殻炙草大㦸各二兩黄芩茵陳當歸各一兩每服四錢薑三片空心服二石散治肉疸小便多如白泔色因酒所致其脉弦滑凝水石煆水飛白石脂煅花粉肉桂各一兩兎絲子知母為末每服二錢大麥飲調下桂术湯治酒疸因下後變為黒疸目青面黒心中如啖韮薺狀大便正黒皮膚不仁其脉㣲而數肉桂白术各一兩枳實香豉乾葛杏仁甘草每服四錢當歸白术湯治酒疸發黄結飲癖在心胸間心下縱横堅滿骨肉沉重逆害飲食小便赤黄此由本虛飲食生冷與脾胃痰結所致其脉弦濇白术茯苓各三兩當歸黄芩茵陳各二兩前胡枳實杏仁半夏甘草加生薑七片人参飲治飲酒房勞酒入百脉令人恍忽失常人参白芍花粉枳殻茯苓枣仁炙草各一兩熟地二兩右剉散每服四錢食後臨卧服如神散治酒毒不散發黄久黄浸漬流入清氣道中宜引藥納鼻滴出黄水愈苦瓠子去皮苦葫蘆子去皮各二七個黄黍米三百粒安息香二皂子大右為末以一字搐入鼻中滴出黄水一升忌勿吹或過多即以黍穰燒灰射香末各少許搐鼻立止女勞疸証治夫交接輸瀉必動三焦上焦屬心中焦屬脾下焦屬腎動則熱熱則慾火熾因入水中二焦熱鬰故能黄下焦氣勝故額黒上焦走血随瘀熱行大便溏黒小腹急痛有男女同室而浴者多成此病攝生之人不可不知滑石石膏散治女勞疸身黄額黒日晡發熱惡寒小腹急足下熱其脉浮𦂳腹或滿者難治滑石煅石膏煅等分右為末以麥粥飲調下二錢日三四服小便利則瘥硝石礬石散治女勞疸其腹臚脹膀胱急欲作水狀大便黒者非水其脉滑腹滿者難治硝石煅汁盡礬石煅汁盡為末每服二錢大麥汁調下日三服重衣覆取汗病随大小便出大便黒小便黄是效雜勞疸証治五疸之外有時行瘴瘧風寒暑濕等証疸各不同茵陳梔子丸治時行病急黄及瘴瘧疫癘茵陳梔子芒硝杏仁去皮尖各三分豆豉湯浸軟另研二分常山鱉甲各五錢醋炙巴霜一分大黄一分為末餳糖為丸桐子大每服三丸飲下吐利為度未知加一丸艾煎丸治因傷風瘀熱不解發為風疸滿身皆黄小便或黄或白寒熱好卧不欲動其脉陽浮隂弱生艾三月採来搗取汁銅器煎如膏大黄川連花粉凝水石煅苦参葶藶隔紙炒各等分右為末以艾膏和得所丸如桐子大初服六七丸漸加至二十丸有熱加苦参渇加花粉小便澁加葶藶小便多加凝水石小便白加黄連大便難加大黄所加並倍之五苓散治伏暑鬰發黄小便不利發黄肉桂茯苓澤瀉猪苓白术各等分為末茵陳湯下礬石滑石散治濕疸始得之一身盡疼發熱面色黒黄七日後壮熱熱在裏有血下如肫肝色状小腹滿者急下之身盡黄小便不利其脉沉細礬石滑石等分為末每服二錢大麥粥飲下日三服便利如血者效或汗愈苦参散治人無漸忽然振寒皮膚麯塵出小便赤澁大便時燥心氣無異飲食不妨服諸湯不除因為久黄方苦参黄連𤓰蒂黄栢大黄各一分葶藶五錢為細末每服一錢當吐下随時消息加減小半夏湯治黄疸小便色不異欲自利腹滿而喘者不可除熱熱去必噦半夏每服三錢薑十片煎七分服養榮湯治五疸脚弱心忪口淡耳響㣲寒發熱氣急小便白濁當作虚勞治之人参白术黄茋當歸熟地白芍茯苓逺志五味甘草肉桂陳皮右剉散每服四錢薑三片大棗二枚煎服便精遺泄加龍骨一兩咳𠻳加阿膠三因極一病証方論卷十
