body:
  text: 三因極一病證方論卷十宋陳言撰勞瘵叙論夫骨蒸殗殢復連尸疰癆疰蟲疰毒疰熱疰冷疰食疰鬼疰等皆曰傳尸者以疰者注也病自上注下與前人相似故曰疰其變有二十二種或三十六種或九十九種大略令人寒熱盜汗夢與鬼交遺泄白濁髮乾而聳或腹中有塊或腦後兩邉有小結核連復數箇或聚或散沉沉默默咳嗽痰涎或咯膿血如肺痿肺􅏴狀或復下痢羸瘦困乏不自勝持積月纍年以致於死死後乃疰易傍人以至滅門者有之更有飛尸遁尸塞尸喪尸尸疰等謂之五疰及大小附著等證不一知其所苦無處不惡乃挾諸鬼邪而害人以三因推之內非七情所忤外非四氣所襲雖若麗乎不內外因奈其證多端傳變遷移難以推測故自古及今愈此病者十不得一所謂狸骨獺肝天靈蓋銅鏡鼻徒有其說未嘗見效惟膏肓俞崔氏穴若早知灸之可愈若稍晚亦不濟也近集得經驗方服之頗效漫録於左餘缺以俟明哲勞瘵諸證病者增寒發熱自汗面白舌乾口苦精神不守恐畏不能獨卧其傳在肝病者增寒發熱面黑鼻燥忽忽喜忘大便苦難或復泄瀉口瘡其傳在心病者增寒發熱面青唇黃舌本强不能咽飲食無味四肢羸瘦吐涎沫其傳在脾病者增寒發熱面赤鼻白乾燥毛折咯嗽喘急時吐白沫或有血線其傳在肺病者增寒發熱面黃耳輪焦枯䯒骨㾓痛小便白濁遺瀝胸痛其傳在腎所謂勞蒸者二十四種隨證皆可考尋毛折髮焦肌膚甲錯其蒸在皮外人覺熱自反惡寒身振瞤劇其蒸在肉髮焦鼻衄或復尿血其蒸在血身熱煩躁痛如針刺其蒸在脉爪甲焦枯眼昏兩脅急痛其蒸在筋板牙黑燥大杼酸疼其蒸在骨背膂疼痛䯒骨酸嘶其蒸在髓頭眩熱悶口吐濁涎眼多眵淚其蒸在腦男子失精女人白濁其蒸在玉房乍寒乍熱中脘與膻中煩悶其蒸在三焦小便赤黃凝濁如膏其蒸在膀胱傳道不均或祕或泄腹中雷鳴其蒸在小腸大腹隱痛舌鼻乾疼其蒸在大腸口鼻乾燥腹脹睡卧不安自汗出其蒸在胃口苦耳聾脅下痛其蒸在膽裏急後重肛門澀閉其蒸在回腸小腹㽲痛筋脉緩縱隂氣自重强其蒸在宗筋眼昏淚下時復眩暈躁怒不常其蒸在肝舌焦黑氣短煩悶灑灑析析其蒸在心唇乾口瘡胸腹脹悶畏寒不食其蒸在脾咳嗽喘滿吐痰咯血聲嘶音啞其蒸在肺耳輪焦枯腳氣酸痛起居不得其蒸在腎情想不寧無故精泄白物綿綿而下其蒸在右腎心主胞絡心膈噎塞攻擊疼痛俯仰煩寃其蒸在膈諸證雖曰不同其根多有蟲嚙其心肝治之不可不絶其根也勞瘵治法取勞蟲方青桑皮栁枝石榴皮桃枝梅枝各七莖各長四寸許青蒿一小把右用童便一升半葱白七莖煎及一半去滓别入安息香阿魏各一分再煎至一盞濾清調硃砂末五分檳榔一分麝香一匙分作二服調下五更初一服五更三㸃時一服至已牌時必取下蟲紅色者可救青者不治見有所下即進軟粥飯溫暖將息不可任意及食生冷毒物合時須擇良日不得令貓犬孝服穢惡婦人見神授散治諸傳尸勞氣殺蟲方得之於清源郡王府川椒二斤去目并合口者炒去汗右為末每服二錢空心米湯下須疸悶暈少頃如不能禁即以酒糊為丸桐子大空心服三五十丸昔人嘗與病癆婦人交婦人死遂得疾遇一異人云氣已入臟遂與此方急合服二斤其病當去如其言服之幾盡大便出一蟲如蛇自此遂安續有人服之獲其效者多矣潤神散治勞瘵增寒發熱口乾咽燥自汗疲劇煩躁人參黃茋麥冬桔梗炙草淡竹葉右各等分為末每服二錢自汗加小麥同煎溫金散治積勞咳嗽喘悶咯痰其中有血杏仁去皮尖以五味各一兩米泔浸一宿取出乾去五味不用略炒麥冬一錢桑皮五錢茯神五錢防風黃芩各五錢甘草右為末每服二錢入黃蠟如指大同煎七分食後熱服蛤蚧散治積癆久嗽失音蛤蚧一對去口足水浸去膜刮去血脉用好醋炙訶子阿膠熟地麥冬細辛甘草各五錢為末蜜丸皂莢子大每服一丸含化不拘時服蘇合香丸治傳尸骨蒸殗殢肺痿疰忤鬼氣氣厥氣不和者甚有神效蘇合香油一兩入安息香內安息香二兩另為末用無灰酒一升熬膏乳香龍腦各一兩白术硃砂青木香丁香白檀香沉香犀角鎊香附訶子麝香蓽撥各二兩右為末用安息香等膏同煉蜜丸如桐子大早朝井花水溫冷任意化下四丸老人小兒一丸溫酒化服用黃蠟丸裹縫紗囊盛帶亦可辟邪疰忤中惡證治病者卒心腹脹滿吐利不行如乾霍亂狀世所謂中惡是也由人精神不全心志多恐遂為邪鬼所擊或復附著沉沉默默寢卧譫語誹謗罵詈訐露人事不避嫌疑口中好言未然禍福及至其時毫髮不失人有起心已知其肇登涉險髙如履平地或悲泣呻吟不欲見人其狀萬端如醉如狂不可概舉此皆鬼神及諸精魅附著惑人或復觸犯忌諱土地神靈為其所作非有真實但隨方俗考驗治之還魂湯治卒中惡感忤鬼擊飛尸諸奄忽氣絶無復知覺或已死絶口噤不開去齒下湯或湯入口不下者分病人髮左右捉踏肩引之藥下復增取盡一升須㬰立蘇麻黃三兩去節煮過桂枝二兩甘草一兩杏仁去皮尖二百五十粒桃奴丸治心氣虛有熱恍忽不常言語錯亂尸疰客忤魘夢不祥小兒驚癎並宜服之桃奴七枚另研硃砂五錢另研牛黃另研龍腦各一分另研桃仁十四粒去皮尖麩炒生玳瑁鎊一兩雌黃桃葉煮水研飛三分黑犀鎊五錢麝香一兩另研琥珀三分另研安息香一兩無灰酒洗去砂以銀器入桃仁琥珀熬成膏右為末和入前膏丸如芡實大隂乾磁器封閉靜室安置煎人參研下一丸食逺臨卧服蘇合香丸治卒中惡忤疰方見前蠱毒叙論廣西閩中山間人以蛇虺蜈蚣蜒蝣蝦蟆等百蟲同器畜之使其自相啖食勝者為靈以事之取其毒雜以菜果飲食之類以害人妄意要福以圖富貴人或中之證狀萬端廣如治百蠱說或年嵗聞人多死又有人家香火伏事如家先者亦謂之蠱能病人世謂之蠱注以姓類屬五行謂之五蠱此皆邉鄙邪僻之地多有此事中都則蔑聞也中蠱證治夫中蠱毒者令人心腹絞痛有如物嚙吐下血皆如爛肉若不急治食人五臟即死驗之令病人唾水中沉者即是蠱有人行蠱毒以病人若欲知其姓名以敗鼓皮燒灰作末飲服方寸匕須臾自呼蠱家姓名可語令呼喚將去則愈治之亦有方丹砂丸治毒從酒食中下蠱者端午日合辰砂另研雄黃另研水飛赤足蜈蚣續隨子各一兩麝香一分右為末糯米飲為丸雞豆大若覺中毒即以酒下一丸蛇蝎所螫醋磨塗之凡例凡諸蠱多假是假蠱毒藥以投之知時宜煮大豆甘草薺苨汁飲之通治諸藥毒礬石散治中諸物毒晉礬建茶各等分為末每服三錢新汲水調下得吐即止未知再作解毒丸治誤食毒草並百物毒救人於不死貫仲去毛青黛甘草各一兩板藍根四兩洗净日晒乾右為末蜜丸桐子大以青黛别為衣如稍覺精神恍忽惡心即是誤中諸毒急取藥十五丸嚼爛用新汲水送下即解此方傳自異人京師陳道士用水浸炊餅為丸尤妙亦解暑毒青黛雄黃丸凡始覺中毒及蛇蟲咬癰疽才作即服此令毒氣不聚上好青黛雄黃等分為末新汲水調下二錢凡中毒嚼生黑豆不腥氣嚼白礬味甘者皆毒無疑蛇蟲傷治法白芷散治惡蛇咬傷頓仆不可療者香白芷一味為末水調下頃刻咬處出黃水腫盡消皮合白礬半夏散治蝎螫痛不可忍白礬半夏等分為末釅醋調貼五絶治法凡魘寐産絶自縊壓溺五者令人卒死謂之五絶半夏散治魘寐卒死及為墻屋竹木所壓水溺金瘡卒致悶絶産婦惡血冲心諸暴絶證半夏湯泡去滑七次為末吹鼻中大豆許立蘇但心頭溫者可治牡丹散治産後血暈悶絶若口噤則撬開灌之必效丹皮大黃芒硝各一兩冬瓜子半合桃仁二十七粒去皮尖右㕮咀每服五錢水三盞煎半去滓入芒硝再煎分二服救自縊法徐徐抱解不得截繩上下安被卧之一人以腳踏兩肩手少挽其髮當絃勿縱之一人以手按胸上數動之一人摩將臂脛屈伸之若已强但漸屈之并按其腹如此一炊頃氣從口出呼吸眼開而猶引按莫置亦勿苦勞之須㬰可少進湯及粥清含與之令濡喉漸漸能咽乃稍稍止耳外令兩人以管吹其兩耳此法最善無不活者自旦至暮雖冷亦可自暮至旦少難救壓死方以死人安著將兩手袖掩其鼻口眼上一食頃乃活眼開乃與熱小便若初覺氣絶而不能言可急劈開口以熱小便灌之打撲悶絶者亦可用此夫壓死折傷惟禮法君子守垂堂巖墻之戒固無是事然安車良馬時有跌足奔輪步砌臨流未免虛舟飄瓦况行商征賈捕獵漁人涉歷既多不測尤甚其如寃仇加害凶險劫持打撲金瘡皆致夭枉治之不可不急也雞鳴散治從髙墜下及木石所壓凡是傷損血瘀凝積氣絶死并久積瘀血煩躁疼痛呌呼不得並以此藥利去瘀血即愈大黃一兩酒蒸桃仁三四十粒去皮尖右研細酒一盞煎六分雞鳴時服次日取下瘀血即愈若氣絶不能言取藥不及即劈開口以熱小便灌之大獄活血丹治男子婦人外傷內損狗咬蟲傷驢馬撲墜手足傷折一切疼痛腹中瘀血刺脅築心及左癱右瘓走注疼痛産後敗血灌注四肢並宜服之花桑枝取臂火者炭火煆赤烟盡淬於米醋中取出焙乾一斤金墨半斤一半用萆麻三兩研細塗墨上塗盡薄紙裹黃泥濟令乾火煆通紅冷地蓋去火性一半用醋化􅗠砂二兩塗盡炙乾大黑豆一斤去皮焙乾亂髮二斤煆存性栗楔一斤用栗蓬中心扁者薄切晒乾乳香四兩細研入米醋一碗熬膏皂角刺一斤燒通赤淬粱醋內焙乾右六味為末入乳香膏內和杵三千下丸如彈子大如膏少加醋糊痛者一服一丸輕者半丸以無灰酒一盞乳香一豆大先磨香盡次磨藥盡煎三五沸臨卧時溫服以痛處就牀卧如欲出汗以衣被覆之仍用藥磨塗損處忌一切動風物婦人諸疾服者用當歸一錢依法煎服孕婦忌服接骨散治跌撲手腳脛骨脆折水蛭不拘多少於新瓦上炙令香熟勿太過為末每服一錢熱酒調入麝香五分折處不可手觸藥行良久覺痛折處漸癢如蟻噆之遂要人捻揉骨折處相接即用杉木夾縛兩三日去之骨全矣花蕊石散治一切金瘡打撲傷損或內損血入臟腑壅溢作衄及婦人産後敗血不散蕊石一斤研細末上色硫黃四兩研細右二味拌勻入藏瓶中以紙筋搗黃泥固濟候乾焙令熱透以磚襯瓶底用白炭十斤頂上發火燒炭盡候冷取出再研極細諸臟傷及婦人産後瘀血不行并用童便溫酒調一二錢匕取瘀血取效白芨散治鼻衄即止白芨不拘多少為末冷水調用紙花貼鼻窊中救溺死法竈中灰急將溺者埋灰中從頭至足水出七升即活驚悸證治夫驚悸與忪悸不同驚悸則因事有所大驚或聞虛響或見異相登髙涉險夢寐不祥驚忤心神氣與涎鬱遂使驚悸名曰心驚膽寒在心膽經屬不內外因其脉必動忪悸則因汲汲富貴戚戚貧賤久思所愛遽失所重觸事不意氣鬱涎聚遂致忪悸在心脾經意思所生屬內所因或冒寒暑濕閉諸經令人忽忽若有所失恐懼如人將捕中脘忪悸此乃外邪非因心病况五飲停蓄閉於中脘最使人忪悸治屬飲家除悸與外內因所治各見本門溫膽湯治心膽虛怯觸事易驚或夢寐不祥或見異物致心驚膽懾氣鬱生涎涎與氣搏變生諸證或短氣悸乏或體倦自汗四肢浮腫飲食無味心虛煩悶坐卧不安半夏枳實竹茹各二兩橘皮三兩茯苓一兩五錢炙草一兩加生薑五片棗一枚同煎七分鎮心丹大治驚悸辰砂用黃松節酒煮過龍齒用逺志苖醋煮右二味等分為末猪心血為丸如芡實大每服一丸以麥冬菉豆燈心生薑白蜜煎豆熟為度臨卧咽下小兒磨半定志丸治心驚膽懾逺志薑汁淹炒菖蒲各二兩茯苓茯神人參各一兩右為末蜜丸桐子大硃砂為衣米湯下五十丸寒水石散治因驚心氣不行鬱而生涎涎結為飲遂為大疾忪悸愪㦜不自勝持少小遇驚尤宜服之但中寒者不宜服寒水石煆滑石煆各一兩甘草一錢右為末每服二錢熱則新汲水下怯寒則薑棗湯下入龍腦少許尤佳小兒量嵗與之自汗證治夫自汗多因冒風傷暑及喜怒驚恐房室虛勞皆能致之無問睡醒浸浸自出名曰自汗或睡著汗出名曰盜汗若其飲食勞碌負重涉逺登髙疾走因動汗出非自汗也人之氣血猶隂陽之水火平則寧偏則過隂虛陽必凑故發熱自汗如水熱自湧陽虛隂必乘故發厥自汗如水溢自流考其所因風暑涉外喜怒驚涉內房室虛勞涉不內外理亦甚明其間如􅊓癤腸􅏴腳氣産蓐等病皆有自汗治之當推其所因為病源無使混濫如經脉别論所載但原其汗所出處初非自汗證不可不知正元散治下元虛臍腹脹滿心脅刺痛泄利嘔吐自汗陽氣漸微手足厥冷及傷寒隂證霍亂轉筋久下冷痢少氣羸瘦一切虛寒並宜服之常服常助陽消隂正元氣溫脾胃進飲食人參茯苓白术甘草黃茋烏藥山藥薑汁炒附子川芎乾葛各兩烏頭炮去皮臍桂心各五錢紅豆乾薑橘皮各三錢右為末每服二錢薑一片棗一枚鹽少許煎七分食前溫服自汗加浮麥牡蠣散治諸虛不足及新病暴虛津液不固體常自汗夜卧即甚久而不止羸瘠枯瘦心忡驚惕短氣煩倦牡蠣米泔浸煆麻黃根黃茋各一兩右銼散每服三錢浮小麥一百粒同煎一法為細末每服三錢葱白三寸煎一盞半分五服麥煎散治榮衛不調夢內盜汗四肢煩疼飲食少膚瘦黃秦芁鱉甲醋煮三五十沸去裙醋塗炙黃柴胡各二兩乾漆炒烟盡人參茯苓乾葛川烏炮去皮尖各一兩𤣥參右為末每服二錢先用小麥三七粒煎湯一盞去麥入藥煎七分臨卧服如久患後亦宜服此以其退勞倦調理經絡桂枝湯治傷風自汗桂枝芍藥甘草加薑三片棗一枚煎服却暑散治傷暑自汗赤茯苓甘草各四兩寒食麵生薑各一斤為末每服二錢新汲水調下防己黃茋湯治傷濕自汗防己四兩黃茋五兩炙草三兩白术三兩加薑三片棗三枚溫粉止汗如神川芎白芷藁本各一分米粉二分撲身上消渴叙論夫消渴皆由精血走耗津液枯乏引飲既多小便必數浸浸衰微肌肉脫削諸脉不榮精髓內竭推其所因涉內外與不內外古方不原病本但出禁忌似屬不內外因藥中用麻黃逺志得非內外兼并况心虛煩悶最能發渴風寒暑濕病冷作熱入干腎經引水自救皆明文也不知其因施治錯誤緣醫之大患不可不知三消脉證渴病有三曰消渴消中消腎消渴屬心故煩心致心火散漫渴而引飲經云脉軟散者當病消渴諸脉軟散皆氣虛血虛也消中屬脾痺熱成則為消中消中復分為三有熱中寒中强中寒中隂勝陽鬱久必為熱中經曰脉洪大隂不足陽有餘則為熱中多食數溲為消中隂狂興盛不交精泄則為强中三消病至强中亦危矣消腎屬腎盛壯之時不自謹惜快情恣欲極意房中年長腎衰多餌丹石真氣既喪孤立唇口焦乾精溢自泄不飲而利經云腎實則消不渴而小便自利名曰腎消亦曰內消三消治法真珠丸治心虛煩悶或外傷暑熱內積愁煩酣飲過多皆致煩渴口乾舌燥引飲無度小便或利或不利知母一兩川連一兩苦參一兩𤣥參一法無鐡孕粉一兩牡蠣一兩硃砂二兩麥冬苦粉各五錢銀箔二百片一法有白扁豆一兩金箔二百片右為末蜜入生花粉汁少許丸如桐子大用金箔為衣每服二十丸先用生花粉汁下一服次用麥冬熟水下病退日二服忌炙煿酒色次服蓯蓉丸補之肉蓯蓉丸肉蓯蓉酒浸磁石煆醋淬熟地山茰桂心山藥牛膝茯苓黃芪鹽水炒澤瀉􅎷茸去毛切片酥炙逺志石斛覆盆五味萆解破故紙巴㦸去心酒浸兔絲酒浸龍骨杜仲薑汁炒去絲各五錢附子製六錢右為末蜜丸桐子大米湯下五十丸薑粉散治消中多因外傷痺熱內積憂思喜啖鹹食及麵致脾胃乾燥飲食倍常不為肌膚大便反堅小便無度生薑輕粉搜勻每服二錢長流水調下齒浮是效次投猪肚丸附子猪肚丸附子檳榔各一兩鱉甲一兩當歸知母木香川練秦芁大黃龍膽白芍破故紙枳殼各五錢右為末分作三分入猪肚內縫定令蜜酒三升童便五升同入砂鍋煮爛搗細入一分末同搗搜為丸桐子大溫酒米湯下五十丸烏金散治熱中多因外傷燥熱內傷用意傷脾飲啖肥膩熱積胸中致多食數溲小便過於所飲亦有不渴而飲食自消為小便者黃丹京墨煆各一兩研勻每服三錢食後先用水一碗嗽口待心中熱索水便以冷水調下爛金丸治熱中消渴止後將補精血益諸虛解勞倦去骨節間熱定心强志安神定魄固臟腑進飲食免生瘡瘍猪肚一個黃連三十兩蜜生薑各二十兩先將猪肚洗淨復以葱麵醋椒等洗控乾同煎藥并水酒入銀石器內煮半日漉出黃連洗出蜜酒令盡銼為細末再用酒調膏入洗净猪肚內縫定入銀石器內水熬爛研為膏搜下項藥人參二兩黃茋四兩五味山藥杜仲石斛山茰車前鱉甲熟地當歸新蓮肉各二兩槐角茯苓磁石各一兩川芎沉香各五錢麝香一錢兔絲子一兩為末用猪肚膏搜和得所膏少則添熟蜜杵千百下丸桐子大食前溫酒糯米湯下五十丸一法有白术二兩陽起石一兩石子薺苨湯治强中多因耽嗜色欲及快意飲食或服丹石真氣既脫致煩渴飲水飲食倍常隂氣常興不交精出故中焦虛熱注於下焦三消之中最為難治薺苨石膏各三兩人參茯苓花粉磁石知母乾葛黃芩甘草各二兩右銼散用水三盞腰子一隻去脂膜黑豆一合煮至盞半去腰子大豆入藥四錢煎七分去滓食後服下焦熱則夜間服渴止勿服次投補藥黃連猪肚丸治强中消渴先服石子薺苨湯病若退可服此補養黃連粱米花粉茯神各四兩知母麥冬各二兩右為末用猪肚洗極净入藥末縫定甑中炊極爛取出藥别研猪肚為膏搜前藥得所乾即添蜜少許杵數千下丸桐子大食前服胡桃丸治消腎亦曰消渴亦曰內消多因快情縱欲極意房中年少懼不能房多服丹石及失志傷腎遂致唇口乾燥精溢自出或小便赤黃五色浮濁大便燥實小便大利而不甚渴茯苓桃肉附子一枚去皮臍切片薑汁一盞蛤粉一分同煎等分為末蜜丸桐子大米飲下三五十丸古瓦湯治消腎消中飲水無度小便頻數乾葛花粉人參雞䏶胵洗净焙乾各等分右為末每服二錢用多年古瓦碓碎煎湯調下不以時候服􅎷茸去毛切片三分麥冬二兩熟地黃茋雞䏶胵麩炒蓯蓉山茰破故紙牛膝五味各三分茯苓𤣥參各五錢人參三分地骨皮五錢右為末蜜丸桐子大米湯下三十丸逺志丸治心腎虛煩渴引飲胸氣短小便自利白濁泄遺人參茯苓炮薑牡蠣逺志各汁炒一兩右為末用蓯蓉一兩酒熬成膏丸如桐子大糯米湯下五十丸六神湯治三消渴疾蓮房乾葛枇杷葉炙草花粉黃芪各等分每服四錢小便不利加茯苓童根桑白皮湯治三消渴疾或飲多利少或不飲自利肌膚瘦削四肢倦怠常服補虛止渴利童根桑白皮未移栽者取根去粗皮晒乾不焙茯苓人參麥冬乾葛山藥桂心各一兩甘草五錢𤣥兔丹治三焦渴利神藥常服固精止白濁延年兔絲子酒浸通軟乘濕焙乾十兩茯苓新蓮肉各三兩五味子酒浸七兩右為末另研山藥末六兩將所浸酒餘者添酒煮糊搜和搗千杵丸桐子大米湯下五十丸梅花湯治消渴疾大棗四十九枚鮮蓮肉四十九粒西木香一錢五分炙草二兩右用雄猪脊筋一尺二寸同煎藥用水五碗於銀石器內煮去滓取汁一碗空腹任意呷服八味丸治消渴小便多熟地八兩山藥四兩山茰四兩茯苓丹皮澤㵼各三兩肉桂附子各一兩文蛤散治渴欲飲水不止文蛤即五倍子最能回津為末以水飲任調方寸匕不以時烏梅木瓜湯治酒食過度中焦藴熱煩渴枯慘小便反多遂成消中兼治瘴渴所謂瘴渴北人往南方瘴地多生此疾乾木瓜烏梅麥芽草果去皮炒甘草各五錢右銼散四錢薑五片煎七分去滓不以時服羊乳丸治嶺南山瘴風熱毒氣入腎中變寒熱腳弱虛滿而渴黃連生花粉生地汁羊乳或牛乳人乳亦可和為丸米飲下三十丸一法濃煮小麥粥飲下渴疾有人依山谷方單用兔絲子酒浸透炒服甚效亦有用黃茋六兩甘草一兩服之尤效又渴人病愈須防發􅏴疽宜服忍冬丸忍冬草一味不拘多少根莖花葉皆可用一名老翁鬚一名蜜啜花一名金銀花右以米麯酒於瓶內浸以糠火煨一宿取出晒乾入甘草末少許即以所浸酒為糊丸桐子大每服五十丸至百丸酒飲任下不以時此藥不特治􅏴亦能止渴麥門冬煎治諸渴麥冬人參黃茋各二兩茯苓山茰山藥桂心各一兩半黑豆三合煮去皮另研為末以生地汁二碗牛乳二盞熬為膏丸桐子大麥飲下五十丸竹龍散治消渴五靈脂五錢黑豆五錢為末煎冬瓜仁湯調下二錢澄源丹治三消渴疾神效牡蠣煆粉苦參蜜陀僧知母水銀以白蠟炒結砂子各一兩花粉黃丹一兩與水銀砂同研右為末男子用雌猪肚女子用雄猪肚入藥在內以線縫定用繩縛在新磚上别用生花粉半斤切碎同煮早晨至午時取藥出不用花粉只研爛猪肚和藥為丸每服三十粒食前米湯下日三服十日可去病根料簡或云渴無外所因且傷寒脉浮而渴屬太陽有汗而渴屬陽明自利而渴屬少隂及陽毒傷寒倍重燥甚而渴甚者有中暑伏熱纍取不瘥而渴者有瘴毒氣染寒熱而渴者得非外因治法如傷寒論中不復繁引酒煮黃連丸治中暑熱渴最妙又有婦人産蓐去血過多而渴者名曰血崩非三消類不可不審五疸叙論古方叙五種黃病者即黃汗黃疸榖疸酒疸女勞疸是也觀别録則不至於斯然疸與黃其實一也今古立名異耳黃汗者以胃為脾表屬陽明陽明蓄熱喜自汗汗出因入水中熱必鬱故汗黃也黃疸者此由暴熱用冷水洗浴熱留胃中所致以與諸疸不同故用黃字字之又云因食生黃瓜氣上薰所致人或疑其不然古賢非妄詮也必有之矣酒疸者以酒能發百脉熱由大醉當風入水所致榖疸者由失飢發熱食多傷胃胃氣衝鬱所致女勞疸者由大熱交接竟入水水流濕入於脾因腎氣虛脾以所勝尅入致腎氣上行故有額黑身黃之證世謂脾腎病者即此證也其間兼渴與腹脹者並難治發於隂必嘔發於陽則振寒而微熱雖本於胃氣鬱發土色上行然發於脾則為肉疸發於腎則為黑疸若論所因外則風寒暑濕內則憂怒喜驚酒食房勞三因悉偹世醫獨麗於傷寒論中不亦濫矣學者宜識之黃汗證治病者身體腫發熱不渴狀如風水汗出染衣色正黃如柏汁名曰黃汗桂枝加黃茋湯治黃汗身腫汗出出已輒輕久久必身瞤胸中痛腰已下無汗腰髖弛痛如有物在皮中劇者不能食煩躁小便不利桂枝芍藥各三兩甘草二兩黃茋五兩右銼散每服四錢薑五片棗二枚煎七分溫服仍飲熱粥以助藥力覆取微汗未知再服黃茋苦酒湯治身體紅腫發熱自汗汗如柏汁其脉沉黃茋五兩芍藥桂枝各三兩右為銼散每服四錢苦酒三合煎至七分不以時服初服當心煩以苦酒阻故也至六七日稍愈黃疸證治病者發黃身面眼悉黃如金色小便如黃柏汁名曰黃疸麻黃醇酒治傷寒瘀熱不解鬱發於表發為黃疸其脉浮緊者以汗解之麻黃三兩去節以醇酒五升煮取二升每服一盞溫服汗出愈秋冬用酒煮春夏用水煮榖疸證治病者發黃內熱食則腹滿眩暈榖氣不消胃中苦濁濁氣下流小便不通隂被其寒熱流膀胱身體盡黃名曰穀疸穀疸丸治胃蓄熱氣濁食穀不消大小便不利脹滿不下食趺陽脉緊而數亦治因勞發熱熱鬱發黃苦參三兩龍膽草一兩山梔去皮五錢人參三分為末猪膽汁入蜜丸大麥飲下五十丸日三服紅丸子最治穀疸蓬术醋煮三稜醋煮各三兩胡椒一兩青皮三兩麩炒阿魏一分右為末醋化阿魏入陳米粉為糊丸如桐子大礬紅為衣生薑甘草湯下酒疸證治五疸惟酒疸變證最多蓋酒之為物隨人性量不同有盈石而不醉者有濡吻而輒亂者以醖釀而成有大熱毒滲入百脉為病則不特發黃溢於皮膚為黑為腫流於清氣道中則眼黃鼻􅏴種種不同故方論中酒疸外有肉疸黑疸癖疸勞溢乃致令人恍忽失常等數證不同半夏湯治酒疸發黃身不熱清言了了腹滿欲嘔心煩足熱或成癖癥心口懊憹其脉沉弦或緊細半夏茯苓白术各三兩前胡枳殼炙草大㦸各二兩黃芩茵陳當歸各一兩每服四錢薑三片空心服二石散治肉疸小便多如白泔色因酒所致其脉弦滑凝水石煆水飛白石脂煅花粉肉桂各一兩兔絲子知母為末每服二錢大麥飲調下桂术湯治酒疸因下後變為黑疸目青面黑心中如啖韭薺狀大便正黑皮膚不仁其脉微而數肉桂白术各一兩枳實香豉乾葛杏仁甘草每服四錢當歸白术湯治酒疸發黃結飲癖在心胸間心下縱橫堅滿骨肉沉重逆害飲食小便赤黃此由本虛飲食生冷與脾胃痰結所致其脉弦澀白术茯苓各三兩當歸黃芩茵陳各二兩前胡枳實杏仁半夏甘草加生薑七片人參飲治飲酒房勞酒入百脉令人恍忽失常人參白芍花粉枳殼茯苓棗仁炙草各一兩熟地二兩右銼散每服四錢食後臨卧服如神散治酒毒不散發黃久黃浸漬流入清氣道中宜引藥納鼻滴出黃水愈苦瓠子去皮苦葫蘆子去皮各二七個黃黍米三百粒安息香二皂子大右為末以一字搐入鼻中滴出黃水一升忌勿吹或過多即以黍穰燒灰射香末各少許搐鼻立止女勞疸證治夫交接輸瀉必動三焦上焦屬心中焦屬脾下焦屬腎動則熱熱則欲火熾因入水中二焦熱鬱故能黃下焦氣勝故額黑上焦走血隨瘀熱行大便溏黑小腹急痛有男女同室而浴者多成此病攝生之人不可不知滑石石膏散治女勞疸身黃額黑日晡發熱惡寒小腹急足下熱其脉浮緊腹或滿者難治滑石煅石膏煅等分右為末以麥粥飲調下二錢日三四服小便利則瘥硝石礬石散治女勞疸其腹臚脹膀胱急欲作水狀大便黑者非水其脉滑腹滿者難治硝石煅汁盡礬石煅汁盡為末每服二錢大麥汁調下日三服重衣覆取汗病隨大小便出大便黑小便黃是效雜勞疸證治五疸之外有時行瘴瘧風寒暑濕等證疸各不同茵陳梔子丸治時行病急黃及瘴瘧疫癘茵陳梔子芒硝杏仁去皮尖各三分豆豉湯浸軟另研二分常山鱉甲各五錢醋炙巴霜一分大黃一分為末餳糖為丸桐子大每服三丸飲下吐利為度未知加一丸艾煎丸治因傷風瘀熱不解發為風疸滿身皆黃小便或黃或白寒熱好卧不欲動其脉陽浮隂弱生艾三月採來搗取汁銅器煎如膏大黃川連花粉凝水石煅苦參葶藶隔紙炒各等分右為末以艾膏和得所丸如桐子大初服六七丸漸加至二十丸有熱加苦參渴加花粉小便澀加葶藶小便多加凝水石小便白加黃連大便難加大黃所加並倍之五苓散治伏暑鬱發黃小便不利發黃肉桂茯苓澤瀉猪苓白术各等分為末茵陳湯下礬石滑石散治濕疸始得之一身盡疼發熱面色黑黃七日後壯熱熱在裏有血下如肫肝色狀小腹滿者急下之身盡黃小便不利其脉沉細礬石滑石等分為末每服二錢大麥粥飲下日三服便利如血者效或汗愈苦參散治人無漸忽然振寒皮膚麯塵出小便赤澀大便時燥心氣無異飲食不妨服諸湯不除因為久黃方苦參黃連瓜蒂黃柏大黃各一分葶藶五錢為細末每服一錢當吐下隨時消息加減小半夏湯治黃疸小便色不異欲自利腹滿而喘者不可除熱熱去必噦半夏每服三錢薑十片煎七分服養榮湯治五疸腳弱心忪口淡耳響微寒發熱氣急小便白濁當作虛勞治之人參白术黃茋當歸熟地白芍茯苓逺志五味甘草肉桂陳皮右銼散每服四錢薑三片大棗二枚煎服便精遺泄加龍骨一兩咳嗽加阿膠三因極一病證方論卷十
