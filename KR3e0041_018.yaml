body:
  text: 三因極一病證方論卷十八宋陳言撰蓐勞證治婦人因産理不順疲極筋力憂勞心力致膚羸喘乏寒熱如瘧頭痛自汗肢體倦怠咳嗽痰􅊇腹中利痛名曰蓐勞石子湯治蓐勞猪腎一對去脂膜四破香豉當歸白芍粳米葱白右銼散分兩劑用水三升煮一小碗去滓分三服脫隂證治婦人趣産勞力努咽太過致隂下脫若脫肛狀及隂下挺出逼迫腫痛舉重房勞皆能發作清水續續小便淋露硫黃散治産後蓐勞隂脫硫黃烏賊魚骨各五錢五味子一分為末糝患處當歸散治隂下脫當歸黃芩各二兩芍藥一兩蝟皮五錢燒存性牡蠣二兩半為末每服二錢酒米湯任下忌登髙舉重尉法蛇床子一味炒熟布裹尉患處亦治産後隂痛桃仁膏治産後隂痛腫妨悶桃仁枯礬五棓子各等分以下二味為末研桃仁膏拌勻敷之硫黃湯治産勞玉門開而不閉硫黃四兩吳茱茰兔絲子蛇床子各一兩半右銼散每服四錢煎數沸濾滓洗玉門日再洗下乳治法産婦有兩種乳脉不行有氣血盛而壅閉不行者有血少氣弱澀而不行者虛當補之盛當踈之盛者當用通草漏蘆土瓜根輩虛者當用鍾乳猪蹄鯽魚之屬概可見矣漏蘆散治産婦氣脉壅滯乳汁不行及經絡凝滯乳內脹痛留蓄針毒或作􅏴腫藥服之後自然內消乳汁通行漏蘆二兩半蛇蛻十條炙瓜蔞十枚急煆存性橘葉為末溫酒調下二錢鍾乳散治乳婦氣少血衰脉藴不行乳汁絶少鍾乳粉研細濃煎漏蘆湯調下母猪蹄湯治如前猪蹄一隻通草四兩青桑膏治乳硬作痛嫩桑葉生採研細末米飲調攤紙花貼患處千金云凡患乳􅏴四十已下可治五十已上不可治治則死不治自得終其天年惡露證治産後兒枕不散及血瘕堅聚按之攫手日晡增劇疼痛淋露不快上攻心胸困䪺狼狽宜服黑龍丹當歸湯奪命丹治之黑龍丹治産後一切血疾垂死者但灌藥無有不效神驗不可言當歸五靈脂良薑生地川芎各一兩並細銼入砂盒內赤石脂泥封紙筋鹽泥固濟封盒炭火十斤煅通紅去火候冷開取盒子看成黑糟乃取出細研入後藥百草霜五兩硫黃乳香各一錢五分花蕊石琥珀各一錢為末米醋和丸如彈子大每服一丸炭火燒紅生薑自然汁與無灰酒各一合小便半盞研開頓服立效當歸湯治産後敗血不散兒枕硬痛或發或止及新産乘虛風寒摶結惡露不快臍腹堅脹當歸鬼箭取羽用紅花各一兩每服三錢調煎七分奪命丹方見前第三論虛煩證治産蓐最難調理所以忌問男女及不許見穢汚者皆古人預防其妄念也每見婦人以得男則喜得女則憂憂喜太早致心虛煩悶多自此始蓋去血過多血虛則隂虛隂虛生內熱內熱則虛煩其證心胸煩滿呼吸短氣頭痛悶亂骨節疼痛晡時徹甚與大病後虛煩相類人參當歸湯治産虛煩不安人參當歸麥冬生地肉桂各一兩白芍二兩右銼散每服四錢水二盞粳米一合竹葉十片煎至一半去米葉入藥併棗三枚煎七分蒲黃散治産後虛煩必效蒲黃紙上炒每服一錢東流水調下無時虛渴證治産後去血過多津液不回腎氣虛弱多使人煩渴引飲無度雖非三消其證頗同治之當飬血通氣回津補腎方效熟地黃湯治産後虛渴不止少氣腳弱眼昏頭眩飲食無味熟地一兩人參三兩麥冬二兩花粉四兩甘草五錢右㕮咀每服四錢水二盞元米一撮薑三片棗三枚煎七分六氣經緯丸川芎白芎當歸白术茯苓澤瀉淋悶證治諸治産前後淋閉其治不同産前當安胎産後當去血其如冷石膏熱氣淋等為治則一但量其虛實而用之瞿麥蒲黃最為産後要藥惟當尋其所因則不失其機要矣茅根湯治産後諸淋無問冷熱膏石結氣悉主之白茅根八兩瞿麥茯苓蒲黃桃膠滑石炙草各一兩子貝十箇燒冬葵子人參各二兩石首魚腦骨二十箇煆右銼散每服四錢加薑三片燈心二十莖煎七分亦可為末煎木香湯調下二錢如氣壅閉木通陳皮湯調下産後雜病治法當歸養血丸治産後惡血不散發渴疼痛及惡露不快臍腹堅脹兼室女經候不勻赤白帶下心腹腰痛當歸肉桂各一兩赤芍丹皮𤣥胡索各二兩右為末蜜丸桐子大溫酒米飲下三五丸痛極細嚼咽下四神散治産後留血不消積聚作塊急切疼痛猶如遁尸心腹絞痛下利當歸芍藥川芎炮薑各等分為末溫酒調下二錢丁香散治産後咳逆石蓮肉十箇去心炒丁香十枚為末水煎服當歸黃茋湯治産後腰足疼痛不可轉側壯熱自汗身體强氣短黃茋芍藥各二兩當歸三兩每服四錢加薑三片竹葉湯治産後傷風發熱面赤喘而頭痛乾葛三分防風桔梗桂心人參炙草各一分附子五錢每服四錢加薑五片棗三枚竹葉十片煎七分嘔者加半夏神授散治婦人産後一切疾病不問大小以致危篤丹皮白芍桂心陳皮青皮各五錢當歸百合川芎炙草炮薑各一兩人參神麯麥芽各三錢紅花一錢半為末每服二錢薑棗湯煎七分孕婦勿服調補法産後血氣既衰五臟俱損唯得將補不可轉利雖惡血未盡亦不可便服補藥須候七日外臍下塊散方可投之若痛甚切者或崩傷泄利虛羸喘乏别生他疾𢃄生宿患宜尋閲諸方審詳調理不可拘以日數也如黑神散却不妨黑神散治産後諸疾當歸白芍炙草炮薑肉桂熟地黑豆蒲黃各等分為末或溫酒童便任意下四順理中丸治新産血氣俱傷五臟暴虛肢體羸乏少氣多汗才産直至百日每日常服壯氣補虛調飬臟氣蠲除餘熱消穀嗜食兼治産後臟虛嘔吐不止人參白术炮薑炙草等分為末蜜丸桐子大米湯下三十丸當歸建中湯治産後勞傷虛勞不足腹中㽲痛吸吸少氣小腹拘急痛連腰背時自汗出不思飲食産訖直至滿月每日三服令人强健當歸三兩桂心二兩白芍五兩炙草二錢右銼散每服四錢薑三片棗二枚煎七分去滓入飴糖一塊鎔化崩傷內衄加阿膠生地濟隂丹治産後百病百日內常服去瘀生新木香茯苓京墨桃仁秦芁炙草人參桔梗石斛蠶布燒藁本各二兩歸身桂心炮薑細辛丹皮川芎各一兩半川椒山藥各三分澤蘭熟地香附各四兩蒼术糯米一升炒為末蜜丸每兩作六七丸每一丸嚼細食前溫酒醋湯任下人參飬血丸治産後出月羸瘦不常人參赤芍川芎菖蒲各一兩當歸二兩熟地五兩烏梅肉二兩為末蜜丸桐子大溫酒下五十丸羊肉湯治産後腹中疼痛虛勞不足裏急脅痛并治寒疝右銼散水三碗酒一茶杯煎至一盞去滓分二服或少加葱鹽亦佳婦人女子衆病論證治法婦人三十六病本論所述名品不同或云七癥八瘕九痛十二𢃄下共三十六雖有名數不見證狀又論十二癥者是所下之物不同一清血二黑血三紫汁四赤肉五濃痂六豆汁七葵羮八凝血九清泴十米泔十一如月浣十二經不應期九痛者熱傷痛冷澀痛淋澀痛小便時痛經來時痛脅脹痛汁出如蟲嚙痛脅下分痛腰胯折痛七害者竅孔不利隂中寒熱小腹急堅臟內不仁子户翕瞤洞泄惡吐五傷者兩脅肢滿心引脅痛氣結不通邪思泄利前後痼寒三痼者羸瘦不生肌斷緒不乳産經水閉寒亦名三十六病名品雖殊無非血病多因經脉失於將理産蓐不善調護內作七情外感六淫隂陽勞佚飲食生冷遂致榮衛不輸新陳干忤隨經敗濁淋露凝滯為癥為瘕為流溢穢惡痛害傷痼犯時微若秋毫作病重如山嶽古人所謂婦人之病十倍男子雖言之太過亦明戒約之切也白堊丹治婦人三十六病崩中漏下身瘦手足熱惡風怯寒咳􅊇煩滿拘急短氣心脅腰背痛與子臟相引痛溺下五色心常恐懼遇恚怒憂愁即發皆是內傷所致白堊白石脂禹餘糧牡蠣烏賊魚骨龍骨細辛各一兩當歸芍藥川連肉桂茯苓炮薑人參石葦去毛瞿麥白芷附子炙草白蘞各一兩川椒五錢炒去汗為末蜜丸梧子大酒下三十丸至五十丸濟隂丹治婦人久冷無子及屢經墮胎皆因衝任之脉虛損胞內宿挾疾病經水不時暴下不止月內再行或前或後或崩中漏下三十六病積聚癥瘕臍下冷痛小便白濁以上病證皆令孕有不成以至絶嗣此藥治産後百病常服令人除宿血生新血令人有孕及生子充實亦治男子亡血諸疾木香茯苓石斛桃仁京墨當歸人參炙草桔梗秦芁蠶布燒藁本各二兩肉桂炮薑細辛丹皮川芎各一兩半川椒山藥澤蘭熟地香附蒼术大豆卷糯米為末蜜丸每兩作六丸每一丸細嚼溫酒醋湯任下烏雞煎治婦人百病烏骨雞一隻銀刀割去腸酥炙荷葉灰蘄艾糯米飲調餅二兩良薑炮薑當歸𤣥胡索赤芍破故紙川椒生地劉寄奴蓬术陳皮青皮川芎各一兩右為末醋和丸梧子大每服三五十丸湯使於後月經不通紅花蘇木酒下白𢃄牡蠣粉酒調下子宫久冷白茯苓煎湯下赤𢃄建茶清下血崩豆淋酒調絲綿灰下胎不下蜜和酒下腸風陳米飲調百草霜下心疼菖蒲煎酒下漏阻下血烏梅溫酒下耳聾蠟㸃茶湯下胎死不下斑猫酒下腰腳痛當歸酒下胞衣不下藝研水下頭風薄荷㸃茶下血風眼黑豆甘草湯下生瘡地黃湯下身體疼痛黃茋末調酒下四肢浮腫咳嗽喘痛杏仁桑皮湯下腹痛芍藥湯調下産前後痢白者薑湯下赤者甘草湯下常服溫酒醋湯下延齡丹婦人衆病無所不治熟地川芎防風檳榔蕪荑蟬退柏子仁馬牙硝人參黃茋白薇川椒鯉魚鱗晚蠶沙當歸木香附子石膏澤蘭各一兩藁本厚朴炙草炮薑各一兩半吳茱茰紅花各一分為末蜜丸彈子大每服一丸湯使於後血瘕塊痛綿灰酒下催生溫酒細嚼下血勞血結桔梗酒下血崩棕櫚灰酒下血氣痛炒薑酒下血風荆芥酒下血暈悶絶胎死腹中胞衣不下並用生大黃汁童便酒各一盞煎數沸調下交感地黃丸治婦人胎前産後眼見黑花或發狂如見鬼狀胞衣不下失音不語心腹脹滿水榖不化口乾煩渴寒熱往來口生熱瘡咽中腫痛心虛怔忡夜不得卧産後中風角弓反張面赤牙關緊急崩中下血如豚肝狀腹中㽲痛血多血少結為癥瘕恍忽迷亂四肢腫漏胎前不安産後血刺痛生地二斤絞汁留滓𤣥胡索糯米炒赤一兩生薑二斤生薑汁炒地黃滓地黃汁炒生薑滓各至乾堪為末則止當歸一兩蒲黃四兩炒香琥珀一兩右為末蜜丸彈子大當歸湯化下一丸皺血丸調補衝任溫暖血海治胞絡損傷宿瘀乾血不散受胎不牢多致損墮常服去風冷益血當歸牛膝𤣥胡索芍藥茴香蒲黃香附蓬术菊花熟地肉桂各二兩烏豆一升醋煮為末右再入醋二碗煮豆末至一碗入藥和為丸梧子大酒下五十丸人參飬血丸治女人禀受怯弱血氣虛損常服補衝任調血脉宣壅破積退邪熱除寒痺緩中下堅脹安神潤顔色通氣散悶兼治婦人懷孕腹中絞痛口乾不食崩傷眩暈及産後羸瘦不復常者人參赤芍川芎菖蒲各一兩歸身二兩熟地五兩烏梅為末蜜丸桐子大溫酒下五十丸四物湯調益榮衛滋飬血氣治衝任虛損月水不調臍腹㽲痛崩中漏下血瘕梗硬發歇疼痛妊娠宿冷將理失宜胎動不安血下不止及産後乘虛風寒內摶惡露不下結生瘕聚小腹堅痛時作寒熱又治氣血虛冷崩中去血熟地當歸川芎白芍等分忌葱蒜蘿蔔溫經湯治衝任虛損月候不勻或來多不斷或過期不行或崩中不止及治曽經墮損妊娠瘀血停留小腹中痛發熱下利手心煩熱唇口乾燥治小腹有寒久不受胎半夏當歸川芎人參白芍丹皮肉桂阿膠炙草各三兩吳茱茰二兩麥冬五兩加生薑牡丹散治血虛勞倦五心煩熱肢體痛頭目昏重心怔頰赤口乾咽燥發熱盜汗减食嗜卧及血熱相摶月水不利臍腹脹滿寒熱如瘧又治室女血弱隂虛榮衛不和痰嗽潮熱肢體羸瘦漸成骨蒸丹皮芍藥肉桂甘草半鹽水炒半生用沒藥紅花延胡索歸身烏藥各一兩陳皮蘇木鬼箭蓬术各一分乾漆二錢炒為末每服二錢滚水下忌生冷伏龍肝散治氣血勞傷衝任脉虛經血非時忽然崩下或如豆汁或成血片或五色相雜或赤白相兼臍腹冷痛經久未止令人黃瘦口乾飲食减少四肢無力虛煩驚使人無子伏龍肝赤石脂醋淬牡蠣粉煆烏賊魚骨煆禹餘糧醋淬肉桂各等分右為末空心調下二錢酒服白多加牡蠣烏賊骨赤多加石脂禹餘糧黃多加伏龍肝肉桂隨證加之一法有龍骨艾煎丸治崩傷淋瀝小腹常滿常服補榮衛固經脉吳茱茰歸身各二錢半熟地白芍各一兩半石菖蒲川芎人參各一兩熟艾四兩糯米飲調作餅焙為末酒煮糊丸桐子大酒下五十丸滋血湯治婦人血風血熱血虛經候澀滯經脉不通四肢麻木肌體渾身疼痛倦怠將成癆瘵馬鞭草荆芥穗肉桂當歸枳殼赤芍川芎各二兩丹皮一兩每服四錢加烏梅一枚抵當湯治婦人經水不利水蛭虻蟲去翅足各炒三十箇桃仁三十七粒去皮尖炒大黃三錢製右粗末每服四錢煎七分血未利更服又治男子有瘀血膀胱痛萬病丸治室女月經不調臍下堅結大如杯升往來發熱下痢羸瘦此為血瘕若生肉癥不可治也血瘕亦作氣瘕此即石瘕證也乾漆作細炒令火烟出烟頭青白一時久牛膝酒浸一宿各一兩六錢生地五兩取汁右以地黃汁入下二味為末慢火熬俟可丸即丸如桐子大空心米飲或溫酒下二丸日再勿妄加病去止藥婦人氣血虛經不行若服破血行經藥是殺之也謹之礬石鋭丸治婦人經水閉不利臟堅僻不止中有乾血白物礬石三分杏仁一分去皮尖炒細研杏仁入枯礬加少蜜丸如棗大綿裹納隂中末知再作三稜煎治婦人血癥血瘕食積痰滯三稜蓬术各四兩青皮半夏麥芽各三兩右用好醋六升煮乾焙為末醋糊丸桐子大醋湯下三四十丸痰積薑湯下烏金散治婦人血氣血癥血風勞心煩燥筋骨痰痛四肢困倦黑豆十兩沒藥當歸各五錢焙乾為末先將黑豆不犯水净拭用砂瓶一隻入豆在內以瓦片蓋鹽泥固濟留嘴通氣炭火二斤煅烟盡存性以鹽泥塞瓶嘴退火次日取出豆如鴉桕研細方入後末研勻不以時溫酒調下二錢重者不過三五服忌鯉魚毒肉水母之類烏喙丸治腸覃病因寒氣客于腸外與胃氣相搏正氣不榮繫瘕內著惡氣乃起其生也始如雞卵終及成狀如懷胎按之堅推之即移月事時下故曰腸覃亦治乳餘疾大小便不利并食有伏蟲臚脹癰疽毒腫久寒邪熱烏喙炮去皮尖二錢半夏四分石膏煅牡䝉藜蘆蓯蓉酒浸各二錢炮薑桂心巴豆六七粒另研右為末蜜丸菉豆大每服三五丸食後酒飲任下亦治男子疝痛木香散治婦人脾氣血氣血蟲氣蠱水蠱食蠱木香沉香乳香炙草各一分川芎胡椒陳皮人參晉礬各五錢肉桂炮薑砂仁各一兩茴香一兩半炒天茄五兩赤小者晒乾為末空心日午米餘調下二錢忌羊肉石莖散治婦人血結胞門或為癥瘕左腹脅間心腹脹滿脛急如石水狀俗謂之血蠱石莖歸尾馬鞭草紅花烏梅肉沒藥三稜炮蓬术炮蘇木節琥珀各一分另研炙草一錢大腹皮飲治婦人血癭單單腹腫大腹皮防己木通花粉黃茋桑皮厚朴薑汁炒枳殼陳皮大黃製五味青皮各等分每服一兩水一大碗煎六分入酒一分服大黃甘遂湯治婦人小腹滿如鼓敦狀小便微難而不渴者産後為水與血并結在血室也大黃四兩甘遂炮阿膠炒各二兩右銼散每服三錢煎七分溫服其血當下小柴胡湯治婦人傷風七八日續得寒熱發作有時經水適來此為熱入血室其血必結故使如瘧狀發作有時柴胡半夏黃芩甘草丹皮紅花有汗加桂枝小麥湯治婦人臟結喜悲傷欲泣狀如神靈所憑數呻缺小麥一升甘草三兩大棗十二枚牡丹丸治婦人月病血刺疼痛川烏焦黑去足尖丹皮四兩肉桂五兩桃仁五兩去皮尖蜜丸桐子大醋湯下黃芪五物湯治婦人血癉黃茋白芍肉桂大棗生薑竹茹湯治婦人汗血吐血尿血下血熟地竹茹三兩人參白芍桔梗川芎歸身甘草肉桂各一兩膏髮煎治婦人胃氣實胃氣下泄隂吹而正喧髮灰猪油調勻綿裹如棗大納隂中䘌瘡證治凡婦人少隂脉數而滑者隂中必生瘡名曰䘌瘡或痛或癢如蟲行狀淋露濃汁隂蝕幾盡皆由心神煩鬱胃氣虛弱致氣血留滯故經云諸痛癢瘡皆屬心火治之當補心養胃外以薰洗坐導藥治之乃可茯苓補心湯治心虛寒病苦悸恐不樂心腹痛難以言心寒恍忽喜悲愁恚怒衄血面煩悶五心熱渴獨語不覺咽㗋痛舌本强冷汗出善忘恐走及婦人懷妊惡阻嘔吐眩暈四肢怠惰全不納食茯苓人參前胡半夏川芎各三分陳皮枳殼紫蘇桔梗炙草乾葛各五兩當歸一兩白芍二兩熟地一兩五錢每服四錢加薑五片棗一枚分氣補心湯治心氣鬱結怔悸噎悶四肢浮腫上氣喘急大腹皮香附茯苓桔梗木通炙草川芎前胡青皮枳殼白术各三兩細辛木香各五錢每服四錢加薑棗煎狼牙湯治婦人隂中蝕瘡潰爛膿水淋漓臭穢狼牙濃煎汁以綿纒筋頭大如繭浸濃汁瀝隂中日數次雄黃鋭散雄黃青箱子苦參黃連各二分桃仁去皮尖一分右為末以生艾搗汁和丸棗大綿裹納下部扁竹汁更佳凡蝕於肛者單燒雄黃熏之蝕於下部則咽乾苦參湯洗之藿香飬胃湯藿香白术茯苓神麯烏藥砂仁米仁半麯人參各五錢炙草畢澄茄各二錢五分加薑棗煎小兒論凡小兒與大人不殊惟回氣臍風夜啼重舌變蒸客忤積熱驚癎解顱兒病疳病不行數症大人無之其如傷風傷寒斑瘡下痢用藥則一但多少異耳諸方前已類編可披而得故不重引然養小之書隋唐間猶未甚該博吾宋則有錢氏要方張氏妙選胡王偹録幼幼新書及單行小集方論證狀動計百千不勝備矣今略叙保生要方前數證以防緩急之需博雅君子不妨廣覽小兒初生回氣法小兒初生氣絶不能啼者必是難産或冒寒所致急以綿絮包裹抱懷中未可斷臍帶且將包衣置炭火爐中燒之仍撚大指捻蘸油㸃燈於臍帶上往來燒之蓋臍帶連兒臍得火氣由臍入腹更以熱醋湯洗臍帶須臾氣回啼哭如常方可浴洗了則臍帶可斷小兒初生所服藥法小兒初生急以綿裹指拭盡口中惡血若不急拭啼聲一出即入腹成百病矣亦末須與乳且先與拍破黃連浸湯取膿汁調硃砂細末抹兒口中打盡腹中舊屎方可與乳兒若多睡聽之勿强與乳則自然長而少病小兒初生通大小便法小兒初生大小便不通腹脹欲絶者急令婦人以溫水先潄口了吸咂兒前後心并臍下手足心共七處每一處凡三五次潄口吸咂取紅赤為度須臾自通不爾無益有此證遇此方可謂再生小兒臍風撮口法小兒初生一七日內或患臍風撮口百無一活坐視其斃者皆是良可憫也有一法極驗世罕有知者凡患此兒齒齦上有小泡子如粟米狀以溫水蘸熟帛裹指輕輕擦破即口開便安不用服藥神效千金變蒸論凡小兒有生三十二日一變再變為一蒸十變而五小蒸又三大蒸積五百七十六日大小蒸都畢乃成人小兒所以變蒸者是榮其血脉改其五臟變者上氣蒸者體熱微驚耳冷尻冷上唇頭白泡起如魚目珠子微汗出其重者體壯熱而脉亂或汗或不汗不欲飲食輒吐涎目白睛微赤黑睛微白變蒸畢目自精明矣此其證也單變小微兼蒸小劇凡蒸平者五日而衰逺者十日而衰先期五日後期五日十日之中熱乃除耳或違日數不除切不妄治及炙刺但少與紫霜丸微下之熱歇便止若身熱耳熱尻亦熱此乃他病可作便治紫霜丸治小見變蒸發熱不解并挾傷寒溫壯汗後雖熱不解腹中有痰癖哺乳不進乳則吐涎食癎先寒後熱者代赭石赤石脂各一兩巴豆三十粒去油杏仁五十粒去皮尖右以上二味為末另研杏仁巴豆為膏相和更杵一二十杵若硬少加蜜同搗之密器中收三十日兒服麻子大一粒與少乳汁令下食頃後令與少乳勿令多至日中當小下熱除若未全除明日更與一粒百日兒服如小豆一粒此以準定增減夏月多熱喜冷發疹二三十日輒一服佳紫霜丸無所不治惟不虛下之夜啼四證小兒夜啼有四證一曰寒二曰熱三曰重舌四曰客忤寒則腹痛而啼面青口白有冷氣腹亦冷曲腰而啼此寒證也熱則心燥而啼面赤小便赤口中熱腹熱啼時或有汗仰身而啼此熱證也治重舌口瘡則要乳不得口到乳上即啼身額皆微熱急取燈照口若無瘡舌必腫也客忤者見生人氣忤犯而喘也蒜丸治冷證腹痛夜啼大蒜一顆慢火煨香熟取出細切爛研日中或火上治半乾研末乳香出另研研勻丸如芥子大每服七粒乳汁送下燈花散治熱證夜啼荆芥穗燈上燒連燈花取研細用燈心煎湯塗口中以乳汁送下蒲黃散治小兒重舌蒲黃微炒紙鋪地上出火氣右研細糝些小舌下時時糝之更以溫水蘸熱帛裹指輕輕按掠之按罷糝藥牡蠣散治小兒口瘡牡蠣煆紅取出候冷紙裹埋土中七日出火氣三錢炙草一分研勻時時糝口中或吐或咽皆無害治客忤夜啼法用本家厨下火柴頭一箇火滅者以硃書云吾是天下五雷公將來作神將能將夜啼鬼一縛永不放急急如律令柴頭以火燒焦為上書了勿令兒知立在床下倚床前腳裡男左女右黃土散治小兒卒客忤竈上黃土蚯蚓糞等分研勻和水塗兒頭上及五心良積熱證治小兒積熱者表裏俱熟遍身皆熱頰赤口乾小便赤大便焦黃先以四順清凉飲利動臟府熱則去或既去復熱者內熱已解而表熱未解也當用惺惺散紅綿散加麻黃微發汗表熱乃去表熱去後又發熱者何也世醫到此盡不能曉又再用凉藥或再解表或以為不可治誤致夭傷者甚多此表裏俱虛而陽浮於外所以作熱只用六神散入粳米煎和其胃氣則收陽氣歸內身體便凉熱重者用銀白散四順飲子治小兒頭昏頰赤口內熱小便赤大便少此裏證也大黃當歸赤芍甘草等分右為末三嵗已上每服一錢煎七分作二服虛熱加甘草下痢减大黃冒風寒加麻黃中風證舌强戴眼者加獨活並於一兩中加减五錢惺惺散桔梗細辛人參炙草茯苓花粉白术各等分為末每服一錢加薄荷三葉紅綿散殭蠶二兩炒天南星二兩切片油浸蘇木節二兩天麻一兩右為末每服一錢入紅綿少許煎六分溫服凡小兒風熱頭痛頭目不清並宜服之若傷寒有表證發熱者每服入麻黃末五分若裏熱心燥渴入滑石末五分同煎服之六神散茯苓扁豆人參白术山藥炙草各等分為末每服一錢薑棗煎五分此藥用處甚多治胃冷加附子治風證加天麻治痢加粟殼銀白散山藥白术茯苓各五錢人參知母炙草扁豆升麻等分為末每服一錢加棗煎急慢驚風證治小兒發癎俗云驚風有隂陽二證身熱面赤而發搐榒上視牙關緊硬者陽證也因吐瀉或只吐不瀉目漸困面色白而虛或冷而發驚不甚搐榒微微目上視手足微動者隂證也陽證用凉藥隂證用溫藥不可作一概驚風治之有一證欲發瘡疹先身熱驚跳或發搐榒此非驚風當服發散藥陽癎硃砂一分膩粉麝香各五錢蘆㑹白附甘草各二錢殭蠶十箇金箔七片赤腳蜈蚣二條炙胡黃連一錢蠍稍二十箇右為末二歲已上服五分金銀薄荷湯調下三歲已上一錢如口不開灌入鼻中隂癎附子生去皮臍天南星半夏各二錢白附一錢五分右研細末井花水浸七日每日換水浸訖控乾入硃砂二錢麝香一錢拌勻每服一字薄荷湯下量兒加减一法用附子生去皮臍為末每服二錢生薑二片煎半盞分二三服吐者入丁香五箇同煎或用水浸蒸餅為丸粟米大每服二十粒亦可餘方見癲癎門解顱治法三辛散治小兒頭骨應合而不合頭骨開解名曰解顱細辛桂心各五錢乾薑七錢半為末以乳汁和敷顱上又方蛇殼炒焦為末用猪頰車中骨膸調敷頂上日三四度曽有人作頭巾裹遮護之久而自合良法也魃病證治千金論小兒有魃病是妊婦被惡神導其腹中令兒病也魃亦小兒也其證微微下利寒熱往來毫毛鬢髮猙獰不恱者是也宜服龍膽湯凡婦人先有小兒未能行而母更有娠使兒飲此乳亦作魃也令兒黃瘦骨立發熱毛髮落龍膽湯治小兒出腹血脉盛實寒熱溫壯四肢驚掣吐哯者若以能進哺中食實不消壯熱及變蒸不解中客忤鬼氣并諸驚癎龍膽柴胡黃芩桔梗鈎藤芍藥炙草茯苓各五錢蜣螂二條大黃一兩煨右為銼散以水一升煮取五合為一劑十嵗以下皆可服若兒生一日至七日分一合為五服八日至十五日為三服十六日至二十日分二合為三服二十日至三四十日盡以五合為三服皆以得下即止此劑為出腹小兒所作若日月長大者依此為例必如客忤鬼氣并諸驚癎可加人參當歸各二錢五分百日加一錢一字二百日加一錢半一嵗加五錢餘藥皆准此疳病證治小兒疳病者多因缺乳吃食太早所致或因久患臟腑胃虛蟲動日漸羸瘦腹大不能行髮豎發熱無精神肥兒丸主之肥兒丸川連神麯各一兩大麥五錢木香二錢檳榔二箇史君肉肉果各五錢麵裹煨為末神麯和丸每服三十丸滚水送下六神丸丁香木香肉果各五錢三味同麵裹入慢火煨麵熟為度訶子五錢麵裹煨史君肉蘆㑹各一兩細研為末棗肉和丸麻子大每服七丸米飲送下龍膽丸治疳病發熱龍膽草川連史君肉青皮等分為末猪膽汁和丸桐子大每服三五十丸以意加減卧時滚水下不行證治五加皮散治小兒三嵗不能行者由禀受不足體力虛怯腰脊腿膝腳筋骨軟故不能行五加皮為末粥飲調用酒少許每服一蜆子殼日三服鹿茸地黃丸治小兒足軟不能行熟地八兩丹皮三兩山藥茰肉各四兩澤瀉二兩茯苓二兩鹿茸鮮者佳酥炙黃一隻為末蜜丸梧子大青鹽湯下三錢三因極一病證方論卷十八
