body:
  text: 三因極一病證方論卷十六宋陳言撰斑瘡證治夫斑瘡病內經與張仲景皆不載尋托方論蓋自魏朝方有以白頭赤根者為豌豆即癍瘡也細粟如麻者俗呼為麻即膚疹也又有大者俗呼為芋為萍此皆輕重之不齊故命名異耳百問云治法不得専利以瘡疹發於表利之則毒氣入裏龎安常云身疼壯熱須少解散臟祕毒攻非利不愈必令汗下初虞世南亦云瘡疹發於肌肉屬陽明古人治法皆以承氣湯利之諸説矛盾不無疑誤今皆存之要當分其未發已發為治若其始發必作寒熱如傷寒狀方證所載耳冷尻冷咳嗽者皆瘡疹證又小兒初得手足搐搦如風癎者亦瘡疹候便可與宣熱必須利之千金治豌豆瘡初發欲發者單煮大黃服之即明文也若其已發只須解肌用升麻紫草等是也如是分之諸證自判又此病多因傷寒失於汗下或時氣勝復嵗主客氣及天行疫病長幼相染者當隨因辨證治之其間唯倒黶最危宜早為治三豆飲子治天行痘瘡但覺有此證預服則不發赤小豆黑豆菉豆各一升甘草五錢右淨淘豆入甘草以水煮熟逐日空心任性食豆飲汁七日瘡自不發升麻湯治大人小兒傷風寒瘟疫頭痛寒熱體疼癍瘡已發未發並可服升麻葛根甘草芍藥各等分右銼散每服五錢重水二盞煎七分去滓熱服小兒量與之一法加紫草茸煎鼠粘子散治傷寒斑瘡毒氣咽膈不利聲不出疼痛鼠粘子炒丹參甘草炙乾薄荷升麻等分右㕮咀每服三錢水一盞半煎七分去滓不時服小兒量與之龍腦膏治癍瘡倒黶豬心血調腦子成膏以紫草茸煎湯解開稀稠得所服無腦子用辰砂一法以白芍藥葉燒灰為細末每服二錢入麝香少許沸湯調下仙靈散治癍瘡入眼仙靈脾葳靈仙等分右為末每服二錢食後米湯調下豆皮飲子治小兒因出瘡毒入眼生翳真菉豆皮白菊花真榖精草去根等分右為末每服一大錢乾肺一箇粟米泔一盞同煎泔盡只將乾肺去核日服三次丹毒敘論經云諸痛癢瘡皆屬心火心虛寒則癢心實熱則痛丹毒之病由心實熱也心生血主於脈血熱則肌浮隂滯於陽則發丹毒方論有云以其色赤如丹砂塗故得丹名然又有水丹白丹五色油丹豈專以赤為名也又有赤硫天火殃火尿竈竈廢野火等古方以為小兒出入逰行觸犯所致此因容或有之若小兒在襁褓中未能出入亦患此者是豈因觸犯耶大率皆血熱之所為也敘列於後丹毒證治夫火丹者肉中忽赤如丹塗之色痛癢不定甚至遍身白丹者肉中腫起癢痛如吹狀雞冠丹者亦名茱茰丹肉上粟起如雞冠水丹者遍體熱起黃色如水在皮中五色油丹者亦名曲腫赤硫丹腫熱赤色流入四肢以上皆不問大小如天火骨火殃火尿竈朱田野火等丹多著少小但自腹肉生出四肢者則易愈自四肢生入腹者難治香欒皮湯治諸腫丹毒發於四肢腹背頭面或赤或白或癢或痛或寒或熱香欒皮一兩以水一大碗煎半碗用翎毛刷患處神妙伏龍肝散治少小諸腫丹毒用伏龍肝為末以雞子清和敷之日三次金花散治一切丹毒鬱金黃芩甘草山梔大黃黃連糯米右七味各一兩生為末蜜和冷水調以鵝毛拭患處料簡治丹毒方千金外臺甚多無出用至冷物凡至冷物無過藻菜如有患丹毒熱腫等取渠中藻菜細切熟搗敷丹上厚三寸乾則易之最良癮疹證治世醫論病丙穩禾疹無不謂是皮膚間風熱然既分冷熱冷熱即寒暑之證又有因浴出湊風冷而得之者豈非濕也則知四氣備矣經云諸痛癢瘡皆屬於心心實熱則痛虛寒則癢又陽明主肌肉屬胃與大腸亦有冷熱分痛癢不可不審世人呼白者為婆膜赤者為風血名義混淆當以理曉內則察其臟府虛實外則分其寒暑風濕隨證調之無不愈矣加味羌活飲治風寒暑濕外搏肌膚發為癮疹增寒發熱遍體搔癢隨臟氣虛實或赤或白心迷悶亂口苦咽乾羌活前胡各一兩人參桔梗炙草枳殼麩炒川芎天麻茯苓各五錢蟬退去頭足薄荷三分右為末每服二大錢水一盞薑三片煎七分無時服加味烏金丸治癮疹上攻頭面赤腫搔癢搔之皮便脫落作瘡作癢作痛淫液走注有如蟲行川烏湯洗浸三五次去皮尖焙乾稱荆芥各八兩杜當歸水浸三日焙乾稱半斤薄荷五兩右為末醋煮米粉為丸桐子大每服五十丸溫酒清茶下麯术丸治因浴出湊風冷遍身癮疹搔之隨手腫突及眩暈嘔噦白术一兩神麯二兩炒甘草一分右為末每服二錢米飲調下一方以土砂研炒冷酒調下二錢不飲酒者以茶調下敷藥景天一斤細搗取汁敷上熱炙手摩再三度瘥狐臭漏腋證治狐臭與漏腋雖不害人性命而害人身奉親事君乃至交遊皆非所宜修身之士務為清潔或得此患不可不思有以去之夫狐臭多因勞逸汗漬以手摹而嗅之致清氣道中受此宿穢故傳而為病方論有天生之臭説恐未必皆然多見為人相染者蓋其氣吸上元宫遂散百脈多相沾染忌之為得漏腋者亦由腋下夾汗致汚衣數重皆透然未必臭以二證考之其病自别古方共作一病未為至論蜘蛛散治狐臭薰人不可嚮邇者大蜘蛛一箇以黃泥入少赤石脂搗籮極細入鹽少許杵煉為一窠納蜘蛛在內旋以火近燒令通紅候冷剖開右一味研細臨卧入輕粉一字釅醋調成膏敷腋下明早登厠必瀉下黑汁臭穢不可聞於逺僻處傾棄之無致染人神良六物散治漏腋腋下足心手掌隂下股裏常如汗濕汚衣者乾枸杞根乾薔薇根甘草各五錢商陸根滑石各一分右治下篩以苦酒少許和勻塗當微汗出易衣更塗之不過三次便愈或一嵗復發又再塗之頭痛證治頭者諸陽之會上丹産於泥丸宫百神所奪凡頭痛者乃足太陽受病上連風府眉角而痛皆可藥愈或上穿風府陷入於泥丸宫而痛者是謂真頭痛不可以藥愈夕發旦死旦發夕死責在根氣先絶也原其所因有中風寒暑濕而疼者有氣血飲食厥而疼者有五臟氣鬱結而成者治之之法當先審其三因三因既眀則所施無不切中芎辛湯治傷風寒生冷及氣虛痰厥頭疼如破兼眩暈欲倒嘔吐不定附子生去皮臍烏頭生去皮尖天南星乾薑炙草川芎細辛各等分右㕮咀每服四大錢水二盞薑五片茶芽少許煎七分去滓食後服藿香散治傷風挾涎飲上厥頭疼偏正夾腦諸風藿香五錢川烏頭湯洗七次去皮尖一兩乳粉皂角子大三錢草烏頭炮去皮尖五錢右為末每服一字薄荷茶清調下食後服惺惺散治傷寒發熱頭疼腦痛石膏甘草麻黃去節各等分右為末每服二錢水一小盞茶半盞蔥三寸劈碎煎三五沸先嚼蔥白細咽下去枕仰卧如發熱再投一服汗出即愈玉屑散治傷寒發熱涎潮上厥伏留陽經頭疼眩暈不可忍者石膏煅右研細每服二錢蔥茶調下小兒量大小加減芎术湯治著濕頭重眩暈苦極不知食味暖中補益精氣川芎白术附子生去皮臍各五錢甘草桂心各一分右㕮咀每服四大錢水二盞薑七片棗一枚煎七分去滓空心服救生散治外傷風冷內積憂思氣鬱涎聚隨氣上厥伏留陽經頭疼壯熱眩暈或眩暈胸痞膈塞兼服寬中丸并攻之菊花蒂川芎石膏煆各一兩甘草炙一分右晒乾為末每服三錢煎蔥湯調下如覺胸痞即調此下寬中丸治氣滯不快飲食不消胸膈痞塞凝痰聚飲狀如傷寒頭疼胸痞大附子炮木香青皮大黃濕紙裹煨等分右為末醋煮糊為丸桐子大每服十丸薑湯下頭疼甚則調救生散送下天南星丸治腎厥頭疼不可忍硫黃石膏天南星焰硝各等分右為末糊丸桐子大每服三十丸空心溫酒下硃硫丸治腎厥痰厥頭疼諸藥不效川烏炮硫黃各五錢硃砂水飛二兩天南星一兩炮製右為末薑汁糊丸桐子大每服十五丸生薄荷湯下葫蘆巴散治氣攻頭疼如破葫蘆巴炒三稜銼醋浸一宿各一兩乾薑炮一分右為末每服二錢生薑湯或酒調下雄黃丸治八般頭風及眩暈惡心通明雄黃一兩川烏頭生去皮尖兩半右二味為末滴水丸如桐子大每服十丸煨蔥白湯清下即用後藥搐鼻搐鼻藥蓽撥良薑各一分白芷一錢細辛半分右為末每服一小字先含水一口分搐鼻內吐水即止大附丸治元氣虛壅上攻偏正頭疼不可忍大附子一枚炮去皮臍為末蔥汁糊丸菉豆大每服十丸至十五丸清茶下一法以川烏頭炮去皮尖為末用韭葉自然汁和丸治風虛痰涎頭疼如聖餅子治氣厥上盛下虛痰飲風寒伏留陽經偏正頭疼痛連腦頂吐逆惡心目瞑耳聾常服清頭目消痰暖胃氣川烏頭生去皮臍南星乾薑各一兩甘草川芎天麻防風半夏製各五錢右為末湯浸蒸餅和丸雞豆子大捻作餅子晒乾每服五箇同荆芥三五穗細嚼茶酒任下熱水亦得不時服眼敘論夫眼為五臟之精華一身之至要如天之有日月其可不保護耶然骨之精為瞳子屬腎筋之精為黑眼屬肝血之精為絡裏屬心氣之精為白眼屬肺肉之精為約束屬脾契筋骨血氣之精與脈并為系系上屬於腦後出於項中故六淫外傷五臟內鬱飲食房室逺視悲泣抄寫雕鏤刺繡博奕不避煙塵刺血發汗皆能病目故方論有五輪八廓內外障等各各不同尤當分其所因及臟府隂陽不可混濫如目決其面者為鋭眥屬少陽近鼻上為外眥屬太陽下為內眥屬陽明赤脈從上下者太陽病從下上者陽明病從外走內者少陽病此三陽病不可混也睛色赤病在心色白病在肺色青肝之病色黑腎之病色黃者脾之病色不可名者病在胃中此五臟三陽病不可混也仍敘三因於後三因證治病者喜怒不節憂思兼并致臟氣不平鬱而生涎隨氣上厥逢腦之虛浸淫眼系蔭注於目輕則昏澀重則翳障眇淚努肉白膜漫睛皆內所因或數冒風寒不避暑濕邪中於項乘虛循系以入於腦故生外翳醫論中所謂青風緑風紫風黑風赤風白風白翳黃翳等隨八風所中變生諸症皆外所因或嗜欲不節飲食無時生食五辛熱啖炙煿馳騁田獵冒涉煙塵勞動外精喪眀之本謂之一時恣意逰佚而為百嵗之固愆皆不內外因治之各有方千金神麯丸眀目百嵗可讀細字常服益眼神麯四兩光眀砂一兩磁石二兩煆醋淬七七次右為末煉蜜丸桐子大米飲服五丸空心日三服羌活散治風毒氣上攻眼目昏澀翳膜生瘡及偏正頭風眼花小纍纍者羌活川芎天麻旋覆花青皮南星炮藁本各一兩右為末每服二錢水一盞薑三片薄荷七葉煎七分食後服一法入牽牛末二兩以薑汁煮糊丸如桐子大酒下二三十丸白蒺藜散治腎臟風毒上攻眼目赤腫熱淚昏澀努肉攀睛白蒺藜炒去角防風甘草生真殭蠶去絲嘴各一兩南星一兩五錢黑豆二合青鹽五錢以水煮透取出焙乾稱不用鹽豆甘菊花三兩生右為末每服二錢煎甘草湯調下食後服忌炙煿洗肝散治肝熱赤脈貫睛澀痛沖風淚下兼治熱血攻心蒺藜一兩半防風羌活各五錢馬牙硝二兩甘草一分右為末每服二錢白湯調下食後服椒紅丸眀目暖水臟補虛勞久服駐顔縮小便川椒取紅者四兩巴戟去心金鈴子銼炒茴香製附子各一兩右為末以淮山藥三兩酒煮糊搜為丸桐子大空心鹽湯下三五十丸煮肝散治眼赤有耳癢症用四生散方見􅒃風門每服四錢匕鹽酒入羊子肝煮空心溫服羊子肝即羊肝上小片子驅風散治風熱上攻眼瘇眶澀痛不可忍上下眶眥赤爛翳肉侵睛五棓子一兩去塵土蔓荆子一兩五錢洗右㕮咀每服三錢水二盞銅石器內煎至一盞澄清熱洗留滓二服熱再煎立勝散治風毒攻眼及時眼隱澀羞明瘇痛黃連黃柏秦皮去粗甘草各等分右㕮咀每服四錢水一盞棗一枚燈心七莖煎數沸去滓以新羊毛筆蘸刷眼候溫即用手沃之一法不用黃柏甘草有黃芩防風神仙照水膏治障翳蠟一兩黃丹一兩水飛蛇殼一分燭燒水銀一錢烏雞殼一箇右用桞木槌研細滴蠟為餅臨卧用之候天眀將水照眼藥隨水中膜盡去蘖竹瀝膏治一切赤眼障翳慈竹一段去兩頭節黃柏去粗皮刮細者滿填竹內右用磚對立置竹磚上兩頭各安淨碗以乾竹火燒令瀝出盡收之以叉股銅筯點通利膏治眼赤翳澀膜遮障時多熱淚杏仁二十一箇湯去皮尖乳香皂子大輕粉右旋入口中都嚼候津液滿口吐出磁器中置火上令四邉沸以綿濾别盞中入生腦子皂子大研勻再濾過以銅筯點之通神膏治眼生翳膜赤脈努出澀癢疼痛有淚沙蜜四兩青鹽麝香各一字乳香硇砂滴淋過枯礬各半字當歸五分黃連一錢右件乳鉢內研破同蜜入膏竹筒內密封閣定煮半日厚綿濾過點眼蛤粉丸治雀目不拘久近但日落便不見物上色蛤粉細研黃蠟右鎔蠟搜粉為丸如棗大每用豬肝一片二兩許披開裹藥一丸麻線纒甕器內水一碗煮熟取出乘熱薰眼至溫吃肝以效為度鼻病證治肺為五臟華蓋蓋百脈取氣于肺鼻為肺之開闔吸引五臭衛養五臟升降隂陽故鼻為清氣道或七情內鬱六淫外傷飲食勞佚清濁不分隨氣壅塞遂為清涕鼻洞濁腦膿絲衄血息肉久而為􅙄雖種種不同未有不涉三因致泥丸汨亂變生諸症羊肺散治肺虛壅鼻生息肉不聞香臭羊肺一具洗白术四兩肉蓯蓉木通乾薑川芎各一兩右為細末以水量打稀稠得所灌肺中煮熟細切焙乾為末食後米飲服一二錢細辛膏治鼻塞腦冷清涕不已細辛川椒乾薑川芎吳茱茰附子生去皮臍各三分皂角屑五錢桂心一兩豬脂六兩右煎豬脂成油先一宿以苦酒浸煎八味取入油煎附子黃色止以綿裹塞鼻孔通草散治鼻􅙄氣息不通不聞香臭并有息肉木通細辛附子炮去皮臍各等分右為末蜜和綿裹少許納鼻中一法以瓜蒂為末綿裹納鼻中或吹入亦可一法以枯礬研為末面脂和綿裹少許納鼻中數日息肉與藥消落粉黃膏治肺熱鼻發赤瘰俗謂酒皶硫黃一分為末蘿蔔切去蓋剜作甕子入硫黃在內以竹針蓋定正安粳火煨一宿取出研細輕粉烏頭尖各少許為末右研勻以麵油調卧時敷早時洗去以酥調尤佳一法用乳香硫黃細辛輕粉等分為末水調卧敷一法以梔子為末蠟丸小彈子大茶酒任下一丸凡鼻頭微白者亡血也赤者血熱也酒客多有之若時行衄血不宜斷之或出一二升不已即以龍骨為末吹入即止凡九竅出血皆用此法甚良餘衄方見失血門唇病證治唇者脾之候也意舍之所榮燥則乾熱則裂風則瞤動寒則揭氣鬱則生瘡血枯則瀋而無色治之之法內則隨證調其脾外則當以藥敷之清脾湯治思過度藴熱於脾口乾唇燥瀋裂無色黃茋白芷升麻人參甘草炙半夏炮去滑等分右㕮咀每服四錢水一盞半薑五片棗二枚小麥三十粒煎七分去滓無時服羌活散治風濕入脾致唇口瞤動裙揭頭疼目眩及四肢浮腫如風水狀羌活三兩茯苓薏苡仁各一兩右為末每服二錢水一大盞煎七分入淡竹瀝一匙許再煎服菊花丸治脾氣久虛憂思過度榮衛枯耗唇裂瀋緊或口吻生瘡容色枯悴男子失精女人血衰悉主之甘菊花枸杞子肉蓯蓉酒浸洗切巴戟天去心各等分右為末蜜丸桐子大每服三五十丸米湯送下青灰散治唇緊燥裂生瘡面無顔色青黛布燒灰研細以豬脂調敷之一法以頭垢敷之口病證治夫口乃一身之都門出入榮養之要道節宣微爽病必生焉故熱則苦寒則醎宿食則酸煩燥則澀虛則淡疳則甘五味入口藏於脾胃行其精華分布津液于五臟臟氣偏勝味必偏應於口或胃熱則口臭凝滯則生瘡不可失睡失睡則愈增龍石散治上膈壅毒口舌生瘡咽喉腫痛寒水石煅三兩辰砂二錢半另研腦子半字右為末以少許糝患處咽津日夜數次小兒瘡疹攻口先以五福化毒丹掃却以此藥糝之立效赴筵散治口瘡疼痛五棓子一兩洗黃柏蜜塗炙紫色滑石各五錢右研細末每服五分許糝患處不妨便可飲食緑雲膏治口瘡臭氣瘀爛久而不瘥黃柏五錢螺青二錢右研細令卧置一字在舌下不妨咽津遲眀瘥一法以銅緑易螺青兼金散治藴熱上攻或下虛邪熱病口生瘡細辛黃連各等分右為末先以熱水揾帛揩淨糝藥患處良久涎出吐之杏粉膏治口瘡以涼藥敷之不愈者杏仁十粒去皮尖輕粉一字右研杏仁細調勻臨卧敷瘡上少頃吐之勿咽生香膏治口氣熱臭右以甜瓜子去殼一味研細蜜熬少許調成膏食後含化勿染在齒間一方以香附炒去毛為末每早晚揩少許牙上齒病證治齒為關門腎之榮骨之餘也腎衰則齒豁精固則齒堅又大腸支脈在牙齗主灌注於牙大腸壅則齒為之浮大腸虛則宣露挾風則攻目頭面疳𧈟則齲脫為痔皆氣鬱而生諸症不同治之各有方安腎丸八味丸並治虛壅牙齒疼痛浮腫安腎丸方見腰痛門八味丸方見腳氣門西嶽蓮花峰神傳藥方豬牙皂角及生薑西國升麻熟地黃木律旱蓮槐角子細辛荷葉要相當青鹽等分同燒煅研細將來使最良揩齒牢牙鬚髮黑誰知世上有仙方荷葉用蒂常用齒藥牢牙去風冷蚛蝺宣露不問老少用之甚效槐枝栁枝各長四寸一握切碎皂角不蛀者七莖鹽四十文重右同入磁瓶內黃泥固濟粳火燒一夜候冷取出研細用如常法有石佛菴主年七十餘云祖上多患齒疼脫落得此方效數世用之齒白齊密乃良方也玉池散治風蟲牙疼腫癢動搖牙齦潰爛宣露出血口氣等疾地骨皮白芷升麻防風細卒川芎槐花當歸藁本甘草各等分右為末每用一字許揩牙或大段痛即取二錢水一盞半黑豆半合薑三片煎至一盞稍溫潄候冷吐之殊效或用金沸草散亦佳舌病證治舌者心之官主嘗五味以營養于身資于脾以分布津液於五臟故心之本脈係於舌本脾之絡脈係于舌傍肝脈循隂器絡于舌本凡此三經或為風寒濕所中使人舌卷縮而不能言或憂怒思恐所鬱則舌腫滿而不得息心熱則破裂生瘡肝壅則出血如湧脾間則白胎如雪諸證雖異治之各有方升麻柴胡湯治心脾虛熱上攻舌上生瘡舌本強頰兩邉腫痛柴胡升麻芍藥梔子木通各一兩黃芩大青杏仁去皮尖各三分石膏煅二兩右㕮咀每服四錢水一盞薑五片煎七分去滓食後服金沸草散治風寒傷于心脾令人增寒發熱齒浮舌腫荆芥穗四兩旋覆花前胡麻黃去節各三兩炙草赤芍藥製半夏各一兩右㕮咀每服四大錢水一盞半薑七片棗一枚煎七分去滓潄口吐一半吃一半世醫用此發散傷風傷寒及加杏仁五味子治咳嗽皆效獨未知治舌腫牙疼辛未年有人患舌腫牙疼如吹滿塞其中粥藥不入其勢甚危大煎一劑乘熱以紙籠氣薰之遂愈又一婦人牙疼治療不瘥致口頰皆腫亦以此藥薰潄而愈故特記之烙腫法凡舌腫舌下必有噤蟲狀如螻蛄卧蠶有頭尾頭小白可燒鐵烙烙頭上即消黑散子治舌忍腫破右釡底煤研細以醋調敷舌上下脫去更敷能先決出血竟敷之彌佳一法用鹽等分調薄荷蜜治舌上白胎乾澀話語不真薄荷自然汁龍腦者佳白蜜等分右先以生片蘸水揩洗竟敷之良文蛤散治熱壅舌上出血如泉五棓子洗白膠香牡蠣粉各等分右為末每用少許糝患處或熱鐵箆烙孔上礬石散治風濕寒舌強不能語枯礬桂心等分右為末每一錢安舌下或用正舌散治之方出中風門凡失欠頰車蹉但開不能合以酒飲之令大醉睡中吹藥搐其鼻嚏透即自正咽喉證治哽附夫喉以候氣咽以咽物咽接三脘以通胃喉通五臟以系肺氣水穀攸分皎然明白有為水喉穀喉之説者謬説也千金復云喉嚨候脾胃咽門候肝膽亦非至論智者當以理推不可強存乎其人矣諸臟熱則腫寒則縮皆使喉閉風燥亦然五臟久嗽則聲嘶嘶者喉破也非咽門病咽腫則不能吞乾則不能咽多因飲啖辛熱或復嘔吐絡傷致咽系乾枯之所為也與咽門自别又有懸􅏴暴腫閉塞喉嚨亦如喉閉但懸􅏴在上腭俗謂鶯翁又謂之鵝聚俗語聲訛不可不備識小續命湯治卒喉痺不得語方見中風門外加杏仁七粒去皮尖甚效玉鑰匙治風熱喉痺及纒喉風焰硝一兩半硼砂五錢腦子一字白殭蠶一分右為末研勻以竹管吹五分許入喉中立愈神效散治喉痺熱腫語音不出荆芥穗另為末萆麻生去皮另研各等分右入生蜜少許丸如皂子大以綿裹含化急則嚼化一法用朴硝不用荆芥蜜附子治府寒咽門閉不能咽大附子生去皮臍切作大片蜜塗炙令黃令咽津甘味盡更塗炙用玉屑無憂散治纒喉風喉痺疼痛語音不出咽物有礙或風涎壅滯口舌生瘡大人酒癥小兒妳癖或悮吞骨屑硬塞不下玄參管仲滑石縮砂仁黃連甘草茯苓山豆根荆芥穗各五錢寒水石煅硼砂各三錢右為末每服一錢先抄入口以新水咽下此藥除三尸去八邪殺九蟲辟瘟療渴荆芥湯治風熱肺壅咽喉腫痛語音不出喉中如有物哽咽之則痛甚荆芥穗五錢桔梗二兩甘草一兩右㕮咀每服四錢水一盞薑三片煎六分去滓溫服一法去荆芥穗名如聖湯雄黃解毒丸治纒喉風及急喉痺卒然倒仆失音不語或牙關緊急不省人事或上膈壅熱痰涎不利咽喉腫痛雄黃飛鬱金各一分巴豆去皮油二七箇右為末醋糊丸菉豆大熱清茶下七丸吐出頑涎立醒未吐再服如未至死心頭尚溫灌藥下喉無有不活乾薑散治懸􅏴壅熱卒暴腫大乾薑半夏湯洗去滑各等分右為末以少許著舌上咽津一法用鹽抹筯頭張口拄之日五六次麻仁散治穀賊尸咽咽喉中癢此因悮吞榖芒搶刺癢痛芝麻炒不拘多少右為末湯點服凡榖賊屬咽馬喉風屬喉不可不分馬鞭草散治馬喉痺紅腫連頰馬鞭草根右一味搗自然汁每用一合許一法以馬銜鐵汁服亦妙凡治哽之法皆以類推如鸕鷀治魚哽磁石治針硬髮灰治髮哽狸虎治骨哽亦各隨其類也蜜綿薤白通治諸哽煮薤白半熟以線繫定手提線少嚼薤白咽之度薤至哽處數牽引骨即出矣一法以綿一小塊蜜煮用如食薤法玉屑無憂散治一切物哽方見纒喉風下耳病證治腎雖寄竅於耳當知耳為聽會主納五音外則宫商角徴羽內則唏噓呵欠呬內關五臟外合六淫故風寒暑濕使人聾瞶耳鳴憂思喜怒多生內塞其如勞佚不言而喻復有出血生膿聤耳底耳或耵直庚切聹乃頂反不出飛走投入諸證既殊治各有法菖蒲丸治耳卒痛及聾塞不聞聲菖蒲附子炮去皮臍各等分右為末以醋丸如杏仁大綿裹納耳中日二易之補腎丸治腎虛耳聾或勞頓傷氣中風虛損腎氣升而不降致耳內虛鳴山茰乾薑炮巴戟芍藥澤瀉兔絲子酒浸逺志去心桂心黃茋石斛乾地黃細辛當歸附子炮牡丹皮蛇床子甘草蓯蓉人參各二兩菖蒲一兩防風一兩五錢茯苓五錢羊腎右為末以羊腎研細酒煮麵糊為丸桐子大食前鹽酒任下三十丸至五十丸蠟彈丸治耳虛聾白茯苓一兩山藥炒三兩杏仁去皮尖炒兩半黃蠟二兩右以前三味研勻為末溶蠟同末丸如彈子大鹽湯嚼下有止以黃蠟細切嚼點好建茶送下亦效乾蠟散治耳聾因腎虛所致十年內一服效乾蠟黃者小者并頭尾用四十九箇生薑切蠍大者十九片二味銀石器內炒至乾為細末右向晚勿食初夜以酒調作一服至二更以來徐徐盡量飲五更耳中間如聞百十攢笙響便自此聞聲解倉飲子治氣熱壅或飲食傷胃風熱上壅耳內聾閉徹痛膿血流出白芍赤芍各五錢當歸甘草炙大黃蒸木鱉子去殼各一兩右㕮咀每服四錢水一盞煎七分食後卧服麝香散治停耳底耳耳內膿出桑螵蛸一枚慢火炙及八分熟存性麝香右為末研令勻每用半字糝耳內如有膿先用撚紙以藥糝之一法用染坯枯礬等分為末以筆管吹入耳中即愈或入麝香更佳諸蟲入耳麻油灌之即出耳內出血龍骨為末吹入即止三因極一病證方論卷十六
