body:
  text: 三因極一病証方論卷十四宋陳言撰水腫叙論夫腎主元氣天一之水生焉肺主冲化地四之金屬焉元氣乃水中之火所以太陽合少隂主精髄以滋血冲化乃地中之金所以太隂合陽明主肌肉以養氣今腎虚則火虧致陽水凝滯肺滿則泛溢使陽水沈潛沈潛則氣閉凝滯則血淖經絡不通上為喘急下為腫滿故經曰腎為少隂肺為太隂其本在腎其末在肺皆至隂以積水也所以能聚水而生病者葢以腎為胃闗闗鍵不利樞機不轉水乃不行渗透經絡皮膚浮腫諸經不同廣如經説治法曰平治權衡者察脉之浮沉也去菀陳莝者疏滌腸胃也開鬼門潔净府者發汗利小便也原其所因則冐風寒暑濕屬外喜怒憂思屬内飲食勞逸背於常經屬不内外皆致此治之當究其所因及諸禁忌而為治也水腫証治脉例古方水腫証候以短氣不得卧為心水兩脇疼痛為肝水大便鴨溏為肺水四肢苦重為脾水足痛足冷為腎水口苦咽乾為胆水乍虚乍實為大腸水腹急肢痩為膀胱水小便秘澁為胃水小腹急滿為小腸水各随其經絡分其内外審其脉証而甄别之然此十水謂之正水外有風水皮水石水黄汗以義攷之風合歸肝皮合歸肺黄汗歸脾石合歸腎雖名理不踰奈証候少異古方偹列不可不辨但風水脉浮必惡風皮亦浮按不沒指石水脉浮不惡風腹滿不喘黄汗脉沉遲發熱多涎久而不愈必致􅏴膿正水寸口脉浮而遲浮則熱遲則潛熱潛相搏名曰沉趺陽脉浮而數浮則熱數則止熱止相搏名曰伏沉伏相搏名曰水沉則絡脉虚伏則小便難虚難相搏水走皮膚即為正水此金匱節文所以用寸口趺陽二脉者葢水氣不在一經也大抵脉浮滯數即是虚寒潛止於其間久必沉伏沉伏則陽虚隂實為水必矣要知水脉必沉論曰脉出者死與病不相應也唇黒則傷肝缺盆平則傷心臍突則傷脾足平則傷腎背平則傷肺凡此五傷决不可療也治法曰腰以上腫宜發汗腰以下腫宜利小便學者當知之復元丹治水腫夫心腎真火能生脾肺真土今真火氣虧不能滋養真土故土不能制水水液妄行三焦不瀉氣脉閉塞樞機不通喘息奔急水氣盈溢渗透經絡皮膚滿溢足脛尤甚兩目下腫腿股間冷口苦舌乾心腹堅脹不得正卧卧則咳𠻳小便不通夢中虚驚不能安卧附子二兩木香茴香川椒獨活厚朴白术陳皮吳茱茰肉桂各二兩澤瀉一兩半肉果梹榔各五錢右為末糊丸桐子大紫蘇湯下無時此藥世傳屢驗未嘗示人其間君臣佐使與造化同妙服者自知要當屏去諸藥一日三服先此旋利如傾次乃腫消喘止葢藥能助真火以養真土運動樞機安平必矣法當禁慾并絶鹽半年乃不再作當歸散治同前當歸木香赤茯苓肉桂梹榔赤芍丹皮陳皮木通白术各等分右為末脚膝頭面腫大小便不通每服二錢水一盞紫蘇葉二葉淡木𤓰一片如指大同煎八分温服日三服如已愈早晩二服覺氣下或小便快是效臟寒去梹榔臍突加大腹皮猪苓各一兩忌烏雞肉鹽酸海味正陽丹治水腫宣木𤓰四兩瀝者一個剉童便酒各三升煑爛絞汁人参大豆煑去皮乾十兩附子五錢銀硃二錢右為末入銀硃研匀以木𤓰膏研匀丸如桐子大米湯下送五十丸消腫丸治水腫喘滿小便不利滑石木通白术黒丑茯苓陳皮茯神通脱木各一分丁香木香各半分瞿麥一分右為末酒糊丸桐子大燈心麥冬湯下三十丸消腫散治水氣浮腫喘不得卧煩熱煩躁煩渇大小便不利大黄蜜蒸黒支甘草乾葛陳皮麻黄川芎馬牙硝各等分為末蜜調下二錢棗仁散治水氣浮腫無問新久老少悉可服惟禁鹽必效棗仁赤茯苓甘草肉桂各等分右為末米飲調下禹餘粮丸治十種水氣凡脚膝腫上氣喘急小便不利但是水氣悉皆主之蛇含石大者三兩以新鉄銚盛入一秤炭火中燒蛇黄與銚子一般通紅用鉗取銚子出傾蛇黄入酸醋二升中候冷取出蛇黄研極細禹餘粮三兩針砂五兩水淘浄乾更以銚子炒乾禹粮一處用米醋二升就銚子煑醋乾為度入一秤炭燒通紅傾藥净磚上候冷研無聲則止以三物為主其次量人虚實入下項藥治水多是取轉惟此方三物既非大㦸甘遂芫花之比又下項扶持故虚老人可服羌活木香茯苓川芎牛膝白䓻仁茴香蓬术三稜肉桂炮薑青皮白蒺藜附子當歸各五錢酒浸一宿右為細末拌極匀以神麯和藥杵極細煮糊為丸桐子大食前温酒下三十丸至五十丸惟忌鹽雖毫末不得入口若無以為味即水病去後且以醋少許調和食不能忌鹽物後必復發欲病去切須忌鹽但試服藥即於小便内旋去不動臟腑病去日日三服兼以温和補藥助之真神方也第一退水丸能化氣退腫水去菀陳莝利濕通小便蓬术三稜肉桂青皮益智各五錢巴豆二兩去皮油右為末麵糊丸桐子大用黄梔十個劈破荆芥黒丑酸醬草各少許煎湯下三十丸第二退水餅服前藥未效即服此方甘遂大㦸各等分為末入麵打水調為餅如棋子大漫火煨熟五更淡薑湯嚼下一餅第三大腹子散取轉後調正胃氣進飲食大腹子炒肉桂茴香陳皮各五錢右為末每服二錢米飲調下桃紅散治正水脹急大小便不利上逆欲死甘遂五錢半生半炒坯十文另研右為末研匀每用一分以白麵四兩水調入藥搜和切作棋子以白水煮浮更不得使鹽料物只淡食候大小便利去六七分却用後藥調補平胃散附子白术各一兩丁香五錢為末和匀每服二錢薑七片棗三枚煎七分日三五服若脚未退腫可灸三隂交及風門穴腫退必矣大丸治遍身腫滿及痰氣食積傷寒感風脾氣横泄羌活白术各五錢陳皮木通黄茋桑皮各三分木香一分黒丑十個半生半炒右為末蜜丸彈子大治風痰散腹脇壅滯清頭目濃煎薑湯下取食傷止赤白痢煎棗湯下小便不利燈心湯下傷寒葱茶下如未快以稀粥投之用熱茶湯下亦可須七日後方可服已得瀉急欲止之投冷白粥即自止婦人産前並宜服之服此藥須住他藥三日及不得吃生冷葷腥滋味一日只吃軟飯淡粥次日早進千金散藿香炙草炮薑神麯茯苓各一兩人参肉桂陳皮厚朴薑汁炒各二兩為末薑三片鹽一捻每服二錢葶藶大丸治腫滿腹大四肢枯痩小便澁濁甜葶藶薺菜根各等分為末蜜丸彈子大每服一丸陳皮湯嚼下一丸至三丸小便清數夕腹當依舊料簡病有風水皮水石水黄汗皆與正水同其治自别大豆湯治風水通身腫骨節疼惡風自汗眼合不得短氣欲絶其脉浮大豆杏仁麻黄防風防己猪苓各四兩澤瀉黄茋烏頭各三兩半夏茯苓白术各五兩甘遂炙草各二兩右㕮咀每服五錢水二盞酒半盞薑七片煎七分以大小便利腫消則停藥未利加生大㦸六兩葶藶三兩隔紙炒香無不快利甘遂甘草似不當用用之却效非人情所可測也五皮散治皮水四肢頭面悉腫按之沒指不惡風其腹如鼓不喘不渇脉亦浮大腹皮桑白皮茯苓皮生薑皮陳皮每服四錢煎入木香汁少許則效澤漆湯治石水腹腫四肢腫不喘其脉沉澤漆五兩桑皮六兩炙射干泔浸黄芩茯苓白术各四兩防己澤㵼各二兩右㕮咀每服五錢水三盞烏豆一合煎七分日三服黄汗依五疸法治之用黄茋酒黄茋五兩芍藥三兩肉桂二兩每服四錢苦酒三合水一盞半煎七分服料簡病有水腫相類者曰膚脹鼓脹腸覃石瘕脾氣横泄五種治法亦復不同除鼓脹見腫滿門石瘕見婦人門今具膚脹及脾氣横泄於後附子菉豆湯治寒客皮膚殻殻然而堅腹大身腫按之陷而不起色不變病名膚脹一劑未快再服附子一个大約重八錢去皮臍破開兩半菉豆二兩右以生薑一兩水二碗煎至一碗絞去滓分三服空心温服次日將前附子破作四片再用菉豆一兩薑一兩如前煎服第三次將附子作八片如前無礙丸治脾氣横泄四肢浮腫心腹脹滿喘不得卧蓬术三稜各一兩大腹皮二兩木香梹榔一分生右為末炒麥芽粉糊丸桐子大薑湯下二十丸茯苓分氣飲治脾胃不和胸膈噎塞腹脹脇疼痛氣促喘急心下脹滿飲食不進嘔吐不止兼脾氣横泄四肢浮腫五味桔梗茯苓甘草陳皮桑皮大腹皮蘇葉各二兩五錢每服四錢薑三片鹽少許煎七分服麻黄甘草湯治氣急久不瘥遂成水腫如此者諸皮中浮以水攻面目身體從腰以上腫當以此湯發汗麻黄二兩甘草一兩每服四錢煎七分参苓蘇子丸治面腫小便澁心腹脹滿茯苓蘇子杏仁陳皮防己葶藶各一兩隔紙炒為末蜜丸小荳大以桑皮湯下三十丸料簡夫洪腫門類極多自正水之餘有風水皮水石水黄汗等証入水間如脾氣横泄脚氣肢滿膚脹鼓脹腸覃石瘕與夫造作干犯土氣皆作浮腫屬血屬氣理自不同奈外証相類未易甄别若不預學臨証必迷錯亂汗下皆醫殺之更有氣分血分亦入腫門治法甄别其可不學古方類例雖明多見不學者抄寫數方一道施治尚非其病妄投其藥盛者致困困者必死况有飲食禁忌種種不同學者勉之不可輕玩以病試藥甚為不仁戒之戒之氣分証治氣分與胸痺中滿皆相類但胸痺屬氣實中滿屬氣虚氣分則挾痰飲氣為涎飲所隔榮衛不利腹滿脇鳴相逐氣轉膀胱榮衛俱勞陽氣不通則身冷隂氣不通則骨疼陽氣前通則惡寒隂氣前通則痺不仁隂陽相得其氣乃行大氣轉其氣乃散實則失氣虚則遺溺乃知氣挾涎飲之所為也其脉寸口遲而濇遲為氣不足濇為血不足趺陽脉㣲而遲㣲則為氣遲則為寒斯証也名曰氣分桂附湯治心下堅大如盤邉如盤旋水飲所作名曰氣分肉桂三兩炙草麻黄細辛附子四個右㕮咀每服四錢薑七片棗三枚煎七分温服汗出如蟲行皮中即愈枳术湯治同前枳實一兩半白术三兩每服四錢煎七分温服腹中軟即當散也隂􅒃叙論夫隂􅒃屬肝系宗筋胃陽明養之世多不識謂之外腎非特名義錯差亦使内臟不分其可不辨古方雖出四証但曰腸􅒃氣􅒃水􅒃卵脹殊不别其所因如腸􅒃則因房室過度元臟虚冷腹邉膋系不収墜入􅒃中上下無定謂之腸􅒃屬不内外因病者久蓄憂思恐怒兼并随臟氣下墜致腫脹急痛名曰氣􅒃屬内所因病者久生冷濕濕氣下墜致隂腫脹名曰水􅒃屬外所因病者勞役無節及跨馬坐車致卵核腫脹或偏有大小上下無常名曰卵脹屬不内外因有小兒生来便如此者乃宿疾也卵脹腸􅒃皆難治氣􅒃水􅒃皆易治又寒疝下注入於􅒃中名曰狐疝亦屬􅒃病世人因此並以􅒃病為疝氣不審之甚婦人隂門挺出亦稱􅒃病名義不分有如此者隂􅒃証治凡􅒃病惟腸􅒃無問貴賤多有之有睡卧膋系延入脇下者有墜入囊中者或遇役勞及天色變動逼上囊根腫急作痛過於寒疝得煖即下其如卵脹有作熱生膿為癰潰爛者比比有之茱茰内消丸治隂􅒃偏大上攻臍腹㽲痛膚囊腫脹或生瘡瘍時生黄水腿足沉重足脛腫滿行歩艱難服之内消不動臟腑川棟三兩炒大腹皮五味海藻洗𤣥胡索各二兩半茴香肉桂川烏各二兩陳皮桃仁各一兩麵炒木香一兩五錢枳實一兩吳茱茰白蒺藜各二兩桔梗青皮山茰各二兩為末酒糊丸桐子大温酒下三十丸大㦸丸治隂􅒃腫脹或小腸氣痛大㦸五錢去皮炒黄川棟五兩麝香五分另研右為末獨以川棟入好酒二升葱白七枚煮川楝去皮核取肉和藥末丸如桐子大薑湯下五七丸至十丸潮熱疼痛炒薑熱酒下十丸煉隂丸治隂器下墜腫脹卵核偏大堅如石痛不可忍𤣥胡索海藻昆布青皮茴香川楝馬蘭花各一兩木香五錢大㦸酒浸三宿切片焙乾一分右為末别將硇砂阿魏安息香各一分用酒醋各一升淘三物去砂石熬成膏入麝香一錢沒藥一分入前藥和丸菉豆大用綿灰下十丸至十五丸抵聖丸治膀胱有熱多因天氣熱而發隂􅒃腫滿赤痛大便秘欲飲水按之臍下痛續随子米仁郁李仁茵芋白牽牛各一兩㣲炒右為末滴水丸桐子大五丸用博濟方香薑散煎服黄昏服五更利下惡物則效兼金丸治熱入膀胱臍腹上下并脇肋疼痛便燥欲飲水按之痛者大黄八錢煨硝石桂心炙草各四兩桃仁四十粒為末蜜丸桐子大米湯下五七丸至十丸婦人血閉疼痛亦宜服之應痛丸治敗精惡物不去結在隂囊成疝疼痛不可忍阿魏二兩用蕎麥麵以醋和作餅厚三指裹阿魏慢火煨熟梹榔大者二個刮作瓮子滿盛的香將刮下末用蕎麥麵作餅子慢火煨熟右同研為末入硇砂末一錢赤芍末一兩同為麵捜和為丸桐子大酒鹽湯下十丸蒺藜丸治囊核堅大行動艱辛發作牽引偏墜疼痛白蒺藜炒海藻洗去鹽澤瀉各一兩茴香一兩半炒桂心木通牛膝北味木香梹榔各二兩茯苓人参逺志各三兩薑汁炒川楝桃仁赤芍續斷山茰肉蓯蓉青皮各四兩為末蜜丸桐子大温酒鹽湯下三五十丸三白散治膀胱藴熱風濕相乘隂􅒃腫脹大小便不利白牽牛二兩白术桑白皮廣皮木通各五錢右為末每服二錢薑湯調下未覺再進此藥不損臟氣只導利留滯疝方大率多用熱藥此方惟導壅滯熱証宜服之蜘蛛散治隂狐疝氣偏有大小時時上下脹人蜘蛛十四個熬焦桂心五錢為末蜜丸桐子大米飲下十丸牡丹散治􅒃偏大脹不能動坐卧不安丹皮防風等分為末酒服方寸匕小品有桂枝豉鉄精共五味小兒以乳汁調一字許香附散治􅒃脹香附不拘多少為末每用酒一盞煎海藻一錢煎至半盞先吃海藻再取煎酒調香附末二錢服雄黄散治隂腫大如斗核痛人所不能治雄黄一兩研礬二兩研甘草五錢以水四升煎洗之癰疽叙論發背癰疽者該三因而有之論云癰疽瘰癧不問虚實寒熱皆由氣鬰而成經云氣宿於經絡與血俱澁而不行壅結為癰疽不言熱之所作而後成癰者此乃因喜怒憂思有所鬰而成也又論云身有熱被風冷搏之血脉凝注不行熱氣壅結而成亦有隂虚陽氣凑襲寒化為熱熱成則肉腐為膿者此乃外因寒熱風濕所傷而成也又服丹石及炙煿酒麵温牀厚被所致又盡力房室精虚氣節所致者此乃因不内外所傷而成也故知三因偹矣又論云癤者節也癰者壅也疽者沮也如是但隂陽不平有所壅節皆成癰疽又曰隂滯於陽則發癰陽滯於隂則發疽以此二者發無定處當以脉别之浮洪滑數則為陽㣲沉緩澁則為隂隂則熱治陽則冷治治之之要雖有四節八事竊謂初覺則宣熱㧞毒已潰則排膿止痛膿盡則消毒長肌次序固明若不别其所因施治亦昧故治法中有用逺志宣熱者得非内因乎至於外因則用大黄不内外因則用甘草世醫但泥方書多用五香連翹與漏蘆二湯更不知三因所自其可守一法而普攻之既得其因又須觀病淺深與証候吉凶寒則温之熱則清之虚則補之實則瀉之導以鍼石灼以艾炷破毒潰堅以平為期各有成法近胡成得一方甚寳秘之特以獻洪丞相與之作序言重於世已遍行矣其方乃千金内補散添黄茋人参减桂間有輕重者服之稍效若真癰疽為害反甚内補散當用在第四節當先服内消等藥俟膿盡方得投茍專用之亦所謂守一法也孔子不嘗未逹之藥良有㫖哉士大夫當深味斯言毋輕信醫方誤天下後世謹之謹之癰疽証治病者脉數身無熱而反洒淅惡寒若有痛處背發其癰腫欲知有膿無膿以手掩腫上熱者為有膿不熱為無膿此亦大畧也亦有脉不數不熱而疼者發於隂也不痛尤是惡証不可不知凡熱盛脉數即用漏蘆并单煮大黄等湯不甚熱脉緩弱只投五香連翹湯其他依四節八事次序及推三因以用藥未有不全濟也逺志酒治一切癰疽發背癤毒惡候浸大有死血隂毒在中則不痛敷之則痛有憂怒等氣積而内攻則痛不可忍敷之即不痛或藴熱在内熱逼人手敷之即清凉或氣虚血冷潰而不斂敷之即斂此本韓大夫宅用以救人極騐若七情内鬰不問虚實寒熱治之必愈逺志為末每服三錢酒一盞調少頃澄清之服以滓敷患處单煮大黄湯孫真人云緩急之際单煑一味為湯服即快利此要法獨聖湯治服金石及食炙煿飲酒房勞發為癰疽及諸惡瘡疼痛甘草半斤以水一斗浸一宿煎至五升以下去滓入銀石器内熬為膏分二服温酒下臨卧一服次日五更一服當取下惡物為效通聖雙行湯治傷風寒暑濕或散使氣血凝滯肉腐為膿壅結成癰疽随處發作大黄一兩木鱉防風枳殻桔梗甘草各一分右㕮咀每服四五錢水一盞煎七分去滓入朴硝二錢溶化熱服得踈轉一二次即服萬金湯若隂証只服萬金不可用通聖雙行也萬金湯治癰疽發背髭鬚發腦婦人乳癰等定痛去毒甘草五錢沒藥五錢𤓰蔞一個去皮以無灰酒一斗煮至一升随量飲盡或出血或出黄水即愈五香連翹湯治一切惡核瘰癧癰疽惡毒等証青木香沉香乳香丁香麝香升麻桑寄生獨活連翹射干木通各二兩大黄三兩右㕮咀每服四錢水二盞煮一盞以上去滓取八分取清汁熱服半日以上未利再服以利下惡物為度未生肉前服不妨以折熱毒之氣本方有竹瀝芒硝恐泥者不能斟酌故缺之知者當自量入漏蘆湯治癰疽發背丹痃惡肉時行熱毒發作赤腫及眼赤生瘡漏蘆白芨黄芩麻黄白薇枳殻升麻炙草白芍各二兩大黄三兩芒硝右㕮咀每服四錢煎七分以快利為度忍冬酒治癰疽腫毒甚效忍冬草取嫩苖或有花更好炙草八錢右同研入酒一升半以瓶塞口煑温服仍以渣敷腫上又木蓮葉四十九片揩去毛研細酒觧温服與忍冬草不相上下又龍鱗薜荔一握細研以酒觧汁温服亦能瀉下惡物去其根轉毒散治發背癰疽不問淺深大小利根本不動元氣車螯紫背光厚者名昌熾甘草一分輕粉五分右以鹽泥固濟車螯火煅取末一兩入甘草輕粉研匀濃煎𤓰蔞酒調下四錢五更初轉下惡物為度未快再作𤓰蔞每用一個酒一碗煎一盞為一劑服靈寳膏治發背癰疽宣㧞熱毒排膿止痛𤓰蔞仁三十個取仁炒香細研乳香胡桃六十個取肉去皮同𤓰蔞仁研白蜜一斤右以銀石器内慢火熬成膏每服兩匙温酒調下托裏散治癰疽欲發未潰及己潰服之内托不使透膜𤓰蔞仁鬼腰帶皮皂角刺射干即仙人掌根花紅者是天蘿𤓰取子茴香木鱉五個漢椒一兩右焙乾為末麵薄糊為丸作餅炙乾為末酒調下二三錢不飲酒以木香湯下梹連散治癰疽瘡腫未潰已潰皆可敷梹榔川連各五錢川山甲十甲燒存性為末先㸃好茶以翎毛刷過瘡仍以茶清調藥敷瘡上如熱甚則雞子清調膿已潰則用長肌藥未潰則用替針丸白玉膏收縮癰疽令不蔓衍切忌用冷藥外貼逼毒氣殺人杏仁二十一粒川椒四十九粒去目炒出汗為末清油一兩酒蠟半兩右文武熬用栁青枝攪紫黒色綿濾過再熬滴水成珠収净器内看瘡大小作新月樣紙花團圈貼候暈收更促小瘡頭聚用後藥敷替針丸治癰疽雖潰而膿不出出之不快雄雀糞二十七個硇砂一字陳倉米沒藥俱一字右研匀以米飲丸如粟米每用一粒貼在瘡頭或瘡眼中即潰膿出生肌散敷癰疽瘡毒即生肌黄狗頭骨燒存性二兩膩粉右為末生蔴油調敷自通聖萬金神異白玉梹連替針生肌凡七方是一家行用均濟三因皆良藥也瞿麥散治癰疽已潰排膿止痛利小便瞿麥一兩芍藥肉桂赤小荳川芎黄茋當歸白蘞麥冬各二兩為末酒調下二錢内塞散治癰疽已退熱膿血不止排膿止痛防風茯苓白芷桔梗逺志甘草人参川芎歸身黄茋各一兩肉桂五錢附子一枚製厚朴二兩薑炒赤小荳二兩半酒浸炒為末温酒米湯調下二錢千金内補散治癰疽發背惡肌不盡服此生肌消毒當歸肉桂各二兩人参川芎厚朴薑製防風炙草白芷桔梗各一兩為末酒調下二錢不能飲酒以木香湯調下善應膏治癰疽潰長肌斂痂白芷黄茋各一兩甘草二錢黄蠟二兩黄丹二兩半右前三味為粗末春秋用蔴油四兩半夏四兩冬五兩熬藥紫赤色綿濾去滓再入黄蠟黄丹以栁枝不住手攪滴水成珠即止用如常法猪蹄湯洗發背癰疽猪蹄黄茋川連白芷各二錢黄芩一分薔薇根狼毒根各一兩右㕮咀以水二斗煮猪蹄熟澄清得汁半斗入藥煎至三盞去滓洗瘡以帛拭乾日二次如疼痛加當歸甘草各一分外食散治癰腫惡肉不盡膿水淋漓敷此能消肌長肉白礬銀盒内用瓦葢煅令盡一兩好染坯血竭各一兩右細研用桑漿旋捜為膏量瘡大小貼之忌鯽魚酒麵毒物等漏瘡脉例經云陷脉為漏留連肉腠脉得寒即下陷凝滯肌肉故曰留滯肉腠肉冷亦能為膿血故為冷漏須用温藥方如後陷脉散治漏瘡及二三十年癭瘤或大如杯盂久久不瘥致有漏潰令人骨消肉盡或堅或軟或潰令人驚惕寤寐不安身中痛愈而復作炮薑琥珀大黄附子各一兩丹参三錢石硫黄白石英鍾乳粉烏賊魚骨各五錢為末貯以磁盒韋囊勿令洩氣若瘡濕即敷無汁煎猪油敷之以乾為度或死肌不消加芒硝方亦佳一法用胡燕屎一枚桂附丸治氣漏冷漏諸瘡肉桂附子炮裂投米醋中浸再泡三五次去皮尖厚朴薑炒炙草白术各一兩木香一分乳香二錢研為末蜜丸桐子大米飲下三十丸癰疽治法夫癰則皮薄腫髙疽則皮厚腫堅初發並宜灼艾惟癰成則宜針疽膿成則宜烙若能審其名証早早施治仍用藥以攻利其根補托其裡不必告醫自療而瘥但世人忽之耳醫方所以冠癰疽於雜病之先者知為大病也世醫失治療之序顛倒錯亂多致夭枉良可歎息故備集得效灸法以貽學者庶不致妄投也治初生癰疽發背神效灸法累試有騐江寧府紫極觀因掘得石碑載之凡人初覺發背欲結未結赤熱腫痛先以濕紙覆其上立視觀之其紙先乾處即結癰頭也取大蒜切成片如三錢厚安其頭上用大艾炷灸之三壯即換一蒜片痛者灸至不痛不痛灸至痛時方住最要早覺早灸為上一日二日十灸十活三日四日六七活五六日三四活過七日則不可灸矣若有十數頭作一處生者即用大蒜研成膏作薄餅鋪頭上聚艾於蒜餅上燒之亦能活也若背上初發赤腫一片中間有一片黄粟米頭子便用獨頭蒜切去兩頭取中間半寸厚正安於瘡上却用艾於蒜上灸十四壯多至四十九壯三因極一病証方論卷十四
